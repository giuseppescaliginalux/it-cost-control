    /**
     * js_initiatives_templates.html
     * VIEW TEMPLATES: Pure HTML visual components for the Initiatives Hub.
     */

    const InitiativesTemplates = {

        getKanbanMainLayout: function () {
            return `
            <div class="mb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-3">
                <div>
                    <h2 class="text-xl font-black text-slate-800 uppercase tracking-widest">IT Initiatives Control Center</h2>
                    <p class="text-slate-500 text-xs font-medium mt-1">Drag & Drop cards between lanes to update technical lifecycle status instantly.</p>
                </div>
                <div class="flex items-center gap-2 flex-wrap w-full md:w-auto justify-end">
                    <div id="initiatives-global-tags-filter-lane" class="flex flex-wrap gap-1 items-center mr-2"></div>
                    <button onclick="InitiativesController.openInitiativeModalForm(null)" class="py-2 px-4 bg-teal-700 hover:bg-teal-800 text-white font-black text-xs uppercase tracking-wider rounded-xl shadow-md transition-all">+ New Initiative</button>
                    <button onclick="InitiativesController.pushKanbanArchitectureToGoogleSheets()" class="py-2 px-4 bg-slate-800 hover:bg-slate-900 text-white font-black text-xs uppercase tracking-wider rounded-xl shadow-md transition-all">Commit & Push Kanban</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-5 gap-4 items-start w-full mt-4" id="initiatives-kanban-board-grid"></div>
            <div id="initiatives-modal-mount-point" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xs z-[9999] flex items-center justify-center p-4"></div>
        `;
        },

        getKanbanColumnStructure: function (columnKey, label, colorClass, cardsHtml, count, totalSaving) {
            return `
            <div class="bg-slate-50/80 rounded-2xl p-4 border border-slate-200 flex flex-col min-h-[650px] w-full"
                 ondragover="event.preventDefault();" 
                 ondrop="InitiativesController.handleColumnDrop(event, '${columnKey}')">
                <div class="flex items-center justify-between mb-3 pb-1.5 border-b border-slate-200 w-full">
                    <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full ${colorClass}"></span>
                        ${label}
                    </h3>
                    <div class="flex items-center gap-2">
                        <div class="text-right leading-tight">
                            <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest block">Saving</span>
                            <span class="font-mono font-black text-slate-700 text-[11px]">€${Math.round(totalSaving).toLocaleString('it-IT')}</span>
                        </div>
                        <span class="bg-white border text-slate-700 text-[10px] font-black px-2 py-0.5 rounded shadow-3xs min-w-[22px] text-center">${count}</span>
                    </div>
                </div>
                <div class="flex flex-col gap-3 overflow-y-auto flex-1 pr-0.5" id="kanban-target-lane-${columnKey}">
                    ${cardsHtml}
                </div>
            </div>
        `;
        },

        getInitiativeCard: function (data, id, fmtSaving, savingPercentText, finalDateStr, strategyBadge, assetName, manufacturer) {
            const tags = (data["Tags"] || "").split(',').map(t => t.trim()).filter(t => t);

            return `
            <div id="ops-card-parent-${id}" 
                 draggable="true" 
                 ondragstart="InitiativesController.handleCardDragStart(event, '${id}')"
                 class="block bg-white rounded-xl border border-slate-200/80 p-3 shadow-3xs cursor-grab active:cursor-grabbing group hover:shadow-md hover:border-teal-500/40 transition-all overflow-hidden relative animate-fade-in"
                 onclick="InitiativesController.openInitiativeModalForm(${id})">
                
                <div class="flex justify-between items-start gap-3 w-full">
                    <div class="min-w-0 flex-1">
                        <h4 class="font-black text-slate-900 text-[12px] leading-tight mb-0.5 truncate">${assetName || "Unassigned Asset"}</h4>
                        <div class="text-[8px] font-black text-slate-400 uppercase tracking-widest truncate">${manufacturer || 'Generic Vendor'}</div>
                    </div>
                    <div class="text-right shrink-0 flex flex-col items-end">
                        <span class="text-[8px] font-bold text-slate-400 uppercase tracking-tight">Saving</span>
                        <div class="flex items-center gap-1 font-mono font-black text-teal-600 text-[11px]">
                            <span>${fmtSaving}</span>
                            <span class="text-[8px] font-sans font-black px-1 py-0.5 rounded border border-teal-100 bg-teal-50/50 leading-none">${savingPercentText}</span>
                        </div>
                    </div>
                </div>

                <div class="text-[10px] text-slate-500 italic leading-relaxed line-clamp-2 mt-2 border-b border-slate-50 pb-2">
                    ${data["Description"] || "No description provided."}
                </div>

                <div class="flex items-center justify-between w-full h-5 mt-2 text-[9px] font-bold">
                    <div class="flex items-center gap-1.5 shrink-0">
                        ${strategyBadge}
                        <span class="text-slate-300 select-none">•</span>
                        <span class="text-slate-400 font-mono">Target: ${finalDateStr}</span>
                    </div>
                </div>

                ${tags.length > 0 ? `
                <div class="flex flex-wrap gap-1 mt-2 pt-1.5 border-t border-slate-100/60">
                    ${tags.map(t => `<span class="px-1.5 py-0.5 bg-slate-50 border border-slate-200 text-slate-600 rounded text-[7px] font-black uppercase tracking-wider shadow-3xs">${t}</span>`).join('')}
                </div>` : ''}
            </div>
        `;
        },

        getModalFormStructure: function (isNew, assetDropdownHtml, contractDropdownHtml, leverCheckboxesHtml) {
            return `
        <div class="bg-white rounded-2xl border border-slate-200 p-5 w-full max-w-2xl space-y-4 shadow-2xl relative animate-fade-in text-xs">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2.5">
                <div>
                    <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest">${isNew ? 'New Transformation Initiative' : 'Modify Financial Initiative'}</h3>
                    <p class="text-slate-400 text-[10px]">Define optimization vectors, technical scope and timelines.</p>
                </div>
                <button onclick="InitiativesController.closeInitiativeModalWindow()" class="text-slate-400 hover:text-slate-600 text-lg font-bold">×</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 bg-slate-50 p-3 rounded-xl border border-slate-200/60 shadow-inner">
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 required-label">1. Select Asset Context</label>
                    <select id="modal-init-asset-select" onchange="InitiativesController.handleAssetCascadeDropdownChange(this.value)" class="w-full p-2 bg-white border border-slate-300 rounded-lg focus:ring-1 focus:ring-teal-500 font-bold text-slate-800">
                        <option value="">-- Choose Target Technology Asset --</option>
                        ${assetDropdownHtml}
                    </select>
                </div>
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 required-label">2. Link Specific Contract Row</label>
                    <select id="modal-init-contract-select" class="w-full p-2 bg-white border border-slate-300 rounded-lg focus:ring-1 focus:ring-teal-500 font-mono text-slate-700 font-bold">
                        <option value="">-- Select Mapped Contract Ref --</option>
                        ${contractDropdownHtml}
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Initial Strategy</label>
                    <select id="modal-init-strategy" class="w-full p-2 bg-white border border-slate-300 rounded-lg font-bold text-slate-700">
                        <option value="OPTIMIZATION">OPTIMIZATION</option>
                        <option value="TERMINATE">TERMINATE</option>
                        <option value="REPLACE">REPLACE</option>
                        <option value="TRANSFER">TRANSFER</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Final Decision</label>
                    <select id="modal-init-decision" class="w-full p-2 bg-white border border-slate-300 rounded-lg font-bold text-indigo-700">
                        <option value="OPTIMIZATION">OPTIMIZATION</option>
                        <option value="TERMINATE">TERMINATE</option>
                        <option value="REPLACE">REPLACE</option>
                        <option value="TRANSFER">TRANSFER</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Kanban Governance Lane</label>
                    <select id="modal-init-status" class="w-full p-2 bg-white border border-slate-300 rounded-lg font-bold text-slate-800">
                        <option value="IDEA">IDEA</option>
                        <option value="INCOMING">INCOMING</option>
                        <option value="PLANNED">PLANNED</option>
                        <option value="IN PROGRESS">IN PROGRESS</option>
                        <option value="COMPLETED">COMPLETED</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 required-label">Target Execution Date</label>
                    <input type="date" id="modal-init-target-date" class="w-full p-2 bg-white border border-slate-300 rounded-lg font-mono font-bold text-slate-700">
                </div>
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 required-label">Target Saving (Annualized €)</label>
                    <input type="text" id="modal-init-target-saving" oninput="ContractsUtils.formatInputAsIntegerCurrency(this)" placeholder="e.g. 35.000" class="w-full p-2 bg-white border border-slate-300 rounded-lg font-mono font-black text-teal-800">
                </div>
            </div>

            <div>
                <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Attached Optimization Levers (Multi-Selection Context)</label>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Service Owner</label>
                    <input type="text" id="modal-init-owner" class="w-full p-2 bg-white border border-slate-300 rounded-lg font-medium text-slate-800">
                </div>
                <div>
                    <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Procurement Point Focal</label>
                    <input type="text" id="modal-init-procurement" class="w-full p-2 bg-white border border-slate-300 rounded-lg font-medium text-slate-800">
                </div>
            </div>

            <div>
                <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Technical Scope Description</label>
                <textarea id="modal-init-description" rows="2" class="w-full p-2 bg-white border border-slate-300 rounded-lg focus:ring-1 focus:ring-teal-500 font-medium text-slate-700" placeholder="Describe the structural modifications..."></textarea>
            </div>

            <div>
                <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Operational Selection Tags (Press Comma to append at runtime)</label>
                <div class="border border-slate-300 bg-white p-2 rounded-xl space-y-2">
                    <div id="modal-init-tags-wrapper" class="flex flex-wrap gap-1.5"></div>
                    <input type="text" id="modal-init-tags-input" onkeyup="InitiativesController.handleTagsOnTheFlyInjection(event)" placeholder="Type tag name and add comma..." class="w-full p-1 text-[11px] font-bold text-slate-600 bg-slate-50 border-none outline-none focus:outline-none">
                </div>
            </div>

            <div class="flex justify-between items-center border-t border-slate-100 pt-3">
                ${!isNew ? `<button onclick="InitiativesController.deleteInitiativeFromArchitecture()" class="px-4 py-2 bg-rose-50 border border-rose-200 hover:bg-rose-600 text-rose-600 hover:text-white font-black uppercase tracking-wider rounded-xl transition-all">Delete</button>` : '<div></div>'}
                <div class="flex gap-2">
                    <button onclick="InitiativesController.closeInitiativeModalWindow()" class="px-4 py-2 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">Cancel</button>
                    <button onclick="InitiativesController.commitInitiativeFormToLocalState()" class="px-6 py-2 bg-teal-700 hover:bg-teal-800 text-white font-black uppercase tracking-wider rounded-xl shadow-md transition-colors">Apply Matrix Changes</button>
                </div>
            </div>
        </div>
        `;
        }
    };
</script>
