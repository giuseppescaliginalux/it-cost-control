                                </select>
                            </div>
                            
                            <div class="relative w-full sm:w-56 shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                <input type="text" id="initiatives-search-input" onkeyup="InitiativesController.handleSearchInput(this.value)" placeholder="Search keyword..." class="w-full pl-9 pr-3 py-1.5 text-[11px] font-bold bg-slate-50 hover:bg-white border border-slate-200 rounded-xl focus:ring-1 focus:ring-teal-500 shadow-inner outline-none transition-colors">

                <div class="grid grid-cols-1 md:grid-cols-3 gap-5 items-start w-full" id="initiatives-kanban-board-grid"

        `;
        },

        getKanbanColumnStructure: function (columnKey, label, colorClass, bgColorClass, iconSvg, cardsHtml, count, totalSaving, dropdownHtml = '') {
            return `
            <div class="kanban-lane-container ${bgColorClass} rounded-2xl p-4 flex flex-col min-h-[680px] w-full relative border shadow-inner"

        getInitiativeCard: function (data, id, fmtSaving, savingPercentText, finalDateStr, strategyBadge, initiativeName, assetName, fmtRunRate, fmtTargetCost, costLabel, supplier, isOverdue, dateLabel = "Target Date", owner = "TBD", procurement = "TBD") {
            const cardBorderClass = isOverdue ? "border-rose-300 shadow-sm shadow-rose-100/50" : "border-slate-200";
            const isNegSaving = savingPercentText.includes('+');
            const textColorClass = isNegSaving ? 'text-rose-600' : 'text-teal-600';
            const badgeColorClass = isNegSaving ? 'border-rose-100 bg-rose-50/50 text-rose-700' : 'border-teal-100 bg-teal-50/50 text-teal-700';

            const safeOwner = owner && owner.trim() !== "undefined" && owner.trim() !== "" ? owner : "TBD";
            const safeProcurement = procurement && procurement.trim() !== "undefined" && procurement.trim() !== "" ? procurement : "TBD";
            const safeDateLabel = dateLabel && dateLabel.trim() !== "undefined" ? dateLabel : "Target Date";
            const safeSupplier = supplier && supplier.trim() !== "undefined" && supplier.trim() !== "" ? supplier : "Generic Supplier";

            const tags = (data.tags || "").split(',').map(t => t.trim()).filter(t => t);
            const tagsHtml = tags.map(t => `
            <div class="relative flex items-center px-2 py-0.5 bg-slate-50 hover:bg-rose-50 border border-slate-200/80 hover:border-rose-200 rounded-full shadow-3xs group/tag transition-all duration-150 cursor-default h-4.5">
                <span class="text-slate-600 group-hover/tag:text-rose-700 text-[8px] font-black uppercase tracking-wider select-none"><span class="text-teal-500/80 group-hover/tag:text-rose-400">#</span>${t}</span>
                <button type="button" onclick="event.stopPropagation(); InitiativesController.removeTagFromSource('${t}', ${id})" 
                        class="${InitiativesState.globalEditMode ? 'w-0 opacity-0 group-hover/tag:w-3 group-hover/tag:opacity-100 group-hover/tag:ml-1' : 'hidden'} flex items-center justify-center text-rose-500 hover:text-rose-700 font-black text-[10px] transition-all cursor-pointer leading-none" title="Remove tag">×</button>
            </div>`).join('');

            return `
            <!-- 🌐 GUSCIO CONTAINER 3D BILANCIATO -->
            <div class="flip-card-container w-full group" id="card-container-${id}">
                <div class="flip-card-inner w-full h-full shadow-3xs rounded-xl">
                    
                    <!-- 🟩 LATO A: FRONT VISTA OPERATIVA -->
                    <div id="ops-card-parent-${id}" 
                         draggable="${InitiativesState.globalEditMode ? 'true' : 'false'}" 
                         ondragstart="InitiativesController.handleCardDragStart(event, ${id})"
                         ondragover="InitiativesController.handleCardDragOver(event, this)"
                         ondragleave="InitiativesController.handleCardDragLeave(event, this)"
                         ondrop="InitiativesController.handleCardDrop(event, ${id}, this)"
                         class="flip-card-front block bg-white rounded-xl border ${cardBorderClass} p-3 shadow-3xs ${InitiativesState.globalEditMode ? 'cursor-pointer hover:border-teal-500/40' : 'cursor-zoom-in'} transition-all relative animate-fade-in hover:shadow-md hover:z-30 w-full h-full"
                         onclick="InitiativesController.openInitiativeModalForm(${id})">
                        
                        <!-- ⚡ CONTEXT MENU UNIVERSALE POSIZIONATO IN SICUREZZA -->
                        <div class="absolute top-2.5 right-2 z-30" onclick="event.stopPropagation()">
                            <button onclick="InitiativesController.toggleContextMenu('${id}')" class="p-1 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded transition-colors shadow-3xs">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" /></svg>
                            </button>
                            
                            <div id="context-menu-${id}" class="hidden absolute right-0 mt-1 w-44 bg-white border border-slate-200 rounded-lg shadow-xl overflow-hidden context-dropdown">
                                <button onclick="InitiativesController.flipCard('${id}')" class="w-full text-left px-4 py-2.5 text-xs font-black text-indigo-600 hover:bg-indigo-50 flex items-center gap-2 border-b border-slate-100 transition-colors">
                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg> Fiscal Projection
                                </button>
                                ${InitiativesState.globalEditMode ? `
                                <button onclick="InitiativesController.openInitiativeModalForm(${id})" class="w-full text-left px-4 py-2 text-xs font-bold text-slate-700 hover:bg-slate-50 flex items-center gap-2 mt-1">
                                    <svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg> Edit
                                </button>
                                <button onclick="InitiativesController.cloneInitiative('${id}')" class="w-full text-left px-4 py-2 text-xs font-bold text-slate-700 hover:bg-slate-50 flex items-center gap-2">
                                    <svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg> Clone
                                </button>
                                <div class="border-t border-slate-100 my-1"></div>
                                <button onclick="InitiativesController.deleteInitiativeInline('${id}')" class="w-full text-left px-4 py-2 text-xs font-bold text-rose-600 hover:bg-rose-50 flex items-center gap-2 transition-colors">
                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg> Delete
                                </button>
                                ` : ''}
                            </div>
                        </div>
                        
                        <!-- 🛡️ PR-7 AGGIUNTO PER EVITARE SOVRAPPOSIZIONI CON I TRE PUNTINI -->
                        <div class="flex justify-between items-start gap-3 w-full mb-1 relative z-10 pr-7">
                            <div class="min-w-0 flex-1">
                                <h4 class="font-black text-slate-900 text-[13px] leading-snug mb-1 truncate" title="${initiativeName}">${initiativeName}</h4>
                                <div class="flex flex-col gap-1">
                                    <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest bg-slate-50/80 px-1.5 py-0.5 border border-slate-200 rounded truncate w-fit max-w-full shadow-3xs" title="${assetName}">${assetName || 'Unassigned'}</span>
                                    <div class="text-[9px] text-slate-400 font-medium truncate mt-0.5" title="Supplier: ${safeSupplier}">
                                        Supplier: <span class="font-bold text-slate-600">${safeSupplier}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="text-right shrink-0 flex gap-2.5 bg-slate-50/50 p-1.5 rounded-lg border border-slate-100">
                                <div class="flex flex-col items-end border-r border-slate-200 pr-2.5 justify-center">
                                    <span class="text-[8px] font-bold text-slate-400 uppercase tracking-tight">Baseline</span>
                                    <span class="font-mono font-bold text-slate-500 text-[11px] mt-0.5">${fmtRunRate}</span>
                                </div>
                                <div class="flex flex-col items-end border-r border-slate-200 pr-2.5 justify-center">
                                    <span class="text-[8px] font-bold text-slate-400 uppercase tracking-tight">${costLabel}</span>
                                    <span class="font-mono font-black text-indigo-600 text-[11px] mt-0.5">${fmtTargetCost}</span>
                                </div>
                                <div class="flex flex-col items-end justify-center pl-0.5">
                                    <span class="text-[8px] font-bold text-slate-400 uppercase tracking-tight">Saving</span>
                                    <div class="flex items-center gap-1 mt-0.5 font-mono font-black ${textColorClass} text-[12px]">
                                        <span>${fmtSaving}</span>
                                        <span class="text-[8px] font-sans font-black px-1 py-0.5 rounded border ${badgeColorClass} leading-none">${savingPercentText}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="text-[11px] text-slate-600 font-medium leading-relaxed mt-2.5 border-b border-slate-50 pb-2.5 relative z-10">
                            ${data.description || "No specific technical scope defined."}
                        </div>

                        <div class="flex items-end justify-between w-full mt-2.5 relative z-10">
                            <div class="flex flex-col gap-1.5 shrink-0 min-w-0 pr-2">
                                <div class="w-fit">${strategyBadge}</div>
                                <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-[9px] font-bold text-slate-500 mt-1">
                                    <div class="flex items-center gap-1 truncate max-w-[100px]" title="Service Owner: ${safeOwner}">
                                        <svg class="w-3 h-3 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                        <span class="truncate">${safeOwner}</span>
                                    </div>
                                    <div class="flex items-center gap-1 truncate max-w-[100px]" title="Procurement Focal: ${safeProcurement}">
                                        <svg class="w-3 h-3 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                                        <span class="truncate">${safeProcurement}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col items-end shrink-0">
                                <span class="text-[8px] font-black uppercase tracking-widest ${isOverdue ? 'text-rose-500' : 'text-slate-400'}">${safeDateLabel}</span>
                                <div class="flex items-center gap-1 mt-0.5">
                                    <button onclick="event.stopPropagation(); InitiativesController.flipCard('${id}')" class="p-1 bg-slate-50 hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 rounded border border-slate-200 transition-colors shadow-3xs group/pnl" title="Toggle 3D Fiscal Outlook">
                                        <svg class="w-3.5 h-3.5 group-hover/pnl:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                    </button>

                                    <span class="font-mono text-[10px] font-black ${isOverdue ? 'text-rose-700 bg-rose-50 border-rose-200' : 'text-slate-700 bg-slate-50 border-slate-200'} px-2 py-0.5 rounded border shadow-3xs">${finalDateStr}</span>
                                    ${isOverdue ? `<span class="px-1.5 py-0.5 bg-rose-100 text-rose-700 border border-rose-200 rounded text-[7px] font-black uppercase tracking-wider animate-pulse ml-0.5">Overdue</span>` : ''}
                                </div>
                            </div>
                        </div>

                        ${tags.length > 0 ? `
                        <div class="absolute top-full -translate-y-1/2 left-4 right-4 flex flex-wrap gap-1.5 opacity-0 group-hover:opacity-100 transition-all duration-150 pointer-events-none group-hover:pointer-events-auto z-30" onclick="event.stopPropagation()">
                            ${tagsHtml}
                        </div>` : ''}
                        
                        <div class="absolute inset-0 bg-teal-500/5 border border-teal-500/30 rounded-xl opacity-0 pointer-events-none transition-opacity z-20" id="drop-overlay-${id}"></div>
                    </div>

                    <!-- 🟦 LATO B: BACK (Clean Fiscal Outlook - No Double Padding) -->
                    <div class="flip-card-back border border-slate-200 p-0 flex flex-col justify-between cursor-default bg-white" onclick="event.stopPropagation()">
                        <!-- Contenitore a schermo intero per il grafico a barre YoY -->
                        <div id="pnl-chart-3d-container-${id}" class="w-full h-full">
                            <span class="text-slate-500 text-[10px] italic">Loading projections...</span>
                        </div>
                    </div>

                </div>
            </div>
            `;
        },

        // --- HELPER METODI P&L ---
        getPnLImpactPanelMarkup: function (b26, o26, b27, o27, b28, o28, id = null) {
            const maxVal = Math.max(b26, o26, b27, o27, b28, o28, 1);

            const getBar = (val, isOptimized) => {
                const h = Math.max(4, (val / maxVal) * 100);
                const color = isOptimized ? 'bg-teal-500' : 'bg-slate-300';
                return `<div class="w-3.5 ${color} rounded-t-sm transition-all" style="height: ${h}%;" title="€${window.formatKM(val)}"></div>`;
            };

            const calcYoY = (base, target) => {
                const diff = target - base;
                const pct = base > 0 ? (diff / base) * 100 : 0;
                const sign = diff > 0 ? '+' : '';
                const color = diff < 0 ? 'text-emerald-600' : (diff > 0 ? 'text-rose-600' : 'text-slate-400');
                if (diff === 0) return `<span class="text-slate-400 font-bold">—</span>`;
                return `<span class="${color} font-black text-[11px]">${sign}€${window.formatKM(Math.abs(diff))} <span class="text-[9px]">(${sign}${pct.toFixed(1)}%)</span></span>`;
            };

            // Se l'id è definito (retro card), applichiamo un padding confortevole di p-4 e allunghiamo il grafico
            const paddingClass = id !== null ? "p-4" : "p-3 border border-slate-200/60";
            const titleSize = id !== null ? "text-[11px]" : "text-[9px]";
            const legendSize = id !== null ? "text-[9px]" : "text-[7.5px]";
            const yoyTitleSize = id !== null ? "text-[8.5px]" : "text-[7px]";
            const barHeightClass = id !== null ? "h-[74px]" : "h-16";

            return `
            <div class="bg-white ${paddingClass} rounded-xl w-full h-full flex flex-col justify-between">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-1.5 shrink-0">
                    <span class="${titleSize} font-black text-slate-700 uppercase tracking-widest flex items-center gap-1.5 select-none">
                        <svg class="w-4 h-4 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>
                        Fiscal Projections
                    </span>
                    <div class="flex items-center gap-3">
                        <!-- Ripristinate le diciture "Baseline" e "Optimized" in chiaro -->
                        <div class="flex items-center gap-2 ${legendSize} font-bold text-slate-400 uppercase select-none">
                            <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-slate-300 rounded-sm"></span> Baseline</div>
                            <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-teal-500 rounded-sm"></span> Optimized</div>
                        </div>
                        ${id !== null ? `
                        <button onclick="InitiativesController.flipCard('${id}')" class="p-1 text-slate-400 hover:text-slate-600 rounded hover:bg-slate-100 transition-colors shadow-3xs" title="Back to front">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                        ` : ''}
                    </div>
                </div>

                <!-- Grafico a barre con altezza e spessore ottimizzati per massima leggibilità -->
                <div class="flex items-end justify-around ${barHeightClass} pt-1 pb-1 border-b border-slate-100 shrink-0">
                    <div class="flex flex-col items-center h-full w-1/3 border-r border-slate-100">
                        <div class="flex items-end justify-center gap-1.5 h-full w-full mb-1">
                            ${getBar(b26, false)}
                            ${getBar(o26, true)}
                        </div>
                        <span class="text-[9px] font-black text-slate-700 select-none">FY26</span>
                        <span class="text-[11px] font-mono font-bold text-teal-700 leading-none mt-0.5">€${window.formatKM(o26)}</span>
                    </div>

        getMasterSmartCards: function (mastersArray, preSelectedMasterId, preSelectedContractId = null) {
            let html = '<div class="space-y-2">';

            mastersArray.forEach(m => {
                const expDateStr = m.masterEndDate ? m.masterEndDate.toString().split('T')[0] : "N/A";
                const isSelected = preSelectedMasterId === m.masterId;
                const runRate = parseFloat(m.runRate) || 0;

                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const maxDate = m.masterEndDate ? new Date(m.masterEndDate) : null;
                const isFullyExpired = maxDate && (maxDate < today);

                const expiredOpacityClass = isFullyExpired && !isSelected ? 'opacity-40 grayscale hover:opacity-100 hover:grayscale-0' : '';
                const borderClass = isSelected ? 'border-teal-500 bg-teal-50/20 ring-1 ring-teal-500 shadow-sm' : 'border-slate-200 bg-white hover:border-teal-300';

                const checkIcon = isSelected && !preSelectedContractId
                    ? `<svg class="w-4 h-4 text-teal-600 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`
                    : `<div class="w-4 h-4 rounded-full border-2 border-slate-300 shrink-0"></div>`;

                let listHtml = '';
                if (m.childContracts && m.childContracts.length > 0) {
                    listHtml = m.childContracts.map(c => {
                        let desc = c.scope || "No scope provided";
                        let safeScope = String(desc).replace(/"/g, '&quot;');
                        let cc = c.costCenter || "N/A";
                        let tcv = parseFloat(c.totalCommitment || 0);
                        let term = c.contractTerm || "N/A";

                        let endDate = c.endDate || "N/A";
                        if (endDate !== "N/A") {
                            let ed = new Date(endDate);
                            if (!isNaN(ed.getTime())) endDate = ed.toISOString().split('T')[0];
                        }
                        let cRunRate = parseFloat(c.annualValue || 0);
                        const cId = c.contractId || "";

                        const isContractSelected = preSelectedContractId === cId;
                        const rowSelectedClass = isContractSelected ? "bg-amber-50/80 font-bold border-l-4 border-l-amber-500" : "";
                        const targetBtnClass = isContractSelected ? "bg-amber-500 text-white shadow-3xs scale-105" : "bg-slate-100 text-slate-400 hover:bg-amber-500 hover:text-white";

                        return `
                        <tr id="contract-row-${cId}" class="contract-row-item border-b border-slate-100 hover:bg-slate-100 transition-colors ${rowSelectedClass}">
                            <td class="p-1.5 text-center align-middle w-10">
                                <button type="button" onclick="event.stopPropagation(); InitiativesController.selectContractCard('${m.masterId}', '${cId}')" 
                                        id="contract-target-btn-${cId}"
                                        class="contract-target-btn p-1 rounded text-[9px] font-black leading-none transition-all ${targetBtnClass}" 
                                        title="Target this specific contract scope">
                                    🎯
                                </button>
                            </td>
                            <td class="p-1.5 truncate max-w-[180px] font-medium text-slate-800" title="${safeScope}">${desc}</td>
                            <td class="p-1.5 font-mono">${cc}</td>
                            <td class="p-1.5 font-mono text-slate-500">€${Math.round(tcv).toLocaleString('it-IT')}</td>
                            <td class="p-1.5 truncate max-w-[60px] text-center" title="${term}">${term} M</td>
                            <td class="p-1.5 font-mono text-slate-400">${endDate}</td>
                            <td class="p-1.5 font-bold font-mono text-slate-700 text-right">€${Math.round(cRunRate).toLocaleString('it-IT')}</td>
                        </tr>
                        `;
                    }).join('');
                } else {
                    listHtml = `<tr><td colspan="7" class="p-4 text-center text-slate-400 italic">No operational contracts found linked to this Master Agreement.</td></tr>`;
                }

                html += `
                <div class="border ${borderClass} ${expiredOpacityClass} rounded-xl p-2.5 transition-all cursor-pointer master-card pb-3" onclick="InitiativesController.selectMasterCard('${m.masterId}')" id="master-card-${m.masterId}">
                    
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex items-center gap-2.5 min-w-0 flex-1">
                            <div id="master-check-${m.masterId}" class="shrink-0">${checkIcon}</div>
                            <div class="min-w-0 flex-1">
                                <div class="font-black text-[11px] text-slate-800">Master ID: <span class="text-indigo-600">${m.masterId}</span></div>
                                <div class="flex flex-wrap gap-x-2 gap-y-0.5 text-[9px] font-bold text-slate-500 mt-0.5">
                                    <div class="truncate shrink-0">Supplier: <span class="text-slate-700">${m.supplier || 'N/A'}</span></div>
                                    <div class="text-slate-300 shrink-0">•</div>
                                    <div class="truncate flex-1 min-w-[150px]" title="${m.masterScope || ''}">Scope: ${m.masterScope || 'N/A'}</div>
                                </div>
                            </div>
                        </div>
                        <div class="text-right shrink-0 border-l border-slate-200/50 pl-3">
                            <div class="font-mono font-black text-slate-700 text-[12px]">€${Math.round(runRate).toLocaleString('it-IT')}</div>
                            <div class="text-[8px] font-bold text-slate-400 uppercase mt-0.5 tracking-tight">Max Exp: <span class="text-slate-600 font-mono">${expDateStr}</span></div>
                        </div>
                    </div>

                    <div id="master-details-${m.masterId}" class="${isSelected ? '' : 'hidden'} mt-3 bg-slate-50 border border-slate-200/60 rounded-lg overflow-x-auto custom-scrollbar p-1 shadow-inner" onclick="event.stopPropagation()">
                        <table class="w-full text-[8px] text-left text-slate-600 whitespace-nowrap table-fixed">
                            <thead>
                                <tr class="text-slate-400 uppercase tracking-widest border-b border-slate-200 text-[7px]">
                                    <th class="p-1.5 font-black w-10 text-center">Target</th>
                                    <th class="p-1.5 font-black w-[30%]">Scope / Service Name</th>
                                    <th class="p-1.5 font-black w-[12%]">Cost Ctr</th>
                                    <th class="p-1.5 font-black w-[18%]">Commitment</th>
                                    <th class="p-1.5 font-black w-[10%] text-center">Term</th>
                                    <th class="p-1.5 font-black w-[12%]">End Date</th>
                                    <th class="p-1.5 font-black w-[18%] text-right">Run Rate</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${listHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
                `;
            });
            html += '</div>';
            return html;
        },

        getGlobalFilterTagItem: function (tag, isSelected, isUsed) {
            let activeClass = "";
            if (isSelected) {
                activeClass = 'bg-teal-600 text-white border-teal-700 shadow-md font-black scale-102';
            } else if (!isUsed) {
                activeClass = 'bg-slate-100 text-slate-400 border-slate-200/60 font-medium opacity-60 hover:opacity-90 hover:bg-slate-200/50';
            } else {
                activeClass = 'bg-slate-50 hover:bg-slate-100 text-slate-600 border-slate-200 hover:border-slate-300 font-bold';
            }

            const hashColorClass = isSelected ? 'text-teal-200' : (isUsed ? 'text-teal-500' : 'text-slate-300');
            const tooltipText = isUsed ? 'Active tag' : 'New tag - Drag to a card to attach';

            return `
                <div draggable="${InitiativesState.globalEditMode ? 'true' : 'false'}" 
                     ondragstart="InitiativesController.handleTagDragStart(event, '${tag}')"
                     onclick="InitiativesController.handleGlobalTagFilterToggle('${tag}')"
                     class="px-2.5 py-1 text-[9px] uppercase tracking-wider rounded-xl border cursor-pointer select-none transition-all ${activeClass} h-6 flex items-center"
                     title="${tooltipText}">
                     <span class="${hashColorClass} mr-0.5 font-black">#</span>${tag}
                </div>
            `;
        },
    };
</script>
