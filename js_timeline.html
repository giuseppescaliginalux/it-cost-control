<script>
    /**
     * js_timeline.html
     * ARCHITETTURA MASTER-CENTRIC: Disegna solo gli Accordi Quadro (Master).
     * Sfrutta Previous Master ID per evidenziare le successioni.
     */

    const TimelineState = {
        timelineStartYear: 2024,
        timelineEndYear: 2028,
        pixelRatePerMonth: 32, // 3 Anni visibili perfettamente

        // Ora filtriamo e lavoriamo direttamente sui MASTER CONTRACTS
        getActiveMasters: function() {
            return (windowPayload.masterContracts || []);
        },

        calculateTimeCoordinates: function(startDateStr, endDateStr) {
            if (!startDateStr || !endDateStr) return { width: 0, left: 0 };

            const start = new Date(startDateStr);
            const end = new Date(endDateStr);
            if (isNaN(start.getTime()) || isNaN(end.getTime())) return { width: 0, left: 0 };

            const baseDate = new Date(this.timelineStartYear, 0, 1);
            const msPerDay = 24 * 60 * 60 * 1000;
            const offsetDays = Math.max(0, Math.floor((start - baseDate) / msPerDay));
            const durationDays = Math.max(1, Math.floor((end - start) / msPerDay) + 1);
            const pixelRatePerDay = this.pixelRatePerMonth / 30.4166;

            return {
                left: offsetDays * pixelRatePerDay,
                width: durationDays * pixelRatePerDay
            };
        }
    };

    const TimelineTemplates = {
        getControlsShellMarkup: function() {
            return `
            <div class="space-y-4 animate-fade-in relative z-20">
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
                    <div>
                        <h2 class="text-lg font-black text-slate-800 tracking-tight">Master Agreements Lifecycle</h2>
                        <p class="text-xs text-slate-500 font-medium mt-0.5">Vista aggregata per Fornitore e dipendenze storiche.</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="TimelineController.scrollTimelineCanvas('left')" class="px-3 py-1.5 bg-slate-800 text-white rounded-xl hover:bg-slate-900 text-[10px] font-black tracking-wider uppercase shadow-xs cursor-pointer">◀ Past</button>
                        <button onclick="TimelineController.scrollTimelineCanvas('right')" class="px-3 py-1.5 bg-slate-800 text-white rounded-xl hover:bg-slate-900 text-[10px] font-black tracking-wider uppercase shadow-xs cursor-pointer">Future ▶</button>
                    </div>
                </div>

                <div id="timeline-matrix-canvas-wrapper" class="overflow-x-auto border border-slate-200 bg-white rounded-2xl p-4 shadow-sm scroll-smooth">
                    <div style="width: 2100px;" class="space-y-4">
                        <div class="flex items-center text-left text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 font-mono">
                            <div class="w-65 shrink-0 border-r border-slate-200 pr-2 bg-white sticky left-0 z-30">Supplier / Vendor</div>
                            <div id="timeline-chronological-axis-track" class="flex-1 flex gap-0 pl-4 relative"></div>
                        </div>
                        <div id="timeline-matrix-swimlanes-viewport" class="space-y-4 relative"></div>
                    </div>
                </div>
            </div>`;
        },

        getTimeScaleAxisTicks: function(startYear, endYear, monthWidth) {
            let html = '';
            const yearWidth = 12 * monthWidth; 
            for (let year = startYear; year <= endYear; year++) {
                const highlightClass = (year === 2026 || year === 2027) ? "text-teal-700 font-black bg-teal-50/40 border-teal-200/60 shadow-3xs" : "text-slate-400 border-slate-100";
                html += `
                <div style="width: ${yearWidth}px;" class="border-l pb-1 pl-3 font-mono text-[11px] shrink-0 h-8 flex items-center ${highlightClass}">
                    <span>Year ${year}</span>
                    ${year === 2026 ? '<span class="text-[8px] bg-emerald-100 text-emerald-700 border border-emerald-200 px-1.5 py-0.5 rounded ml-3 uppercase font-sans font-black tracking-wide">In Progress</span>' : ''}
                </div>`;
            }
            return html;
        },

        getSwimlaneBlockMarkup: function(supplierName, cardsHtml) {
            return `
            <div class="bg-slate-50/50 border border-slate-200/80 rounded-2xl p-4 flex flex-row items-stretch gap-4 hover:border-slate-300 transition-colors relative">
                <div class="w-65 bg-white border border-slate-200 p-3 rounded-2xl flex flex-col justify-center shrink-0 text-left sticky left-0 z-30 shadow-sm">
                    <h5 class="text-sm font-black text-slate-800 break-words leading-tight truncate" title="${supplierName}">${supplierName}</h5>
                </div>
                <div class="flex-1 flex flex-col gap-2.5 overflow-x-hidden relative pl-4">
                    ${cardsHtml}
                </div>
            </div>`;
        },

        getContractCardNodeMarkup: function(m, left, width) {
            const isExpired = (m["Status"] || "").toString().toUpperCase().trim() === "EXPIRED";
            const borderStyles = isExpired ? "border-slate-200 bg-slate-50/50 opacity-60 grayscale-[0.2]" : "border-slate-200 bg-white shadow-3xs hover:border-teal-500/40";
            const stripeColor = isExpired ? "bg-slate-400" : "bg-teal-600";
            
            const cleanStart = safeFormatStringDate(m["Start Date"] || m["Master Start Date"]);
            const cleanEnd = safeFormatStringDate(m["End Date"] || m["Master End Date"]);
            const formattedVal = parseFloat(m["Annual Value"] || m["Total Value"] || 0).formatCurrency();
            
            const masterId = m["Master Contract ID"] || "N/A";
            const prevId = (m["Previous Master ID"] || "").toString().trim();

            // Etichetta visiva se questo master deriva da un altro (Rinnovo/Consolidamento)
            const prevBadgeHtml = prevId ? `<span class="bg-amber-100 text-amber-800 border border-amber-200 px-1 py-0.5 rounded text-[8px] font-black uppercase flex items-center gap-1" title="Renews: ${prevId}"><svg class="w-2 h-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Successor</span>` : '';

            return `
            <div class="relative w-full h-16 shrink-0">
                <div style="position: absolute; left: ${left}px; width: ${width}px;" class="h-16 flex items-center shrink-0 cursor-pointer hover:scale-[1.01] transition-transform">
                    <div class="w-full border rounded-xl p-2 h-16 flex flex-col justify-between relative overflow-hidden group transition-all ${borderStyles}">
                        <div class="absolute top-0 left-0 w-1 h-full ${stripeColor}"></div>
                        
                        <div class="flex justify-between items-center font-black text-[11px] leading-none px-1">
                            <div class="flex items-center gap-1.5 truncate max-w-[70%]">
                                <span class="text-slate-900 font-extrabold truncate" title="${masterId}">${masterId}</span>
                                ${prevBadgeHtml}
                            </div>
                            <span class="font-mono text-teal-700 text-[11px] shrink-0 font-bold">€ ${formattedVal}</span>
                        </div>

                        <div class="text-[8px] text-slate-400 font-mono flex justify-between uppercase leading-none px-1 tracking-tighter select-none mt-1">
                            <span>${cleanStart}</span>
                            <span class="text-teal-600 font-bold bg-teal-50 px-1 rounded border border-teal-100/40">${m["Term (Months)"] || '-'} M</span>
                            <span>${cleanEnd}</span>
                        </div>
                    </div>
                </div>
            </div>`;
        }
    };

    const TimelineController = {
        initTimelineWorkspace: function() {
            const tabContainer = document.getElementById('tab-timeline');
            if (!tabContainer) return;
            tabContainer.innerHTML = TimelineTemplates.getControlsShellMarkup();
            this.renderActiveTimelineCanvas();
        },

        scrollTimelineCanvas: function(direction) {
            const wrapper = document.getElementById('timeline-matrix-canvas-wrapper');
            if (!wrapper) return;
            const scrollStep = 12 * TimelineState.pixelRatePerMonth;
            wrapper.scrollLeft += (direction === 'left' ? -scrollStep : scrollStep);
        },

        renderActiveTimelineCanvas: function() {
            const wrapper = document.getElementById('timeline-matrix-canvas-wrapper');
            const viewport = document.getElementById('timeline-matrix-swimlanes-viewport');
            const axisTrack = document.getElementById('timeline-chronological-axis-track');

            if (!wrapper || !viewport || !axisTrack) return;

            const masters = TimelineState.getActiveMasters();

            if (masters.length === 0) {
                viewport.innerHTML = '<div class="p-8 text-center text-slate-400 text-xs font-bold uppercase">No Master Contracts found in payload.</div>';
                return;
            }

            axisTrack.innerHTML = TimelineTemplates.getTimeScaleAxisTicks(
                TimelineState.timelineStartYear, 
                TimelineState.timelineEndYear, 
                TimelineState.pixelRatePerMonth
            );

            // Raggruppa i Master per Fornitore (Supplier)
            const swimlanesBuckets = {};
            masters.forEach(m => {
                let supplier = (m["Supplier"] || "Unassigned Vendor").toString().trim();
                if (supplier === "") supplier = "Unassigned Vendor";
                
                if (!swimlanesBuckets[supplier]) swimlanesBuckets[supplier] = [];
                swimlanesBuckets[supplier].push(m);
            });

            let swimlanesHtml = '';
            Object.keys(swimlanesBuckets).sort().forEach(supplier => {
                let cardsHtml = '';
                
                swimlanesBuckets[supplier].forEach(master => {
                    const coord = TimelineState.calculateTimeCoordinates(
                        master["Start Date"] || master["Master Start Date"], 
                        master["End Date"] || master["Master End Date"]
                    );
                    cardsHtml += TimelineTemplates.getContractCardNodeMarkup(master, coord.left, coord.width);
                });

                swimlanesHtml += TimelineTemplates.getSwimlaneBlockMarkup(supplier, cardsHtml);
            });

            viewport.innerHTML = swimlanesHtml;
            
            setTimeout(() => {
                wrapper.scrollLeft = 24 * TimelineState.pixelRatePerMonth; // Punta al 2026
            }, 50);
        }
    };
</script>
