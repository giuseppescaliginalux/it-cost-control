        getAssetOutlookMarkup: function (b26, o26, b27, o27, b28, o28, safeDOMId) {

            const s27 = Math.max(0, b27 - o27);
            const s28 = Math.max(0, b28 - o28);
            const maxVal = Math.max(b26, b27, b28, 1);

            const fmt = (val) => window.formatKM ? window.formatKM(val) : Math.round(val).toLocaleString('it-IT');
            const pct = (sav, base) => base > 0 ? Math.round((sav / base) * 100) : 0;

            const renderBar = (base, opt, sav) => {
                const hBase = (base / maxVal) * 100;
                const hSav = base > 0 ? (sav / base) * 100 : 0;
                const hOpt = base > 0 ? (opt / base) * 100 : 0;

                return `
                <div class="h-full w-10 flex flex-col justify-end items-center group">
                    <div class="w-5 flex flex-col justify-end rounded-t-[3px] overflow-hidden shadow-sm transition-transform duration-300 group-hover:scale-110 cursor-crosshair" style="height: ${Math.max(2, hBase)}%;">
                        ${sav > 0 ? `<div class="w-full bg-emerald-400 border-b border-emerald-500/60" style="height: ${hSav}%;" title="Saving: €${fmt(sav)}"></div>` : ''}
                        <div class="w-full bg-teal-700" style="height: ${hOpt}%;" title="Optimized: €${fmt(opt)}"></div>
                    </div>
                </div>`;
            };

            const renderSavCell = (sav, base) => {
                const p = pct(sav, base);
                return sav > 0
                    ? `<span class="text-emerald-500 font-bold">€ ${fmt(sav)}</span> <span class="text-[8px] font-black text-emerald-500/70 ml-0.5">(-${p}%)</span>`
                    : `<span class="text-slate-300">0%</span>`;
            };

                        <div class="w-[25%] text-right text-[8px] font-black text-slate-400 uppercase tracking-widest">FY27</div>
                        <div class="w-[25%] text-right text-[8px] font-black text-slate-400 uppercase tracking-widest">FY28</div>
                    </div>

                    <!-- Baseline Row -->
                    <div class="flex items-center w-full hover:bg-slate-50 px-1 rounded transition-colors leading-none py-1">
                        <div class="w-[25%] text-[9px] font-black text-slate-500 uppercase tracking-widest">Baseline</div>
                        <div class="w-[25%] text-right text-[10px] font-mono text-slate-400">€ ${fmt(b26)}</div>
                        <div class="w-[25%] text-right text-[10px] font-mono text-slate-400">€ ${fmt(b27)}</div>
                        <div class="w-[25%] text-right text-[10px] font-mono text-slate-400">€ ${fmt(b28)}</div>

                    <div class="text-[10px] text-slate-500 mt-1 truncate" title="${scope}">${scope}</div>
                </div>

                <div class="w-[20%] flex flex-col justify-center border-l border-slate-100/70 pl-3 shrink-0">
                    <span class="text-[6px] text-slate-400 uppercase font-black tracking-widest block mb-0.5">COST CENTER</span>
                    <div class="flex items-center gap-1.5">
                        <span class="font-bold text-[10px] text-slate-700 truncate max-w-[100px]">${costCenter}</span>
                        <span class="px-1.5 py-0.5 bg-slate-100 text-slate-500 font-black text-[7px] uppercase tracking-widest rounded border border-slate-200/60 shrink-0">${expType}</span>
                    </div>
                </div>
                
                <div class="w-[20%] flex flex-col justify-center border-l border-slate-100/70 pl-3 shrink-0">
                    <span class="text-[6px] text-slate-400 uppercase font-black tracking-widest block mb-0.5">LIFECYCLE</span>
                    <span class="text-[9px] font-mono font-medium text-slate-600 whitespace-nowrap">${start} ➔ ${end}</span>
                    <span class="text-[8px] font-medium text-slate-400 mt-0.5">${term} Months</span>
                </div>

                <div class="flex items-center justify-end w-[30%] shrink-0 gap-4">
                    <div class="text-right flex flex-col items-end">
                        <span class="text-[6px] text-slate-400 uppercase font-black tracking-widest block mb-0.5">COMMITMENT</span>
                        <span class="text-[11px] font-mono font-black text-slate-700">€ ${effCommitStr}</span>
                        ${hasCredit ? `<span class="text-[8px] font-bold text-teal-600">(${creditStr})</span>` : ''}
                    </div>
                    <div class="text-right flex flex-col items-end pl-3 border-l border-slate-100" title="${isDiscounted ? `Nominal Run Rate: €${nomRunRateStr}` : ''}">
                        <span class="text-[6px] text-slate-400 uppercase font-black tracking-widest block mb-0.5">RUN RATE</span>
                        <span class="text-[12px] font-mono font-black ${isDiscounted ? 'text-teal-700' : 'text-slate-700'} block">€ ${effRunRateStr}</span>
                    </div>
                    ${editActions}
                </div>
            </div>
            `;
        },

        getCurrentStatusBadge: function (status) {
            const val = (status || "").toUpperCase().trim();
            const styles = {
                'RUNNING': 'text-emerald-700 bg-emerald-50 border-emerald-100',
                'OPTIMIZING': 'text-amber-700 bg-amber-50 border-amber-100',
                'EXITING': 'text-orange-700 bg-orange-50 border-orange-100',
                'TRANSFERRED': 'text-sky-700 bg-sky-50 border-sky-100',
                'EXPIRED': 'text-rose-700 bg-rose-50 border-rose-100',
                'DISMISSED': 'text-slate-500 bg-slate-50 border-slate-200'
            };
            return `<span class="px-2 py-0.5 text-[9px] font-bold rounded-full border ${styles[val] || 'text-slate-400 bg-slate-50 border-slate-100'}">${val}</span>`;
        },

        getTargetStatusText: function (target) {
            const val = (target || "").toUpperCase().trim();
            const colors = { 'RETAIN': 'text-emerald-600', 'EXIT': 'text-rose-600', 'HANDOVER': 'text-sky-600' };
            return `<span class="text-[10px] font-black tracking-widest uppercase ${colors[val] || 'text-slate-400'}">${val}</span>`;
        },

        getBudgetStatusBadge: function (budgetStatus) {
            const val = (budgetStatus || "").toUpperCase().trim();
            if (val === "SECURED") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> SECURED</span>`;
            if (val === "AT RISK") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> AT RISK</span>`;
            return `<span class="text-slate-300">—</span>`;
        },

        getMoveLineModalMarkup: function (targetContract, currentMaster, availableMasters) {
            const formatStrDate = (v) => v ? new Date(v).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A';

            const masterCardsHtml = availableMasters.map(m => {
                // FIX: Mappiamo tutte le possibili chiavi del JSON per Commitment e Scope
                const effCommitNum = parseFloat(m.effectiveCommitment || m.totalCommitment || 0);
                const commitStr = window.formatKM ? window.formatKM(effCommitNum) : effCommitNum.toLocaleString('it-IT');
                const scopeStr = m.scope || m.masterScope || "No Scope defined";

                return `
                <div id="move-target-card-${m.masterId}" onclick="InventoryController.selectTargetMaster('${m.masterId}')" class="move-target-card cursor-pointer bg-white border border-slate-200 rounded-lg p-3 hover:border-teal-500 hover:shadow-sm transition-all mb-2 flex items-center justify-between gap-3 relative">
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] font-black text-slate-800 uppercase tracking-widest truncate">${m.supplier || "Supplier N/A"}</div>
                        <div class="text-[10px] text-slate-500 truncate mt-0.5" title="${scopeStr}">${scopeStr}</div>
                    </div>
                    <div class="text-right shrink-0 px-3 border-r border-slate-100">
                        <div class="text-[7px] text-slate-400 uppercase font-black tracking-widest mb-0.5">Validity</div>
                        <div class="font-mono text-[9px] font-bold text-slate-600">${formatStrDate(m.masterStartDate)} ➔ ${formatStrDate(m.masterEndDate)}</div>
                    </div>
                    <div class="text-right shrink-0 w-[80px]">
                        <div class="text-[7px] text-slate-400 uppercase font-black tracking-widest mb-0.5">Commitment</div>
                        <div class="font-mono text-[11px] font-black text-slate-800">€ ${commitStr}</div>
                    </div>
                    <!-- Selection Indicator -->
                    <div class="absolute -left-1.5 top-1/2 -translate-y-1/2 w-3 h-3 bg-teal-500 rounded-full border-2 border-white opacity-0 transition-opacity" id="move-target-indicator-${m.masterId}"></div>
                </div>`;
            }).join('');

            return `
            <div id="move-line-modal" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-fade-in p-4">
                <div class="bg-slate-50 rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden border border-slate-200">
                    <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-white">
                        <div>
                            <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                                <svg class="w-4 h-4 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                                Move Contract Line
                            </h3>
                            <p class="text-[10px] font-bold text-slate-500 mt-1">Select the destination Master Agreement for this line</p>
                        </div>
                        <button onclick="InventoryController.closeMoveLineModal()" class="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 p-1.5 rounded transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                    </div>
                    
                    <div class="p-6 bg-slate-50/50 max-h-[60vh] overflow-y-auto">
                        <div class="mb-4 text-xs bg-indigo-50 border border-indigo-100 p-3 rounded-lg text-indigo-800 shadow-inner">
                            Moving line <strong>${targetContract.legalEntity || targetContract.contractId}</strong> currently bound to <strong class="uppercase">${currentMaster.supplier || currentMaster.Supplier || ''}</strong>.
                        </div>
                        <div id="move-target-container">
                            ${masterCardsHtml}
                        </div>
                    </div>
                    
                    <div class="px-6 py-4 border-t border-slate-200 bg-white flex justify-end gap-3">
                        <button onclick="InventoryController.closeMoveLineModal()" class="px-4 py-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest hover:bg-slate-100 rounded transition-colors border border-transparent">Cancel</button>
                        <button id="move-line-apply-btn" disabled onclick="InventoryController.confirmMoveLine('${targetContract.contractId}')" class="px-5 py-2 text-[10px] font-black text-white uppercase tracking-widest bg-slate-300 rounded cursor-not-allowed transition-colors flex items-center gap-2">
                            Apply Movement
                        </button>
                    </div>
                </div>
            </div>`;
        }

    };

    InventoryTemplates.getTemplateOfMasterAccordion = InventoryTemplates.getMasterAccordionCard;

</script>
