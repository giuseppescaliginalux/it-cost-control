<script>
    /**
     * js_initiatives_state.html
     * MODEL: Centralized State Management for the 3-Column Initiatives Hub.
     * Gestisce lo stato e la matematica delle iniziative usando DTO camelCase puri.
     */

    const InitiativesState = {
        rawInitiatives: [],
        optimizationLevers: [],
        currentEditingInitiative: null,
        selectedTagsFilter: [],
        searchKeyword: '',
        globalEditMode: false,

        pipelineHorizon: 'next_3_months',
        pipelineStatus: 'all',
        realizedHistory: 'past_month',
        globalSortKey: 'assetName',

        loadPayload: function (payload) {
            this.rawInitiatives = payload.initiatives || [];
            this.optimizationLevers = payload.optimizationLevers || [
                "Tier Consolidation", "License Downgrade", "Architecture Optimization",
                "Contract Renegotiation", "Vendor Swap", "Storage Lifecycle", "Instance Right-sizing"
            ];

            this.rawInitiatives.forEach(init => {
                if (String(init.status).toUpperCase().trim() === "INCOMING") {
                    init.status = "PLANNED";
                }
            });
        },

        recalculateMetrics: function (initiatives, contracts, masterContracts = []) {
            const sortedInits = [...initiatives].sort((a, b) => {
                const dA = new Date(a.targetDate || "2099-12-31");
                const dB = new Date(b.targetDate || "2099-12-31");
                return dA - dB;
            });

            sortedInits.forEach(init => {
                const masterId = (init.masterId || "").toString().trim();
                const contractId = (init.contractId || "").toString().trim();
                const targetDate = init.targetDate ? new Date(init.targetDate) : null;

                let originalBaseline = 0;
                if (contractId !== "") {
                    const c = contracts.find(x => String(x.contractId).trim() === contractId);
                    originalBaseline = c ? (parseFloat(c.annualValue) || 0) : 0;
                } else {
                    contracts.forEach(c => {
                        if (String(c.masterId).trim() === masterId && masterId !== "") {
                            originalBaseline += (parseFloat(c.annualValue) || 0);
                        }
                    });
                }

                let startingCost = originalBaseline;
                if (originalBaseline !== 0 && targetDate) {
                    const priorInits = sortedInits.filter(i => {
                        const iMaster = String(i.masterId || "").trim();
                        const iContract = String(i.contractId || "").trim();
                        return iMaster === masterId && iContract === contractId &&
                            new Date(i.targetDate) < targetDate &&
                            !isNaN(parseFloat(i.targetCostAnnualized));
                    });

                    if (priorInits.length > 0) {
                        priorInits.sort((a, b) => new Date(b.targetDate) - new Date(a.targetDate));
                        startingCost = parseFloat(priorInits[0].targetCostAnnualized);
                    }
                }
                init.baselineSpendAnnualized = startingCost;

                const targetCost = parseFloat(init.targetCostAnnualized);
                const strategy = (init.decision || "").toString().trim().toLowerCase();

                let targetSaving = 0;
                if (!isNaN(targetCost) && targetCost >= 0) {
                    targetSaving = startingCost - targetCost;
                } else if (["terminate", "replace", "transfer"].includes(strategy)) {
                    targetSaving = startingCost;
                }
                init.targetSavingAnnualized = targetSaving;
                init.targetSavingPct = startingCost > 0 ? (targetSaving / startingCost) : 0;

                const status = (init.status || "").toString().trim().toLowerCase();

                // ⚡ NUOVA LOGICA AUTOMATICA: Se Completata, ricalcola il saving vero dal successore
                if (status === "completed") {
                    if (["terminate", "transfer"].includes(strategy)) {
                        init.newActual = 0;
                    } else if (masterId !== "") {
                        const successor = masterContracts.find(m => (m.previousMasterId || "").includes(masterId));
                        if (successor) {
                            init.newActual = parseFloat(successor.runRate) || 0;
                        }
                    }

                    if (init.newActual !== "" && init.newActual !== null && !isNaN(parseFloat(init.newActual))) {
                        init.actualSavingAnnualized = startingCost - parseFloat(init.newActual);
                    } else {
                        init.actualSavingAnnualized = targetSaving;
                    }
                } else {
                    init.actualSavingAnnualized = 0;
                    init.newActual = "";
                }
            });

            return initiatives;
        },

        updateInitiativeStatus: function (id, newStatus) {
            if (this.rawInitiatives[id]) {
                this.rawInitiatives[id].status = newStatus;
                return this.rawInitiatives[id];
            }
            return null;
        },

        getInitiativeById: function (id) {
            return this.rawInitiatives[id] ? { ...this.rawInitiatives[id], _id: id } : null;
        },

        saveInitiativeInstance: function (id, updatedData) {
            if (id === null || id === undefined || id === '') {
                this.rawInitiatives.push(updatedData);
            } else {
                this.rawInitiatives[id] = updatedData;
            }
        },

        deleteInitiativeInstance: function (id) {
            if (this.rawInitiatives[id]) {
                this.rawInitiatives.splice(id, 1);
                return true;
            }
            return false;
        },

        toggleTagFilter: function (tag) {
            const idx = this.selectedTagsFilter.indexOf(tag);
            if (idx > -1) this.selectedTagsFilter.splice(idx, 1);
            else this.selectedTagsFilter.push(tag);
        }
    };
</script>
