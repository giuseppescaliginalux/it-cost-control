Number.prototype.formatCurrency = function () {
    return this.toLocaleString('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
    });
}

// Estensione per gli oggetti Date nativi
Date.prototype.formatDashboardDate = function () {
    if (isNaN(this.getTime())) return "-";
    return this.toLocaleDateString('en-US', {
        day: 'numeric',
        month: 'short',
        year: 'numeric'
    });
};

// Estensione per le stringhe contenenti date (es. "2027-01-14" o "2027-01-14T00:00:00")
String.prototype.formatDashboardDate = function () {
    if (!this.trim() || this === "-") return "-";
    const parsedDate = new Date(this);
    if (isNaN(parsedDate.getTime())) return this; // Se non è una data valida, restituisce il testo originale
    return parsedDate.formatDashboardDate();
};

/**
 * apiFetch: Versione Nativa Google
 * Risolve l'errore TypeError: Failed to fetch (CORS)
 */
function apiFetch(params = {}) {
  return new Promise((resolve, reject) => {
    
    // Decidiamo quale funzione chiamare nel Code.gs
    let serverFunction = "getAssetsData_Internal";
    let arg = null;

    if (params.action === "macro_trend") serverFunction = "getTrendData_Internal";
    if (params.action === "active_savings") serverFunction = "getSavingsData_Internal";
    if (params.asset) {
      serverFunction = "getDrillDownData_Internal";
      arg = params.asset;
    }

    // Il tunnel nativo di Google
    google.script.run
      .withSuccessHandler(data => {
        // I dati arrivano già come oggetti JavaScript, pronti all'uso!
        resolve(data);
      })
      .withFailureHandler(err => {
        console.error("Errore lato Server:", err);
        reject(err);
      })[serverFunction](arg); // Chiama la funzione con l'eventuale argomento
  });
}

// Nuovo wrapper per gestire il payload multiplo con async/await
function apiFetchFullPayload() {
    return new Promise((resolve, reject) => {
        google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .getFullPayload_Internal(); // La funzione che hai incollato in Code.gs
    });
}

async function fetchLiveData() {
    document.getElementById('loading-state').classList.remove('hidden');
    document.getElementById('error-state').classList.add('hidden');
    document.getElementById('dashboard-content').classList.add('hidden');
    
    try {
        // 1. SCARICHIAMO IL SUPER-PACCHETTO (Assets + Contratti + Iniziative)
        const payload = await apiFetchFullPayload();
        
        // Salviamo l'intero payload globalmente per usi futuri
        window.globalPayload = payload; 
        
        // ====================================================
        // ZONA 1: LA TUA VECCHIA LOGICA INVENTORY (INVARIATA)
        // ====================================================
        // Diamo in pasto alla vecchia logica SOLO gli Assets
        globalCachedData = (payload.assets || []).filter(r => (r["Asset Name"] || "").toString().trim() !== "");
        window.allLiveRows = globalCachedData; // Per report iniziative
        
        setupDynamicSlider(globalCachedData);
        
        // I tuoi vecchi script aggiorneranno le nuove card usando i vecchi ID
        renderStaticKpis(globalCachedData);

        const top10 = [...globalCachedData].sort((a,b) => (parseFloat(b["Run Rate"])||0) - (parseFloat(a["Run Rate"])||0)).slice(0, 10);
        renderLiveChart(top10.map(r => r["Asset Name"]), top10.map(r => parseFloat(r["Effective Budget"])||0), top10.map(r => parseFloat(r["Fiscal Projection"])||0));

        applyFiltersAndSort(); // Popola la tabella Inventory

        fetchAndRenderTrendChart(); // Le tue chiamate originali
        fetchAndRenderCumulativeSavings();

        // ====================================================
        // ZONA 2: LA NUOVA LOGICA EXECUTIVE DASHBOARD
        // ====================================================
        // Passiamo tutto il pacchetto alla nuova funzione dei KPI e dei Grafici
        if (typeof updateExecutiveDashboard === "function") {
            updateExecutiveDashboard(payload);
        }

        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('dashboard-content').classList.remove('hidden');
        
        // Sicurezza extra: forza il ricalcolo delle larghezze dei grafici
        window.dispatchEvent(new Event('resize'));
        
    } catch (e) {
        document.getElementById('error-message').textContent = e.toString();
        document.getElementById('error-state').classList.remove('hidden');
    }
}

function switchTab(tabId) {
    const tabDash = document.getElementById('tab-dashboard');
    const tabInv = document.getElementById('tab-inventory');
    const btnDash = document.getElementById('btn-tab-dashboard');
    const btnInv = document.getElementById('btn-tab-inventory');

    // Nuovi stili per il tema scuro dell'Header
    const activeClass = "bg-teal-700 text-white shadow-sm pointer-events-none font-black".split(" ");
    const inactiveClass = "text-teal-300 hover:text-white hover:bg-teal-800/50 cursor-pointer font-bold".split(" ");

    if(tabId === 'tab-dashboard') {
        tabDash.classList.remove('hidden'); tabDash.classList.add('block');
        tabInv.classList.remove('block'); tabInv.classList.add('hidden');

        btnDash.classList.remove(...inactiveClass); btnDash.classList.add(...activeClass);
        btnInv.classList.remove(...activeClass); btnInv.classList.add(...inactiveClass);
        window.dispatchEvent(new Event('resize'));

        tabInv.classList.remove('hidden'); tabInv.classList.add('block');
        tabDash.classList.remove('block'); tabDash.classList.add('hidden');

        btnInv.classList.remove(...inactiveClass); btnInv.classList.add(...activeClass);
        btnDash.classList.remove(...activeClass); btnDash.classList.add(...inactiveClass);
    }
}

// ==========================================
// LOGICA NUOVA DASHBOARD EXECUTIVE
// ==========================================
function updateExecutiveDashboard(payload) {
    const contracts = payload.contracts || [];
    const initiatives = payload.initiatives || [];
    const assets = payload.assets || [];

    // --- 1. Calcoli Macro ---
    // Recuperiamo Budget e Proiezione dai tuoi calcoli esistenti
    let totalBudget = 0;
    let totalProjection = 0;
    assets.forEach(a => {
        totalBudget += parseFloat(a["Effective Budget"]) || 0;
        totalProjection += parseFloat(a["Fiscal Projection"]) || 0;
    });

    // --- 2. Contratti Attivi (Filtro Robusto) ---
    const activeContracts = contracts.filter(c => {
        const s = c["Status"];
        return s && s.toString().trim().toUpperCase() === "ACTIVE";
    });
    
    const activeCountEl = document.getElementById('active-contracts-count');
    if (activeCountEl) activeCountEl.textContent = activeContracts.length;

    // --- 3. Savings, Gap & Efficiency ---
    let totalActualSaving = 0;
    let totalTargetSaving = 0;

    initiatives.forEach(init => {
        totalActualSaving += parseFloat(init["Actual Saving (Annualized)"]) || 0;
        totalTargetSaving += parseFloat(init["Target Saving (Annualized)"]) || 0;
    });

    // Calcoliamo quanto manca da mettere in sicurezza (evitando numeri negativi se abbiamo superato il target)
    const remainingToSecure = Math.max(0, totalTargetSaving - totalActualSaving);

    // Funzione rapida per formattare in Milioni (M)
    const formatMillions = (val) => "€ " + (val / 1000000).toFixed(1) + "M";

    // Popoliamo i due numerini (Secured e To Secure) in formato M
    const actualSavingsEl = document.getElementById('actual-savings-kpi');
    const targetSavingsEl = document.getElementById('target-savings-kpi');
    
    if (actualSavingsEl) actualSavingsEl.textContent = formatMillions(totalActualSaving);
    if (targetSavingsEl) targetSavingsEl.textContent = formatMillions(remainingToSecure);

    // Calcoliamo la percentuale di risparmio sul BUDGET TOTALE
    const totalPipelineSavings = totalActualSaving + remainingToSecure;
    const portfolioSavingPct = totalBudget > 0 ? Math.round((totalPipelineSavings / totalBudget) * 100) : 0;
    
    const efficiencyEl = document.getElementById('efficiency-kpi');
    if (efficiencyEl) efficiencyEl.textContent = portfolioSavingPct + "%";

    // --- 4. ACCENSIONE GRAFICI ---
    
    // Ricreiamo la variabile per il grafico
    const totalSavings = totalActualSaving + remainingToSecure;
    // Grafico A: Waterfall
    renderWaterfallChart(totalBudget, totalSavings, totalProjection);
    
    // Grafico B: Suppliers (Dovrebbe già andare)
    renderSupplierChart(activeContracts);
    
    // Grafico C: Renewal Pipeline
    renderRenewalPipeline(activeContracts);
}

// Variabile globale per distruggere il grafico al refresh
let supplierChartInstance = null; 

function renderSupplierChart(activeContracts) {
    const ctxElement = document.getElementById('supplierConcentrationChart');
    if (!ctxElement) return; // Se l'HTML non è pronto, si ferma

    const supplierMap = {};
    activeContracts.forEach(c => {
        const supplier = c["Supplier"] || "Unknown Supplier";
        const val = parseFloat(c["Annual Value"]) || 0;
        supplierMap[supplier] = (supplierMap[supplier] || 0) + val;
    });

    const sortedSuppliers = Object.entries(supplierMap).sort((a, b) => b[1] - a[1]);
    const labels = [];
    const data = [];
    let othersSum = 0;

    sortedSuppliers.forEach((item, index) => {
        if (index < 5) {
            labels.push(item[0]);
            data.push(item[1]);
        } else {
            othersSum += item[1];
        }
    });

    if (othersSum > 0) {
        labels.push("Others");
        data.push(othersSum);
    }

    const ctx = ctxElement.getContext('2d');
    if (supplierChartInstance) supplierChartInstance.destroy(); 

    supplierChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: ['#0f766e', '#0d9488', '#14b8a6', '#2dd4bf', '#99f6e4', '#cbd5e1'],
                borderWidth: 2,
                borderColor: '#ffffff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9, weight: 'bold' } } }
            }
        }
    });
}

let waterfallChartInstance = null;

function renderWaterfallChart(totalBudget, totalSavings, totalProjection) {
    const ctxElement = document.getElementById('waterfallChart');
    if (!ctxElement) return;

    // Calcoliamo la varianza "non spiegata" dai saving (es. nuovi acquisti o aumenti listini)
    const unexplainedVariance = totalProjection - (totalBudget - totalSavings);

    const ctx = ctxElement.getContext('2d');
    if (waterfallChartInstance) waterfallChartInstance.destroy();

    waterfallChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Initial Budget', 'Total Savings', 'Other Factors', 'FY Projection'],
            datasets: [{
                data: [totalBudget, -totalSavings, unexplainedVariance, totalProjection],
                backgroundColor: [
                    '#475569', // Slate (Budget)
                    '#10b981', // Emerald (Savings - scende)
                    unexplainedVariance > 0 ? '#f43f5e' : '#10b981', // Rose se positivo, Emerald se negativo
                    '#0d9488'  // Teal (Final)
                ],
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { callback: function(value) { return '€ ' + (value/1000000).toFixed(1) + 'M'; } }
                }
            }
        }
    });
}

let renewalChartInstance = null;

function renderRenewalPipeline(activeContracts) {
    const ctxElement = document.getElementById('renewalPipelineChart');
    if (!ctxElement) return;

    // Raggruppa i contratti per Trimestre e Anno (Es. "Q1 2026")
    const quarterMap = {};
    const now = new Date();

    activeContracts.forEach(c => {
        if (!c["End Date"]) return;
        const endDate = new Date(c["End Date"]);
        
        // Escludiamo scadenze passate da oltre 1 anno o date invalide
        if (isNaN(endDate) || endDate < new Date(now.getFullYear() - 1, 0, 1)) return;

        const year = endDate.getFullYear();
        const quarter = Math.floor(endDate.getMonth() / 3) + 1;
        const label = `Q${quarter} ${year}`;

        const val = parseFloat(c["Annual Value"]) || 0;
        quarterMap[label] = (quarterMap[label] || 0) + val;
    });

    // Ordina i trimestri cronologicamente
    const sortedQuarters = Object.entries(quarterMap).sort((a, b) => {
        const [qA, yA] = a[0].replace('Q','').split(' ');
        const [qB, yB] = b[0].replace('Q','').split(' ');
        if (yA !== yB) return parseInt(yA) - parseInt(yB);
        return parseInt(qA) - parseInt(qB);
    });

    // Prendi solo i prossimi 8 trimestri (2 anni di visibilità)
    const displayData = sortedQuarters.slice(0, 8);

    const labels = displayData.map(d => d[0]);
    const data = displayData.map(d => d[1]);

    const ctx = ctxElement.getContext('2d');
    if (renewalChartInstance) renewalChartInstance.destroy();

    renewalChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Expiring Spend (€)',
                data: data,
                backgroundColor: '#0d9488', // Verde Teal in linea con la dashboard
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false } // Nascondiamo la legenda, il titolo basta
            },
            scales: {
                y: { 
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) { return '€ ' + (value/1000).toFixed(0) + 'k'; }
                    }
                },
                x: {
                    grid: { display: false }
                }
            }
        }
    });
}

function setupDynamicSlider(allRows) {
    let maxRunRate = 0;

    allRows.forEach(row => {
        const rate = parseFloat(row["Run Rate"]) || 0;
        if (rate > maxRunRate) maxRunRate = rate;
    });

    // Se non ci sono dati, rimetti un default
    if (maxRunRate === 0) maxRunRate = 1000000;

    const slider = document.getElementById('budget-slider');
    const maxLabel = document.getElementById('slider-max-label');

    // Configura il range reale dell'input HTML
    slider.max = maxRunRate;

    // Aggiorna l'etichetta visiva a destra (es. "€ 2.4M")
    if (maxRunRate >= 1000000) {
        maxLabel.textContent = `€ ${(maxRunRate / 1000000).toFixed(1)}M`;
    } else {
        maxLabel.textContent = `€ ${(maxRunRate / 1000).toFixed(0)}K`;
    }
}

function renderStaticKpis(data) {
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('dashboard-content').classList.remove('hidden');
    let b = 0, c = 0;
    data.forEach(row => {
        b += parseFloat(row.effective_budget || row["Effective Budget"]) || 0;
        c += parseFloat(row.fiscal_projection || row["Fiscal Projection"]) || 0;
    });
    const net = b - c;
    document.getElementById('total-budget-kpi').textContent = '€ ' + b.toLocaleString('en-US', { maximumFractionDigits: 0 });
    document.getElementById('total-cost-kpi').textContent = '€ ' + c.toLocaleString('en-US', { maximumFractionDigits: 0 });
    document.getElementById('total-variance-kpi').textContent = (net >= 0 ? '+' : '') + '€ ' + net.toLocaleString('en-US', { maximumFractionDigits: 0 });
    document.getElementById('global-variance-card').className = net >= 0 ? "bg-emerald-50 p-5 rounded-xl border border-emerald-200 text-emerald-900" : "bg-rose-50 p-5 rounded-xl border border-rose-200 text-rose-900";
}

function toggleStatusFilter(status, button) {
    const index = selectedStatuses.indexOf(status);

    if (index > -1) {
        // Se lo stato era già selezionato, lo rimuoviamo
        selectedStatuses.splice(index, 1);
        button.classList.remove('active'); // Rimuoviamo lo stato visivo "acceso"
    } else {
        // Altrimenti lo aggiungiamo
        selectedStatuses.push(status);
        button.classList.add('active'); // Aggiungiamo lo stato visivo "acceso"
    }

    // Eseguiamo il filtro aggiornato
    applyFiltersAndSort();
}

// Badge per lo Stato Corrente (es. RUNNING)
function getCurrentStatusBadge(status) {
    const val = (status || "").toUpperCase().trim();
    const styles = {
        'RUNNING': 'text-emerald-700 bg-emerald-50 border-emerald-100',
        'OPTIMIZING': 'text-amber-700 bg-amber-50 border-amber-100',

    return `<span class="px-2 py-0.5 text-[9px] font-bold rounded-full border ${style}">${val}</span>`;
}

// Stile per la Strategia (es. RETAIN)
function getTargetStatusText(target) {
    const val = (target || "").toUpperCase().trim();
    const colors = { 'RETAIN': 'text-emerald-600', 'EXIT': 'text-rose-600', 'HANDOVER': 'text-sky-600' };
    const color = colors[val] || 'text-slate-400';
    return `<span class="text-[10px] font-black tracking-widest uppercase ${color}">${val}</span>`;
}

// Badge per il Budget Status (es. SECURED)
function getBudgetStatusBadge(budgetStatus) {
    const val = (budgetStatus || "").toUpperCase().trim();
    if (val === "SECURED") {
        return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> SECURED</span>`;
    }
    if (val === "AT RISK") {
        return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> AT RISK</span>`;
    }
    return `<span class="text-slate-300">—</span>`;
}

// Helper per la formattazione pulita delle date (Es: 31/12/2026)
function formatDateString(dateVal) {
    if (!dateVal) return "-";
    // Se è già una stringa formattata o un oggetto data, puliscila
    if (dateVal instanceof Date) return dateVal.toLocaleDateString('it-IT');
    return dateVal.toString().replace(/T.*/, ''); // Rimuove timestamp se presenti
}

function applyFiltersAndSort() {
    const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
    const sortBy = document.getElementById('sort-select').value;

    // Legge il valore dello slider (Run Rate)
    const minVal = parseFloat(document.getElementById('budget-slider').value) || 0;

    // Aggiorna l'etichetta numerica dello slider
    document.getElementById('budget-val').textContent = minVal.toLocaleString('it-IT');

    // ====================================================
    // NUOVO: Legge le checkbox del Billing Channel
    // ====================================================
    const channelCheckboxes = document.querySelectorAll('#billing-channel-container input[type="checkbox"]:checked');
    // Trasformiamo i valori selezionati in un array di testi maiuscoli (es. ["DIRECT", "PARTNER"])
    const selectedChannels = Array.from(channelCheckboxes).map(cb => cb.value.toUpperCase().trim());

    // Esegue il filtraggio combinato
    let filteredData = globalCachedData.filter(row => {
        const name = (row.asset_name || row["Asset Name"] || "").toLowerCase();
        const manufacturer = (row.manufacturer || row["Manufacturer"] || "").toLowerCase();
        const runRate = parseFloat(row["Run Rate"] || row.run_rate) || 0;
        const currentStatus = (row["Current Status"] || row.current_status || "").toUpperCase().trim();
        
        // Estraiamo il Billing Channel dalla riga del foglio (assicurati che la colonna si chiami così)
        const billingChannel = (row["Billing Channel"] || "").toString().toUpperCase().trim();

        // Check 1: Ricerca testuale su nome asset o produttore
        const matchesSearch = name.includes(searchTerm) || manufacturer.includes(searchTerm);

        // Check 2: Filtro sul valore minimo dello slider
        const matchesRunRate = runRate >= minVal;

        // Check 3: Filtro Multi-Stato (Se l'array è vuoto, passano tutti)
        const matchesStatus = selectedStatuses.length === 0 || selectedStatuses.includes(currentStatus);

        // ====================================================
        // NUOVO Check 4: Filtro Billing Channel
        // Se l'array selectedChannels è vuoto (nessuna spunta), passano tutti.
        // Altrimenti, passa solo se il canale della riga è tra quelli spuntati.
        // ====================================================
        const matchesChannel = selectedChannels.length === 0 || selectedChannels.includes(billingChannel);

        // Ritorna true solo se TUTTI i check sono superati
        return matchesSearch && matchesRunRate && matchesStatus && matchesChannel;
    });

    // Esegue l'ordinamento
    filteredData.sort((a, b) => {
        if (sortBy === 'runrate-desc') {
            return (parseFloat(b["Run Rate"]) || 0) - (parseFloat(a["Run Rate"]) || 0);
        }

        if (sortBy === 'assetname-asc') {
            const nameA = (a["Asset Name"] || "").toString();
            const nameB = (b["Asset Name"] || "").toString();
            return nameA.localeCompare(nameB, 'it', { sensitivity: 'base' });
        }

        if (sortBy === 'expiry-asc') {
            // Mette in cima le scadenze più vicine
            const dA = a["Last End Date"] ? new Date(a["Last End Date"]) : new Date(2099, 11, 31);
            const dB = b["Last End Date"] ? new Date(b["Last End Date"]) : new Date(2099, 11, 31);
            return dA - dB;
        }

        return 0;
    });

    // Aggiorna il contatore dei risultati
    document.getElementById('asset-count-badge').textContent = filteredData.length + " Assets";

    // Passa l'array pulito e ordinato alla nuova funzione di rendering grafico
    renderMainTable(filteredData);
}

        const target = row["Target Status"] || "-";
        const budgetStatus = row["Budget Status (FY27)"] || row["Budget Status"] || "";

        const exitDate = row["Exit Date"] || "";
        //const lastEndDate = row["Last End Date"] || "";
        const lastEndDate = row["Last End Date"] ? new Date(row["Last End Date"]) : null;

        const runRate = parseFloat(row["Run Rate"]) || 0;
        const costImprovement = parseFloat(row["Cost Improvement"]) || 0;
        const fiscalProjection = parseFloat(row["Fiscal Projection (FY27)"] || row["Fiscal FY27"] || row["Fiscal Projection"] || 0);

        const isActiveGroup = ["RUNNING", "EXPIRED", "OPTIMIZNG", "ACTIVE"].includes(status);
        const isInactiveGroup = ["DISMISSED", "TRANSFERRED", "EXTNG"].includes(status);

        const safeDOMId = btoa(encodeURIComponent(name)).replace(/=/g, "");
        const targetHtmlContent = getTargetStatusText(target);
        const showBudgetBadge = budgetStatus && budgetStatus.toUpperCase().trim() !== "NOT BUDGETED" && budgetStatus.trim() !== "-";

        // Logica Alert (Senza icone, solo colore e tipografia)
        let alertClass = "";
        let alertLabel = "";

        if (lastEndDate) {
            if (lastEndDate <= today && ["RUNNING", "OPTIMIZNG", "ACTIVE"].includes(status)) {
                // SCADUTO: Barra rossa e label
                alertClass = "border-l-4 border-l-rose-500 bg-rose-50/20";
                alertLabel = `<span class="ml-2 text-[8px] font-black uppercase tracking-widest text-rose-600 bg-rose-100 px-1.5 py-0.5 rounded">Overdue</span>`;
            } else if (lastEndDate <= alertThreshold && lastEndDate > today) {
                // IN SCADENZA: Barra arancione e label
                alertClass = "border-l-4 border-l-amber-500 bg-amber-50/20";
                alertLabel = `<span class="ml-2 text-[8px] font-black uppercase tracking-widest text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded animate-pulse">Expiring</span>`;
            }
        }

        tableHtml += `

async function toggleAssetDetails(encodeName, safeDOMId) {
    const container = document.getElementById(`details-${safeDOMId}`);
    const arrow = document.getElementById(`arrow-${safeDOMId}`);
    const assetName = decodeURIComponent(encodeName);

    // Gestione Apertura/Chiusura
    if (!container.classList.contains('hidden')) { 
        container.classList.add('hidden'); 
        arrow.style.transform = "rotate(0deg)"; // Ritorna orizzontale
        arrow.classList.remove('text-teal-600'); // Toglie il colore attivo
        return; 
    }
    
    // Mostra il pannello e ruota la freccia
    container.classList.remove('hidden'); 
    arrow.style.transform = "rotate(90deg)"; // Ruota verso il basso
    arrow.classList.add('text-teal-600'); // Colora la freccia di Teal

    // Se abbiamo già i dati in memoria (cache), carichiamo subito i tab
    if (globalCachedDetails[assetName]) {
        // Nota: renderStatusSummary non è più strettamente necessario se i dati sono già nel pannello principale, 
        // ma lo lasciamo se lo usi per popolare altri campi nascosti.
        if (typeof renderStatusSummary === "function") renderStatusSummary(safeDOMId, globalCachedDetails[assetName].details);
        switchDetailTab(safeDOMId, 'contracts');
        return;
    }

    // Stato di caricamento (Skeleton/Pulse)
    document.getElementById(`tab-content-${safeDOMId}`).innerHTML = `
        <div class="flex flex-col items-center py-6 space-y-2 animate-pulse">
            <div class="h-2 w-32 bg-slate-200 rounded-full"></div>
            <div class="h-2 w-48 bg-slate-100 rounded-full"></div>
        </div>
    `;

    try {
        // Chiamata API nativa tramite il tuo bridge apiFetch
        const data = await apiFetch({ asset: encodeName });
        globalCachedDetails[assetName] = data; 

        if (typeof renderStatusSummary === "function") renderStatusSummary(safeDOMId, data.details);
        switchDetailTab(safeDOMId, 'contracts');
        
    } catch (e) { 
        console.error("Errore caricamento dettagli:", e);
        document.getElementById(`tab-content-${safeDOMId}`).innerHTML = `
            <div class="text-center py-4 text-rose-500 font-bold text-[10px] uppercase tracking-widest">
                ⚠️ Error loading details
            </div>
        `; 
    }
}

function renderStatusSummary(safeDOMId, details) {
    const container = document.getElementById(`status-container-${safeDOMId}`);
    if (!details) return;

    container.innerHTML = `
        <div>
            <label class="text-[9px] text-stone-400 font-bold uppercase block mb-0.5">Current Status</label>
            <span class="text-xs font-bold text-stone-800">${details['Current Status'] || '-'}</span>
        </div>
        <div>
            <label class="text-[9px] text-stone-400 font-bold uppercase block mb-0.5">Target Status</label>
            <span class="text-xs font-bold text-teal-700">${details['Target Status'] || '-'}</span>
        </div>
        <div class="text-right">
            <label class="text-[9px] text-stone-400 font-bold uppercase block mb-0.5">Run Rate</label>
            <span class="text-xs font-mono font-bold text-stone-800">€ ${(parseFloat(details['Run Rate']) || 0).formatCurrency()}</span>
        </div>
    `;
}

        window.scrollTo({ top: searchInput.getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' });
    }
}

function safeFormatStringDate(rawDate) {
    if (!rawDate || rawDate.toString().trim() === "") return "—";
    try {
        if (rawDate.toString().includes('/') && rawDate.toString().length <= 10) {
            return rawDate.toString().trim();
        }
        const parsed = new Date(rawDate);
        if (isNaN(parsed.getTime())) return rawDate.toString().split('T')[0];
        return parsed.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    } catch (e) { return "—"; }
}

function switchDetailTab(safeDOMId, tabType) {
    const assetName = decodeURIComponent(atob(safeDOMId));
    const assetPayload = globalCachedDetails[assetName] || { contracts: [], allocations: [], initiatives: [] };
    const contentDiv = document.getElementById(`tab-content-${safeDOMId}`);
    contentDiv.innerHTML = '';

    // Gestione Bottoni Tab
    const updateTabStyles = (type) => {
        ['contracts', 'alloc', 'initiatives'].forEach(t => {
            const btn = document.getElementById(`tab-btn-${t}-${safeDOMId}`);
            if (btn) {
                btn.className = (t === type) 
                    ? "px-4 py-2 font-bold text-[10px] uppercase border-b-2 border-teal-700 text-teal-700 transition-all"
                    : "px-4 py-2 font-bold text-[10px] uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition-all";
            }
        });
    };
    updateTabStyles(tabType);

    // --- TAB ALLOCATIONS (Con Riepilogo Totale) ---
if (tabType === 'alloc') {
    const dataList = assetPayload.allocations || [];
    if (dataList.length === 0) { contentDiv.innerHTML = '<p class="text-slate-400 italic py-4 text-center">No allocations.</p>'; return; }

    let html = `<div class="overflow-hidden border border-slate-200 rounded-xl bg-white shadow-sm">
        <table class="w-full text-left text-[11px] border-collapse">
        <thead>
            <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-black uppercase tracking-widest">
                <th class="p-3 w-1/2">Budget Entry</th>
                <th class="p-3 text-right w-1/4">Original Amount</th>
                <th class="p-3 text-right w-1/4">Allocated Share</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">`;
    
    let sumOriginal = 0;
    let sumEffective = 0;

    dataList.forEach(log => {
        const origBudget = parseFloat(log["Original Budget"]) || 0;
        const effBudget = parseFloat(log["Effective Budget"]) || 0;
        const coAssets = log.co_allocated_assets || [];
        
        // Accumulo per il totale
        sumOriginal += origBudget;
        sumEffective += effBudget;

        let split = (parseFloat(log["Allocation Split %"]) || 0);
        if (split > 0 && split <= 1) split *= 100;

        // RIGA 1: Dati principali
        html += `
            <tr class="text-slate-600 font-medium hover:bg-slate-50/30">
                <td class="p-3 align-top">
                    <div class="font-bold text-slate-900 leading-tight">${log["Allocation Alias"] || "N/A"}</div>
                    <div class="text-[9px] text-slate-400 mt-1 uppercase font-bold">${safeFormatStringDate(log["Valid From"])} → ${safeFormatStringDate(log["Valid To"])}</div>
                </td>
                <td class="p-3 text-right align-top font-mono text-slate-400 italic">€ ${origBudget.formatCurrency()}</td>
                <td class="p-3 text-right align-top">
                    <div class="text-teal-900 font-black font-mono text-sm">€ ${effBudget.formatCurrency()}</div>
                    <div class="mt-1"><span class="px-2 py-0.5 rounded border text-[9px] font-black uppercase ${split >= 99.9 ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 'text-teal-600 bg-teal-50 border-teal-100'}">${split.toFixed(1)}%</span></div>
                </td>
            </tr>`;

        // RIGA 2: Asset Condivisi
        if (split < 99.9 && coAssets.length > 0) {
            const sharedList = coAssets.map(co => 
                `<span class="text-slate-700 font-bold">${co.asset_name}</span> <span class="text-teal-600 font-mono">(${(parseFloat(co.split_pct)*100).toFixed(0)}%)</span>`
            ).join('<span class="mx-3 text-slate-300">|</span>');

            html += `
                <tr class="bg-slate-50/50">
                    <td colspan="3" class="px-4 py-2 border-b border-slate-100 text-left">
                        <div class="text-[10px] leading-relaxed">
                            <span class="font-black text-slate-400 uppercase tracking-widest mr-2">↳ Co-allocated with:</span>
                            ${sharedList}
                        </div>
                    </td>
                </tr>`;
        }
    });

    // --- RIGA FINALE: TOTALE ALLOCAZIONE ---
    const totalRatio = sumOriginal > 0 ? (sumEffective / sumOriginal) * 100 : 0;
    
    html += `
        </tbody>
        <tfoot>
            <tr class="bg-slate-100/50 font-bold border-t-2 border-slate-200">
                <td class="p-3 text-slate-500 uppercase tracking-widest font-black text-[9px]">Total Portfolio Allocation</td>
                <td class="p-3 text-right font-mono text-slate-400 italic"></td>
                <td class="p-3 text-right bg-teal-100/10">
                    <div class="text-teal-900 font-black text-sm font-mono">€ ${sumEffective.formatCurrency()}</div>
                    <div class="text-[9px] text-teal-600 uppercase tracking-tighter mt-0.5">
                        ${totalRatio.toFixed(1)}% of total original budget
                    </div>
                </td>
            </tr>
        </tfoot>
    </table></div>`;
    
    contentDiv.innerHTML = html;
}

    // --- TAB: ACTIVE CONTRACTS (Ordinati per Scadenza) ---
    else if (tabType === 'contracts') {
        const dataList = assetPayload.contracts || [];
        dataList.sort((a, b) => {
            const dA = a["End Date"] ? new Date(a["End Date"]).getTime() : new Date(2099, 11, 31).getTime();
            const dB = b["End Date"] ? new Date(b["End Date"]).getTime() : new Date(2099, 11, 31).getTime();
            return dB - dA;
        });

        let html = `<div class="overflow-hidden border border-slate-200 rounded-xl bg-white shadow-sm">
            <table class="w-full text-left text-[11px]">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-black uppercase tracking-widest">
                    <th class="p-3">Supplier</th>
                    <th class="p-3 text-center">Commitment</th>
                    <th class="p-3 text-right bg-teal-50/40 text-teal-900">Annual Value</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">`;

        dataList.forEach(log => {
            const cStatus = (log["Status"] || log["Contract Status"] || "").toUpperCase().trim();
            
            // Logica Stili
            let rowStyles = "hover:bg-slate-50/20";
            let statusBadge = "";

            if (cStatus === "EXPIRED") {
                rowStyles = "opacity-50 grayscale"; // Lo rende meno visibile
                statusBadge = `<span class="ml-2 text-[7px] font-black uppercase border border-slate-300 text-slate-400 px-1 rounded">Expired</span>`;
            } else if (cStatus === "ACTIVE") {
                statusBadge = `<span class="ml-2 text-[7px] font-black uppercase bg-emerald-50 text-emerald-600 border border-emerald-100 px-1 rounded">Active</span>`;
            } else if (cStatus === "INCOMING" || cStatus === "UPCOMING") {
                statusBadge = `<span class="ml-2 text-[7px] font-black uppercase bg-sky-50 text-sky-600 border border-sky-100 px-1 rounded">Incoming</span>`;
            }
            html += `
                <tr class="text-slate-600 font-medium ${rowStyles} transition-all">
                    <td class="p-3 align-top">
                        <div class="flex items-center">
                          <div class="text-sm font-black text-slate-900 leading-none">${log["Supplier"]}</div>
                          ${statusBadge}
                        </div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">${log["Legal Entity"]}</div>
                    </td>
                    
                    <td class="p-3 text-center align-top">
                        <div class="font-mono text-slate-700 font-bold mb-1">€ ${parseFloat(log["Total Commitment"] || 0).formatCurrency()}</div>
                        
                        <div class="flex items-center justify-center gap-1.5 text-[9px] text-slate-400 font-bold uppercase tracking-tighter">
                            <span>${safeFormatStringDate(log["Start Date"])} → ${log["End Date"] ? safeFormatStringDate(log["End Date"]) : 'Active'}</span>
                            
                            ${log["Contract Term (Months)"] ? `
                                <span class="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-sm border border-slate-200 whitespace-nowrap">
                                    ${log["Contract Term (Months)"]} mo
                                </span>
                            ` : ''}
                        </div>
                    </td>
                    <td class="p-3 text-right bg-teal-50/10 align-top font-black font-mono text-teal-800 text-sm">
                        € ${parseFloat(log["Annual Value"] || 0).formatCurrency()}
                    </td>
                </tr>
                <tr class="bg-slate-50/40">
                    <td colspan="3" class="px-3 py-1 text-slate-500 italic text-[10px] border-b">
                        <span class="font-black text-[9px] text-slate-400 uppercase tracking-tighter not-italic mr-1">Scope:</span>
                        ${log["Scope"] || "N/A"}
                    </td>
                </tr>`;
        });
        contentDiv.innerHTML = html + '</tbody></table></div>';
    }

    // --- TAB: SAVING INITIATIVES (Ordinate per Data Decrescente) ---
    else if (tabType === 'initiatives') {
        const dataList = assetPayload.initiatives || [];
        dataList.sort((a, b) => {
            // Se manca la data, usiamo il 2099 per spingerle in fondo alla lista
            const dA = a["Target Date"] ? new Date(a["Target Date"]).getTime() : new Date(2099, 11, 31).getTime();
            const dB = b["Target Date"] ? new Date(b["Target Date"]).getTime() : new Date(2099, 11, 31).getTime();
            
            return dA - dB; // Ordine crescente
        });

        let html = '<div class="flex flex-col gap-2">';
        dataList.forEach(log => {
            // Logiche finanziarie
            const isActual = (parseFloat(log["Actual Saving (Annualized)"]) || 0) > 0;
            const savingVal = isActual ? parseFloat(log["Actual Saving (Annualized)"]) : parseFloat(log["Target Saving (Annualized)"]);
            const baselineVal = parseFloat(log["Baseline Spend (Annualized)"]) || 0;
            
            // Calcolo della percentuale di risparmio (arrotondata all'intero più vicino)
            const savingPct = baselineVal > 0 ? Math.round((savingVal / baselineVal) * 100) : 0;
            
            // Colori in base ad Actual vs Target
            const borderClass = isActual ? "border-emerald-500 shadow-emerald-50" : "border-amber-500 shadow-amber-50";

            html += `
                <div class="bg-white p-3 rounded-xl border-l-4 ${borderClass} border-slate-100 shadow-sm flex justify-between items-center gap-4 hover:shadow-md transition-shadow">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-black text-slate-900 text-xs uppercase truncate">${log["Decision"]}</span>
                            <span class="px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500 text-[8px] font-black uppercase tracking-widest">${log["Initiative Status"]}</span>
                        </div>
                        <p class="text-[10px] text-slate-500 italic truncate opacity-80">"${log["Description"] || "No description."}"</p>
                    </div>
                    <div class="flex gap-3 items-center shrink-0">
                        <div class="text-center px-3 border-r border-slate-100">
                            <p class="text-[8px] text-slate-400 font-black uppercase mb-0.5 tracking-tighter">Target Date</p>
                            <p class="font-mono font-bold text-slate-800 text-[10px]">${safeFormatStringDate(log["Target Date"] || log["Actual Date"])}</p>
                        </div>
                        
                        <div class="text-right px-3 border-r border-slate-100 hidden sm:block">
                            <p class="text-[8px] text-slate-400 font-black uppercase mb-0.5 tracking-tighter">Baseline Spend</p>
                            <p class="font-mono font-bold text-slate-600 text-[10px]">€${baselineVal.formatCurrency()}</p>
                        </div>
                        
                        <div class="text-right min-w-[85px]">
                            <p class="text-[8px] text-emerald-500 font-black uppercase mb-0.5 tracking-tighter">${isActual ? 'Actual Saving' : 'Target Saving'}</p>
                            <div class="flex flex-col items-end gap-0.5">
                                <p class="font-mono font-black text-emerald-700 text-xs">€${savingVal.formatCurrency()}</p>
                                ${savingPct > 0 ? `<span class="bg-emerald-100 text-emerald-700 text-[8px] font-bold px-1 py-0.5 rounded leading-none">-${savingPct}%</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
        });
        contentDiv.innerHTML = html + '</div>';
    }
}

function renderLiveChart(labels, budgets, costs) {
    const ctx = document.getElementById('liveSheetsChart').getContext('2d');
    if (chartInstance) { chartInstance.destroy(); }

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Budget FY27',
                    data: budgets,
                    backgroundColor: '#0F766E', // Teal (Coerente con gli altri grafici)
                    borderRadius: 3,            // Angoli smussati
                    barPercentage: 0.6,         // Spessore barra più snello
                    categoryPercentage: 0.8     // Spaziatura tra i gruppi
                },
                {
                    label: 'Outlook FY27',           // Testo aggiornato da Projection a Outlook
                    data: costs,
                    backgroundColor: '#E11D48', // Rose (Mantiene l'allerta visiva per i costi)
                    borderRadius: 3,
                    barPercentage: 0.6,
                    categoryPercentage: 0.8
                }
            ]
        },
        options: {
            indexAxis: 'y', // Mantiene il grafico orizzontale
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        boxWidth: 10,
                        font: { size: 10, family: 'Inter' }
                    }
                },
                tooltip: {
                    callbacks: {
                        label: function (context) {
                            let label = context.dataset.label || '';
                            if (label) { label += ': '; }
                            // Attenzione: qui si usa context.parsed.x perché le barre sono sdraiate!
                            if (context.parsed.x !== null) {
                                label += '€ ' + context.parsed.x.toLocaleString('en-US', { maximumFractionDigits: 0 });
                            }
                            return label;
                        }
                    }
                }
            },
            scales: {
                x: {
                    beginAtZero: true,
                    ticks: {
                        font: { size: 9 },
                        callback: function (value) {
                            // Formattazione intelligente: Milioni o Migliaia
                            if (value >= 1000000) {
                                return '€ ' + (value / 1000000).toFixed(1) + 'M';
                            } else if (value >= 1000) {
                                return '€ ' + (value / 1000).toFixed(0) + 'k';
                            }
                            return '€ ' + value;
                        }
                    }
                },
                y: {
                    ticks: {
                        font: { size: 9, fontStyle: 'bold', family: 'Inter' }
                    },
                    grid: {
                        drawOnChartArea: false // Nasconde le linee di griglia verticali per maggiore pulizia
                    }
                }
            }
        }
    });
}

async function fetchAndRenderTrendChart() {
    try {
        const trendData = await apiFetch({action:'macro_trend'});
        //const response = await fetch(`${SCRIPT_BASE_URL}?token=${SECRET_TOKEN}&action=macro_trend`);
        //const trendData = await response.json();

        if (trendData.error) {
            console.error("Macro Trend API Error:", trendData.error);
            return;
        }

        const labels = ['FY26', 'FY27', 'FY28'];
        const grossData = [trendData.FY26.gross, trendData.FY27.gross, trendData.FY28.gross];
        const optimizedData = [trendData.FY26.optimized, trendData.FY27.optimized, trendData.FY28.optimized];

        const savingsData = [
            trendData.FY26.gross - trendData.FY26.optimized,
            trendData.FY27.gross - trendData.FY27.optimized,
            trendData.FY28.gross - trendData.FY28.optimized
        ];

        const ctx = document.getElementById('efficiencyTrendChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            plugins: [{
                id: 'topLabels',
                afterDatasetsDraw(chart) {
                    const { ctx } = chart;
                    ctx.save();
                    ctx.font = 'bold 10px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';

                    chart.data.datasets.forEach((dataset, i) => {
                        const meta = chart.getDatasetMeta(i);
                        meta.data.forEach((element, index) => {
                            const value = dataset.data[index];
                            if (value > 0) {
                                const text = '€' + (value / 1000000).toFixed(1) + 'M';

                                if (dataset.type === 'line') {
                                    // Testo verde scuro
                                    ctx.fillStyle = '#1C1917';
                                    ctx.fillText(text, element.x, element.y - 10);
                                } else {
                                    // Testo per le barre grigie e verdi
                                    ctx.fillStyle = '#78716C';
                                    ctx.fillText(text, element.x, element.y - 5);
                                }
                            }
                        });
                    });
                    ctx.restore();
                }
            }],
            data: {
                labels: labels,
                datasets: [
                    {
                        type: 'bar',
                        label: 'Spend without Initiatives',
                        data: grossData,
                        backgroundColor: '#A8A29E',
                        borderRadius: 4,
                        barPercentage: 0.5,
                        categoryPercentage: 0.8,
                        order: 2
                    },
                    {
                        type: 'bar',
                        label: 'Spend with Initiatives',
                        data: optimizedData,
                        backgroundColor: '#0F766E',
                        borderRadius: 4,
                        barPercentage: 0.5,
                        categoryPercentage: 0.8,
                        order: 3
                    },
                    {
                        type: 'line',
                        label: 'Cost Avoidance',
                        data: savingsData,
                        borderColor: '#10B981',
                        backgroundColor: '#10B981',
                        borderWidth: 2.5,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: false,
                        tension: 0.1,
                        order: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: { top: 35, bottom: 10 }
                },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10, family: 'Inter' } } },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                let label = context.dataset.label || '';
                                if (label) { label += ': '; }
                                if (context.parsed.y !== null) {
                                    label += '€ ' + context.parsed.y.toLocaleString('en-US', { maximumFractionDigits: 0 });
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { font: { size: 9 }, callback: function (value) { return '€ ' + (value / 1000000).toFixed(1) + 'M'; } } },
                    x: { ticks: { font: { size: 10, weight: 'bold', family: 'Inter' } } }
                }
            }
        });
    } catch (err) {
        console.error("Error computing trend:", err);
    }
}
