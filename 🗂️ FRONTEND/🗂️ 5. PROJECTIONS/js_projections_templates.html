                                    <span class="truncate">All Cost Centers</span>

                                <button onclick="ProjectionsController.toggleMenuDropdown(event, 'proj-filter-drop-sup')" id="proj-btn-filter-sup" class="w-full text-left px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg flex justify-between items-center font-bold text-slate-700 text-xs select-none cursor-pointer">
                                    <span class="truncate">All Suppliers</span>

                <div class="lg:col-span-3 space-y-4">

        // 🌟 Helper interno per generare le celle finanziarie con i Badge di sconto (Ibrido Vettoriale)
        _renderCell: function (val, pct, colorClass = "text-slate-700", isCompact = false) {
            let badge = '';
            const roundedPct = Math.round(pct);

            // 🛡️ Scudo protettivo per nascondere decimali o zero spuri (-0%)
            if (roundedPct > 0) {
                const isTerminated = roundedPct >= 99.9;

                if (isCompact) {
                    // 🎯 LIVELLO 3 (Drill-down): Layout ultra-compatto con micro-freccia verticale
                    const badgeColor = isTerminated ? 'text-emerald-800 bg-emerald-100' : 'text-teal-800 bg-teal-100';
                    const iconSvg = `<svg class="w-2.5 h-2.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m0 0l6.75-6.75M12 19.5l-6.75-6.75" /></svg>`;

                    badge = `
                    <span class="inline-flex items-center gap-[1px] px-1 py-0.5 rounded text-[8px] font-black tracking-tighter shrink-0 select-none mr-1.5 ${badgeColor}" title="Cost reduced by ${roundedPct}%">
                        ${iconSvg}${roundedPct}%
                    </span>`;
                } else {
                    // ⚡ LIVELLI 1 e 2 (Riepiloghi Macro): Icone SVG pure ad alta fedeltà (Anti-Schiacciamento)
                    let badgeColor, iconSvg;

                    if (isTerminated) {
                        // Dismissione completa (100%): Colore Smeraldo, icona di Chiusura/Taglio Netto (X spessa)
                        badgeColor = 'text-emerald-700 bg-emerald-50 border-emerald-200';
                        iconSvg = `<svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>`;
                    } else {
                        // Ottimizzazione parziale: Colore Teal FinOps, icona del Fulmine Vettoriale asimmetrico
                        badgeColor = 'text-teal-700 bg-teal-50 border-teal-200';
                        iconSvg = `<svg class="w-3 h-3 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M11.5 2L3 13h7v9l8.5-11H11.5V2z"/></svg>`;
                    }

                    badge = `
                    <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded border text-[9px] font-black tracking-tight shrink-0 select-none mr-2 ${badgeColor}" title="Cost reduced by ${roundedPct}%">
                        ${iconSvg} -${roundedPct}%
                    </span>`;
                }
            }

            return `
            <div class="flex items-center justify-end whitespace-nowrap w-full">
                ${badge}
                <span class="${colorClass}">€ ${val.formatCurrency()}</span>
            </div>`;
        },

        // LEVEL 1: Top-Level Dimension Header Card (isCompact = false)
        getGroupHeaderRowMarkup: function (groupIdx, label, assetCount, v26, p26, v27, p27, v28, p28) {
            return `
            <tr onclick="ProjectionsController.toggleLevel1Accordion(${groupIdx})" class="bg-slate-100/80 border-b border-slate-200 hover:bg-slate-100 transition-all font-black text-slate-900 select-none cursor-pointer">
                <td class="p-3 text-left align-middle w-2/5">
                    <div style="display: flex; align-items: center; justify-content: flex-start; width: 100%; min-width: 0;">

                            <svg id="proj-l1-chevron-${groupIdx}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" class="text-slate-500 transition-transform duration-200" style="transform: rotate(0deg);">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                            </svg>

                        <div style="flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px;" class="text-xs uppercase font-black tracking-wider text-slate-800" title="${label || 'UNSPECIFIED'}">
                            ${label || 'UNSPECIFIED'}
                        </div>
                        <div style="flex-shrink: 0;">
                            <span class="bg-white border border-slate-300 text-slate-600 text-[8px] font-extrabold px-1.5 py-0.5 rounded shadow-3xs leading-none" title="Contains ${assetCount} active scoped assets">${assetCount} Assets</span>

                    </div>
                </td>
                <td class="p-3 align-middle font-mono w-1/5">${this._renderCell(v26, p26, 'text-slate-700', false)}</td>
                <td class="p-3 align-middle font-mono bg-teal-50/10 w-1/5">${this._renderCell(v27, p27, 'text-teal-800', false)}</td>

        // LEVEL 2: Nested Intermediate Asset Row (isCompact = false)
        getAssetRowMarkup: function (groupIdx, assetIdx, assetName, manufacturer, driver, v26, p26, v27, p27, v28, p28, childTableHtml, groupLabel) {
            return `
            <tr onclick="ProjectionsController.toggleLevel2Accordion(${groupIdx}, ${assetIdx})" class="hover:bg-slate-50/70 transition-all border-b border-slate-100 cursor-pointer select-none">
                <td class="p-3 pl-8 text-left align-middle w-2/5">

                            <svg id="proj-l2-chevron-${groupIdx}-${assetIdx}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="text-slate-400 transition-transform duration-200" style="transform: rotate(0deg);">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                            </svg>

                        <div style="flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px;" class="font-extrabold text-slate-900 text-xs tracking-tight" title="${assetName}">

                            <svg class="w-3.5 h-3.5 group-hover/btn:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18h18M7 15l4-4 4 4 6-6" /></svg>

                </td>
                <td class="p-3 align-middle font-mono w-1/5">${this._renderCell(v26, p26, 'text-slate-600', false)}</td>
                <td class="p-3 align-middle font-mono font-bold bg-teal-50/5 w-1/5">${this._renderCell(v27, p27, 'text-teal-700', false)}</td>
                <td class="p-3 align-middle font-mono w-1/5">${this._renderCell(v28, p28, 'text-slate-600', false)}</td>
            </tr>
            <tr id="proj-l2-body-row-${groupIdx}-${assetIdx}" class="hidden bg-slate-50/30 shadow-inner">
                <td colspan="4" class="p-3 pl-12">
                    ${childTableHtml}
                </td>
            </tr>`;
        },

        // LEVEL 3: Deep Drill-Down Contract Items Sub-Table
        getContractDrillDownItemRow: function (c) {
            // 🎯 Layout ultra-compatto a Livello 3 e trasparenza per i contratti scaduti
            const opacityClass = c.isExpired ? 'opacity-50 bg-slate-50' : 'opacity-100';
            const expBadge = c.isExpired ? '<span class="ml-1 text-[8px] text-slate-400 font-normal border border-slate-200 rounded px-1 shadow-3xs">(Exp)</span>' : '';

            // ⚡ FORMATTAZIONE DEL TOOLTIP DI VALIDITÀ PER IL CAMPO "title" (Senza aggiungere colonne)
            const startStr = c.startDate ? (c.startDate instanceof Date ? c.startDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : String(c.startDate)) : "—";
            const endStr = c.endDate ? (c.endDate instanceof Date ? c.endDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : String(c.endDate)) : "—";
            const validityTooltip = `Validity: ${startStr} ➔ ${endStr}`;

            return `
            <tr class="hover:bg-slate-50/80 border-b border-slate-100 last:border-0 ${opacityClass} transition-colors">
                <td class="py-2 font-bold text-slate-800 truncate pr-2" title="${validityTooltip}">
                    <div class="cursor-help underline decoration-dotted inline-block" title="${validityTooltip}">
                        ${c.supplier}${expBadge}
                    </div>
                    <span class="text-[9px] text-slate-400 block font-mono">ID: ${c.cId}</span>
                </td>
                <td class="py-2 truncate pr-2" title="${c.legalEntity}">${c.legalEntity}</td>
                <td class="py-2 font-mono text-slate-500 truncate pr-2" title="${c.costCenter || 'N/A'}">${c.costCenter || 'N/A'}</td>
                <td class="py-2 font-mono font-black text-[9px] text-slate-400"><span class="px-1.5 py-0.5 border rounded bg-slate-50">${c.expType}</span></td>
                
                <td class="py-2 align-middle font-mono truncate">${this._renderCell(c.v26, c.p26, 'text-slate-500', true)}</td>
                <td class="py-2 align-middle font-mono font-black bg-teal-50/10 px-1 truncate">${this._renderCell(c.v27, c.p27, 'text-teal-700', true)}</td>
                <td class="py-2 align-middle font-mono truncate">${this._renderCell(c.v28, c.p28, 'text-slate-500', true)}</td>
            </tr>`;
        },

        getContractDrillDownTableStructure: function (rowsHtml) {
            return `
            <div class="border border-slate-200 rounded-xl bg-white p-3 shadow-3xs max-w-full overflow-hidden">
                <table class="w-full text-left text-[11px] border-collapse table-fixed whitespace-nowrap">

                        <tr class="border-b border-slate-200 text-slate-400 font-black uppercase tracking-wider text-[9px] select-none">
                            <th class="pb-2 w-[25%]">Supplier Dimension</th>
                            <th class="pb-2 w-[15%]">Entity</th>
                            <th class="pb-2 w-[20%]">Cost Center</th>
                            <th class="pb-2 w-[10%]">Type</th>
                            <th class="pb-2 text-right w-[10%]">FY26</th>
                            <th class="pb-2 text-right text-teal-900 bg-teal-50/20 px-1 rounded w-[10%]">FY27</th>
                            <th class="pb-2 text-right w-[10%]">FY28</th>
                        </tr>
                    </thead>
                    <tbody class="font-medium text-slate-600">
                        ${rowsHtml}
                    </tbody>
                </table>
            </div>`;
        },

            return `
            <div class="bg-white rounded-xl shadow-2xl w-11/12 max-w-7xl h-[90vh] flex flex-col overflow-hidden relative" onclick="event.stopPropagation()">
                <div class="flex justify-between items-center p-4 border-b border-slate-200 bg-slate-50 flex-wrap gap-4 shrink-0">
                    <h3 class="text-xl font-semibold text-slate-800">Asset Financial Outlook <span class="text-slate-400 font-medium ml-2">| ${assetName}</span></h3>
                    <div class="flex items-center gap-2">
                        <div class="relative flex items-center">
                            <select id="modal-sel-exp" class="text-xs border-slate-300 rounded shadow-sm py-1 pl-2 pr-6 font-bold text-slate-700 cursor-pointer appearance-none bg-white"><option value="">All Exp. Types</option></select>
                            <button type="button" onclick="document.getElementById('modal-sel-exp').value=''; document.getElementById('modal-sel-exp').dispatchEvent(new Event('change'));" class="hidden absolute right-1.5 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full w-4 h-4 flex items-center justify-center font-bold text-[10px] leading-none" id="clear-modal-sel-exp">×</button>
                        </div>
                        <div class="relative flex items-center">
                            <select id="modal-sel-cc" class="text-xs border-slate-300 rounded shadow-sm py-1 pl-2 pr-6 font-bold text-slate-700 cursor-pointer appearance-none bg-white"><option value="">All Cost Centers</option></select>
                            <button type="button" onclick="document.getElementById('modal-sel-cc').value=''; document.getElementById('modal-sel-cc').dispatchEvent(new Event('change'));" class="hidden absolute right-1.5 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full w-4 h-4 flex items-center justify-center font-bold text-[10px] leading-none" id="clear-modal-sel-cc">×</button>
                        </div>
                        <div class="relative flex items-center">
                            <select id="modal-sel-le" class="text-xs border-slate-300 rounded shadow-sm py-1 pl-2 pr-6 font-bold text-slate-700 cursor-pointer appearance-none bg-white"><option value="">All Legal Entities</option></select>
                            <button type="button" onclick="document.getElementById('modal-sel-le').value=''; document.getElementById('modal-sel-le').dispatchEvent(new Event('change'));" class="hidden absolute right-1.5 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full w-4 h-4 flex items-center justify-center font-bold text-[10px] leading-none" id="clear-modal-sel-le">×</button>
                        </div>
                        <button onclick="ProjectionsController.closeFinancialBridgeModal()" class="ml-2 text-slate-400 hover:text-rose-600 transition-colors">

                <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 p-4 shrink-0 bg-white border-b border-slate-100 z-10 shadow-sm relative">

        getFinancialBridgeTableRowMarkup: function (opts) {
            return `
            <tr class="hover:bg-slate-50/80 transition-colors cursor-help ${opts.rowOpacity}" title="${opts.tooltipContent}">

                    <div class="flex items-start gap-2 truncate">
                        <span class="w-2.5 h-2.5 rounded-full shrink-0 mt-1 shadow-sm" style="background-color: ${opts.baseColor}"></span>
                        <div class="min-w-0 flex-1">
                            <div class="font-black text-slate-800 truncate text-[12px] leading-tight flex items-center gap-1">
                                ${opts.legalEntity}
                                ${opts.isExpired ? '<span class="ml-1 text-[8px] text-slate-400 font-normal border border-slate-200 bg-slate-50 rounded px-1 shadow-3xs">(Exp)</span>' : ''}
                            </div>
                            <div class="text-[9px] font-mono text-slate-500 truncate mt-0.5">ID: ${opts.cId}</div>
                        </div>
                    </div>
                </td>
                ${opts.tableCells}
                
                <td class="sticky right-0 bg-slate-50 shadow-sm p-3 border-l border-slate-200 z-10 w-28 min-w-[7rem] text-right align-middle">
                    <div class="flex flex-col items-end justify-center">
                        <div class="flex items-center justify-end gap-1">
                            <span class="font-black font-mono text-slate-800 text-[12px] leading-tight">€${opts.effCommitmentStr}</span>
                            ${opts.hasCredit ? `<span class="text-[9px] font-black text-teal-600 leading-none">${opts.creditStr}</span>` : ''}
                        </div>
                        ${opts.hasCredit ? `<span class="block text-[8px] font-bold text-slate-400 mt-0.5 uppercase tracking-tighter">Nom: €${opts.nomCommitmentStr}</span>` : ''}
                    </div>
                </td>
            </tr>
            `;
        },

        getFinancialBridgeTableMarkup: function (labels, tableRowsHtml, totalsCells, fyMap, monthlyTotalsArray, formatKM) {
            const bgColorsUI = ['bg-slate-100/60', 'bg-teal-50/60', 'bg-indigo-50/60', 'bg-sky-50/60', 'bg-amber-50/60'];
            const textColorsUI = ['text-slate-700', 'text-teal-700', 'text-indigo-700', 'text-sky-700', 'text-amber-700'];

            let theadCells = labels.map((lbl, i) => {
                const colorIndex = [...new Set(fyMap)].indexOf(fyMap[i]) % bgColorsUI.length;
                return `<th class="px-2 py-2 text-center text-[10px] font-semibold text-slate-500 uppercase tracking-wider border-r border-slate-200 ${bgColorsUI[colorIndex]}">${lbl}</th>`;
            }).join('');

            let tfootHtml = `<td class="sticky left-0 bg-slate-100 p-3 border-r border-slate-200 z-30 w-40 min-w-[10rem] text-right text-slate-500 font-black">FISCAL TOTALS</td>`;
            let currentFy = fyMap[0];
            let currentSpan = 0; let currentFyTotal = 0; let colorIdx = 0;

            labels.forEach((_, idx) => {
                if (fyMap[idx] !== currentFy) {
                    tfootHtml += `<td colspan="${currentSpan}" class="p-2 text-center border-r border-slate-300 font-black ${bgColorsUI[colorIdx % bgColorsUI.length]} ${textColorsUI[colorIdx % textColorsUI.length]}"><span class="text-[8px] uppercase opacity-60 tracking-widest mr-1.5">${currentFy}:</span>€${formatKM(currentFyTotal)}</td>`;
                    currentFy = fyMap[idx]; currentSpan = 1; currentFyTotal = monthlyTotalsArray[idx]; colorIdx++;
                } else {
                    currentSpan++; currentFyTotal += monthlyTotalsArray[idx];
                }
            });
            tfootHtml += `<td colspan="${currentSpan}" class="p-2 text-center border-r border-slate-300 font-black ${bgColorsUI[colorIdx % bgColorsUI.length]} ${textColorsUI[colorIdx % textColorsUI.length]}"><span class="text-[8px] uppercase opacity-60 tracking-widest mr-1.5">${currentFy}:</span>€${formatKM(currentFyTotal)}</td>`;

            return `
            <table class="min-w-full divide-y divide-slate-200 table-fixed">
                <thead class="bg-slate-50 sticky top-0 z-20 shadow-sm">
                    <tr>
                        <th class="px-3 py-2 text-left text-xs font-semibold text-slate-600 sticky left-0 bg-slate-50 z-30 border-r border-slate-200 w-40 min-w-[10rem]">Contract Identity</th>
                        ${theadCells}
                        <th class="sticky right-0 bg-slate-50 p-3 border-l border-slate-200 z-30 w-24 min-w-[6rem] text-right text-[10px] font-black uppercase tracking-widest text-slate-500">Tot. Cmmt</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-slate-100">
                    ${tableRowsHtml}
                </tbody>
                <tfoot class="bg-slate-100 sticky bottom-0 z-20 border-t-2 border-slate-300 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <tr>
                        ${tfootHtml}
                        <td class="sticky right-0 bg-slate-100 border-l border-slate-300 z-30 w-24 min-w-[6rem]"></td>
                    </tr>
                </tfoot>
            </table>
            `;
        }

    };
</script>
