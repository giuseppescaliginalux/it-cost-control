<script>
    /**
     * js_dashboard_state.html
     * MODEL: Centralized FinOps analytical state engine for executive dashboarding.
     * Allineato interamente sui DTO camelCase puri senza proprietà spure con spazi.
     */
    const DashboardState = {
        assets: [],
        contracts: [],
        initiatives: [],
        projections: [],
        varianceReport: [], // Memorizza il report varianze in memoria cache
        activeChartTab: 'general',

        loadCachePayload: function (payload) {
            this.assets = (payload.assets || []).filter(r => {
                const name = (r.name || "").toString().trim();
                return name !== "" && name.toLowerCase() !== "total" && name.toLowerCase() !== "totale";
            });
            this.contracts = payload.contracts || [];
            this.initiatives = payload.initiatives || [];
            this.projections = payload.projections || [];
            this.varianceReport = payload.varianceReport || [];
            // FIX: Assorbiamo bridge, allocazioni e master direttamente nello stato locale
            this.bridge = payload.bridge || [];
            this.allocations = payload.allocations || [];
            this.masterContracts = payload.masterContracts || [];
        },

        computeExecutiveMetrics: function () {
            let totalBudget = 0;

            // FIX: Calcoliamo il Budget TOTALE aziendale leggendo il foglio Allocations
            const allocs = windowPayload.allocations || [];
            allocs.forEach(a => {
                const fYear = String(a.fiscalYear || "").toUpperCase().trim();
                if (fYear === "FY27") {
                    let bVal = parseFloat(a.amount);
                    totalBudget += isNaN(bVal) ? 0 : bVal;
                }
            });

            let totalProjection = 0;
            // FIX: Fallback su runRate se le proiezioni non sono ancora generate
            if (this.projections && this.projections.length > 0) {
                this.projections.forEach(p => {
                    let pVal = parseFloat(p.fy27Optimized);
                    totalProjection += isNaN(pVal) ? 0 : pVal;
                });
            } else {
                this.assets.forEach(a => {
                    let pVal = parseFloat(a.runRate);
                    totalProjection += isNaN(pVal) ? 0 : pVal;
                });
            }

            const activeContracts = this.contracts.filter(c => (c.status || "").toString().trim().toUpperCase() === "ACTIVE");

            let totalActualSaving = 0;
            let totalTargetSaving = 0;
            this.initiatives.forEach(init => {
                let actSaving = parseFloat(init.actualSavingAnnualized);
                let tgtSaving = parseFloat(init.targetSavingAnnualized);
                totalActualSaving += isNaN(actSaving) ? 0 : actSaving;
                totalTargetSaving += isNaN(tgtSaving) ? 0 : tgtSaving;
            });

            let realizedActual = 0;
            let realizedTarget = 0;
            this.initiatives.forEach(init => {
                if ((init.status || "").toString().toUpperCase().trim() === "COMPLETED") {
                    let actSaving = parseFloat(init.actualSavingAnnualized);
                    let tgtSaving = parseFloat(init.targetSavingAnnualized);
                    realizedActual += isNaN(actSaving) ? 0 : actSaving;
                    realizedTarget += isNaN(tgtSaving) ? 0 : tgtSaving;
                }
            });

            let perfPct = realizedTarget > 0 ? ((realizedActual - realizedTarget) / realizedTarget) * 100 : 0;

            return {
                totalBudget: totalBudget,
                totalProjection: totalProjection,
                netVariance: totalBudget - totalProjection, // In positivo mostra il Surplus reale
                activeContractsCount: activeContracts.length,
                securedSavings: totalActualSaving,
                remainingToSecure: Math.max(0, totalTargetSaving - totalActualSaving),
                realizedActual: realizedActual,
                realizedTarget: realizedTarget,
                performancePercentage: perfPct
            };
        },

        getTop10AssetsByRunRate: function () {
            return [...this.assets]
                .sort((a, b) => (parseFloat(b.runRate) || 0) - (parseFloat(a.runRate) || 0))
                .slice(0, 10);
        }
    };
</script>
