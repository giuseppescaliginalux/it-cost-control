<script>
    /**
     * js_projections_state.html
     * MODEL: Centralized state engine for multi-dimensional OLAP analytics.
     * Allineato al 100% sullo standard camelCase puro.
     */
    const ProjectionsState = {
        rawDataset: [],
        assetLookupMap: new Map(),
        currentOlapData: [],
        currentFilteredRecords: [],

        // OLAP Configuration
        pivotDimension: 'expenditureType', // Options: 'expenditureType', 'costCenter', 'legalEntity'
        sortKey: 'name',                  // Options: 'name', '2026', '2027', '2028'
        sortOrder: 'asc',

        // Active Multi-Select Filters
        filters: {
            searchKeyword: '',
            expenditureTypes: [],
            legalEntities: [],
            costCenters: [],
            suppliers: []
        },

        loadPayload: function (payload) {
            this.rawDataset = payload.projections || [];
            this.currentOlapData = [];
            this.currentFilteredRecords = [];

            this.assetLookupMap.clear();
            (payload.assets || []).forEach(asset => {
                const id = String(asset.id || "").trim();
                if (id) {
                    this.assetLookupMap.set(id, {
                        name: (asset.name || "").toString().trim(),
                        manufacturer: (asset.manufacturer || "Unknown").toString().trim(),
                        driver: (asset.businessDriver || "Technology").toString().trim()
                    });
                }
            });
        },

        toggleFilterValue: function (category, value) {
            const arr = this.filters[category];
            const idx = arr.indexOf(value);
            if (idx > -1) {
                arr.splice(idx, 1);
            } else {
                arr.push(value);
            }
        },

        resetAllFilters: function () {
            this.pivotDimension = 'expenditureType';
            this.sortKey = 'name';
            this.sortOrder = 'asc';
            this.filters.searchKeyword = '';
            this.filters.expenditureTypes = [];
            this.filters.legalEntities = [];
            this.filters.costCenters = [];
            this.filters.suppliers = [];
        }
    };
</script>
