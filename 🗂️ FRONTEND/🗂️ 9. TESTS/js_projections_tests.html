<script>
    /**
     * ============================================================================
     * FINOPS UNIT TESTING (CLIENT-SIDE): PROJECTIONS DOMAIN
     * ============================================================================
     * Suite estesa a 18 test per convalidare i DTO camelCase puri, 
     * il calcolo YTD vs ROY, l'Invoice Clearing e l'oracolo del tempo.
     */

    window.addEventListener('DOMContentLoaded', () => {
        // Assicuriamoci che l'engine e il runner siano caricati
        if (typeof FinOpsTestRunner === 'undefined' || typeof ContractProjection === 'undefined') return;

        const projSuite = FinOpsTestRunner.createSuite("ProjectionsEngine (Client-Side)");

        projSuite.add("1. ContractProjection - Contratto totalmente esterno al perimetro dell'anno fiscale", (assert) => {
            const dto = { contractId: "CTR-OLD", startDate: "2023-01-01", contractEndDate: "2024-05-01", costRecurrence: "Recurrent", annualValue: 50000 };
            const fy26 = new TimePeriod("FY26", "2025-07-01", "2026-06-30");
            const projection = new ContractProjection(dto, fy26);

            assert.equal(projection.daysOfCompetence, 0);
            assert.equal(projection.calculateBaseline(), 0);
            assert.equal(projection.calculateOptimized(), 0);
        });

        projSuite.add("2. ContractProjection - Applicazione strategia TERMINATE (Costo si azzera)", (assert) => {
            const dto = { contractId: "CTR-TERMINATE-TEST", startDate: "2025-07-01", contractEndDate: "2026-06-30", costRecurrence: "Recurrent", annualValue: 365000 };
            const fy26 = new TimePeriod("FY26", "2025-07-01", "2026-06-30");

            const terminateInit = { status: "COMPLETED", decision: "TERMINATE", targetDate: "2026-04-01" };
            const projection = new ContractProjection(dto, fy26, [terminateInit]);

            assert.equal(projection.calculateBaseline(), 365000);
            assert.closeTo(projection.calculateOptimized(), 273750, 10);
        });

        projSuite.add("3. ContractProjection - Cascading Multi-Iniziativa (Sconti progressivi)", (assert) => {
            const dto = { contractId: "CTR-MULTI-CUT", startDate: "2025-07-01", contractEndDate: "2026-06-30", costRecurrence: "Recurrent", annualValue: 100000 };
            const fy26 = new TimePeriod("FY26", "2025-07-01", "2026-06-30");

            const init1 = { status: "COMPLETED", decision: "OPTIMIZE", targetDate: "2025-06-30", targetCostAnnualized: 90000 };
            const init2 = { status: "COMPLETED", decision: "OPTIMIZE", targetDate: "2025-12-31", targetCostAnnualized: 80000 };

            const projection = new ContractProjection(dto, fy26, [init1, init2]);
            assert.closeTo(projection.calculateOptimized(), 85000, 500);
        });

        projSuite.add("4. Engine Orchestrator - Deve preservare le colonne descrittive", (assert) => {
            const dto = { contractId: "CTR-PROJ-PRESERVE", status: "ACTIVE", supplier: "Amazon", costCenter: "CC-01", startDate: "2026-01-01", contractEndDate: "2026-12-31", annualValue: 365000, extra: "Dato" };
            const output = ProjectionsEngine.calculateAll([dto], [], []);

            assert.equal(output.length, 1);
            assert.equal(output[0].Supplier, "Amazon");
            assert.equal(output[0]["Cost Center"], "CC-01");
            assert.equal(output[0]["FY26 Baseline"], 182500);
        });

        projSuite.add("4b. Engine Orchestrator - Iniziativa IN NEGOTIATION deve essere inclusa", (assert) => {
            const contractDto = { contractId: "CTR-A", masterId: "MCT-01", status: "IN NEGOTIATION", startDate: "2026-01-01", contractEndDate: "2026-06-30", costRecurrence: "Recurrent", annualValue: 1070000 };
            const init = { masterId: "MCT-01", status: "IN NEGOTIATION", decision: "OPTIMIZATION", targetDate: "2026-07-01", targetSavingPct: 0.05 };
            const output = ProjectionsEngine.calculateAll([contractDto], [init], [], []);

            assert.equal(output.length, 1);
            assert.closeTo(output[0].fy26Optimized, 535000, 1);
            assert.closeTo(output[0].fy27Optimized, 1016500, 1);
        });

        projSuite.add("4c. Contract.exportToData - Deve preservare annualValue e status esplicito", (assert) => {
            const contract = new Contract({ contractId: "CTR-EXPORT", status: "IN NEGOTIATION", startDate: "2026-01-01", contractEndDate: "2026-06-30", annualValue: 1070000 });
            const exported = contract.exportToData();

            assert.equal(exported.annualValue, 1070000);
            assert.equal(exported.status, "IN NEGOTIATION");
        });

        projSuite.add("5. ContractProjection - Rinnovo virtuale (Rollover) oltre la End Date", (assert) => {
            const dto = { contractId: "CTR-TDD-ROLLOVER", startDate: "2025-01-01", contractEndDate: "2026-12-31", costRecurrence: "Recurrent", annualValue: 100000 };
            const fy28 = new TimePeriod("FY28", "2027-07-01", "2028-06-30");
            const projection = new ContractProjection(dto, fy28, []);

            assert.equal(projection.calculateBaseline(), 100000);
            assert.equal(projection.calculateOptimized(), 100000);
        });

        projSuite.add("5b. ContractProjection - Rinnovo virtuale Optimization dopo scadenza", (assert) => {
            const dto = {
                contractId: "CTR-EXPIRED-OPT",
                startDate: "2024-01-01",
                contractEndDate: "2025-06-30",
                costRecurrence: "Recurrent",
                annualValue: 120000
            };
            const fy27 = new TimePeriod("FY27", "2026-07-01", "2027-06-30");
            const optimizationInit = {
                status: "IN PROGRESS",
                decision: "OPTIMIZATION",
                targetDate: "2026-07-01",
                targetCostAnnualized: 60000
            };

            const projection = new ContractProjection(dto, fy27, [optimizationInit]);

            assert.equal(projection.calculateBaseline(), 0);
            assert.equal(projection.calculateOptimized(), 60000);
        });

        projSuite.add("6. ContractProjection - Il Rollover virtuale DEVE interrompersi se esiste un Master Successore", (assert) => {
            const predDto = { contractId: "CTR-PRED-01", startDate: "2025-01-01", contractEndDate: "2026-12-31", costRecurrence: "Recurrent", annualValue: 365000 };
            const successorStartDate = new Date("2027-07-01");
            const fy28 = new TimePeriod("FY28", "2027-07-01", "2028-06-30");

            const projection = new ContractProjection(predDto, fy28, [], successorStartDate);
            assert.equal(projection.calculateBaseline(), 0);
            assert.equal(projection.calculateOptimized(), 0);
        });

        projSuite.add("7. ContractProjection - Standard ERP Monthly Pro-Rata", (assert) => {
            const dto = { contractId: "CTR-ERP-TEST", startDate: "2026-11-16", contractEndDate: "2028-12-31", costRecurrence: "Recurrent", annualValue: 12000 };
            const periodNov = new TimePeriod("NOV-26", "2026-11-01", "2026-11-30");
            const periodDec = new TimePeriod("DEC-26", "2026-12-01", "2026-12-31");

            assert.equal(new ContractProjection(dto, periodNov, []).calculateBaseline(), 500);
            assert.equal(new ContractProjection(dto, periodDec, []).calculateBaseline(), 1000);
        });

        projSuite.add("8. Projections Engine - Master Init deve ripartirsi sui figli", (assert) => {
            const targetPeriod = new TimePeriod("FY26", "2025-07-01", "2026-06-30");
            const contractA = { contractId: "CTR-A", masterId: "MCT-SHARED", costRecurrence: "Recurrent", annualValue: 50000, startDate: "2025-07-01", contractEndDate: "2026-06-30" };
            const contractB = { contractId: "CTR-B", masterId: "MCT-SHARED", costRecurrence: "Recurrent", annualValue: 50000, startDate: "2025-07-01", contractEndDate: "2026-06-30" };

            const sharedInit = { masterId: "MCT-SHARED", contractId: "", status: "COMPLETED", decision: "OPTIMIZE", targetDate: "2026-01-01", targetCostAnnualized: 70000, targetSavingPct: 0.3 };

            const projA = new ContractProjection(contractA, targetPeriod, [sharedInit]);
            const projB = new ContractProjection(contractB, targetPeriod, [sharedInit]);

            assert.closeTo(projA.calculateOptimized() + projB.calculateOptimized(), 85000, 10);
        });

        projSuite.add("9. Dual Scope - L'iniziativa con 'contractId' specifico colpisce solo il bersaglio", (assert) => {
            const targetPeriod = new TimePeriod("FY26", "2025-07-01", "2026-06-30");
            const contractA = { contractId: "CTR-TARGET", masterId: "MCT-DUAL", costRecurrence: "Recurrent", annualValue: 100000, startDate: "2025-01-01", contractEndDate: "2028-12-31" };
            const contractB = { contractId: "CTR-IGNORED", masterId: "MCT-DUAL", costRecurrence: "Recurrent", annualValue: 100000, startDate: "2025-01-01", contractEndDate: "2028-12-31" };

            const localInit = { masterId: "MCT-DUAL", contractId: "CTR-TARGET", status: "COMPLETED", decision: "OPTIMIZE", targetDate: "2025-07-01", targetCostAnnualized: 50000 };

            const projA = new ContractProjection(contractA, targetPeriod, [localInit]);
            const projB = new ContractProjection(contractB, targetPeriod, []);

            assert.equal(projA.calculateOptimized(), 50000);
            assert.equal(projB.calculateOptimized(), 100000);
        });

        projSuite.add("10. CAPEX Full Upfront carica 100% nel primo anno fiscale e 0 successivi", (assert) => {
            const dtoCapex = { contractId: "CTR-CAPEX", expenditureType: "CAPEX", billingTerms: "Full Upfront / Prepaid", costRecurrence: "Recurrent", startDate: "2026-01-01", contractEndDate: "2027-12-31", totalCommitment: 120000 };
            const fy26 = new TimePeriod("FY26", "2025-07-01", "2026-06-30");
            const fy27 = new TimePeriod("FY27", "2026-07-01", "2027-06-30");

            assert.equal(new ContractProjection(dtoCapex, fy26, []).calculateBaseline(), 120000);
            assert.equal(new ContractProjection(dtoCapex, fy27, []).calculateBaseline(), 0);
        });

        projSuite.add("11. Forward Generation - Creazione corretta dei Bucket Actual vs Virtual", (assert) => {
            const dto = { contractId: "CTR-FWD", startDate: "2026-01-01", contractEndDate: "2027-03-31", costRecurrence: "Recurrent", annualValue: 120000 };
            const fy26 = new TimePeriod("FY26", "2025-07-01", "2026-06-30");
            const fy27 = new TimePeriod("FY27", "2026-07-01", "2027-06-30");

            const p26 = new ContractProjection(dto, fy26, []);
            const p27 = new ContractProjection(dto, fy27, []);

            p26.calculateOptimized();
            p27.calculateOptimized();

            const combinedActual = { ...p26.monthlyOptimizedActual, ...p27.monthlyOptimizedActual };
            const combinedVirtual = { ...p26.monthlyOptimizedVirtual, ...p27.monthlyOptimizedVirtual };

            assert.equal(Math.round(combinedActual["2026-07"]), 10000);
            assert.equal(Math.round(combinedActual["2027-03"]), 10000);

            assert.isTrue(combinedActual["2027-04"] === undefined);
            assert.equal(Math.round(combinedVirtual["2027-04"]), 10000);
        });

        projSuite.add("12. Forward Generation - Iniziativa Infra-Annuale sui Bucket", (assert) => {
            const dto = { contractId: "CTR-FWD-ADV", startDate: "2026-01-01", contractEndDate: "2027-03-31", costRecurrence: "Recurrent", annualValue: 120000 };
            const init = { status: "COMPLETED", decision: "OPTIMIZE", targetDate: "2027-01-01", targetCostAnnualized: 60000 };

            const fy27 = new TimePeriod("FY27", "2026-07-01", "2027-06-30");
            const p27 = new ContractProjection(dto, fy27, [init]);
            p27.calculateOptimized();

            assert.equal(Math.round(p27.monthlyOptimizedActual["2026-12"]), 10000);
            assert.equal(Math.round(p27.monthlyOptimizedActual["2027-01"]), 5000);
            assert.equal(Math.round(p27.monthlyOptimizedVirtual["2027-04"]), 5000);
        });

        projSuite.add("13. Prevenzione Double Invocation - I secchielli mensili non devono raddoppiare", (assert) => {
            const dto = { contractId: "CTR-DOUBLE-TEST", startDate: "2025-07-01", contractEndDate: "2026-06-30", costRecurrence: "Recurrent", annualValue: 791000 };
            const fy26 = new TimePeriod("FY26", "2025-07-01", "2026-06-30");

            const projection = new ContractProjection(dto, fy26, []);

            projection.calculateBaseline();
            projection.calculateOptimized();

            const julyActual = projection.monthlyOptimizedActual["2025-07"];
            assert.closeTo(julyActual, 65916.66, 1);
        });

        projSuite.add("14. Engine Orchestrator - Contratti UPCOMING devono generare proiezioni future", (assert) => {
            const dtoUpcoming = {
                contractId: "CTR-FUTURO",
                status: "UPCOMING",
                startDate: "2026-01-01",
                contractEndDate: "2026-12-31",
                costRecurrence: "Recurrent",
                annualValue: 120000,
                billingTerms: "Fixed Recurring"
            };

            const output = ProjectionsEngine.calculateAll([dtoUpcoming], [], []);

            assert.equal(output.length, 1);
            assert.equal(output[0]["FY26 Baseline"], 60000);
            assert.equal(output[0]["FY27 Baseline"], 120000);
        });

        // ============================================================================
        // 🌟 NUOVI TEST FINOPS ARCHITECTURAL (Fase 15 - 18)
        // ============================================================================

        projSuite.add("15. YTD vs ROY - Contratti Flat lineari tagliati rispetto all'oracolo del tempo", (assert) => {
            const dto = { contractId: "CTR-FLAT-TIME", billingTerms: "Full Upfront / Prepaid", pricingModel: "Flat", totalCommitment: 12000, startDate: "2026-01-01", contractEndDate: "2026-12-31" };

            // Simula data odierna fissa a fine Aprile 2026 (4 mesi passati consolidati, 8 futuri)
            const simulatedToday = new Date("2026-05-01T00:00:00Z");
            const contractInstance = new Contract(dto);
            const split = contractInstance.calculateYtdRoySplit(simulatedToday);

            assert.equal(split.ytdActuals, 4000);
            assert.equal(split.royForecast, 8000);
        });

        projSuite.add("16. YTD vs ROY - Contratti con Ledger (I movimenti ACTUAL alimentano YTD, CALCULATED alimentano ROY)", (assert) => {
            const dto = { contractId: "CTR-LEDGER-SPLIT", billingTerms: "Custom / Ledger Driven", pricingModel: "Flat", totalCommitment: 12000, startDate: "2026-01-01", contractEndDate: "2026-12-31" };
            const contractInstance = new Contract(dto);

            const mockLedger = [
                { type: "ACTUAL", amount: 3000 },
                { type: "ACTUAL", amount: 3000 },
                { type: "CALCULATED", amount: 6000 }
            ];

            const split = contractInstance.calculateYtdRoySplit(new Date(), mockLedger);

            assert.equal(split.ytdActuals, 6000);
            assert.equal(split.royForecast, 6000);
        });

        projSuite.add("17. Invoice Clearing - Le fatture ACTUAL stornano i ratei teorici CALCULATED nel mese per evitare double-counting", (assert) => {
            const contractInstance = new Contract({
                id: "CTR-CLEAR-TEST", pricingModel: "Flat", billingTerms: "Fixed Recurring", billingFrequency: "Monthly",
                startDate: "2026-01-01", contractEndDate: "2026-12-31", totalCommitment: 12000
            });

            // L'utente approva la fattura di Gennaio (ACTUAL)
            contractInstance.ledger.push({ type: "ACTUAL", amount: 1000, startDate: "2026-01-01", endDate: "2026-01-31" });

            // Forziamo il recupero dell'intero scadenziario
            const fullLedger = contractInstance.exportFullLedger();

            const actualCount = fullLedger.filter(l => l.type === "ACTUAL").length;
            const calculatedCount = fullLedger.filter(l => l.type === "CALCULATED").length;

            assert.equal(actualCount, 1);
            // Gennaio è coperto dall'ACTUAL, l'engine deve generare solo gli 11 mesi rimanenti stornando il CALCULATED di Gennaio!
            assert.equal(calculatedCount, 11);
        });

        projSuite.add("18. Ricalcolo Predittivo Pay-As-You-Go - Inserimento di ACTUAL rimodula i mesi residui a protezione del budget", (assert) => {
            const contractInstance = new Contract({
                id: "CTR-PAYG-TEST", pricingModel: "Capped Consumption", billingTerms: "Pay-As-You-Go",
                totalCommitment: 1000, startDate: "2026-01-01", contractEndDate: "2026-12-31"
            });

            // A Marzo registriamo un consumo reale extra di 200€
            contractInstance.ledger.push({ type: "ACTUAL", amount: 200, startDate: "2026-03-01", endDate: "2026-03-31" });

            // L'engine calcola i mesi rimanenti (da Aprile a Dicembre = 9 mesi)
            const autoLedger = contractInstance.generateForecastLedger(contractInstance.ledger);

            assert.equal(autoLedger.length, 9);
            // Formula: (1000 TCV - 200 ACTUAL) / 9 mesi rimanenti = 88.88€ a mese
            assert.closeTo(autoLedger[0].amount, 88.88, 0.1);
        });

    });
</script>
