                    </button>
                    <button onclick="InventoryController.triggerEditContract('${cId}')" class="h-6 w-6 p-1 bg-slate-50 text-slate-400 hover:text-teal-600 hover:bg-teal-50 border border-slate-200 rounded-md transition-all shadow-3xs group cursor-pointer" title="EDIT ALLOCATION">
                        <svg class="w-3.5 h-3.5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" /></svg>
                    </button>
                </div>
            ` : '';

            return `
            <div onclick="InventoryController.triggerEditContract('${cId}')" class="cursor-pointer flex items-center justify-between p-2 mb-1 last:mb-0 bg-white border border-slate-100 rounded-lg shadow-3xs hover:border-teal-200 hover:shadow-sm transition-all group/child">
                <div class="flex items-center gap-2.5 w-5/12 min-w-0">
                    <span class="px-1.5 py-0.5 bg-slate-100 text-slate-500 font-black text-[7px] uppercase tracking-widest rounded border border-slate-200/60 shrink-0">${expType}</span>
                    <div class="min-w-0">
                        <div class="flex items-center gap-1.5">
                            <div class="font-black text-slate-700 text-[10px] uppercase tracking-wide truncate" title="${entity}">${entity}</div>
                            ${statusBadge}
                        </div>
                        <div class="text-[8px] font-mono text-slate-400 mt-0.5 truncate">ID: ${cId}</div>
                    </div>
                </div>
                <div class="flex items-center justify-end w-7/12">
                    <div class="text-right border-r border-slate-100 pr-3 hidden sm:block">
                        <span class="text-[6px] text-slate-400 uppercase font-black tracking-widest block">LIFECYCLE</span>
                        <span class="text-[9px] font-mono font-medium text-slate-500">${start} ➔ ${end} <span class="text-slate-400 text-[8px]">(${term}M)</span></span>
                    </div>
                    <div class="text-right border-r border-slate-100 px-3 hidden md:block">
                        <span class="text-[6px] text-slate-400 uppercase font-black tracking-widest block">TOTAL COMMITMENT</span>
                        <span class="text-[9px] font-mono font-bold text-slate-600">€ ${totCommit}</span>
                    </div>
                    <div class="text-right pl-3">
                        <span class="text-[6px] text-slate-400 uppercase font-black tracking-widest block">RUN RATE</span>
                        <span class="text-[9px] font-mono font-black text-slate-700">€ ${runRate}</span>
                    </div>
                    ${editActions}
                </div>
            </div>`;
        },

        getCurrentStatusBadge: function (status) {
            const val = (status || "").toUpperCase().trim();
            const styles = {
                'RUNNING': 'text-emerald-700 bg-emerald-50 border-emerald-100',
                'OPTIMIZING': 'text-amber-700 bg-amber-50 border-amber-100',
                'EXITING': 'text-orange-700 bg-orange-50 border-orange-100',
                'TRANSFERRED': 'text-sky-700 bg-sky-50 border-sky-100',
                'EXPIRED': 'text-rose-700 bg-rose-50 border-rose-100',
                'DISMISSED': 'text-slate-500 bg-slate-50 border-slate-200'
            };
            return `<span class="px-2 py-0.5 text-[9px] font-bold rounded-full border ${styles[val] || 'text-slate-400 bg-slate-50 border-slate-100'}">${val}</span>`;
        },

        getTargetStatusText: function (target) {
            const val = (target || "").toUpperCase().trim();
            const colors = { 'RETAIN': 'text-emerald-600', 'EXIT': 'text-rose-600', 'HANDOVER': 'text-sky-600' };
            return `<span class="text-[10px] font-black tracking-widest uppercase ${colors[val] || 'text-slate-400'}">${val}</span>`;
        },

        getBudgetStatusBadge: function (budgetStatus) {
            const val = (budgetStatus || "").toUpperCase().trim();
            if (val === "SECURED") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> SECURED</span>`;
            if (val === "AT RISK") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> AT RISK</span>`;
            return `<span class="text-slate-300">—</span>`;
        }
    };

    // Aggancio del riferimento per la funzione chiamata in js_inventory_controller
    InventoryTemplates.getTemplateOfMasterAccordion = InventoryTemplates.getMasterAccordionCard;
</script>
