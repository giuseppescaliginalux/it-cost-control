<script>
/**
 * MODULO 2: LOGICA FILTRI E ORDINAMENTO (100% Client-Side)
 */

// Inizializza tutto ciò che riguarda il Tab Inventory
function initInventoryTab() {
    setupDynamicSlider(globalCachedData);
    populateAssetFilters();
    populateContractFilters(); 
    applyFiltersAndSort(); 
}

// Estrae i valori unici dai CONTRATTI e disegna i checkbox (inclusa la Location e Country Quick-Select)
function populateContractFilters() {
    const contracts = windowPayload.contracts || [];
    
    const getUnique = (key) => [...new Set(contracts.map(c => (c[key] || "").toString().trim()).filter(v => v !== ""))].sort();
    
    const buildCheckboxes = (values, containerId) => {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = values.map(val => `
            <label class="flex items-center gap-2 cursor-pointer group/cb">
                <input type="checkbox" value="${val}" onchange="applyFiltersAndSort()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                <span class="text-[11px] font-medium text-slate-600 group-hover/cb:text-slate-900 truncate">${val}</span>
            </label>
        `).join('');
    };

    buildCheckboxes(getUnique("Billing Channel"), "filter-container-channel");
    buildCheckboxes(getUnique("Expenditure Type"), "filter-container-exp");
    buildCheckboxes(getUnique("Legal Entity"), "filter-container-legal");
    buildCheckboxes(getUnique("Supplier"), "filter-container-supplier");
    buildCheckboxes(getUnique("Cost Center"), "filter-container-costcenter");
    buildCheckboxes(getUnique("Location"), "filter-container-location");

    // CORREZIONE: Estrazione basata sul formato reale [XYZ] delle nazioni
    const uniqueLocations = getUnique("Location");
    const countrySet = new Set();
    uniqueLocations.forEach(loc => {
        const match = loc.match(/^\[([A-Z]{3})\]/);
        if (match) countrySet.add(match[1].trim().toUpperCase());
    });
    const uniqueCountries = Array.from(countrySet).sort();
    
    const quickSelectContainer = document.getElementById("location-country-quick-select");
    if (quickSelectContainer) {
        quickSelectContainer.innerHTML = uniqueCountries.map(c => `
            <button type="button" onclick="toggleCountryLocations(event, '${c}')" class="text-[9px] font-black px-2 py-0.5 rounded bg-slate-100 text-slate-600 hover:bg-teal-600 hover:text-white border border-slate-200 transition-all uppercase tracking-wider">
                ${c}
            </button>
        `).join('');
    }
}

// Funzione di utilità per selezionare/deselezionare in blocco le location di una Country
// CORREZIONE: Aggiornato il pattern di controllo per intercettare i tag [ITA], [CHN], ecc.
function toggleCountryLocations(event, country) {
    if (event) {
        event.preventDefault();
        event.stopPropagation();
    }
    
    const checkBoxes = document.querySelectorAll('#filter-container-location input');
    let targetBoxes = Array.from(checkBoxes).filter(cb => {
        const match = cb.value.match(/^\[([A-Z]{3})\]/);
        return match && match[1].trim().toUpperCase() === country.toUpperCase();
    });
    
    if (targetBoxes.length === 0) return;
    
    // Se sono già tutte selezionate le deseleziona, altrimenti le seleziona tutte
    const allChecked = targetBoxes.every(cb => cb.checked);
    targetBoxes.forEach(cb => cb.checked = !allChecked);
    
    applyFiltersAndSort();
}

// Estrae i valori unici degli ATTRIBUTI ASSET e disegna i checkbox
function populateAssetFilters() {
    const assets = globalCachedData || [];
    
    const uniqueStatuses = [...new Set(assets.map(a => (a["Current Status"] || "").toString().trim().toUpperCase()).filter(v => v !== ""))].sort();
    const container = document.getElementById("status-filter-container");
    if (container) {
        container.innerHTML = uniqueStatuses.map(val => `
            <label class="flex items-center gap-2 cursor-pointer group/cb">
                <input type="checkbox" value="${val}" onchange="applyFiltersAndSort()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                <span class="text-[11px] font-medium text-slate-600 group-hover/cb:text-slate-900 truncate">${val}</span>
            </label>
        `).join('');
    }

    // Estrazione e rendering dei Budget Status
    const uniqueBudgetStatuses = [...new Set(assets.map(a => (a["Budget Status (FY27)"] || a["Budget Status"] || "").toString().trim()).filter(v => v !== "" && v !== "-"))].sort();
    const budgetContainer = document.getElementById("budget-status-filter-container");
    if (budgetContainer) {
        budgetContainer.innerHTML = uniqueBudgetStatuses.map(val => `
            <label class="flex items-center gap-2 cursor-pointer group/cb">
                <input type="checkbox" value="${val}" onchange="applyFiltersAndSort()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                <span class="text-[11px] font-medium text-slate-600 group-hover/cb:text-slate-900 truncate">${val}</span>
            </label>
        `).join('');
    }

    // Estrazione e rendering dei Business Driver
    const uniqueDrivers = [...new Set(assets.map(a => (a["Business Driver"] || "").toString().trim()).filter(v => v !== ""))].sort();
    const driverContainer = document.getElementById("driver-filter-container");
    if (driverContainer) {
        driverContainer.innerHTML = uniqueDrivers.map(val => `
            <label class="flex items-center gap-2 cursor-pointer group/cb">
                <input type="checkbox" value="${val}" onchange="applyFiltersAndSort()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                <span class="text-[11px] font-medium text-slate-600 group-hover/cb:text-slate-900 truncate">${val}</span>
            </label>
        `).join('');
    }
}

function setupDynamicSlider(allRows) {
    let maxRunRate = 0;
    allRows.forEach(row => {
        const rate = parseFloat(row["Run Rate"]) || 0;
        if (rate > maxRunRate) maxRunRate = rate;
    });
    if (maxRunRate === 0) maxRunRate = 1000000;

    const slider = document.getElementById('budget-slider');
    const maxLabel = document.getElementById('slider-max-label');
    if(slider) slider.max = maxRunRate;

    if(maxLabel) {
        if (maxRunRate >= 1000000) maxLabel.textContent = `€ ${(maxRunRate / 1000000).toFixed(1)}M`;
        else maxLabel.textContent = `€ ${(maxRunRate / 1000).toFixed(0)}K`;
    }
}

// Funzione Reset All ripulita e allineata
function resetAllFilters() {
    const searchInput = document.getElementById('search-input');
    if (searchInput) searchInput.value = '';
    
    const sortSelect = document.getElementById('sort-select');
    if (sortSelect) sortSelect.value = 'runrate-desc';
    
    const slider = document.getElementById('budget-slider');
    if (slider) slider.value = 0;
    
    const containers = [
        'status-filter-container',
        'budget-status-filter-container',
        'driver-filter-container',
        'filter-container-channel',
        'filter-container-exp',
        'filter-container-legal',
        'filter-container-supplier',
        'filter-container-costcenter',
        'filter-container-location'
    ];
    
    containers.forEach(id => {
        const container = document.getElementById(id);
        if (container) {
            const checkboxes = container.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = false);
        }
    });
    
    applyFiltersAndSort();
}

function applyFiltersAndSort() {
    const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
    const sortBy = document.getElementById('sort-select').value;
    const minVal = parseFloat(document.getElementById('budget-slider').value) || 0;
    if(document.getElementById('budget-val')) document.getElementById('budget-val').textContent = minVal.toLocaleString('it-IT');

    // Lettura di tutti i filtri attivi (Asset & Contratti)
    const selStatus = Array.from(document.querySelectorAll('#status-filter-container input:checked')).map(cb => cb.value.toUpperCase());
    const selBudgetStatus = Array.from(document.querySelectorAll('#budget-status-filter-container input:checked')).map(cb => cb.value.toUpperCase());
    const selDriver = Array.from(document.querySelectorAll('#driver-filter-container input:checked')).map(cb => cb.value.toUpperCase());
    
    const selChannel = Array.from(document.querySelectorAll('#filter-container-channel input:checked')).map(cb => cb.value);
    const selExp = Array.from(document.querySelectorAll('#filter-container-exp input:checked')).map(cb => cb.value);
    const selLegal = Array.from(document.querySelectorAll('#filter-container-legal input:checked')).map(cb => cb.value);
    const selSupplier = Array.from(document.querySelectorAll('#filter-container-supplier input:checked')).map(cb => cb.value);
    const selCostCenter = Array.from(document.querySelectorAll('#filter-container-costcenter input:checked')).map(cb => cb.value);
    const selLocation = Array.from(document.querySelectorAll('#filter-container-location input:checked')).map(cb => cb.value);

    let filteredData = globalCachedData.filter(row => {
        const name = (row["Asset Name"] || "").toLowerCase();
        const manufacturer = (row["Manufacturer"] || "").toLowerCase();
        const runRate = parseFloat(row["Run Rate"]) || 0;
        const currentStatus = (row["Current Status"] || "").toUpperCase().trim();
        const budgetStatus = (row["Budget Status (FY27)"] || row["Budget Status"] || "").toUpperCase().trim();
        const currentDriver = (row["Business Driver"] || "").toUpperCase().trim();
        
        // Controlli standard sull'Asset
        const matchesSearch = name.includes(searchTerm) || manufacturer.includes(searchTerm);
        const matchesRunRate = runRate >= minVal;
        const matchesStatus = selStatus.length === 0 || selStatus.includes(currentStatus);
        const matchesBudgetStatus = selBudgetStatus.length === 0 || selBudgetStatus.includes(budgetStatus);
        const matchesDriver = selDriver.length === 0 || selDriver.includes(currentDriver);

        // Check Relazionale (JOIN Multiplo sui Contratti)
        let matchesChannel = true; let matchesExp = true; let matchesLegal = true;
        let matchesSupplier = true; let matchesCostCenter = true; let matchesLocation = true;

        if (selChannel.length > 0 || selExp.length > 0 || selLegal.length > 0 || selSupplier.length > 0 || selCostCenter.length > 0 || selLocation.length > 0) {
            const normalizedRowAsset = (row["Asset Name"] || "").toString().trim().toLowerCase();
            const relatedContracts = windowPayload.contracts.filter(c => 
                (c["Asset Name"] || "").toString().trim().toLowerCase() === normalizedRowAsset
            );

            if (selChannel.length > 0) matchesChannel = relatedContracts.some(c => selChannel.includes((c["Billing Channel"] || "").toString().trim()));
            if (selExp.length > 0) matchesExp = relatedContracts.some(c => selExp.includes((c["Expenditure Type"] || "").toString().trim()));
            if (selLegal.length > 0) matchesLegal = relatedContracts.some(c => selLegal.includes((c["Legal Entity"] || "").toString().trim()));
            if (selSupplier.length > 0) matchesSupplier = relatedContracts.some(c => selSupplier.includes((c["Supplier"] || "").toString().trim()));
            if (selCostCenter.length > 0) matchesCostCenter = relatedContracts.some(c => selCostCenter.includes((c["Cost Center"] || "").toString().trim()));
            if (selLocation.length > 0) matchesLocation = relatedContracts.some(c => selLocation.includes((c["Location"] || "").toString().trim()));
        }

        return matchesSearch && matchesRunRate && matchesStatus && matchesBudgetStatus && matchesDriver && matchesChannel && matchesExp && matchesLegal && matchesSupplier && matchesCostCenter && matchesLocation;
    });

    filteredData.sort((a, b) => {
        if (sortBy === 'runrate-desc') return (parseFloat(b["Run Rate"]) || 0) - (parseFloat(a["Run Rate"]) || 0);
        if (sortBy === 'assetname-asc') return (a["Asset Name"] || "").toString().localeCompare((b["Asset Name"] || "").toString(), 'it');
        if (sortBy === 'expiry-asc') {
            const dA = a["Last End Date"] ? new Date(a["Last End Date"]) : new Date(2099, 11, 31);
            const dB = b["Last End Date"] ? new Date(b["Last End Date"]) : new Date(2099, 11, 31);
            return dA - dB;
        }
        return 0;
    });

    // Ricalcolo riepiloghi monetari
    let sumRunRate = 0; let sumOutlook = 0;
    filteredData.forEach(row => {
        sumRunRate += parseFloat(row["Run Rate"]) || 0;
        sumOutlook += parseFloat(row["Fiscal Projection (FY27)"] || row["Fiscal FY27"] || row["Fiscal Projection"]) || 0;
    });

    const formatFilterValue = (val) => {
        if (val >= 1000000) return '€ ' + (val / 1000000).toFixed(2) + 'M';
        if (val >= 1000) return '€ ' + (val / 1000).toFixed(0) + 'k';
        return '€ ' + val.toFixed(0);
    };

    if(document.getElementById('asset-count-badge')) document.getElementById('asset-count-badge').textContent = filteredData.length + " Assets";
    if(document.getElementById('filter-runrate-val')) document.getElementById('filter-runrate-val').textContent = formatFilterValue(sumRunRate);
    if(document.getElementById('filter-outlook-val')) document.getElementById('filter-outlook-val').textContent = formatFilterValue(sumOutlook);

    renderMainTable(filteredData);
}
</script>
