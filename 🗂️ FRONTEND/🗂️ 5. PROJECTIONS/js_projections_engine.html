<script>
    /**
     * ============================================================================
     * FINOPS ENGINE (CLIENT-SIDE): js_projections_engine.html
     * ============================================================================
     * Questo modulo esegue il calcolo delle proiezioni finanziarie a latenza zero
     * sfruttando la CPU del browser. Le classi TimePeriod e ContractProjection 
     * sono copie perfette isomorfiche del dominio backend.
     */

    // ============================================================================
    // 1. CLASSI DI DOMINIO (PURE JS)
    // ============================================================================
    class TimePeriod {
        constructor(name, startDateStr, endDateStr) {
            this.startDate = new Date(startDateStr);
            this.endDate = new Date(endDateStr);
            this.name = name;
        }
        getOverlapDays(contractStart, effectiveEnd) {
            if (!contractStart || !effectiveEnd) return 0;
            const start = new Date(Math.max(this.startDate, contractStart));
            const end = new Date(Math.min(this.endDate, effectiveEnd));
            if (start > end) return 0;
            return Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
        }
    }

    class ContractProjection {
        constructor(contractDto, period, linkedInitiatives = [], successorStartDate = null, fullLedger = []) {
            this.contract = contractDto instanceof Contract ? contractDto : new Contract(contractDto);
            this.period = period;
            this.linkedInitiatives = linkedInitiatives;
            this.fullLedger = fullLedger || [];

            this.monthlyBaselineActual = {};
            this.monthlyBaselineVirtual = {};
            this.monthlyOptimizedActual = {};
            this.monthlyOptimizedVirtual = {};

            this.contractStart = this.contract.startDate;
            this.contractEnd = this.contract.getEndDate();

            const isRecurrent = String(this.contract.costRecurrence).toLowerCase() === "recurrent";
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const isHistoricallyExpired = this.contractEnd && this.contractEnd < today;

            if (successorStartDate) {
                this.effectiveEndDate = new Date(successorStartDate);
                this.effectiveEndDate.setDate(this.effectiveEndDate.getDate() - 1);
            } else if (isRecurrent && !isHistoricallyExpired) {
                this.effectiveEndDate = new Date(2099, 11, 31);
            } else {
                this.effectiveEndDate = this.contractEnd;
            }

            this.daysOfCompetence = this.period ? this.period.getOverlapDays(this.contractStart, this.effectiveEndDate) : 0;
        }

        _recordMonthlySplit(targetActual, targetVirtual, dateObj, amount) {
            if (!dateObj || isNaN(dateObj.getTime()) || amount === 0) return;
            const mk = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
            const isVirtual = this.contractEnd && dateObj > this.contractEnd;
            const targetDict = isVirtual ? targetVirtual : targetActual;
            targetDict[mk] = (targetDict[mk] || 0) + amount;
        }

        _applyInitiativesToCost(dateToCheck, baseCost, activeInits) {
            let currentCost = baseCost;
            let isTerminated = false;

            for (let init of activeInits) {
                const initEffDate = new Date(init.targetDate);
                if (initEffDate) initEffDate.setHours(0, 0, 0, 0);

                if (dateToCheck >= initEffDate) {
                    if (["TERMINATE", "REPLACE", "TRANSFER"].includes(String(init.decision).toUpperCase())) {
                        isTerminated = true;
                    } else {
                        let globalSavingPct = parseFloat(init.targetSavingPct) || 0;
                        if (globalSavingPct > 1) globalSavingPct = globalSavingPct / 100;

                        if (globalSavingPct > 0) {
                            currentCost = currentCost * (1.0 - globalSavingPct);
                        } else {
                            let targetCost = parseFloat(init.targetCostAnnualized);
                            if (!isNaN(targetCost) && targetCost >= 0) currentCost = targetCost;
                        }
                    }
                }
            }
            return isTerminated ? 0 : currentCost;
        }

        calculateBaseline() {
            this.monthlyBaselineActual = {};
            this.monthlyBaselineVirtual = {};

            if (this.daysOfCompetence <= 0) return 0;

            const bt = String(this.contract.billingTerms || "").toUpperCase().trim();
            const expType = String(this.contract.expenditureType || "").toUpperCase().trim();
            const isUpfrontCapex = expType === "CAPEX" && (bt.includes("UPFRONT") || bt.includes("PREPAID"));

            if (bt.includes("PAY-AS-YOU-GO") || bt.includes("CUSTOM") || bt.includes("LEDGER")) {
                let ledgerSum = 0;

                (this.fullLedger || []).forEach(mov => {
                    const movStart = mov.startDate ? new Date(mov.startDate) : null;
                    const movEnd = mov.endDate ? new Date(mov.endDate) : movStart;
                    const amt = parseFloat(mov.amount) || 0;

                    if (movStart && movEnd && !isNaN(movStart.getTime()) && !isNaN(movEnd.getTime())) {
                        const overlapStart = movStart < this.period.startDate ? this.period.startDate : movStart;
                        const overlapEnd = movEnd > this.period.endDate ? this.period.endDate : movEnd;

                        if (overlapStart <= overlapEnd) {
                            const activeDays = Math.round((overlapEnd - overlapStart) / (1000 * 60 * 60 * 24)) + 1;
                            const totalDays = Math.round((movEnd - movStart) / (1000 * 60 * 60 * 24)) + 1;
                            const share = totalDays > 0 ? amt * (activeDays / totalDays) : amt;

                            ledgerSum += share;
                            this._recordMonthlySplit(this.monthlyBaselineActual, this.monthlyBaselineVirtual, overlapStart, share);
                        }
                    }
                });

                if (this.contract.costRecurrence === "Recurrent" && this.contractEnd && this.effectiveEndDate > this.contractEnd) {
                    const monthlyFlatRate = (parseFloat(this.contract.annualValue) || 0) / 12;
                    let vStartCursor = new Date(this.contractEnd);
                    vStartCursor.setDate(vStartCursor.getDate() + 1);
                    if (vStartCursor < this.period.startDate) vStartCursor = new Date(this.period.startDate);
                    const vEndCursor = new Date(Math.min(this.period.endDate, this.effectiveEndDate));

                    if (vStartCursor <= vEndCursor) {
                        let current = new Date(vStartCursor);
                        current.setDate(1);
                        while (current <= vEndCursor) {
                            let monthStart = new Date(current.getFullYear(), current.getMonth(), 1);
                            let monthEnd = new Date(current.getFullYear(), current.getMonth() + 1, 0);
                            let overlapStart = monthStart < vStartCursor ? vStartCursor : monthStart;
                            let overlapEnd = monthEnd > vEndCursor ? vEndCursor : monthEnd;

                            if (overlapStart <= overlapEnd) {
                                let activeDays = Math.round((overlapEnd - overlapStart) / (1000 * 60 * 60 * 24)) + 1;
                                let daysInMonth = Math.round((monthEnd - monthStart) / (1000 * 60 * 60 * 24)) + 1;
                                let share = activeDays === daysInMonth ? monthlyFlatRate : monthlyFlatRate * (activeDays / daysInMonth);
                                ledgerSum += share;
                                this._recordMonthlySplit(this.monthlyBaselineActual, this.monthlyBaselineVirtual, monthStart, share);
                            }
                            current.setMonth(current.getMonth() + 1);
                        }
                    }
                }
                return parseFloat(ledgerSum.toFixed(2));
            }

            if (this.contract.costRecurrence === "One-Shot" || isUpfrontCapex) {
                let totalHit = 0;
                if (this.contractStart && this.contractStart >= this.period.startDate && this.contractStart <= this.period.endDate) {
                    const hit = parseFloat(this.contract.totalCommitment) || 0;
                    totalHit += hit;
                    this._recordMonthlySplit(this.monthlyBaselineActual, this.monthlyBaselineVirtual, this.contractStart, hit);
                }
                if (this.contract.costRecurrence === "Recurrent" && this.contractEnd && this.effectiveEndDate > this.contractEnd) {
                    let termMonths = parseFloat(this.contract.contractTerm) || 12;
                    if (termMonths <= 0) termMonths = 12;
                    let nextRenewal = new Date(this.contractEnd);
                    nextRenewal.setDate(nextRenewal.getDate() + 1);
                    let safeguard = 0;
                    while (nextRenewal <= this.period.endDate && nextRenewal < this.effectiveEndDate && safeguard < 100) {
                        if (nextRenewal >= this.period.startDate) {
                            const hit2 = parseFloat(this.contract.totalCommitment) || 0;
                            totalHit += hit2;
                            this._recordMonthlySplit(this.monthlyBaselineActual, this.monthlyBaselineVirtual, nextRenewal, hit2);
                        }
                        nextRenewal.setMonth(nextRenewal.getMonth() + termMonths);
                        safeguard++;
                    }
                }
                return parseFloat(totalHit.toFixed(2));
            }

            const monthlyFlatRate = (parseFloat(this.contract.annualValue) || 0) / 12;
            let totalBaseline = 0;
            const startCursor = new Date(Math.max(this.period.startDate, this.contractStart));
            const endCursor = new Date(Math.min(this.period.endDate, this.effectiveEndDate));
            if (startCursor > endCursor) return 0;

            let current = new Date(startCursor);
            current.setDate(1);

            while (current <= endCursor) {
                let monthStart = new Date(current.getFullYear(), current.getMonth(), 1);
                let monthEnd = new Date(current.getFullYear(), current.getMonth() + 1, 0);
                let overlapStart = monthStart < startCursor ? startCursor : monthStart;
                let overlapEnd = monthEnd > endCursor ? endCursor : monthEnd;

                if (overlapStart <= overlapEnd) {
                    let activeDays = Math.round((overlapEnd - overlapStart) / (1000 * 60 * 60 * 24)) + 1;
                    let daysInMonth = Math.round((monthEnd - monthStart) / (1000 * 60 * 60 * 24)) + 1;
                    let share = activeDays === daysInMonth ? monthlyFlatRate : monthlyFlatRate * (activeDays / daysInMonth);
                    totalBaseline += share;
                    this._recordMonthlySplit(this.monthlyBaselineActual, this.monthlyBaselineVirtual, monthStart, share);
                }
                current.setMonth(current.getMonth() + 1);
            }
            return parseFloat(totalBaseline.toFixed(2));
        }

        calculateOptimized() {
            this.monthlyOptimizedActual = {};
            this.monthlyOptimizedVirtual = {};

            if (this.daysOfCompetence <= 0) return 0;

            const activeInits = this.linkedInitiatives.filter(init =>
                ["COMPLETED", "IN PROGRESS", "IDEA", "APPROVED", "PLANNED"].includes(String(init.status).toUpperCase())
            );

            const bt = String(this.contract.billingTerms || "").toUpperCase().trim();
            const expType = String(this.contract.expenditureType || "").toUpperCase().trim();
            const isUpfrontCapex = expType === "CAPEX" && (bt.includes("UPFRONT") || bt.includes("PREPAID"));

            if (activeInits.length === 0) {
                const res = this.calculateBaseline();
                Object.assign(this.monthlyOptimizedActual, this.monthlyBaselineActual);
                Object.assign(this.monthlyOptimizedVirtual, this.monthlyBaselineVirtual);
                return res;
            }

            activeInits.sort((a, b) => new Date(a.targetDate) - new Date(b.targetDate));

            if (bt.includes("PAY-AS-YOU-GO") || bt.includes("CUSTOM") || bt.includes("LEDGER")) {
                let totalOptimized = 0;
                const originalAnnualValue = parseFloat(this.contract.annualValue) || 0;

                (this.fullLedger || []).forEach(mov => {
                    const movStart = mov.startDate ? new Date(mov.startDate) : null;
                    const movEnd = mov.endDate ? new Date(mov.endDate) : movStart;
                    const amt = parseFloat(mov.amount) || 0;

                    if (movStart && movEnd && !isNaN(movStart.getTime()) && !isNaN(movEnd.getTime())) {
                        const overlapStart = movStart < this.period.startDate ? this.period.startDate : movStart;
                        const overlapEnd = movEnd > this.period.endDate ? this.period.endDate : movEnd;

                        if (overlapStart <= overlapEnd) {
                            let dayCursor = new Date(overlapStart);
                            dayCursor.setHours(0, 0, 0, 0);
                            const loopEnd = new Date(overlapEnd);
                            loopEnd.setHours(23, 59, 59, 999);

                            const totalDays = Math.round((movEnd - movStart) / (1000 * 60 * 60 * 24)) + 1;
                            const dailyRate = amt / totalDays;
                            let movAccumulator = 0;

                            while (dayCursor <= loopEnd) {
                                const testDay = new Date(dayCursor);
                                testDay.setHours(0, 0, 0, 0);
                                let currentAnnual = originalAnnualValue;
                                let isTerminated = false;

                                for (let init of activeInits) {
                                    const initEffDate = new Date(init.targetDate);
                                    if (initEffDate) initEffDate.setHours(0, 0, 0, 0);
                                    if (testDay >= initEffDate) {
                                        if (["TERMINATE", "REPLACE", "TRANSFER"].includes(String(init.decision).toUpperCase())) {
                                            isTerminated = true;
                                        } else {
                                            let globalSavingPct = parseFloat(init.targetSavingPct) || 0;
                                            if (globalSavingPct > 1) globalSavingPct = globalSavingPct / 100;
                                            if (globalSavingPct > 0) currentAnnual = currentAnnual * (1.0 - globalSavingPct);
                                            else {
                                                let targetCost = parseFloat(init.targetCostAnnualized);
                                                if (!isNaN(targetCost) && targetCost >= 0) currentAnnual = targetCost;
                                            }
                                        }
                                    }
                                }

                                if (!isTerminated) {
                                    let discountRatio = originalAnnualValue > 0 ? (currentAnnual / originalAnnualValue) : 1;
                                    movAccumulator += (dailyRate * discountRatio);
                                }
                                dayCursor.setDate(dayCursor.getDate() + 1);
                            }
                            totalOptimized += movAccumulator;
                            this._recordMonthlySplit(this.monthlyOptimizedActual, this.monthlyOptimizedVirtual, overlapStart, movAccumulator);
                        }
                    }
                });

                if (this.contract.costRecurrence === "Recurrent" && this.contractEnd && this.effectiveEndDate > this.contractEnd) {
                    let vStartCursor = new Date(this.contractEnd);
                    vStartCursor.setDate(vStartCursor.getDate() + 1);
                    if (vStartCursor < this.period.startDate) vStartCursor = new Date(this.period.startDate);
                    const vEndCursor = new Date(Math.min(this.period.endDate, this.effectiveEndDate));

                    if (vStartCursor <= vEndCursor) {
                        let current = new Date(vStartCursor);
                        current.setDate(1);

                        while (current <= vEndCursor) {
                            let monthStart = new Date(current.getFullYear(), current.getMonth(), 1);
                            let monthEnd = new Date(current.getFullYear(), current.getMonth() + 1, 0);
                            let overlapStart = monthStart < vStartCursor ? vStartCursor : monthStart;
                            let overlapEnd = monthEnd > vEndCursor ? vEndCursor : monthEnd;

                            if (overlapStart <= overlapEnd) {
                                let daysInMonth = Math.round((monthEnd - monthStart) / (1000 * 60 * 60 * 24)) + 1;
                                let monthAccumulator = 0;
                                let dayCursor = new Date(overlapStart);
                                dayCursor.setHours(0, 0, 0, 0);
                                const loopEnd = new Date(overlapEnd);
                                loopEnd.setHours(23, 59, 59, 999);

                                while (dayCursor <= loopEnd) {
                                    const testDay = new Date(dayCursor);
                                    testDay.setHours(0, 0, 0, 0);
                                    let currentRunRate = this._applyInitiativesToCost(testDay, originalAnnualValue, activeInits);
                                    if (currentRunRate > 0) {
                                        let dailyRateForMonth = (currentRunRate / 12) / daysInMonth;
                                        monthAccumulator += dailyRateForMonth;
                                    }
                                    dayCursor.setDate(dayCursor.getDate() + 1);
                                }
                                totalOptimized += monthAccumulator;
                                this._recordMonthlySplit(this.monthlyOptimizedActual, this.monthlyOptimizedVirtual, overlapStart, monthAccumulator);
                            }
                            current.setMonth(current.getMonth() + 1);
                        }
                    }
                }
                return parseFloat(totalOptimized.toFixed(2));
            }

            if (this.contract.costRecurrence === "One-Shot" || isUpfrontCapex) {
                let totalOptimized = 0;
                const baseCommitment = parseFloat(this.contract.totalCommitment) || 0;

                if (this.contractStart && this.contractStart >= this.period.startDate && this.contractStart <= this.period.endDate) {
                    const hit = this._applyInitiativesToCost(this.contractStart, baseCommitment, activeInits);
                    totalOptimized += hit;
                    this._recordMonthlySplit(this.monthlyOptimizedActual, this.monthlyOptimizedVirtual, this.contractStart, hit);
                }

                if (this.contract.costRecurrence === "Recurrent" && this.contractEnd && this.effectiveEndDate > this.contractEnd) {
                    let termMonths = parseFloat(this.contract.contractTerm) || 12;
                    if (termMonths <= 0) termMonths = 12;
                    let nextRenewal = new Date(this.contractEnd);
                    nextRenewal.setDate(nextRenewal.getDate() + 1);

                    let safeguard = 0;
                    while (nextRenewal <= this.period.endDate && nextRenewal < this.effectiveEndDate && safeguard < 100) {
                        if (nextRenewal >= this.period.startDate) {
                            const hit2 = this._applyInitiativesToCost(nextRenewal, baseCommitment, activeInits);
                            totalOptimized += hit2;
                            this._recordMonthlySplit(this.monthlyOptimizedActual, this.monthlyOptimizedVirtual, nextRenewal, hit2);
                        }
                        nextRenewal.setMonth(nextRenewal.getMonth() + termMonths);
                        safeguard++;
                    }
                }
                return parseFloat(totalOptimized.toFixed(2));
            }

            const originalAnnualValue = parseFloat(this.contract.annualValue) || 0;
            let totalOptimized = 0;

            const startCursor = new Date(Math.max(this.period.startDate, this.contractStart));
            const endCursor = new Date(Math.min(this.period.endDate, this.effectiveEndDate));
            if (startCursor > endCursor) return 0;

            let current = new Date(startCursor);
            current.setDate(1);

            while (current <= endCursor) {
                let monthStart = new Date(current.getFullYear(), current.getMonth(), 1);
                let monthEnd = new Date(current.getFullYear(), current.getMonth() + 1, 0);

                let overlapStart = monthStart < startCursor ? startCursor : monthStart;
                let overlapEnd = monthEnd > endCursor ? endCursor : monthEnd;

                if (overlapStart <= overlapEnd) {
                    let daysInMonth = Math.round((monthEnd - monthStart) / (1000 * 60 * 60 * 24)) + 1;
                    let monthAccumulator = 0;

                    let dayCursor = new Date(overlapStart);
                    dayCursor.setHours(0, 0, 0, 0);
                    const loopEnd = new Date(overlapEnd);
                    loopEnd.setHours(23, 59, 59, 999);

                    while (dayCursor <= loopEnd) {
                        const testDay = new Date(dayCursor);
                        testDay.setHours(0, 0, 0, 0);

                        let currentRunRate = this._applyInitiativesToCost(testDay, originalAnnualValue, activeInits);

                        if (currentRunRate > 0) {
                            let dailyRateForMonth = (currentRunRate / 12) / daysInMonth;
                            monthAccumulator += dailyRateForMonth;
                        }

                        dayCursor.setDate(dayCursor.getDate() + 1);
                    }

                    totalOptimized += monthAccumulator;
                    this._recordMonthlySplit(this.monthlyOptimizedActual, this.monthlyOptimizedVirtual, overlapStart, monthAccumulator);
                }
                current.setMonth(current.getMonth() + 1);
            }
            return parseFloat(totalOptimized.toFixed(2));
        }
    }

    // ============================================================================
    // 2. ORCHESTRATORE GLOBALE (L'ENGINE)
    // ============================================================================
    const ProjectionsEngine = {
        fy26: new TimePeriod("FY26", "2025-07-01", "2026-06-30"),
        fy27: new TimePeriod("FY27", "2026-07-01", "2027-06-30"),
        fy28: new TimePeriod("FY28", "2027-07-01", "2028-06-30"),

        calculateAll: function (contractsArray, initiativesArray, masterContractsArray, ledgerArray = []) {
            console.time("ProjectionsEngine Compute");
            const outputProjections = [];

            const initsByMaster = new Map();
            (initiativesArray || []).forEach(i => {
                const status = String(i.status || "").toUpperCase();
                if (["COMPLETED", "IN PROGRESS", "IDEA", "APPROVED", "PLANNED"].includes(status)) {
                    const mid = String(i.masterId || "").trim();
                    if (!initsByMaster.has(mid)) initsByMaster.set(mid, []);
                    initsByMaster.get(mid).push(i);
                }
            });

            const ledgerByContract = new Map();
            (ledgerArray || []).forEach(l => {
                const cid = String(l.contractId || "").trim();
                if (!ledgerByContract.has(cid)) ledgerByContract.set(cid, []);
                ledgerByContract.get(cid).push(l);
            });

            (contractsArray || []).forEach(contract => {
                const status = String(contract.status || "").toUpperCase();
                if (!["ACTIVE", "EXPIRED", "UPCOMING", "INCOMING"].includes(status)) return;

                const mId = String(contract.masterId).trim();
                const cId = String(contract.contractId).trim();

                const linkedInits = (initsByMaster.get(mId) || []).filter(init => {
                    const initContract = String(init.contractId || "").trim();
                    return initContract === "" || initContract === cId;
                });

                const contractLedger = ledgerByContract.get(cId) || [];

                const successorMaster = (masterContractsArray || []).find(m => {
                    const prevs = String(m.previousMasterId || "").split(',').map(s => s.trim()).filter(s => s);
                    return prevs.includes(mId);
                });
                let successorStart = null;
                if (successorMaster && successorMaster.masterStartDate) successorStart = new Date(successorMaster.masterStartDate);

                const contractDto = { ...contract };

                const p26 = new ContractProjection(contractDto, this.fy26, linkedInits, successorStart, contractLedger);
                const p27 = new ContractProjection(contractDto, this.fy27, linkedInits, successorStart, contractLedger);
                const p28 = new ContractProjection(contractDto, this.fy28, linkedInits, successorStart, contractLedger);

                const fy26B = p26.calculateBaseline(); const fy26O = p26.calculateOptimized();
                const fy27B = p27.calculateBaseline(); const fy27O = p27.calculateOptimized();
                const fy28B = p28.calculateBaseline(); const fy28O = p28.calculateOptimized();

                if (fy26B === 0 && fy27B === 0 && fy28B === 0 && fy26O === 0 && fy27O === 0 && fy28O === 0) return;

                const rowObj = {
                    "Contract ID": cId,
                    "Asset Name": contract.assetName,
                    "Supplier": contract.supplier,
                    "Cost Center": contract.costCenter,
                    "Legal Entity": contract.legalEntity,
                    "Expenditure Type": contract.expenditureType,
                    "Pricing Model": contract.pricingModel,

                    "FY26 Baseline": fy26B, "FY26 Optimized": fy26O,
                    "FY27 Baseline": fy27B, "FY27 Optimized": fy27O,
                    "FY28 Baseline": fy28B, "FY28 Optimized": fy28O,

                    monthlyActual: { ...p26.monthlyOptimizedActual, ...p27.monthlyOptimizedActual, ...p28.monthlyOptimizedActual },
                    monthlyVirtual: { ...p26.monthlyOptimizedVirtual, ...p27.monthlyOptimizedVirtual, ...p28.monthlyOptimizedVirtual }
                };

                outputProjections.push(rowObj);
            });

            console.timeEnd("ProjectionsEngine Compute");
            return outputProjections;
        }
    };
</script>
