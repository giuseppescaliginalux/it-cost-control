<script>
    /**
     * ============================================================================
     * MODULO ASSET INVENTORY: MODEL (STATE)
     * ============================================================================
     * Questa è la "mente" della sezione Assets. Nessun riferimento al DOM qui dentro.
     * Gestisce i filtri, gli ordinamenti e la preparazione dei dati per la vista.
     */
    const InventoryState = {
        // 1. STATO DEI FILTRI E ORDINAMENTO
        filters: {
            search: '',
            minRunRate: 0,
            status: [],
            budgetStatus: [],
            driver: [],
            channel: [],
            expType: [],
            legalEntity: [],
            supplier: [],
            costCenter: [],
            location: []
        },
        sort: {
            by: 'runrate-desc' // Valori: 'runrate-desc', 'assetname-asc', 'expiry-asc'
        },
        
        // 2. STATO DELL'INTERFACCIA (Quale cassetto è aperto)
        expandedAssetId: null,
        expandedMasterId: null, // Ci servirà per il nuovo layout a fisarmonica dei Master
        currentDrillDownData: null,

        // 3. LOGICA DI BUSINESS: Filtraggio e Ordinamento (ex applyFiltersAndSort)
        getFilteredAndSortedAssets: function() {
            const f = this.filters;
            
            let filteredData = globalCachedData.filter(row => {
                const name = (row["Asset Name"] || "").toLowerCase();
                const manufacturer = (row["Manufacturer"] || "").toLowerCase();
                const runRate = parseFloat(row["Run Rate"]) || 0;
                const currentStatus = (row["Current Status"] || "").toUpperCase().trim();
                const budgetStatus = (row["Budget Status (FY27)"] || row["Budget Status"] || "").toUpperCase().trim();
                const currentDriver = (row["Business Driver"] || "").toUpperCase().trim();
                
                // Controlli base sull'Asset
                const matchesSearch = !f.search || name.includes(f.search) || manufacturer.includes(f.search);
                const matchesRunRate = runRate >= f.minRunRate;
                const matchesStatus = f.status.length === 0 || f.status.includes(currentStatus);
                const matchesBudgetStatus = f.budgetStatus.length === 0 || f.budgetStatus.includes(budgetStatus);
                const matchesDriver = f.driver.length === 0 || f.driver.includes(currentDriver);

                // Check Relazionale (Filtri incrociati sui Contratti)
                let matchesChannel = true; let matchesExp = true; let matchesLegal = true;
                let matchesSupplier = true; let matchesCostCenter = true; let matchesLocation = true;

                if (f.channel.length > 0 || f.expType.length > 0 || f.legalEntity.length > 0 || f.supplier.length > 0 || f.costCenter.length > 0 || f.location.length > 0) {
                    const normalizedRowAsset = (row["Asset Name"] || "").toString().trim().toLowerCase();
                    const relatedContracts = windowPayload.contracts.filter(c => 
                        (c["Asset Name"] || "").toString().trim().toLowerCase() === normalizedRowAsset
                    );

                    if (f.channel.length > 0) matchesChannel = relatedContracts.some(c => f.channel.includes((c["Billing Channel"] || "").toString().trim()));
                    if (f.expType.length > 0) matchesExp = relatedContracts.some(c => f.expType.includes((c["Expenditure Type"] || "").toString().trim()));
                    if (f.legalEntity.length > 0) matchesLegal = relatedContracts.some(c => f.legalEntity.includes((c["Legal Entity"] || "").toString().trim()));
                    if (f.supplier.length > 0) matchesSupplier = relatedContracts.some(c => f.supplier.includes((c["Supplier"] || "").toString().trim()));
                    if (f.costCenter.length > 0) matchesCostCenter = relatedContracts.some(c => f.costCenter.includes((c["Cost Center"] || "").toString().trim()));
                    if (f.location.length > 0) matchesLocation = relatedContracts.some(c => f.location.includes((c["Location"] || "").toString().trim()));
                }

                return matchesSearch && matchesRunRate && matchesStatus && matchesBudgetStatus && matchesDriver && 
                       matchesChannel && matchesExp && matchesLegal && matchesSupplier && matchesCostCenter && matchesLocation;
            });

            // Ordinamento
            filteredData.sort((a, b) => {
                if (this.sort.by === 'runrate-desc') return (parseFloat(b["Run Rate"]) || 0) - (parseFloat(a["Run Rate"]) || 0);
                if (this.sort.by === 'assetname-asc') return (a["Asset Name"] || "").toString().localeCompare((b["Asset Name"] || "").toString(), 'it');
                if (this.sort.by === 'expiry-asc') {
                    const dA = a["Last End Date"] ? new Date(a["Last End Date"]) : new Date(2099, 11, 31);
                    const dB = b["Last End Date"] ? new Date(b["Last End Date"]) : new Date(2099, 11, 31);
                    return dA - dB;
                }
                return 0;
            });

            return filteredData;
        },

        // 4. LOGICA DI ESTRAZIONE SOTTO-DATI (ex toggleAssetDetails)
        loadAssetDrillDownData: function(assetName) {
            const targetName = (assetName || "").toString().trim().toLowerCase();
            const bridge = windowPayload.bridge || [];
            const aliasMap = new Map();
            
            bridge.forEach(r => {
                if (!r["Allocation Alias"]) return;
                if (!aliasMap.has(r["Allocation Alias"])) aliasMap.set(r["Allocation Alias"], []);
                aliasMap.get(r["Allocation Alias"]).push({ asset_name: r["Asset Name"], split_pct: r["Allocation Split %"] || 0 });
            });

            const offlineAllocations = bridge.filter(r => (r["Asset Name"] || "").toString().trim().toLowerCase() === targetName)
                .map(r => ({ ...r, co_allocated_assets: (aliasMap.get(r["Allocation Alias"]) || []).filter(a => (a.asset_name || "").toString().trim().toLowerCase() !== targetName) }));

            this.currentDrillDownData = {
                contracts: (windowPayload.contracts || []).filter(c => (c["Asset Name"] || "").toString().trim().toLowerCase() === targetName),
                initiatives: (windowPayload.initiatives || []).filter(i => (i["Asset Name"] || "").toString().trim().toLowerCase() === targetName),
                allocations: offlineAllocations
            };
        },

        // 5. RESET STATO
        resetAllFilters: function() {
            this.filters = {
                search: '', minRunRate: 0, status: [], budgetStatus: [], driver: [],
                channel: [], expType: [], legalEntity: [], supplier: [], costCenter: [], location: []
            };
            this.sort.by = 'runrate-desc';
        }
    };
</script>
