<script>
    /**
     * MODULO DASHBOARD: EXECUTIVE KPI
     */
    function updateExecutiveDashboard(payload) {
        // CORREZIONE CRITICA: Filtriamo immediatamente l'array per eliminare righe vuote o di "Total" dello Sheet
        const assets = (payload.assets || []).filter(r => {
            const name = (r["Asset Name"] || "").toString().trim();
            return name !== "" && name.toLowerCase() !== "total" && name.toLowerCase() !== "totale";
        });

        const contracts = payload.contracts || [];
        const initiatives = payload.initiatives || [];

        let totalBudget = 0; let totalProjection = 0;
        assets.forEach(a => { totalBudget += parseFloat(a["Effective Budget"]) || 0; totalProjection += parseFloat(a["Fiscal Projection"]) || 0; });

        const activeContracts = contracts.filter(c => (c["Status"] || "").toString().trim().toUpperCase() === "ACTIVE");
        document.getElementById('active-contracts-count').textContent = activeContracts.length;

        let totalActualSaving = 0; let totalTargetSaving = 0;
        initiatives.forEach(init => { totalActualSaving += parseFloat(init["Actual Saving (Annualized)"]) || 0; totalTargetSaving += parseFloat(init["Target Saving (Annualized)"]) || 0; });
        const remainingToSecure = Math.max(0, totalTargetSaving - totalActualSaving);

        document.getElementById('actual-savings-kpi').textContent = "€ " + (totalActualSaving / 1000000).toFixed(1) + "M";
        document.getElementById('target-savings-kpi').textContent = "€ " + (remainingToSecure / 1000000).toFixed(1) + "M";

        // ============================================================================
        // CALCOLO PERFORMANCE INIZIATIVE REALIZZATE (COMPLETED)
        // ============================================================================
        let realizedActual = 0;
        let realizedTarget = 0;
        initiatives.forEach(init => {
            const status = (init["Initiative Status"] || "").toString().toUpperCase().trim();
            if (status === "COMPLETED") {
                realizedActual += parseFloat(init["Actual Saving (Annualized)"]) || 0;
                realizedTarget += parseFloat(init["Target Saving (Annualized)"]) || 0;
            }
        });

        let perfPct = 0;
        if (realizedTarget > 0) {
            perfPct = ((realizedActual - realizedTarget) / realizedTarget) * 100;
        }

        const pctEl = document.getElementById('savings-perf-pct');
        if (pctEl) {
            const sign = perfPct >= 0 ? "+" : "";
            pctEl.textContent = sign + perfPct.toFixed(1) + "%";
            // Colore dinamico condizionale (Verde se in surplus, rosso se sotto target)
            if (perfPct >= 0) {
                pctEl.className = "text-3xl font-black text-emerald-600 tracking-tight leading-none";
            } else {
                pctEl.className = "text-3xl font-black text-rose-600 tracking-tight leading-none";
            }
        }

        const formatKpiValue = (val) => {
            if (val >= 1000000) return "€ " + (val / 1000000).toFixed(1) + "M";
            if (val >= 1000) return "€ " + (val / 1000).toFixed(0) + "k";
            return "€ " + val.toFixed(0);
        };

        if (document.getElementById('savings-perf-actual')) {
            document.getElementById('savings-perf-actual').textContent = formatKpiValue(realizedActual);
        }
        if (document.getElementById('savings-perf-target')) {
            document.getElementById('savings-perf-target').textContent = formatKpiValue(realizedTarget);
        }
        // ============================================================================

        renderGenericDoughnut('supplierConcentrationChart', activeContracts, 'Supplier', 'supplier');
        renderGenericDoughnut('costCenterChart', activeContracts, 'Cost Center', 'costCenter');
        renderGenericDoughnut('legalEntityChart', activeContracts, 'Legal Entity', 'legalEntity');
        renderGenericDoughnut('capexOpexChart', activeContracts, 'Expenditure Type', 'capexOpex');

        const top10 = [...assets].sort((a, b) => (parseFloat(b["Run Rate"]) || 0) - (parseFloat(a["Run Rate"]) || 0)).slice(0, 10);
        renderLiveChart(top10.map(r => r["Asset Name"]), top10.map(r => parseFloat(r["Effective Budget"]) || 0), top10.map(r => parseFloat(r["Fiscal Projection"]) || 0));
        renderRenewalPipeline(activeContracts);

        renderStaticKpis(globalCachedData);
        renderOfflineTrendChart(payload.projections || []);
        renderOfflineCumulativeSavings(payload.initiatives || []);
    }

    function renderStaticKpis(data) {
        let b = 0, c = 0;
        data.forEach(row => {
            b += parseFloat(row["Effective Budget"]) || 0;
            c += parseFloat(row["Fiscal Projection"]) || 0;
        });
        const net = b - c;

        // Funzione di utilità interna per l'approssimazione in Milioni (allineata al box 3 e 4)
        const formatToMillions = (val, includePlus = false) => {
            const absVal = Math.abs(val);
            const sign = val < 0 ? "-" : (includePlus && val > 0 ? "+" : "");
            if (absVal >= 1000000) return sign + "€ " + (absVal / 1000000).toFixed(1) + "M";
            if (absVal >= 1000) return sign + "€ " + (absVal / 1000).toFixed(0) + "k";
            return sign + "€ " + absVal.toFixed(0);
        };

        // BOX 2 (Dettaglio sotto a destra: vs Budget) - Ora formattato compatto in Milioni (es: € 12.7M)
        if (document.getElementById('total-budget-kpi')) {
            document.getElementById('total-budget-kpi').textContent = formatToMillions(b);
        }

        // BOX 1 (FY27 Projection) - Numero Grande formattato in Milioni
        if (document.getElementById('total-cost-kpi')) {
            document.getElementById('total-cost-kpi').textContent = formatToMillions(c);
        }

        // BOX 2 (Net Variance) - Numero Grande formattato in Milioni con segno condizionale (+/-)
        if (document.getElementById('total-variance-kpi')) {
            document.getElementById('total-variance-kpi').textContent = formatToMillions(net, true);
        }

        // Logica di controllo colori e badge del secondo box (Net Variance)
        const varKpi = document.getElementById('total-variance-kpi');
        const varBadge = document.getElementById('variance-status-badge');
        if (varKpi) {
            if (net >= 0) {
                varKpi.className = "text-3xl font-black tracking-tight leading-none text-emerald-600";
                if (varBadge) {
                    varBadge.textContent = "Surplus";
                    varBadge.className = "text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest uppercase";
                }
            } else {
                varKpi.className = "text-3xl font-black tracking-tight leading-none text-rose-600";
                if (varBadge) {
                    varBadge.textContent = "Deficit";
                    varBadge.className = "text-rose-700 bg-rose-50 px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest uppercase";
                }
            }
        }
    }

    function switchChartTab(tabType) {
        // Nasconde tutti i contenuti dei grafici 
        const tabs = ['general', 'savings', 'breakdown', 'contracts'];
        tabs.forEach(t => {
            const sec = document.getElementById('chart-sec-' + t);
            const btn = document.getElementById('btn-chart-tab-' + t);
            if (sec) sec.classList.add('hidden');
            if (btn) {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-slate-700');
                btn.classList.add('text-slate-500');
            }
        });

        // Mostra quello selezionato
        const activeSec = document.getElementById('chart-sec-' + tabType);
        const activeBtn = document.getElementById('btn-chart-tab-' + tabType);
        if (activeSec) activeSec.classList.remove('hidden');
        if (activeBtn) {
            activeBtn.classList.add('bg-white', 'shadow-sm', 'text-slate-700');
            activeBtn.classList.remove('text-slate-500');
        }
    }
</script>
