<script>
    /**
     * js_projections_controller.html
     * CONTROLLER: High-performance multi-tier data pipeline and visualization driver.
     */
    const ProjectionsController = {

        initProjectionsWorkspace: function (payload) {
            const container = document.getElementById('tab-projections');
            if (!container) return;

            // 1. Initialize State Architecture
            ProjectionsState.loadPayload(payload);

            // 2. Inject Complete View Framework
            container.innerHTML = ProjectionsTemplates.getWorkspaceLayout();

            // 3. Mount Inline Filter Sub-Dropdown Menus
            this.buildFilterDropdownMenus();

            // 4. Fire Calculations and Rendering Operations
            this.applyEngine();
        },

        formatKM: function (num) {
            if (!num || isNaN(num) || num === 0) return "-";
            const absNum = Math.abs(num);
            if (absNum >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (absNum >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toFixed(0);
        },

        hexToRgbA: function (hex, alpha) {
            let c;
            if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
                c = hex.substring(1).split('');
                if (c.length === 3) { c = [c[0], c[0], c[1], c[1], c[2], c[2]]; }
                c = '0x' + c.join('');
                return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + alpha + ')';
            }
            return `rgba(128,128,128,${alpha})`; // Fallback
        },

        buildFilterDropdownMenus: function () {
            const raw = ProjectionsState.rawDataset;

            // 🌟 CORREZIONE REQ 1: Estrazione difensiva delle chiavi uniche dai record
            const getUniqueValues = (key) => [...new Set(raw.map(r => (r[key] || r[key.replace(" ", "")] || "").toString().trim()).filter(v => v !== ""))].sort();

            const buildCheckboxItems = (valuesArray, containerId, stateFilterCategory) => {
                const domBox = document.getElementById(containerId);
                if (!domBox) return;

                domBox.innerHTML = valuesArray.map(val => `
                    <label class="flex items-center gap-2 px-1.5 py-0.5 hover:bg-slate-50 rounded cursor-pointer text-[11px] font-bold text-slate-700">
                        <input type="checkbox" value="${val}" onchange="ProjectionsController.handleCheckboxToggle('${stateFilterCategory}', '${val.replace(/'/g, "\\'")}')" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                        <span class="truncate">${val}</span>
                    </label>
                `).join('');
            };

            buildCheckboxItems(getUniqueValues("Legal Entity"), "proj-filter-drop-le", "legalEntities");
            buildCheckboxItems(getUniqueValues("Cost Center"), "proj-filter-drop-cc", "costCenters");
            buildCheckboxItems(getUniqueValues("Expenditure Type"), "proj-filter-drop-exp", "expenditureTypes");

            const suppliers = getUniqueValues("Supplier");
            const supBox = document.getElementById("proj-dropdown-supplier-items-box");
            if (supBox) {
                supBox.innerHTML = suppliers.map(val => `
                    <label class="proj-sup-menu-row flex items-center gap-2 px-1.5 py-0.5 hover:bg-slate-50 rounded cursor-pointer text-[11px] font-bold text-slate-700">
                        <input type="checkbox" value="${val}" onchange="ProjectionsController.handleCheckboxToggle('suppliers', '${val.replace(/'/g, "\\'")}')" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                        <span class="truncate">${val}</span>
                    </label>
                `).join('');
            }
        },

        filterSupplierSearchInline: function () {
            const query = document.getElementById('proj-dropdown-supplier-search').value.toLowerCase().trim();
            document.querySelectorAll('.proj-sup-menu-row').forEach(row => {
                const text = row.querySelector('span').textContent.toLowerCase();
                row.style.display = text.includes(query) ? "flex" : "none";
            });
        },

        toggleMenuDropdown: function (event, dropdownId) {
            if (event) event.stopPropagation();
            const menus = ['proj-filter-drop-exp', 'proj-filter-drop-cc', 'proj-filter-drop-le', 'proj-filter-drop-sup'];
            menus.forEach(id => {
                const el = document.getElementById(id);
                const arrow = document.getElementById(id.replace('filter-drop', 'arrow-filter'));
                if (id === dropdownId) {
                    const isHidden = el.classList.toggle('hidden');
                    if (arrow) arrow.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
                } else if (el) {
                    el.classList.add('hidden');
                    if (arrow) arrow.style.transform = "rotate(0deg)";
                }
            });
        },

        handleCheckboxToggle: function (category, value) {
            ProjectionsState.toggleFilterValue(category, value);
            this.updateLabelsDisplay();
            this.applyEngine();
        },

        handleTextSearchExecution: function (val) {
            ProjectionsState.filters.searchKeyword = val.toLowerCase().trim();
            this.applyEngine();
        },

        changePivotDimension: function (dim) {
            ProjectionsState.pivotDimension = dim;
            this.applyEngine();
        },

        applySortingRule: function (key) {
            if (ProjectionsState.sortKey === key) {
                ProjectionsState.sortOrder = ProjectionsState.sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                ProjectionsState.sortKey = key;
                ProjectionsState.sortOrder = 'asc';
            }
            this.applyEngine();
        },

        updateLabelsDisplay: function () {
            const syncDisplay = (containerId, buttonId, defaultText) => {
                const checkedCount = document.querySelectorAll(`#${containerId} input:checked`).length;
                const btnSpan = document.querySelector(`#${buttonId} span`);
                if (!btnSpan) return;

                if (checkedCount === 0) {
                    btnSpan.textContent = defaultText;
                    btnSpan.className = "truncate";
                } else if (checkedCount === 1) {
                    btnSpan.textContent = document.querySelector(`#${containerId} input:checked`).value;
                    btnSpan.className = "truncate text-teal-700 font-black";
                } else {
                    btnSpan.textContent = `${checkedCount} Selected`;
                    btnSpan.className = "truncate text-teal-700 font-black";
                }
            };

            syncDisplay('proj-filter-drop-exp', 'proj-btn-filter-exp', 'All Exp Types');
            syncDisplay('proj-filter-drop-cc', 'proj-btn-filter-cc', 'All Cost Centers');
            syncDisplay('proj-filter-drop-le', 'proj-btn-filter-le', 'All Legal Entities');
            syncDisplay('proj-filter-drop-sup', 'proj-btn-filter-sup', 'All Suppliers');
        },

        resetFiltersAndEngine: function () {
            document.querySelectorAll('#tab-projections input[type="checkbox"]').forEach(cb => cb.checked = false);
            const textSearch = document.getElementById('proj-global-search-input');
            if (textSearch) textSearch.value = '';
            const inlineSupSearch = document.getElementById('proj-dropdown-supplier-search');
            if (inlineSupSearch) inlineSupSearch.value = '';

            document.querySelectorAll('.proj-sup-menu-row').forEach(row => row.style.display = "flex");

            ProjectionsState.resetAllFilters();
            this.updateLabelsDisplay();
            this.applyEngine();
        },

        // 🌟 CORREZIONE REQ 3: Toggle riproporzionato partendo dallo stato collassato
        toggleLevel1Accordion: function (idx) {
            const bodyRow = document.getElementById(`proj-l1-body-row-${idx}`);
            const chevron = document.getElementById(`proj-l1-chevron-${idx}`);
            if (!bodyRow) return;
            const isHidden = bodyRow.classList.toggle('hidden');
            if (chevron) chevron.style.transform = isHidden ? "rotate(0deg)" : "rotate(90deg)";
        },

        toggleLevel2Accordion: function (groupIdx, assetIdx) {
            const bodyRow = document.getElementById(`proj-l2-body-row-${groupIdx}-${assetIdx}`);
            const chevron = document.getElementById(`proj-l2-chevron-${groupIdx}-${assetIdx}`);
            if (!bodyRow) return;
            const isHidden = bodyRow.classList.toggle('hidden');
            if (chevron) chevron.style.transform = isHidden ? "rotate(0deg)" : "rotate(90deg)";
        },

        applyEngine: function () {
            this.syncPivotSelectorsUI();
            const f = ProjectionsState.filters;

            const filteredRows = ProjectionsState.rawDataset.filter(row => {
                const assetName = (row["Asset Name"] || "").toString().toLowerCase();
                const supplier = (row["Supplier"] || "").toString().trim();
                const legal = (row["Legal Entity"] || "").toString().trim();
                const costCenter = (row["Cost Center"] || row.costCenter || "").toString().trim();
                const expType = (row["Expenditure Type"] || "").toString().toUpperCase().trim();

                if (f.searchKeyword && !assetName.includes(f.searchKeyword)) return false;
                if (f.expenditureTypes.length > 0 && !f.expenditureTypes.includes(expType)) return false;
                if (f.legalEntities.length > 0 && !f.legalEntities.includes(legal)) return false;
                if (f.costCenters.length > 0 && !f.costCenters.includes(costCenter)) return false;
                if (f.suppliers.length > 0 && !f.suppliers.includes(supplier)) return false;

                return true;
            });

            // Salviamo il dataset filtrato per la Modale P&L Bridge
            ProjectionsState.currentFilteredRecords = filteredRows;

            const pivotMap = {};
            const activeDimension = ProjectionsState.pivotDimension;
            const graphDatasetTotals = {};

            filteredRows.forEach(row => {
                let dimensionLabel = "";
                if (activeDimension === 'expenditureType') dimensionLabel = row["Expenditure Type"] || row.expenditureType;
                else if (activeDimension === 'costCenter') dimensionLabel = row["Cost Center"] || row.costCenter;
                else if (activeDimension === 'legalEntity') dimensionLabel = row["Legal Entity"] || row.legalEntity;

                dimensionLabel = (dimensionLabel || "UNSPECIFIED").toString().trim();

                const assetName = (row["Asset Name"] || "Unknown Asset").toString().trim();
                const supplier = (row["Supplier"] || "Generic Supplier").toString().trim();
                const legal = (row["Legal Entity"] || "N/A").toString().trim();
                const costCenter = (row["Cost Center"] || row.costCenter || "N/A").toString().trim();
                const expType = (row["Expenditure Type"] || "OPEX").toString().toUpperCase().trim();

                // 🌟 ESTRAZIONE E VERIFICA SCADENZA CONTRATTO (Questo risolve l'errore cId)
                const cId = (row["Contract ID"] || "").toString().trim();
                const origContract = (windowPayload.contracts || []).find(c => c["Contract ID"] === cId) || {};
                const isExpired = origContract["Contract End Date"] && new Date(origContract["Contract End Date"]) < new Date();

                const v26 = parseFloat(row["FY26 Optimized"]) || 0;
                const v27 = parseFloat(row["FY27 Optimized"]) || 0;
                const v28 = parseFloat(row["FY28 Optimized"]) || 0;

                const b26 = parseFloat(row["FY26 Baseline"]) || 0;
                const b27 = parseFloat(row["FY27 Baseline"]) || 0;
                const b28 = parseFloat(row["FY28 Baseline"]) || 0;

                if (!graphDatasetTotals[dimensionLabel]) {
                    graphDatasetTotals[dimensionLabel] = { 2026: 0, 2027: 0, 2028: 0 };
                }
                graphDatasetTotals[dimensionLabel][2026] += v26;
                graphDatasetTotals[dimensionLabel][2027] += v27;
                graphDatasetTotals[dimensionLabel][2028] += v28;

                if (!pivotMap[dimensionLabel]) {
                    pivotMap[dimensionLabel] = {
                        label: dimensionLabel,
                        v26: 0, v27: 0, v28: 0,
                        b26: 0, b27: 0, b28: 0,
                        assetsMap: {}
                    };
                }
                pivotMap[dimensionLabel].v26 += v26;
                pivotMap[dimensionLabel].v27 += v27;
                pivotMap[dimensionLabel].v28 += v28;
                pivotMap[dimensionLabel].b26 += b26;
                pivotMap[dimensionLabel].b27 += b27;
                pivotMap[dimensionLabel].b28 += b28;

                if (!pivotMap[dimensionLabel].assetsMap[assetName]) {
                    const meta = ProjectionsState.assetLookupMap.get(assetName.toLowerCase()) || { manufacturer: "Generic", driver: "Technology" };
                    pivotMap[dimensionLabel].assetsMap[assetName] = {
                        name: assetName,
                        manufacturer: meta.manufacturer,
                        driver: meta.driver,
                        v26: 0, v27: 0, v28: 0,
                        b26: 0, b27: 0, b28: 0,
                        contractsMap: {}
                    };
                }
                pivotMap[dimensionLabel].assetsMap[assetName].v26 += v26;
                pivotMap[dimensionLabel].assetsMap[assetName].v27 += v27;
                pivotMap[dimensionLabel].assetsMap[assetName].v28 += v28;
                pivotMap[dimensionLabel].assetsMap[assetName].b26 += b26;
                pivotMap[dimensionLabel].assetsMap[assetName].b27 += b27;
                pivotMap[dimensionLabel].assetsMap[assetName].b28 += b28;

                // 🌟 Inserimento dei contratti disaggregati per la Tabella Livello 3
                const contractKey = `${cId}|||${supplier}|||${legal}|||${costCenter}|||${expType}`;
                if (!pivotMap[dimensionLabel].assetsMap[assetName].contractsMap[contractKey]) {
                    pivotMap[dimensionLabel].assetsMap[assetName].contractsMap[contractKey] = {
                        supplier: supplier, legalEntity: legal, costCenter: costCenter, expType: expType,
                        isExpired: isExpired, cId: cId,
                        v26: 0, v27: 0, v28: 0,
                        b26: 0, b27: 0, b28: 0
                    };
                }
                pivotMap[dimensionLabel].assetsMap[assetName].contractsMap[contractKey].v26 += v26;
                pivotMap[dimensionLabel].assetsMap[assetName].contractsMap[contractKey].v27 += v27;
                pivotMap[dimensionLabel].assetsMap[assetName].contractsMap[contractKey].v28 += v28;
                pivotMap[dimensionLabel].assetsMap[assetName].contractsMap[contractKey].b26 += b26;
                pivotMap[dimensionLabel].assetsMap[assetName].contractsMap[contractKey].b27 += b27;
                pivotMap[dimensionLabel].assetsMap[assetName].contractsMap[contractKey].b28 += b28;
            });

            const finalGroupedArray = Object.values(pivotMap).filter(asset =>
                asset.v26 > 0 || asset.v27 > 0 || asset.v28 > 0
            );

            ProjectionsState.currentOlapData = finalGroupedArray;

            finalGroupedArray.forEach(group => {
                const assetsList = Object.values(group.assetsMap).map(asset => {
                    asset.contracts = Object.values(asset.contractsMap).sort((a, b) => b.v27 - a.v27);
                    return asset;
                });
                group.assets = assetsList;
                group.assetCount = assetsList.length;
            });

            this.sortOLAPEngineData(finalGroupedArray);
            this.buildMatrixTableDOM(finalGroupedArray);
            this.renderMacroStackedChart(graphDatasetTotals);
        },

        sortOLAPEngineData: function (dataArray) {
            const sk = ProjectionsState.sortKey;
            const order = ProjectionsState.sortOrder;

            // Ordina i Gruppi (Livello 1)
            dataArray.sort((a, b) => {
                let res = 0;
                if (sk === 'name') {
                    res = a.label.localeCompare(b.label, 'en');
                } else {
                    // Traduce '2026' in 'v26' per leggere il dato corretto
                    const valKey = 'v' + sk.slice(-2);
                    res = (a[valKey] || 0) - (b[valKey] || 0);
                }
                return order === 'asc' ? res : -res;
            });

            // Ordina gli Asset dentro i gruppi (Livello 2)
            dataArray.forEach(group => {
                group.assets.sort((a, b) => {
                    let res = 0;
                    if (sk === 'name') {
                        res = a.name.localeCompare(b.name, 'en');
                    } else {
                        // Traduce '2026' in 'v26' per leggere il dato corretto
                        const valKey = 'v' + sk.slice(-2);
                        res = (a[valKey] || 0) - (b[valKey] || 0);
                    }
                    return order === 'asc' ? res : -res;
                });
            });
        },

        buildMatrixTableDOM: function (finalStructure) {
            const body = document.getElementById('projections-matrix-olap-body');
            const counter = document.getElementById('proj-matrix-rows-counter');
            if (!body) return;

            if (counter) {
                let totalAssetCount = finalStructure.reduce((sum, g) => sum + g.assetCount, 0);
                counter.textContent = `${finalStructure.length} Groups / ${totalAssetCount} Connected Assets`;
            }

            if (finalStructure.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400 italic">No historical rows match active multidimensional filters.</td></tr>`;
                return;
            }

            let html = '';

            finalStructure.forEach((group, gIdx) => {
                const p26_l1 = group.b26 > 0 ? ((group.b26 - group.v26) / group.b26) * 100 : 0;
                const p27_l1 = group.b27 > 0 ? ((group.b27 - group.v27) / group.b27) * 100 : 0;
                const p28_l1 = group.b28 > 0 ? ((group.b28 - group.v28) / group.b28) * 100 : 0;

                html += ProjectionsTemplates.getGroupHeaderRowMarkup(
                    gIdx, group.label, group.assetCount,
                    group.v26, p26_l1,
                    group.v27, p27_l1,
                    group.v28, p28_l1
                );
            });
            body.innerHTML = html;

            finalStructure.forEach((group, gIdx) => {
                const subLane = document.getElementById(`proj-l1-container-${gIdx}`);
                if (!subLane) return;

                let subHtml = '';
                group.assets.forEach((asset, aIdx) => {
                    const p26_l2 = asset.b26 > 0 ? ((asset.b26 - asset.v26) / asset.b26) * 100 : 0;
                    const p27_l2 = asset.b27 > 0 ? ((asset.b27 - asset.v27) / asset.b27) * 100 : 0;
                    const p28_l2 = asset.b28 > 0 ? ((asset.b28 - asset.v28) / asset.b28) * 100 : 0;

                    let rowsHtml = asset.contracts.map(c => {
                        const p26_l3 = c.b26 > 0 ? ((c.b26 - c.v26) / c.b26) * 100 : 0;
                        const p27_l3 = c.b27 > 0 ? ((c.b27 - c.v27) / c.b27) * 100 : 0;
                        const p28_l3 = c.b28 > 0 ? ((c.b28 - c.v28) / c.b28) * 100 : 0;

                        return ProjectionsTemplates.getContractDrillDownItemRow({
                            supplier: c.supplier,
                            legalEntity: c.legalEntity,
                            costCenter: c.costCenter,
                            expType: c.expType,
                            isExpired: c.isExpired,
                            cId: c.cId,
                            v26: c.v26, p26: p26_l3,
                            v27: c.v27, p27: p27_l3,
                            v28: c.v28, p28: p28_l3
                        });
                    }).join('');

                    let drillDownTable = ProjectionsTemplates.getContractDrillDownTableStructure(rowsHtml);

                    subHtml += ProjectionsTemplates.getAssetRowMarkup(
                        gIdx, aIdx, asset.name, asset.manufacturer, asset.driver,
                        asset.v26, p26_l2,
                        asset.v27, p27_l2,
                        asset.v28, p28_l2,
                        drillDownTable,
                        group.label // 🌟 Passaggio del contesto alla Modale
                    );
                });
                subLane.innerHTML = subHtml;
            });
        },

        renderMacroStackedChart: function (totalsMap) {
            const ctxEl = document.getElementById('projectionsDynamicOlapChart');
            if (!ctxEl) return;

            if (!window.chartInstances) window.chartInstances = {};
            if (window.chartInstances.olapDynamic) window.chartInstances.olapDynamic.destroy();

            const dimensions = Object.keys(totalsMap).sort();
            const colors = ['#0f766e', '#0d9488', '#14b8a6', '#06b6d4', '#2563eb', '#3b82f6', '#6366f1', '#475569', '#64748b', '#94a3b8', '#cbd5e1'];

            const labels = ['FY26 Outlook', 'FY27 Outlook', 'FY28 Outlook'];
            const datasets = dimensions.map((dim, index) => {
                return {
                    label: dim,
                    data: [totalsMap[dim][2026], totalsMap[dim][2027], totalsMap[dim][2028]],
                    backgroundColor: colors[index % colors.length],
                    borderRadius: 4,
                    barPercentage: 0.38,
                    categoryPercentage: 0.8
                };
            });

            const titleEl = document.getElementById('proj-dynamic-chart-title');
            if (titleEl) {
                const mapTitles = { 'expenditureType': 'Expenditure Type', 'costCenter': 'Cost Center', 'legalEntity': 'Legal Entity' };
                titleEl.textContent = `Optimized Financial Outlook by ${mapTitles[ProjectionsState.pivotDimension]}`;
            }

            this.updateSortingIconsDisplay();

            window.chartInstances.olapDynamic = new Chart(ctxEl.getContext('2d'), {
                type: 'bar',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { display: false } },
                        y: { stacked: true, ticks: { callback: v => v >= 1000000 ? '€' + (v / 1000000).toFixed(1) + 'M' : '€' + (v / 1000).toFixed(0) + 'k' } }
                    },
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9, weight: 'bold' } } },
                        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: €${Math.round(c.raw).toLocaleString('it-IT')}` } }
                    }
                },
                plugins: [{
                    id: 'olapStackedBarTotals',
                    afterDatasetsDraw: function (chart) {
                        const { ctx, scales: { x, y } } = chart;
                        ctx.save();
                        ctx.font = 'black 10px Inter, sans-serif';
                        ctx.fillStyle = '#1e293b';
                        ctx.textAlign = 'center';

                        const totals = [0, 0, 0];
                        chart.data.datasets.forEach(dataset => {
                            dataset.data.forEach((val, i) => { totals[i] += (val || 0); });
                        });

                        const lastMeta = chart.getDatasetMeta(chart.data.datasets.length - 1);
                        lastMeta.data.forEach((bar, i) => {
                            const val = totals[i];
                            if (val > 0) {
                                const formatted = val >= 1000000
                                    ? '€' + (val / 1000000).toFixed(2) + 'M'
                                    : '€' + (val / 1000).toFixed(0) + 'k';
                                ctx.fillText(formatted, bar.x, bar.y - 8);
                            }
                        });
                        ctx.restore();
                    }
                }]
            });
        },

        syncPivotSelectorsUI: function () {
            const activeDim = ProjectionsState.pivotDimension;
            ['expenditureType', 'costCenter', 'legalEntity'].forEach(dim => {
                const btn = document.getElementById('btn-pivot-' + dim);
                if (!btn) return;
                if (dim === activeDim) {
                    btn.className = "py-1 text-[9px] font-black uppercase tracking-tight rounded-lg bg-teal-700 text-white shadow-md transition-all cursor-pointer text-center";
                } else {
                    btn.className = "py-1 text-[9px] font-black uppercase tracking-tight rounded-lg text-slate-500 hover:text-slate-800 hover:bg-white/60 transition-all cursor-pointer text-center";
                }
            });
        },

        updateSortingIconsDisplay: function () {
            const keys = ['name', '2026', '2027', '2028'];
            keys.forEach(k => {
                const el = document.getElementById(`proj-sort-ico-${k}`);
                if (!el) return;
                if (ProjectionsState.sortKey === k) {
                    el.textContent = ProjectionsState.sortOrder === 'asc' ? ' ▲' : ' ▼';
                    el.className = "ml-1 text-[9px] text-teal-600 font-black";
                } else {
                    el.textContent = ' ▲';
                    el.className = "ml-1 text-[9px] text-slate-300 opacity-30";
                }
            });
        },

        // 🌟 ORCHESTRATORE FINANCIAL BRIDGE: Modale con Context Passing e Lookup in RAM
        openFinancialBridgeModal: function (assetName, ctxField, ctxValue) {
            const mountPoint = document.getElementById('proj-modal-mount-point');
            if (!mountPoint) {
                const div = document.createElement('div');
                div.id = 'proj-modal-mount-point';
                div.className = 'hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[9999] flex items-center justify-center p-4 transition-opacity';
                // FIX PUNTO 1: Impedisce la chiusura se si clicca DENTRO la modale
                div.onclick = (e) => { if (e.target === div) this.closeFinancialBridgeModal(); };
                document.body.appendChild(div);
            }

            const activeMount = document.getElementById('proj-modal-mount-point');
            activeMount.innerHTML = ProjectionsTemplates.getFinancialBridgeModalMarkup(assetName);
            activeMount.classList.remove('hidden');
            activeMount.classList.add('flex');

            // Usa i dati filtrati, o in alternativa tutti i dati
            const sourceDataset = ProjectionsState.currentFilteredRecords && ProjectionsState.currentFilteredRecords.length > 0
                ? ProjectionsState.currentFilteredRecords
                : (windowPayload.projections || []);

            // Filtra i record esatti per l'asset richiesto, rispettando i filtri di matrice
            let records = sourceDataset.filter(p =>
                String(p["Asset Name"] || p.assetName || "").trim().toLowerCase() === assetName.toLowerCase().trim()
            );

            // Applica il filtro aggiuntivo se siamo atterrati da un raggruppamento specifico (Context Passing)
            if (ctxField && ctxValue) {
                records = records.filter(r => {
                    const rVal = String(r[ctxField] || "").trim().toLowerCase();
                    return rVal === ctxValue.toLowerCase().trim();
                });
            }

            this.renderBridgeChartAndTable(records);
        },

        closeFinancialBridgeModal: function () {
            const mountPoint = document.getElementById('proj-modal-mount-point');
            if (mountPoint) {
                mountPoint.classList.remove('flex');
                mountPoint.classList.add('hidden');
                mountPoint.innerHTML = '';
            }
        },

        renderBridgeChartAndTable: function (records) {
            if (!records || records.length === 0) return;

            // Formattatore K/M al volo per i tooltip e le colonne
            const formatKM = (num) => {
                const absNum = Math.abs(num);
                if (absNum >= 1000000) return (num / 1000000).toFixed(2) + 'M';
                if (absNum >= 1000) return (num / 1000).toFixed(0) + 'K';
                return num.toFixed(0);
            };

            // 1. ASSE TEMPORALE DINAMICO
            let minDate = new Date(2025, 6, 1);
            let maxDate = new Date(2028, 5, 30);

            records.forEach(r => {
                const actualKeys = Object.keys(r.monthlyActual || {});
                const virtualKeys = Object.keys(r.monthlyVirtual || {});
                [...actualKeys, ...virtualKeys].forEach(mk => {
                    let [y, m] = mk.split('-');
                    let d = new Date(parseInt(y, 10), parseInt(m, 10) - 1, 1);
                    if (d < minDate) minDate = new Date(d.getFullYear(), d.getMonth(), 1);
                    if (d > maxDate) maxDate = new Date(d.getFullYear(), d.getMonth() + 1, 0);
                });
            });

            const monthKeys = [];
            const labels = [];
            const fyMap = [];

            let currentD = new Date(minDate);
            while (currentD <= maxDate) {
                let y = currentD.getFullYear();
                let m = currentD.getMonth();
                monthKeys.push(`${y}-${String(m + 1).padStart(2, '0')}`);
                labels.push(currentD.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
                fyMap.push(`FY${String(m >= 6 ? y + 1 : y).slice(-2)}`);
                currentD.setMonth(m + 1);
            }

            const palette = ['#0f766e', '#2563eb', '#d97706', '#7c3aed', '#db2777', '#059669', '#e11d48', '#0284c7'];
            const datasets = [];
            const tableRowsHtml = [];

            let totalAccrualSum = 0;
            let fy26Sum = 0, fy27Sum = 0, fy28Sum = 0;
            const monthlyTotalsArray = new Array(monthKeys.length).fill(0);

            records.sort((a, b) => (parseFloat(b["FY26 Optimized"]) || 0) - (parseFloat(a["FY26 Optimized"]) || 0));

            records.forEach((r, index) => {
                const baseColor = palette[index % palette.length];

                // 🌟 FIX PUNTO 2 e 3: Lookup in RAM per recuperare i metadati persi dal motore finanziario
                const cId = r["Contract ID"] || r.contractId || "";
                const origContract = (windowPayload.contracts || []).find(c => c["Contract ID"] === cId) || {};

                const supplier = origContract["Supplier"] || r["Supplier"] || "Generic Supplier";
                const legalEntity = r["Legal Entity"] || origContract["Legal Entity"] || "Corporate";
                const costCenter = r["Cost Center"] || origContract["Cost Center"] || "N/A";
                const expType = r["Expenditure Type"] || origContract["Expenditure Type"] || "OPEX";
                const scope = origContract["Scope"] || "No specific scope defined";
                const pricingModel = origContract["Pricing Model"] || "Flat";
                const billingTerms = origContract["Billing Terms"] || "Linear";
                const isExpired = origContract["Contract End Date"] && new Date(origContract["Contract End Date"]) < new Date();

                const totCommitment = parseFloat(origContract["Total Commitment"]) || 0;
                const termMonths = origContract["Contract Term (Months)"] || "-";
                const sDate = origContract["Start Date"] ? new Date(origContract["Start Date"]).toLocaleDateString('en-US', { month: 'short', year: '2-digit' }) : '-';
                const eDate = origContract["Contract End Date"] ? new Date(origContract["Contract End Date"]).toLocaleDateString('en-US', { month: 'short', year: '2-digit' }) : '-';

                // Array per le due fette
                const actualData = new Array(monthKeys.length).fill(0);
                const virtualData = new Array(monthKeys.length).fill(0);
                let hasActual = false, hasVirtual = false;

                monthKeys.forEach((mk, mIdx) => {
                    const actVal = parseFloat((r.monthlyActual || {})[mk]) || 0;
                    const virtVal = parseFloat((r.monthlyVirtual || {})[mk]) || 0;

                    if (actVal > 0) { actualData[mIdx] = actVal; hasActual = true; }
                    if (virtVal > 0) { virtualData[mIdx] = virtVal; hasVirtual = true; }

                    const combined = actVal + virtVal;
                    monthlyTotalsArray[mIdx] += combined;
                    totalAccrualSum += combined;

                    if (fyMap[mIdx] === 'FY26') fy26Sum += combined;
                    if (fyMap[mIdx] === 'FY27') fy27Sum += combined;
                    if (fyMap[mIdx] === 'FY28') fy28Sum += combined;
                });

                if (hasActual) {
                    datasets.push({
                        label: `${supplier} (Act)`,
                        data: actualData,
                        backgroundColor: isExpired ? 'rgba(148, 163, 184, 0.2)' : baseColor,
                        borderColor: isExpired ? baseColor : 'transparent',
                        borderWidth: isExpired ? 1.5 : 0,
                        borderRadius: 2,
                        barPercentage: 0.75,
                        contractMeta: origContract
                    });
                }

                if (hasVirtual) {
                    const rgb = parseInt(baseColor.slice(1, 3), 16) + ',' + parseInt(baseColor.slice(3, 5), 16) + ',' + parseInt(baseColor.slice(5, 7), 16);
                    datasets.push({
                        label: `${supplier} (Virt)`,
                        data: virtualData,
                        backgroundColor: `rgba(${rgb}, 0.25)`,
                        borderColor: 'transparent',
                        borderWidth: 0,
                        borderRadius: 2,
                        barPercentage: 0.75,
                        contractMeta: origContract
                    });
                }

                // Tooltip Dati Integrali (Richiesta Punto 3)
                const tooltipContent = `Supplier: ${supplier}&#10;Entity: ${legalEntity}&#10;Cost Center: ${costCenter}&#10;Exp. Type: ${expType}&#10;Scope: ${scope}&#10;Billing: ${billingTerms}&#10;Pricing: ${pricingModel}`;
                const expBadge = isExpired ? '<span class="ml-1 text-[8px] text-slate-400 font-normal border border-slate-200 bg-slate-50 rounded px-1 shadow-3xs">(Exp)</span>' : '';
                const rowOpacity = isExpired ? 'opacity-60' : 'opacity-100';

                // Nuova Riga Tabellare (Redesign UI Richiesta Punto 2)
                let rowHtml = `
                <tr class="hover:bg-slate-50/80 transition-colors cursor-help ${rowOpacity}">
                    <td class="sticky left-0 bg-white shadow-sm p-3 border-r border-slate-200 z-10 w-56 min-w-[14rem]" title="${tooltipContent}">
                        <div class="flex items-start gap-2 truncate">
                            <span class="w-2.5 h-2.5 rounded-full shrink-0 mt-1 shadow-sm" style="background-color: ${baseColor}"></span>
                            <div class="min-w-0 flex-1">
                                <div class="font-black text-slate-800 truncate text-[12px] leading-tight flex items-center gap-1">${supplier} ${expBadge}</div>
                                <div class="text-[9px] font-bold text-slate-500 truncate mt-0.5">${legalEntity} | CC: <span class="font-mono">${costCenter}</span></div>
                                <div class="text-[8px] font-mono text-slate-400 uppercase tracking-wider truncate mt-1">ID: ${cId}</div>
                            </div>
                        </div>
                    </td>`;

                monthKeys.forEach((mk, mIdx) => {
                    const v = actualData[mIdx] + virtualData[mIdx];
                    const style = v > 0 ? (virtualData[mIdx] > 0 ? 'text-indigo-500 font-medium italic' : 'text-slate-700 font-bold') : 'text-slate-300 select-none';
                    const text = v > 0 ? formatKM(v) : '—';
                    rowHtml += `<td class="p-2 text-center border-r border-slate-100 font-mono min-w-[65px] ${style}">${text}</td>`;
                });

                // Colonna Lifecycle Condensata (Redesign Punto 2)
                rowHtml += `
                    <td class="sticky right-0 bg-slate-50 shadow-sm p-3 border-l border-slate-200 z-10 w-36 min-w-[9rem] text-right">
                        <div class="font-black font-mono text-slate-700 text-[12px] leading-tight mb-1">€${formatKM(totCommitment)}</div>
                        <div class="inline-flex items-center gap-1 bg-white border border-slate-200 px-1.5 py-0.5 rounded text-[8px] font-bold text-slate-500 shadow-3xs uppercase tracking-tighter">
                            <span>${sDate}</span><span class="text-slate-300">➔</span><span>${eDate}</span>
                        </div>
                        <div class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1">${termMonths} Months</div>
                    </td>
                </tr>`;
                tableRowsHtml.push(rowHtml);
            });

            // 3. GENERAZIONE HEADER E MEGA-FOOTER FISCALE
            const bgColorsUI = ['bg-slate-100/60', 'bg-teal-50/60', 'bg-indigo-50/60', 'bg-sky-50/60', 'bg-amber-50/60'];
            const textColorsUI = ['text-slate-700', 'text-teal-700', 'text-indigo-700', 'text-sky-700', 'text-amber-700'];

            const thHtml = `<th class="sticky left-0 bg-slate-100 p-3 border-r border-slate-200 z-10 w-56 min-w-[14rem] text-left text-slate-500 font-black">Contract Identity</th>` +
                labels.map((l, i) => {
                    const colorIndex = [...new Set(fyMap)].indexOf(fyMap[i]) % bgColorsUI.length;
                    return `<th class="p-2 text-center border-r border-slate-200 font-mono min-w-[65px] ${bgColorsUI[colorIndex]}">${l}</th>`;
                }).join('') +
                `<th class="sticky right-0 bg-slate-100 p-3 border-l border-slate-200 z-10 w-36 min-w-[9rem] text-right text-slate-500 font-black">Lifecycle & Value</th>`;

            let tfootHtml = `<td class="sticky left-0 bg-slate-100 p-3 border-r border-slate-200 z-10 w-56 text-right text-slate-500 font-black">FISCAL YEAR TOTALS</td>`;
            let currentFy = fyMap[0];
            let currentSpan = 0; let currentFyTotal = 0; let colorIdx = 0;

            monthKeys.forEach((mk, idx) => {
                if (fyMap[idx] !== currentFy) {
                    tfootHtml += `<td colspan="${currentSpan}" class="p-2 text-center border-r border-slate-300 font-black ${bgColorsUI[colorIdx % bgColorsUI.length]} ${textColorsUI[colorIdx % textColorsUI.length]}"><span class="text-[8px] uppercase opacity-60 tracking-widest mr-1.5">${currentFy}:</span>€${formatKM(currentFyTotal)}</td>`;
                    currentFy = fyMap[idx]; currentSpan = 1; currentFyTotal = monthlyTotalsArray[idx]; colorIdx++;
                } else {
                    currentSpan++; currentFyTotal += monthlyTotalsArray[idx];
                }
            });
            tfootHtml += `<td colspan="${currentSpan}" class="p-2 text-center border-r border-slate-300 font-black ${bgColorsUI[colorIdx % bgColorsUI.length]} ${textColorsUI[colorIdx % textColorsUI.length]}"><span class="text-[8px] uppercase opacity-60 tracking-widest mr-1.5">${currentFy}:</span>€${formatKM(currentFyTotal)}</td>`;
            tfootHtml += `<td class="sticky right-0 bg-slate-100 p-3 border-l border-slate-200 z-10 w-36"></td>`;

            document.getElementById('bridge-table-header').innerHTML = thHtml;
            document.getElementById('bridge-table-body').innerHTML = tableRowsHtml.join('');
            document.getElementById('bridge-table-footer').innerHTML = tfootHtml;

            // 4. AGGIORNAMENTO KPI FINANZIARI
            const today = new Date();
            const currentMonthKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            const currentMonthIdx = monthKeys.indexOf(currentMonthKey);
            const currentRunRate = currentMonthIdx > -1 ? monthlyTotalsArray[currentMonthIdx] : (monthlyTotalsArray[0] || 0);

            const calcYoY = (oldVal, newVal) => {
                if (oldVal === 0) return { text: '—', color: 'text-slate-400' };
                const pct = ((newVal - oldVal) / oldVal) * 100;
                const sign = pct > 0 ? '+' : '';
                return { text: `${sign}${pct.toFixed(1)}%`, color: pct > 0 ? 'text-rose-600 font-black' : (pct < 0 ? 'text-emerald-600 font-black' : 'text-slate-500') };
            };

            document.getElementById('bridge-kpi-current').textContent = `€ ${formatKM(currentRunRate * 12)} / yr`;
            const yoy1 = calcYoY(fy26Sum, fy27Sum);
            document.getElementById('bridge-kpi-yoy1').innerHTML = `<span class="${yoy1.color}">${yoy1.text}</span>`;
            const yoy2 = calcYoY(fy27Sum, fy28Sum);
            document.getElementById('bridge-kpi-yoy2').innerHTML = `<span class="${yoy2.color}">${yoy2.text}</span>`;
            document.getElementById('bridge-kpi-total').textContent = `€ ${Math.round(totalAccrualSum).toLocaleString('it-IT')}`;

            // 5. INIEZIONE GRAFICO CHART.JS
            const canvas = document.getElementById('bridge-modal-chart');
            if (window.chartInstances && window.chartInstances.bridgeChart) window.chartInstances.bridgeChart.destroy();
            else if (!window.chartInstances) window.chartInstances = {};

            window.chartInstances.bridgeChart = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    layout: { padding: { top: 22, bottom: 5 } },
                    interaction: { mode: 'nearest', intersect: true },
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.98)', titleFont: { size: 12, weight: 'black' }, padding: 12,
                            callbacks: {
                                title: (ctx) => ctx[0].dataset.label,
                                label: function (ctx) { return `Accrual: € ${Math.round(ctx.raw).toLocaleString('it-IT')}`; },
                                afterLabel: function (ctx) {
                                    const m = ctx.dataset.contractMeta || {};
                                    const isVirt = ctx.dataset.label.includes('Virt');
                                    if (isVirt) return `\n• Status: Forecasted Renewal\n• Legal Entity: ${m["Legal Entity"] || 'N/A'}`;
                                    return `\n• Cost Ctr: ${m["Cost Center"] || 'N/A'}\n• Rule: ${m["Pricing Model"] || 'Flat'}\n• Type: ${m["Expenditure Type"] || 'OPEX'}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 9, weight: 'bold' } } },
                        y: { stacked: true, beginAtZero: true, grid: { borderDash: [4, 4], color: '#f1f5f9' }, ticks: { callback: v => '€' + (v / 1000).toFixed(0) + 'k', font: { size: 9 } } }
                    }
                },
                plugins: [{
                    id: 'fiscalYearBackgroundsAndHeaders',
                    beforeDraw: (chart) => {
                        const { ctx, chartArea: { top, bottom, left, right }, scales: { x } } = chart;
                        ctx.save();
                        const bgColors = ['rgba(241, 245, 249, 0.65)', 'rgba(204, 251, 241, 0.45)', 'rgba(224, 231, 255, 0.45)', 'rgba(224, 242, 254, 0.45)'];
                        const textColors = ['#94a3b8', '#0d9488', '#4f46e5', '#0284c7'];
                        let currentFy = fyMap[0];
                        let startIdx = 0; let cIdx = 0;
                        for (let i = 0; i <= fyMap.length; i++) {
                            if (i === fyMap.length || fyMap[i] !== currentFy) {
                                let startX = startIdx === 0 ? left : x.getPixelForTick(startIdx) - (x.getPixelForTick(1) - x.getPixelForTick(0)) / 2;
                                let endX = i === fyMap.length ? right : x.getPixelForTick(i) - (x.getPixelForTick(1) - x.getPixelForTick(0)) / 2;
                                ctx.fillStyle = bgColors[cIdx % bgColors.length];
                                ctx.fillRect(startX, top, endX - startX, bottom - top);
                                ctx.font = 'black 11px Inter, sans-serif';
                                ctx.fillStyle = textColors[cIdx % textColors.length];
                                ctx.textAlign = 'center';
                                ctx.fillText(currentFy + " ACCRUAL", startX + (endX - startX) / 2, top - 8);
                                if (i < fyMap.length) { currentFy = fyMap[i]; startIdx = i; cIdx++; }
                            }
                        }
                        ctx.restore();
                    }
                }]
            });
        }


    };

    const olapOriginalSwitchTab = switchTab;
    switchTab = function (tabId) {
        olapOriginalSwitchTab(tabId);
        if (tabId === 'tab-projections') {
            ProjectionsController.initProjectionsWorkspace(window.windowPayload);
        }
    };

    document.addEventListener('click', function (e) {
        const dropCategories = ['exp', 'cc', 'le', 'sup'];
        dropCategories.forEach(cat => {
            const drop = document.getElementById(`proj-filter-drop-${cat}`);
            const btn = document.getElementById(`proj-btn-filter-${cat}`);
            if (drop && !drop.classList.contains('hidden') && btn && !btn.contains(e.target) && !drop.contains(e.target)) {
                drop.classList.add('hidden');
                const arrow = document.getElementById(`proj-arrow-filter-${cat}`);
                if (arrow) arrow.style.transform = "rotate(0deg)";
            }
        });
    });
</script>
