        getMasterAccordionCard: function (master, childContractsHtml, isExpanded, globalEditMode) {
            const mId = master["Master Contract ID"] || master.masterId || 'N/A';
            const supplier = master["Supplier"] || master.supplier || "GENERIC SUPPLIER";

            const nomRunRate = parseFloat(master["Run Rate"] || master.runRate || 0);
            const effRunRateNum = parseFloat(master.effectiveRunRate || master["Effective Run Rate"] || nomRunRate);
            const effRunRateStr = window.formatKM(effRunRateNum);
            const isDiscounted = effRunRateNum !== nomRunRate;

            // Logica Sconti vs Overusage
            const effCommitNum = parseFloat(master["Total Commitment"] || master.totalCommitment || 0);
            const nomCommitNum = parseFloat(master.nominalCommitment || effCommitNum);
            const creditDiff = effCommitNum - nomCommitNum;
            const hasCredit = creditDiff <= -1;
            const hasDebit = creditDiff >= 1;

            const effCommitStr = window.formatKM(effCommitNum);
            const nomCommitStr = window.formatKM(nomCommitNum);

            let badgeHtml = '';
            if (hasCredit) badgeHtml = `<span class="text-[10px] font-bold text-teal-600">(-€${window.formatKM(Math.abs(creditDiff))})</span>`;
            else if (hasDebit) badgeHtml = `<span class="text-[10px] font-bold text-rose-600">(+€${window.formatKM(Math.abs(creditDiff))})</span>`;

            const formatStrDate = (v) => v ? new Date(v).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A';
            const startStr = (master["Master Start Date"] || master.masterStartDate) ? formatStrDate(master["Master Start Date"] || master.masterStartDate) : "N/A";
            const expDateStr = (master["Master End Date"] || master.masterEndDate) ? formatStrDate(master["Master End Date"] || master.masterEndDate) : "N/A";
            const term = master["Contract Term (Months)"] || master.contractTerm || "-";

            const status = (master["Status"] || master.status || "ACTIVE").toUpperCase().trim();
            const isExpired = status === "EXPIRED" || status === "TERMINATED";
            const opacityClass = isExpired ? "opacity-60 grayscale-[0.1] hover:opacity-100 hover:grayscale-0" : "";

            let statusBadge = "";
            if (status === "ACTIVE") statusBadge = `<span class="px-1.5 py-0.5 rounded text-[7px] font-black uppercase tracking-widest border bg-emerald-50 text-emerald-700 border-emerald-200 shadow-2xs leading-none shrink-0">ACTIVE</span>`;
            else if (isExpired) statusBadge = `<span class="px-1.5 py-0.5 rounded text-[7px] font-black uppercase tracking-widest border bg-rose-50 text-rose-700 border-rose-200 shadow-2xs leading-none shrink-0">EXPIRED</span>`;
            else statusBadge = `<span class="px-1.5 py-0.5 rounded text-[7px] font-black uppercase tracking-widest border bg-amber-50 text-amber-700 border-amber-200 shadow-2xs leading-none shrink-0">${status}</span>`;

            const scope = master["Scope"] || master.masterScope || "Scope non specificato";
            const scopeTooltipHtml = typeof generateFinOpsHelpTooltip !== 'undefined' ? generateFinOpsHelpTooltip("Master Scope", scope, "down") : '';

            const linksStr = (master["Contract Links"] || master.contractLinks || "").toString().trim();
            const docsIconHtml = this.getDocsIconHtml(mId, linksStr);

            const actionBtnIcon = globalEditMode
                ? `<svg class="w-4 h-4 shrink-0 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" /></svg>`
                : `<svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>`;

            const actionBtnTooltip = globalEditMode ? "Edit master agreement" : "View master details";
            const actionBtnStyle = globalEditMode ? "hover:text-teal-600 hover:bg-teal-50" : "hover:text-indigo-600 hover:bg-indigo-50";

            const addLineBtn = globalEditMode ? `<button onclick="InventoryController.triggerAddContractLine('${mId}')" class="w-6 h-6 shrink-0 aspect-square flex items-center justify-center bg-slate-50 text-slate-400 hover:text-teal-600 hover:bg-teal-50 border border-slate-200 rounded-md transition-all shadow-3xs group cursor-pointer" title="Add new contract line"><svg class="w-4 h-4 shrink-0 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg></button>` : '';

            const editActions = `
                <div class="flex items-center gap-1.5 ml-3 pl-3 border-l border-slate-200 shrink-0" onclick="event.stopPropagation()">
                    ${addLineBtn}
                    <button onclick="InventoryController.triggerEditMaster('${mId}')" class="w-6 h-6 shrink-0 aspect-square flex items-center justify-center bg-slate-50 text-slate-400 border border-slate-200 rounded-md transition-all shadow-3xs group cursor-pointer ${actionBtnStyle}" title="${actionBtnTooltip}">
                        ${actionBtnIcon}

            return `
            <div class="bg-white border border-slate-200 rounded-xl shadow-2xs mb-1.5 transition-all ${opacityClass} relative z-10 hover:z-50">

        getCurrentStatusBadge: function (status) {

                'OPTIMIZING': 'text-amber-700 bg-amber-50 border-amber-100',
                'EXITING': 'text-orange-700 bg-orange-50 border-orange-100',
                'TRANSFERRED': 'text-sky-700 bg-sky-50 border-sky-100',
                'EXPIRED': 'text-rose-700 bg-rose-50 border-rose-100',
                'DISMISSED': 'text-slate-500 bg-slate-50 border-slate-200'
            };
            return `<span class="px-2 py-0.5 text-[9px] font-bold rounded-full border ${styles[val] || 'text-slate-400 bg-slate-50 border-slate-100'}">${val}</span>`;
        },

        getTargetStatusText: function (target) {
            const val = (target || "").toUpperCase().trim();
            const colors = { 'RETAIN': 'text-emerald-600', 'EXIT': 'text-rose-600', 'HANDOVER': 'text-sky-600' };
            return `<span class="text-[10px] font-black tracking-widest uppercase ${colors[val] || 'text-slate-400'}">${val}</span>`;
        },

        getBudgetStatusBadge: function (budgetStatus) {
            const val = (budgetStatus || "").toUpperCase().trim();
            if (val === "SECURED") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> SECURED</span>`;
