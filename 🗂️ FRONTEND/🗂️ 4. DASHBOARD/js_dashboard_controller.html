<script>
    /**
     * js_dashboard_controller.html
     * CONTROLLER: Execution engine and orchestration coordinator for the Executive Dashboard.
     * Allineato al 100% al registro globale window.chartInstances e basato su camelCase.
     */

    function updateExecutiveDashboard(payload) {
        DashboardController.initDashboardWorkflow(payload);
    }

    const DashboardController = {
        initDashboardWorkflow: function (payload) {
            DashboardState.loadCachePayload(payload);

            const container = document.getElementById('tab-dashboard');
            if (!container) return;
            container.innerHTML = DashboardTemplates.getMainLayoutStructure();

            const metrics = DashboardState.computeExecutiveMetrics();
            document.getElementById('dashboard-kpi-grid-container').innerHTML =
                DashboardTemplates.getKpiGridContent(metrics, this.formatValueToMillions);

            this.handleChartTabShift(DashboardState.activeChartTab);
        },

        handleChartTabShift: function (tabType) {
            DashboardState.activeChartTab = tabType;
            const tabs = ['general', 'savings', 'breakdown', 'contracts'];

            tabs.forEach(t => {
                const sec = document.getElementById('chart-sec-' + t);
                const btn = document.getElementById('btn-chart-tab-' + t);
                if (sec) sec.classList.add('hidden');
                if (btn) {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-slate-700');
                    btn.classList.add('text-slate-500');
                }
            });

            const activeSec = document.getElementById('chart-sec-' + tabType);
            const activeBtn = document.getElementById('btn-chart-tab-' + tabType);
            if (activeSec) activeSec.classList.remove('hidden');
            if (activeBtn) {
                activeBtn.classList.add('bg-white', 'shadow-sm', 'text-slate-700');
                activeBtn.classList.remove('text-slate-500');
            }

            this.renderTabSpecificCharts(tabType);
        },

        renderTabSpecificCharts: function (tabType) {
            const activeContracts = DashboardState.contracts.filter(c => (c.status || "").toString().trim().toUpperCase() === "ACTIVE");

            if (tabType === 'general') {
                // 1. Prendiamo gli asset candidati
                const rawTop10 = DashboardState.getTop10AssetsByRunRate();
                const projs = windowPayload.projections || [];
                const bridge = windowPayload.bridge || [];
                const allocs = windowPayload.allocations || [];

                // 2. Costruiamo un array temporaneo arricchito con i calcoli aggregati reali
                const enrichedAssets = rawTop10.map(asset => {
                    const targetAssetId = asset.id ? asset.id.toString().trim() : "";
                    const targetAssetName = asset.name ? asset.name.toString().trim().toLowerCase() : "";

                    // Calcolo Budget FY27
                    let bSum = 0;
                    const assetLinks = bridge.filter(b => {
                        const bAssetId = b.assetId ? b.assetId.toString().trim() : "";
                        const bFy = b.fiscalYear ? b.fiscalYear.toString().toUpperCase().trim() : "";
                        return bAssetId === targetAssetId && bFy === "FY27";
                    });

                    assetLinks.forEach(link => {
                        const linkAllocId = link.allocationId ? link.allocationId.toString().trim() : "";
                        const rootAlloc = allocs.find(a => {
                            const aAllocId = a.allocationId ? a.allocationId.toString().trim() : "";
                            return aAllocId === linkAllocId && linkAllocId !== "";
                        });
                        if (rootAlloc) {
                            bSum += parseFloat(rootAlloc.amount) || 0;
                        }
                    });

                    // Calcolo Outlook FY27 (Costs)
                    let pSum = 0;
                    const assetProjs = projs.filter(p => {
                        const pAssetId = p.assetId ? p.assetId.toString().trim() : "";
                        const pAssetName = p.assetName ? p.assetName.toString().trim().toLowerCase() : "";
                        return (pAssetId === targetAssetId && targetAssetId !== "") || (pAssetName === targetAssetName && targetAssetName !== "");
                    });

                    if (assetProjs.length > 0) {
                        assetProjs.forEach(p => {
                            pSum += parseFloat(p.fy27Optimized) || 0;
                        });
                    } else {
                        pSum = parseFloat(asset.runRate) || 0;
                    }

                    return {
                        name: asset.name,
                        budget: bSum,
                        cost: pSum
                    };
                });

                // 3. Ordiniamo in modo decrescente dal costo (Outlook) più alto al più basso
                enrichedAssets.sort((a, b) => b.cost - a.cost);

                // 4. Estraiamo i vettori allineati per il grafico
                const labels = enrichedAssets.map(a => a.name);
                const budgets = enrichedAssets.map(a => a.budget);
                const costs = enrichedAssets.map(a => a.cost);

                this.drawLiveChart(labels, budgets, costs);
            }
            else if (tabType === 'savings') {
                this.drawOfflineTrendChart(DashboardState.projections);
                this.drawOfflineCumulativeSavings(DashboardState.initiatives);
            }
            else if (tabType === 'breakdown') {
                this.drawGenericDoughnut('costCenterChart', activeContracts, 'Cost Center', 'costCenter');
                this.drawGenericDoughnut('legalEntityChart', activeContracts, 'Legal Entity', 'legalEntity');
                this.drawGenericDoughnut('capexOpexChart', activeContracts, 'Expenditure Type', 'capexOpex');
                this.drawGenericDoughnut('businessDriverChart', activeContracts, 'Business Driver', 'businessDriver');
            }
            else if (tabType === 'contracts') {
                this.drawGenericDoughnut('supplierConcentrationChart', activeContracts, 'Supplier', 'supplier');
                this.drawRenewalPipeline(activeContracts);
            }
        },

        formatValueToMillions: function (val) {
            const absVal = Math.abs(val);
            if (absVal >= 1000000) return "€ " + (absVal / 1000000).toFixed(1) + "M";
            if (absVal >= 1000) return "€ " + (absVal / 1000).toFixed(0) + "k";
            return "€ " + absVal.toFixed(0);
        },

        drawLiveChart: function (labels, budgets, costs) {
            const canvas = document.getElementById('liveSheetsChart');
            if (!canvas) return;

            if (!window.chartInstances) window.chartInstances = {};
            if (window.chartInstances.live) window.chartInstances.live.destroy();

            window.chartInstances.live = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Budget FY27', data: budgets, backgroundColor: '#0F766E', borderRadius: 3, barPercentage: 0.6, categoryPercentage: 0.8 },
                        { label: 'Outlook FY27', data: costs, backgroundColor: '#E11D48', borderRadius: 3, barPercentage: 0.6, categoryPercentage: 0.8 }
                    ]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10, weight: 'bold' } } } },
                    scales: {
                        y: { ticks: { font: { size: 10, weight: 'bold' } } },
                        x: { ticks: { callback: v => v >= 1000000 ? '€' + (v / 1000000).toFixed(1) + 'M' : '€' + (v / 1000).toFixed(0) + 'k' } }
                    }
                }
            });
        },

        drawGenericDoughnut: function (canvasId, contracts, columnKey, instanceKey) {
            let canvas = document.getElementById(canvasId);
            let parentDiv = canvas ? canvas.parentElement : null;
            if (!parentDiv) {
                const containers = document.querySelectorAll('#chart-sec-breakdown > div, #chart-sec-contracts > div');
                containers.forEach(box => {
                    const header = box.querySelector('h3');
                    if (header && header.textContent.includes(columnKey)) {
                        parentDiv = box.querySelector('.w-full');
                    }
                });
            }
            if (!parentDiv) return;

            parentDiv.className = "flex items-center justify-between gap-4 w-full h-[240px]";
            parentDiv.innerHTML = DashboardTemplates.getDoughnutLayoutStructure(canvasId);
            canvas = document.getElementById(canvasId);

            const propMap = {
                'Cost Center': 'costCenter',
                'Legal Entity': 'legalEntity',
                'Expenditure Type': 'expenditureType',
                'Supplier': 'supplier'
            };

            const dataMap = {};
            // FIX: Usiamo lo stato locale della dashboard
            const allMasters = DashboardState.masterContracts || [];

            contracts.forEach(c => {
                let key = "";
                if (columnKey === 'Business Driver') {
                    const masterObj = allMasters.find(m => String(m.masterId).trim() === String(c.masterId).trim());
                    const targetAssetId = masterObj ? String(masterObj.assetId || "").trim() : "";
                    const assetObj = (DashboardState.assets || []).find(a => String(a.id).trim() === targetAssetId);

                    key = assetObj ? (assetObj.businessDriver || "Technology") : "Technology";
                } else {
                    const prop = propMap[columnKey] || columnKey;
                    key = (c[prop] || "N/A").toString().trim();
                }
                if (key === "") key = "N/A";
                dataMap[key] = (dataMap[key] || 0) + (parseFloat(c.annualValue) || 0);
            });

            const sortedData = Object.entries(dataMap).sort((a, b) => b[1] - a[1]);
            const labels = []; const data = []; let others = 0;

            if (sortedData.length <= 9) {
                sortedData.forEach(item => { labels.push(item[0]); data.push(item[1]); });
            } else {
                sortedData.forEach((item, i) => {
                    if (i < 8) { labels.push(item[0]); data.push(item[1]); }
                    else { others += item[1]; }
                });
                if (others > 0) { labels.push("Others"); data.push(others); }
            }

            const totalSum = data.reduce((sum, v) => sum + v, 0);
            const colors = ['#0f766e', '#0d9488', '#14b8a6', '#06b6d4', '#2563eb', '#3b82f6', '#6366f1', '#475569', '#64748b', '#94a3b8', '#cbd5e1'];

            const legendContainer = document.getElementById(`${canvasId}-html-legend`);
            if (legendContainer) {
                legendContainer.innerHTML = labels.map((label, idx) => {
                    const val = data[idx];
                    const pct = totalSum > 0 ? ((val / totalSum) * 100).toFixed(0) : 0;
                    const fmtVal = val >= 1000000 ? (val / 1000000).toFixed(1) + 'M' : (val / 1000).toFixed(0) + 'k';
                    return DashboardTemplates.getDoughnutLegendItemRow(label, colors[idx % colors.length], fmtVal, pct);
                }).join('');
            }

            if (!window.chartInstances) window.chartInstances = {};
            if (window.chartInstances[instanceKey]) window.chartInstances[instanceKey].destroy();

            window.chartInstances[instanceKey] = new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 1.5, borderColor: '#fff' }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false } } }
            });
        },

        drawOfflineCumulativeSavings: function (initiatives) {
            const labels = [];
            const realizedData = [];
            const pipelineData = [];
            let startDate = new Date(2025, 6, 1); // 01 Luglio 2025

            let totalAnnualizedRealized = 0;

            for (let i = 0; i < 36; i++) {
                let d = new Date(startDate.getFullYear(), startDate.getMonth() + i, 1);
                labels.push(d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
                realizedData.push(0);
                pipelineData.push(0);
            }

            (initiatives || []).forEach(row => {
                let rawDateStr = row.targetDate || row.actualDate;
                let targetDate = typeof FinOpsDate !== 'undefined' ? FinOpsDate.parse(rawDateStr) : new Date(rawDateStr);
                if (!targetDate || isNaN(targetDate.getTime())) return;

                let status = String(row.status || "").toUpperCase().trim();
                let isCompleted = (status === "COMPLETED" || status === "REALIZED");

                let saving = isCompleted
                    ? (parseFloat(row.actualSavingAnnualized) || 0)
                    : (parseFloat(row.targetSavingAnnualized) || 0);

                saving = Math.abs(saving);
                if (saving === 0) return;

                if (isCompleted) {
                    totalAnnualizedRealized += saving;
                }

                let monthly = saving / 12;
                for (let i = 0; i < 12; i++) {
                    let curr = new Date(targetDate.getFullYear(), targetDate.getMonth() + i, 1);
                    let diff = (curr.getFullYear() - startDate.getFullYear()) * 12 + (curr.getMonth() - startDate.getMonth());
                    if (diff >= 0 && diff < 36) {
                        if (isCompleted) realizedData[diff] += monthly;
                        else pipelineData[diff] += monthly;
                    }
                }
            });

            const cumulativeTotalData = [];
            let runTotal = 0;
            for (let i = 0; i < 36; i++) {
                runTotal += realizedData[i] + pipelineData[i];
                cumulativeTotalData.push(parseFloat(runTotal.toFixed(2)));
            }

            const realizedBaselineCeiling = Array(36).fill(parseFloat(totalAnnualizedRealized.toFixed(2)));

            const canvas = document.getElementById('cumulativeSavingsChart');
            if (!canvas) return;

            if (!window.chartInstances) window.chartInstances = {};
            if (window.chartInstances.cumul) window.chartInstances.cumul.destroy();

            window.chartInstances.cumul = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { type: 'bar', label: 'Realized Run-Rate (Completed)', data: realizedData, backgroundColor: '#0d9488', borderRadius: 2, yAxisID: 'y', barPercentage: 0.5 },
                        { type: 'bar', label: 'Pipeline Run-Rate (To Realize)', data: pipelineData, backgroundColor: '#94a3b8', borderRadius: 2, yAxisID: 'y', barPercentage: 0.5 },
                        { type: 'line', label: 'Cumulative Total Savings', data: cumulativeTotalData, borderColor: '#10B981', backgroundColor: '#10B981', fill: false, tension: 0.3, yAxisID: 'y1', pointRadius: 1 },
                        { type: 'line', label: 'Current Realized Savings Baseline', data: realizedBaselineCeiling, borderColor: '#f59e0b', borderDash: [6, 4], fill: false, pointRadius: 0, yAxisID: 'y1', borderWidth: 2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { size: 10, weight: 'bold' } } },
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.raw !== undefined) {
                                        label += '€' + Math.round(context.raw).toLocaleString('it-IT');
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 9 } } },
                        y: { stacked: true, position: 'left', title: { display: true, text: 'Monthly Impact (€)', font: { size: 9, weight: 'bold' } }, ticks: { callback: v => '€' + (v / 1000).toFixed(0) + 'k', font: { size: 9 } } },
                        y1: { position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Cumulative Saved (€)', font: { size: 9, weight: 'bold' } }, ticks: { callback: v => v >= 1000000 ? '€' + (v / 1000000).toFixed(1) + 'M' : '€' + (v / 1000).toFixed(0) + 'k', font: { size: 9 } } }
                    }
                }
            });
        },

        drawOfflineTrendChart: function (projections) {
            const canvas = document.getElementById('efficiencyTrendChart');
            if (!canvas || !projections || projections.length === 0) return;

            if (!window.chartInstances) window.chartInstances = {};
            if (window.chartInstances.trend) window.chartInstances.trend.destroy();

            const trend = { FY26: { g: 0, o: 0 }, FY27: { g: 0, o: 0 }, FY28: { g: 0, o: 0 } };

            projections.forEach(row => {
                trend.FY26.g += parseFloat(row.fy26Baseline) || 0;
                trend.FY26.o += parseFloat(row.fy26Optimized) || 0;
                trend.FY27.g += parseFloat(row.fy27Baseline) || 0;
                trend.FY27.o += parseFloat(row.fy27Optimized) || 0;
                trend.FY28.g += parseFloat(row.fy28Baseline) || 0;
                trend.FY28.o += parseFloat(row.fy28Optimized) || 0;
            });

            window.chartInstances.trend = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: ['FY26', 'FY27', 'FY28'],
                    datasets: [
                        { type: 'bar', label: 'Spend without Initiatives', data: [trend.FY26.g, trend.FY27.g, trend.FY28.g], backgroundColor: '#A8A29E', order: 2 },
                        { type: 'bar', label: 'Optimized Spend', data: [trend.FY26.o, trend.FY27.o, trend.FY28.o], backgroundColor: '#0F766E', order: 3 },
                        { type: 'line', label: 'Cost Avoidance', data: [trend.FY26.g - trend.FY26.o, trend.FY27.g - trend.FY27.o, trend.FY28.g - trend.FY28.o], borderColor: '#10B981', borderWidth: 2, fill: false, order: 1 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, scales: { y: { ticks: { callback: v => '€' + (v / 1000000).toFixed(1) + 'M' } } } }
            });
        },

        drawRenewalPipeline: function (activeContracts) {
            const canvas = document.getElementById('renewalPipelineChart');
            if (!canvas) return;

            const quarterMap = {};
            const now = new Date();

            activeContracts.forEach(c => {
                const endDate = c.contractEndDate || c.endDate;
                if (!endDate) return;
                const d = new Date(endDate);
                if (isNaN(d) || d < new Date(now.getFullYear() - 1, 0, 1)) return;

                const label = `Q${Math.floor(d.getMonth() / 3) + 1} ${d.getFullYear()}`;
                quarterMap[label] = (quarterMap[label] || 0) + (parseFloat(c.annualValue) || 0);
            });

            const sortedQuarters = Object.entries(quarterMap).sort((a, b) => {
                const [qA, yA] = a[0].replace('Q', '').split(' ');
                const [qB, yB] = b[0].replace('Q', '').split(' ');
                return yA !== yB ? parseInt(yA) - parseInt(yB) : parseInt(qA) - parseInt(qB);
            });

            const displayData = sortedQuarters.slice(0, 8);

            if (!window.chartInstances) window.chartInstances = {};
            if (window.chartInstances.renewal) window.chartInstances.renewal.destroy();

            window.chartInstances.renewal = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: { labels: displayData.map(d => d[0]), datasets: [{ label: 'Expiring Spend (€)', data: displayData.map(d => d[1]), backgroundColor: '#0d9488', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => '€' + (v / 1000).toFixed(0) + 'k' } } } }
            });
        }
    };
</script>
