<script>
    /**
     * MODULO OPERATIONS: KANBAN & INTERACTIVE SWITCH
     */
    let selectedOpsTags = [];
    let opsViewMode = "standard"; // Default iniziale

    function formatOpsCurrency(num) {
        const parsed = parseFloat(num);
        if (isNaN(parsed) || parsed === 0) return '€0k';
        const valueInK = Math.round(parsed / 1000);
        return '€' + valueInK.formatCurrency() + 'k';
    }

    function formatNameInitials(fullName) {
        if (!fullName || fullName.trim() === "" || fullName === "TBD" || fullName === "N/A") return "TBD";
        const parts = fullName.trim().split(" ");
        if (parts.length === 1) return parts[0];
        return parts[0].charAt(0).toUpperCase() + ". " + parts.slice(1).join(" ");
    }

    function buildOpsCard(data, colName, assets, contracts) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const isCompleted = data.status === 'COMPLETED';
        let rawDateStr = typeof safeFormatStringDate === 'function' ? safeFormatStringDate(data.targetDateStr) : data.targetDateStr;
        let finalDateStr = (rawDateStr && rawDateStr.toString().trim() !== "" && rawDateStr.toString().toLowerCase() !== "invalid date") ? rawDateStr.toString().trim() : "NO DATE";

        const targetSaving = parseFloat(data["Target Saving (Annualized)"]) || 0;
        const actualSaving = parseFloat(data["Actual Saving (Annualized)"]) || 0;
        let borderColor = colName === 'col1' ? 'border-sky-400' : (colName === 'col2' ? 'border-amber-400' : 'border-emerald-400');

        const assetName = (data["Asset Name"] || "").toString().trim();
        const relatedAsset = assets.find(a => (a["Asset Name"] || "").toString().trim().toLowerCase() === assetName.toLowerCase()) || {};
        const relatedContract = contracts.find(c => (c["Asset Name"] || "").toString().trim().toLowerCase() === assetName.toLowerCase()) || {};
        const manufacturer = (relatedAsset["Manufacturer"] || "Unknown Manufacturer").toString().trim();

        const budgetY = parseFloat(relatedAsset["Effective Budget"] || 0);
        const baselineCostX = parseFloat(relatedContract["Annual Value"] || 0);
        const baselineGap = budgetY - baselineCostX;
        const appliedSaving = isCompleted ? actualSaving : targetSaving;
        const optimizedCostZ = Math.max(0, baselineCostX - appliedSaving);
        const finalGap = budgetY - optimizedCostZ;

        const sOwner = formatNameInitials(data["Service Owner"] || relatedAsset["Service Owner"]);
        const pPoint = formatNameInitials(data["Procurement Point"] || data["Procurement Point Focal"]);
        const isOverdue = !isCompleted && data.targetDateStr && data.targetDate < today;
        let overdueAlertBadge = isOverdue ? `<span class="text-[9px] font-black uppercase tracking-widest text-rose-700 bg-rose-100 border border-rose-300 px-1.5 py-0.5 rounded animate-pulse shadow-sm">⚠️ OVERDUE</span>` : '';

        const strategy = (data["Strategy"] || "").toString().trim().toUpperCase();
        const decision = (data["Decision"] || "").toString().trim().toUpperCase();
        let strategyBadge = (strategy && decision && strategy !== decision)
            ? `<span class="text-[9px] font-black uppercase tracking-widest text-rose-700 bg-rose-50 px-2 py-0.5 rounded border border-rose-200 flex items-center gap-1 shadow-sm">❌ SHIFT: ${strategy} &rarr; ${decision}</span>`
            : `<span class="text-[9px] font-black uppercase tracking-widest text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded border border-indigo-200 shadow-sm">${decision || strategy || "N/A"}</span>`;

        const addressableSpend = parseFloat(data["Baseline Spend (Annualized)"] || data["Baseline Spend"] || 0);
        let savingPercentText = (addressableSpend > 0 && appliedSaving > 0) ? `-${Math.round((appliedSaving / addressableSpend) * 100)}%` : "0%";
        const fmtAddressable = addressableSpend > 0 ? formatOpsCurrency(addressableSpend) : '—';
        const fmtSaving = appliedSaving > 0 ? formatOpsCurrency(appliedSaving) : '—';
        const pctBadgeClass = appliedSaving > 0 ? (isCompleted ? "bg-emerald-50 text-emerald-700 border-emerald-200" : "bg-teal-50 text-teal-700 border-teal-200") : "bg-slate-50 text-slate-500 border-slate-200";

        let horizontalSavingsDisplay = `
        <div class="flex items-center gap-3 text-right shrink-0">
            <div class="flex flex-col justify-center">
                <span class="text-[8px] font-bold text-slate-400 uppercase tracking-tight">Baseline</span>
                <span class="font-mono font-black text-slate-700 text-[11px] mt-0.5">${fmtAddressable}</span>
            </div>
            <div class="flex flex-col border-l border-slate-100 pl-3 justify-center items-end">
                <span class="text-[8px] font-bold text-slate-400 uppercase tracking-tight">${isCompleted ? 'Actual Saving' : 'Target Saving'}</span>
                <div class="flex items-center gap-1 mt-0.5 justify-end">
                    <span class="font-mono font-black ${isCompleted ? 'text-emerald-600' : 'text-teal-600'} text-[11px]">${fmtSaving}</span>
                    <span class="text-[9px] font-black border rounded px-1 py-0.5 leading-none text-center ${pctBadgeClass}">${savingPercentText}</span>
                </div>
            </div>
        </div>`;

        const footerDateColor = isOverdue ? "#e11d48" : "#64748b";

        return `
    <div id="ops-card-parent-${data._id}" class="block bg-white rounded-xl border border-slate-200 border-l-4 ${borderColor} shadow-sm cursor-pointer group hover:shadow-md transition-all overflow-hidden" onclick="handleOpsCardClick(event, '${data._id}')">
        <div class="p-3">
            
            <div class="flex justify-between items-start gap-4 w-full">
                <div class="min-w-0 flex-1">
                    <h4 class="font-black text-slate-900 text-[13px] leading-tight mb-0.5 truncate">${assetName || "Unknown Asset"}</h4>
                    <div class="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate">${manufacturer}</div>
                </div>
                <div class="shrink-0 text-right">
                    ${horizontalSavingsDisplay}
                </div>
            </div>

            <div class="flex items-center justify-between w-full h-5 mt-3 text-[10px]">
                <div class="flex items-center gap-2 shrink-0">
                    <div class="shrink-0">${strategyBadge}</div>
                    <span class="text-slate-300 font-normal select-none shrink-0">•</span>
                    <span class="text-slate-400 font-bold text-[9px] tracking-wide shrink-0">
                        TARGET: ${finalDateStr}
                    </span>
                </div>
                
                <div class="shrink-0 flex items-center justify-end pl-2">
                    ${overdueAlertBadge}
                </div>
            </div>

            <div class="ops-card-extended-section flex flex-col gap-2 pt-2 border-t border-slate-100/60 mt-2.5">
                <div class="text-[11px] font-medium text-slate-500 truncate">Supplier: <span class="text-slate-800 font-bold">${data["Supplier"] || relatedContract["Supplier"] || "Generic Supplier"}</span></div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-1.5 text-[9px] font-bold text-slate-500 uppercase tracking-wider truncate" title="Service Owner: ${sOwner}">
                        <svg class="w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                        <span class="truncate max-w-[100px]">${sOwner}</span>
                    </div>
                    <div class="flex items-center gap-1.5 text-[9px] font-bold text-slate-500 uppercase tracking-wider truncate" title="Procurement Focal: ${pPoint}">
                        <svg class="w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                        <span class="truncate max-w-[100px]">${pPoint}</span>
                    </div>
                </div>
                <p class="text-[10px] text-slate-500 italic leading-relaxed line-clamp-2">${data["Description"] || "No description provided."}</p>
                <div class="flex justify-end items-center w-full pt-1.5 border-t border-slate-50">
                    <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">${data.status || "DRAFT"}</span>
                </div>
            </div>
        </div>
        
        <div id="ops-detail-${data._id}" class="hidden bg-slate-50 border-t border-slate-200 p-3">
            <div class="mb-3 pb-3 border-b border-slate-200/60">
                <div class="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13h14M3 13v6a2 2 0 002 2h14a2 2 0 002-2v-6" /></svg>Baseline Scenario (As-Is)</div>
                <div class="flex justify-between items-center bg-white p-2 rounded-lg border border-slate-100 shadow-sm text-[10px]">
                    <div class="flex flex-col"><span class="text-[8px] font-bold text-slate-400 uppercase">Budget</span><span class="font-mono font-bold text-slate-700">${formatOpsCurrency(budgetY)}</span></div>
                    <div class="text-slate-300 font-black">-</div>
                    <div class="flex flex-col"><span class="text-[8px] font-bold text-slate-400 uppercase">Baseline</span><span class="font-mono font-bold text-slate-700">${formatOpsCurrency(baselineCostX)}</span></div>
                    <div class="text-slate-300 font-black">=</div>
                    <div class="flex flex-col items-end"><span class="text-[8px] font-black ${baselineGap >= 0 ? 'text-emerald-500' : 'text-rose-500'} uppercase">${baselineGap >= 0 ? 'Headroom' : 'Deficit'}</span><span class="font-mono font-black ${baselineGap >= 0 ? 'text-emerald-600' : 'text-rose-600'}">${baselineGap >= 0 ? '+' : '-'}${formatOpsCurrency(Math.abs(baselineGap))}</span></div>
                </div>
            </div>
            <div>
                <div class="text-[8px] font-black text-indigo-400 uppercase tracking-widest mb-2 flex items-center justify-between"><div class="flex items-center gap-1"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>Strategy Simulation (To-Be)</div><span class="text-[8px] font-bold text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100">Saving: ${formatOpsCurrency(appliedSaving)}</span></div>
                <div class="flex justify-between items-center bg-indigo-50/50 p-2 rounded-lg border border-indigo-100 shadow-sm text-[10px]">
                    <div class="flex flex-col"><span class="text-[8px] font-bold text-indigo-500 uppercase">Optimized Cost</span><span class="font-mono font-black text-indigo-700">${formatOpsCurrency(optimizedCostZ)}</span></div>
                    <div class="flex flex-col items-end">
                        <span class="text-[8px] font-black ${finalGap >= 0 ? 'text-emerald-600' : 'text-rose-600'} uppercase">Final vs Budget</span>
                        <div class="flex items-center gap-1 mt-0.5"><span class="font-mono font-black ${finalGap >= 0 ? 'text-emerald-600 bg-emerald-100' : 'text-rose-600 bg-rose-100'} px-1.5 py-0.5 rounded border ${finalGap >= 0 ? 'border-emerald-200' : 'border-rose-200'} text-[11px]">${finalGap >= 0 ? '+' : '-'}${formatOpsCurrency(Math.abs(finalGap))}</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>`;
    }

    function renderOperationsHub(payload) {
        const initiatives = payload.initiatives || []; const contracts = payload.contracts || []; const assets = payload.assets || [];
        const listContainer = document.getElementById('ops-dropdown-checkboxes-list');
        if (listContainer && listContainer.innerHTML === "") {
            const uniqueTags = new Set();
            initiatives.forEach(init => {
                const raw = init["Tags"] || "";
                raw.toString().split(',').forEach(t => { if (t.trim() !== "") uniqueTags.add(t.trim()); });
            });
            listContainer.innerHTML = Array.from(uniqueTags).sort().map(tag => `
            <label class="flex items-center gap-2 px-2 py-1 hover:bg-slate-50 rounded cursor-pointer text-[11px] font-bold text-slate-700">
                <input type="checkbox" value="${tag}" onchange="handleOpsDropdownCheckboxChange()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                <span>${tag}</span>
            </label>`).join('');
        }

        const searchTerm = document.getElementById('ops-search') ? document.getElementById('ops-search').value.toLowerCase().trim() : '';
        const horizonDays = document.getElementById('ops-filter-backlog') ? document.getElementById('ops-filter-backlog').value : '90';
        const lookbackDays = document.getElementById('ops-filter-savings') ? document.getElementById('ops-filter-savings').value : '90';
        const pipelineStatusFilter = document.getElementById('ops-filter-status') ? document.getElementById('ops-filter-status').value.toUpperCase() : 'ALL';

        const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        let backlogLimit = horizonDays !== 'all' ? new Date(today.getTime() + parseInt(horizonDays) * 24 * 60 * 60 * 1000) : null;
        let savingsLimit = lookbackDays !== 'all' ? new Date(today.getTime() - parseInt(lookbackDays) * 24 * 60 * 60 * 1000) : null;

        const cols = { col1: [], col2: [], col3: [] };

        initiatives.forEach((init, idx) => {
            const status = (init["Initiative Status"] || "").toString().toUpperCase().trim();
            const targetDateStr = (init["Target Date"] || init["Target date"] || init["target date"] || init["Data Target"] || init["Data target"] || "").toString().trim();

            const currentItemTags = (init["Tags"] || "").toString().split(',').map(t => t.trim());
            if (selectedOpsTags.length > 0 && !selectedOpsTags.some(t => currentItemTags.includes(t))) return;

            const targetDate = targetDateStr ? new Date(targetDateStr) : new Date(2099, 11, 31);
            if (targetDateStr) targetDate.setHours(0, 0, 0, 0);

            const item = { ...init, _id: idx, targetDate, targetDateStr, status };
            const assetName = (init["Asset Name"] || "").toString().trim();
            const relatedAsset = assets.find(a => (a["Asset Name"] || "").toString().trim().toLowerCase() === assetName.toLowerCase()) || {};
            const relatedContract = contracts.find(c => (c["Asset Name"] || "").toString().trim().toLowerCase() === assetName.toLowerCase()) || {};

            const searchString = `${assetName} ${init["Description"] || ""} ${relatedAsset["Manufacturer"] || ""} ${relatedContract["Supplier"] || ""}`.toLowerCase();
            if (searchTerm && !searchString.includes(searchTerm)) return;

            if (status === "IDEA" || status === "INCOMING" || status === "PLANNED" || status === "") {
                if (pipelineStatusFilter === 'ALL' || status === pipelineStatusFilter || (pipelineStatusFilter === 'IDEA' && status === "")) {
                    if (!targetDateStr || targetDate < today || !backlogLimit || targetDate <= backlogLimit) cols.col1.push(item);
                }
            } else if (status === "IN PROGRESS") {
                cols.col2.push(item);
            } else if (status === "COMPLETED") {
                if (!targetDateStr ? lookbackDays === 'all' : !savingsLimit || (targetDate >= savingsLimit && targetDate <= today)) cols.col3.push(item);
            }
        });

        cols.col1.sort((a, b) => (a.status === "INCOMING" ? -1 : b.status === "INCOMING" ? 1 : a.targetDate - b.targetDate));
        cols.col2.sort((a, b) => a.targetDate - b.targetDate);
        cols.col3.sort((a, b) => b.targetDate - a.targetDate);

        if (document.getElementById('ops-count-overdue')) document.getElementById('ops-count-overdue').textContent = cols.col1.length;
        if (document.getElementById('ops-count-upcoming')) document.getElementById('ops-count-upcoming').textContent = cols.col2.length;
        if (document.getElementById('ops-count-completed')) document.getElementById('ops-count-completed').textContent = cols.col3.length;

        let sumCol1 = 0, sumCol2 = 0, sumCol3Actual = 0;
        cols.col1.forEach(d => sumCol1 += parseFloat(d["Target Saving (Annualized)"]) || 0);
        cols.col2.forEach(d => sumCol2 += parseFloat(d["Target Saving (Annualized)"]) || 0);
        cols.col3.forEach(d => sumCol3Actual += parseFloat(d["Actual Saving (Annualized)"]) || 0);

        if (document.getElementById('ops-sum-col1')) document.getElementById('ops-sum-col1').textContent = formatOpsCurrency(sumCol1);
        if (document.getElementById('ops-sum-col2')) document.getElementById('ops-sum-col2').textContent = formatOpsCurrency(sumCol2);
        if (document.getElementById('ops-sum-col3')) document.getElementById('ops-sum-col3').textContent = formatOpsCurrency(sumCol3Actual);

        // === INSERIMENTO: Iniezione fisica delle card HTML generata all'interno dei contenitori delle colonne ===
        const overdueContainer = document.getElementById('ops-col-overdue');
        const upcomingContainer = document.getElementById('ops-col-upcoming');
        const completedContainer = document.getElementById('ops-col-completed');

        if (overdueContainer) {
            overdueContainer.innerHTML = cols.col1.length === 0
                ? '<p class="text-slate-400 italic text-[11px] text-center py-4">No items in Pipeline.</p>'
                : cols.col1.map(item => buildOpsCard(item, 'col1', assets, contracts)).join('');
        }
        if (upcomingContainer) {
            upcomingContainer.innerHTML = cols.col2.length === 0
                ? '<p class="text-slate-400 italic text-[11px] text-center py-4">No items In Progress.</p>'
                : cols.col2.map(item => buildOpsCard(item, 'col2', assets, contracts)).join('');
        }
        if (completedContainer) {
            completedContainer.innerHTML = cols.col3.length === 0
                ? '<p class="text-slate-400 italic text-[11px] text-center py-4">No Realized items.</p>'
                : cols.col3.map(item => buildOpsCard(item, 'col3', assets, contracts)).join('');
        }
        // === FINE INSERIMENTO ===

        const ball = document.getElementById('ops-toggle-ball');
        if (opsViewMode === "compact") {
            if (ball) ball.style.left = "65px"; // Cambiato da 73px a 65px per allineamento millimetrico
            document.querySelectorAll('.ops-card-extended-section').forEach(s => s.style.display = "none");
        } else {
            if (ball) ball.style.left = "3px";
            document.querySelectorAll('.ops-card-extended-section').forEach(s => s.style.display = "flex");
        }
    }

    function toggleOpsDropdownMenu(event) {
        if (event) event.stopPropagation();
        const menu = document.getElementById('ops-dropdown-menu'); const arrow = document.getElementById('ops-dropdown-arrow'); if (!menu) return;
        menu.classList.toggle('hidden'); if (arrow) arrow.style.transform = menu.classList.contains('hidden') ? "rotate(0deg)" : "rotate(180deg)";
    }

    function handleOpsDropdownCheckboxChange() {
        const container = document.getElementById('ops-dropdown-checkboxes-list'); if (!container) return;
        selectedOpsTags = Array.from(container.querySelectorAll('input[type="checkbox"]')).filter(cb => cb.checked).map(cb => cb.value);
        const badge = document.getElementById('ops-active-tags-count');
        if (badge) { badge.textContent = selectedOpsTags.length; if (selectedOpsTags.length > 0) badge.classList.remove('hidden'); else badge.classList.add('hidden'); }
        renderOperationsHub(windowPayload);
    }

    document.addEventListener('click', function (e) {
        // 1. Logica preesistente per i Tags
        const menu = document.getElementById('ops-dropdown-menu'); const btn = document.getElementById('ops-dropdown-btn');
        if (menu && !menu.classList.contains('hidden') && btn && !btn.contains(e.target) && !menu.contains(e.target)) {
            menu.classList.add('hidden'); const arrow = document.getElementById('ops-dropdown-arrow'); if (arrow) arrow.style.transform = "rotate(0deg)";
        }

        // 2. NUOVO: Logica unificata per i filtri a scomparsa del Kanban
        const pipelineDrop = document.getElementById('dropdown-pipeline');
        const realizedDrop = document.getElementById('dropdown-realized');

        if (pipelineDrop && !pipelineDrop.classList.contains('hidden') && !pipelineDrop.contains(e.target)) {
            pipelineDrop.classList.add('hidden');
        }
        if (realizedDrop && !realizedDrop.classList.contains('hidden') && !realizedDrop.contains(e.target)) {
            realizedDrop.classList.add('hidden');
        }
    });

    function toggleOpsViewMode() {
        const ball = document.getElementById('ops-toggle-ball');
        const txtStd = document.getElementById('ops-txt-std');
        const txtCmp = document.getElementById('ops-txt-cmp');
        const extendedSections = document.querySelectorAll('.ops-card-extended-section');

        if (opsViewMode === "standard") {
            opsViewMode = "compact";
            if (ball) ball.style.left = "65px"; // Sposta la pallina a destra su 'Cmp' (adattato ai 36px/144px di larghezza totale dello switch)
            if (txtStd) txtStd.className = "w-1/2 text-slate-400 transition-colors duration-200";
            if (txtCmp) txtCmp.className = "w-1/2 text-white transition-colors duration-200";
            extendedSections.forEach(section => section.style.display = "none");
        } else {
            opsViewMode = "standard";
            if (ball) ball.style.left = "3px"; // Riporta la pallina a sinistra su 'Std'
            if (txtStd) txtStd.className = "w-1/2 text-white transition-colors duration-200";
            if (txtCmp) txtCmp.className = "w-1/2 text-slate-400 transition-colors duration-200";
            extendedSections.forEach(section => section.style.display = "flex");
        }
    }

    function handleOpsCardClick(event, cardId) {
        const detailDrawer = document.getElementById('ops-detail-' + cardId); if (detailDrawer) detailDrawer.classList.toggle('hidden');
        const cardParent = document.getElementById('ops-card-parent-' + cardId);
        if (cardParent && opsViewMode === "compact") {
            const targetSection = cardParent.querySelector('.ops-card-extended-section');
            if (targetSection) targetSection.style.display = (targetSection.style.display === "none" || targetSection.style.display === "") ? "flex" : "none";
        }
    }

    // Funzione per mostrare/nascondere i dropdown fluttuanti dei filtri Kanban
    function toggleOpsDropdown(event, id) {
        if (event) event.stopPropagation(); // Impedisce la chiusura immediata causata dal listener del document

        const dropdowns = ['dropdown-pipeline', 'dropdown-realized'];
        dropdowns.forEach(dId => {
            const el = document.getElementById(dId);
            if (el) {
                if (dId === id) {
                    el.classList.toggle('hidden');
                } else {
                    el.classList.add('hidden');
                }
            }
        });
    }

</script>
