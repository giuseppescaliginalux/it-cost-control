<script>
    /**
     * js_initiatives_state.html
     * MODEL: Centralized State Management for the 3-Column Initiatives Hub.
     */

    const InitiativesState = {
        rawInitiatives: [],
        optimizationLevers: [],
        currentEditingInitiative: null,
        selectedTagsFilter: [],
        searchKeyword: '', // <-- NUOVA VARIABILE PER LA RICERCA

        pipelineHorizon: 'next_3_months',
        pipelineStatus: 'all',
        realizedHistory: 'past_month',
        globalSortKey: 'assetName',

        loadPayload: function (payload) {
            this.rawInitiatives = payload.initiatives || [];
            this.optimizationLevers = payload.optimizationLevers || [
                "Tier Consolidation", "License Downgrade", "Architecture Optimization",
                "Contract Renegotiation", "Vendor Swap", "Storage Lifecycle", "Instance Right-sizing"
            ];

            this.rawInitiatives.forEach(init => {
                if (String(init["Initiative Status"]).toUpperCase().trim() === "INCOMING") {
                    init["Initiative Status"] = "PLANNED";
                }
            });
        },

        recalculateMetrics: function (initiatives, contracts) {
            const sortedInits = [...initiatives].sort((a, b) => {
                const dA = new Date(a["Target Date"] || "2099-12-31");
                const dB = new Date(b["Target Date"] || "2099-12-31");
                return dA - dB;
            });

            sortedInits.forEach(init => {
                const masterId = (init["Master Contract ID"] || init.masterId || "").toString().trim();
                const contractId = (init["Contract ID"] || init.contractId || "").toString().trim();
                const targetDate = init["Target Date"] ? new Date(init["Target Date"]) : null;

                let originalBaseline = 0;
                if (contractId !== "") {
                    // 🌟 TARGET LOCALE: Isoliamo il singolo contratto selezionato
                    const c = contracts.find(x => String(x["Contract ID"] || x.contractId).trim() === contractId);
                    originalBaseline = c ? (parseFloat(c["Annual Value"] || c.annualValue) || 0) : 0;
                } else {
                    // 🌟 TARGET GLOBALE: Sommiamo l'intero Run Rate dei contratti del Master
                    contracts.forEach(c => {
                        if (String(c["Master Contract ID"] || c.masterId).trim() === masterId && masterId !== "") {
                            originalBaseline += (parseFloat(c["Annual Value"] || c.annualValue) || 0);
                        }
                    });
                }

                let startingCost = originalBaseline;
                if (originalBaseline !== 0 && targetDate) {
                    const priorInits = sortedInits.filter(i => {
                        const iMaster = String(i["Master Contract ID"] || i.masterId || "").trim();
                        const iContract = String(i["Contract ID"] || i.contractId || "").trim();
                        return iMaster === masterId && iContract === contractId &&
                               new Date(i["Target Date"]) < targetDate &&
                               !isNaN(parseFloat(i["Target Cost (Annualized)"]));
                    });

                    if (priorInits.length > 0) {
                        priorInits.sort((a, b) => new Date(b["Target Date"]) - new Date(a["Target Date"]));
                        startingCost = parseFloat(priorInits[0]["Target Cost (Annualized)"]);
                    }
                }
                init["Baseline Spend (Annualized)"] = startingCost;

                const targetCost = parseFloat(init["Target Cost (Annualized)"]);
                const strategy = (init["Decision"] || init["Strategy"] || "").toString().trim().toLowerCase();

                let targetSaving = 0;
                if (!isNaN(targetCost) && targetCost >= 0) {
                    targetSaving = startingCost - targetCost;
                } else if (["terminate", "replace", "transfer"].includes(strategy)) {
                    targetSaving = startingCost;
                }
                init["Target Saving (Annualized)"] = targetSaving;
                init["Target Saving %"] = startingCost > 0 ? (targetSaving / startingCost) : 0;

                const status = (init["Initiative Status"] || "").toString().trim().toLowerCase();

                if (status === "completed") {
                    init["Actual Saving (Annualized)"] = targetSaving;
                } else {
                    init["Actual Saving (Annualized)"] = 0;
                    init["New Actual"] = "";
                }
            });

            return initiatives;
        },

        updateInitiativeStatus: function (id, newStatus) {
            if (this.rawInitiatives[id]) {
                this.rawInitiatives[id]["Initiative Status"] = newStatus;
                return this.rawInitiatives[id];
            }
            return null;
        },

        getInitiativeById: function (id) {
            return this.rawInitiatives[id] ? { ...this.rawInitiatives[id], _id: id } : null;
        },

        saveInitiativeInstance: function (id, updatedData) {
            if (id === null || id === undefined || id === '') {
                this.rawInitiatives.push(updatedData);
            } else {
                this.rawInitiatives[id] = updatedData;
            }
        },

        deleteInitiativeInstance: function (id) {
            if (this.rawInitiatives[id]) {
                this.rawInitiatives.splice(id, 1);
                return true;
            }
            return false;
        },

        toggleTagFilter: function (tag) {
            const idx = this.selectedTagsFilter.indexOf(tag);
            if (idx > -1) this.selectedTagsFilter.splice(idx, 1);
            else this.selectedTagsFilter.push(tag);
        }
    };
</script>
