<script>
    /**
     * MODULO 1: CORE & DATA FETCHING (CON PROFILING ATTIVO)
     */
    let globalCachedData = [];
    let windowPayload = { assets: [], contracts: [], initiatives: [], bridge: [], projections: [] };
    window.hasPendingChanges = false;
    window.originalPayloadSnapshot = null;
    window.currentActiveTabId = 'tab-inventory';
    let selectedStatuses = [];

    // Formattazioni
    Number.prototype.formatCurrency = function () {
        return this.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    window.formatKM = function (num) {
        if (!num || isNaN(num) || num === 0) return "0";
        const absNum = Math.abs(num);
        const sign = num < 0 ? "-" : "";
        if (absNum >= 1000000) {
            const m = absNum / 1000000;
            return sign + (m >= 100 ? m.toFixed(0) : m.toFixed(1)) + 'M';
        }
        if (absNum >= 1000) {
            const k = absNum / 1000;
            return sign + (k >= 100 ? k.toFixed(0) : k.toFixed(1)) + 'k';
        }
        return sign + absNum.toFixed(0);
    };

    Date.prototype.formatDashboardDate = function () {
        if (isNaN(this.getTime())) return "-";
        return this.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
    };
    String.prototype.formatDashboardDate = function () {
        if (!this.trim() || this === "-") return "-";
        const parsedDate = new Date(this);
        if (isNaN(parsedDate.getTime())) return this;
        return parsedDate.formatDashboardDate();
    };
    function safeFormatStringDate(rawDate) {
        return FinOpsDate.toVisualShort(rawDate);
    }

    window.formatServerDate = function (d) {
        return typeof FinOpsDate !== 'undefined' ? FinOpsDate.toIso(d) : d;
    };

    // Chiamata Server
    function apiFetchFullPayload() {
        return new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .getFullPayload_Internal();
        });
    }

    // Avvio Iniziale (Con Radiografia)
    async function fetchLiveData() {
        console.time("⏱️ TOTALE AVVIO CLIENT");

        document.getElementById('loading-state').classList.remove('hidden');
        document.getElementById('error-state').classList.add('hidden');
        document.getElementById('dashboard-content').classList.add('hidden');

        try {
            // 1. Rete (Chiamata e Download)
            console.time("🌐 1. RETE: Download dati dal Server");
            const payload = await apiFetchFullPayload();
            console.timeEnd("🌐 1. RETE: Download dati dal Server");

            // 2. Idratazione Dati
            console.time("💧 2. CPU: HydrationEngine (Stati contratti)");
            const hydratedPayload = HydrationEngine.hydrateAllStatuses(payload);
            console.timeEnd("💧 2. CPU: HydrationEngine (Stati contratti)");

            // 3. Proiezioni Finanziarie
            console.time("🧮 3. CPU: ProjectionsEngine (Calcoli mesi)");
            hydratedPayload.projections = ProjectionsEngine.calculateAll(
                hydratedPayload.contracts || [],
                hydratedPayload.initiatives || [],
                hydratedPayload.masterContracts || [],
                hydratedPayload.ledger || []
            );
            console.timeEnd("🧮 3. CPU: ProjectionsEngine (Calcoli mesi)");

            windowPayload = hydratedPayload;

            console.time("💾 4. CPU: Clonazione Snapshot (Sicurezza)");
            window.originalPayloadSnapshot = JSON.parse(JSON.stringify(hydratedPayload));
            console.timeEnd("💾 4. CPU: Clonazione Snapshot (Sicurezza)");

            setPendingChanges(false);

            // 4. Calcoli Aggregati
            console.time("📊 5. CPU: Aggregazione Budget per Asset");
            globalCachedData = (hydratedPayload.assets || []).filter(r => (r.name || "").toString().trim() !== "");
            globalCachedData.forEach(asset => {
                const assetName = (asset.name || "").toString().toLowerCase().trim();
                const projForAsset = windowPayload.projections.filter(p => (p["Asset Name"] || p.assetName || "").toLowerCase().trim() === assetName);

                asset.fiscalProjectionFY27 = projForAsset.reduce((acc, p) => acc + (parseFloat(p["FY27 Optimized"] || p.fy27Optimized) || 0), 0);

                const activeContracts = (windowPayload.contracts || []).filter(c =>
                    String(c.assetName || "").toLowerCase().trim() === assetName &&
                    ["ACTIVE", "UPCOMING", "INCOMING"].includes(String(c.status || "").toUpperCase().trim())
                );
                asset.runRate = activeContracts.reduce((sum, c) => sum + (parseFloat(c.effectiveRunRate || c.annualValue) || 0), 0);

                let effBudget = 0;
                let variance = 0;
                (windowPayload.varianceReport || []).forEach(v => {
                    if (String(v.assetName || "").toLowerCase().trim() === assetName && String(v.fiscalYear || "").toUpperCase().trim() === "FY27") {
                        effBudget += parseFloat(v.effectiveBudget) || 0;
                        variance += parseFloat(v.variance) || 0;
                    }
                });

                if (effBudget === 0) asset.budgetStatusFY27 = "Not Budgeted";
                else if (variance < 0) asset.budgetStatusFY27 = "At Risk";
                else asset.budgetStatusFY27 = "Secured";
            });
            console.timeEnd("📊 5. CPU: Aggregazione Budget per Asset");

            // 5. Rendering HTML
            console.time("🎨 6. GPU/UI: Rendering HTML (Disegno su schermo)");
            if (typeof InventoryController !== "undefined") InventoryController.initWorkspace();
            if (typeof updateExecutiveDashboard === "function") updateExecutiveDashboard(hydratedPayload);
            if (typeof renderOperationsHub === "function") renderOperationsHub(hydratedPayload);
            if (typeof renderProjectionsHub === "function") renderProjectionsHub(hydratedPayload);
            console.timeEnd("🎨 6. GPU/UI: Rendering HTML (Disegno su schermo)");

            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');

            window.dispatchEvent(new Event('resize'));

        } catch (e) {
            document.getElementById('error-message').textContent = e.toString();
            document.getElementById('error-state').classList.remove('hidden');
        }

        console.timeEnd("⏱️ TOTALE AVVIO CLIENT");
    }

    function showLoading() { document.getElementById('loading-overlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }

    window.setPendingChanges = function (isDirty) {
        window.hasPendingChanges = isDirty;
        const pendingTabs = document.getElementById('global-pending-tabs');
        const btnSync = document.getElementById('btn-global-sync');

        if (pendingTabs) {
            if (isDirty) {
                pendingTabs.classList.remove('hidden');
                pendingTabs.classList.add('flex');
                if (btnSync) btnSync.classList.add('hidden');
            } else {
                pendingTabs.classList.add('hidden');
                pendingTabs.classList.remove('flex');
                const isEditActive = typeof ContractsState !== 'undefined' && ContractsState.globalEditMode;
                if (btnSync) {
                    if (isEditActive) btnSync.classList.add('hidden');
                    else {
                        btnSync.classList.remove('hidden');
                        btnSync.className = "h-9 w-24 bg-teal-950/45 hover:bg-teal-800/60 text-teal-100 border border-teal-800/80 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-1.5 cursor-pointer shrink-0 shadow-3xs";
                        btnSync.querySelector('span').textContent = 'SYNC';
                    }
                }
            }
        }
    };

    window.setEditModeActive = function (isActive) {
        if (window.hasPendingChanges) return;
        const btnSync = document.getElementById('btn-global-sync');
        if (btnSync) {
            if (isActive) btnSync.classList.add('hidden');
            else {
                btnSync.classList.remove('hidden');
                btnSync.className = "h-9 w-24 bg-teal-950/45 hover:bg-teal-800/60 text-teal-100 border border-teal-800/80 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-1.5 cursor-pointer shrink-0 shadow-3xs";
                btnSync.querySelector('span').textContent = 'SYNC';
            }
        }
    };

    window.revertLocalChanges = function () {
        if (!window.originalPayloadSnapshot) return;
        windowPayload = JSON.parse(JSON.stringify(window.originalPayloadSnapshot));

        if (typeof ContractsState !== 'undefined') ContractsState.resetMaster();
        if (typeof InitiativesState !== 'undefined') InitiativesState.loadPayload(windowPayload);

        setPendingChanges(false);
        if (typeof setEditModeActive !== 'undefined') setEditModeActive(false);

        if (window.currentActiveTabId === 'tab-inventory' && typeof InventoryController !== 'undefined') {
            InventoryController.initWorkspace();
            if (typeof InventoryState !== 'undefined' && InventoryState.expandedAssetId) {
                const assetObj = globalCachedData.find(a => btoa(encodeURIComponent(a["Asset Name"] || a.assetName)).replace(/=/g, "") === InventoryState.expandedAssetId);
                if (assetObj) {
                    InventoryState.loadAssetDrillDownData(assetObj["Asset Name"] || assetObj.assetName);
                    InventoryController.renderContractsTabContent(InventoryState.expandedAssetId);
                }
            }
        } else if (window.currentActiveTabId === 'tab-contracts') {
            ContractsState.globalEditMode = false;
            document.getElementById('tab-contracts').innerHTML = ContractsTemplates.getBaseLayout();
            renderAssetSearchList();
        } else if (window.currentActiveTabId === 'tab-operations' && typeof InitiativesController !== 'undefined') {
            InitiativesState.globalEditMode = false;
            InitiativesController.renderKanbanBoard(true);
        } else if (window.currentActiveTabId === 'tab-timeline' && typeof TimelineController !== 'undefined') {
            TimelineState.isTimelineEditable = false;
            TimelineController.initTimelineWorkspace(windowPayload);
        }

        FinOpsUI.showNotificationBanner("Changes discarded. Registry restored.", "success");
    };

    window.triggerGlobalCommit = function () {
        if (window.currentActiveTabId === 'tab-contracts' || window.currentActiveTabId === 'tab-inventory') {
            if (typeof saveCurrentContract === 'function') saveCurrentContract();
        } else if (window.currentActiveTabId === 'tab-operations') {
            if (typeof InitiativesController !== 'undefined') InitiativesController.pushKanbanArchitectureToGoogleSheets();
        } else if (window.currentActiveTabId === 'tab-timeline') {
            if (typeof TimelineController !== 'undefined') TimelineController.commitTimelineChanges();
        } else {
            FinOpsUI.showNotificationBanner("Nessuna azione di commit mappata per questa sezione.", "warning");
        }
    };

    window.onload = fetchLiveData;
</script>
