<script>

    /**
     * Generates a unified, accessible FinOps help tooltip aligned with existing CSS structures.
     * Open/Closed compliant: accepts an optional placement orientation argument.
     * @param {string} title - The header of the tooltip context.
     * @param {string} description - The descriptive analytical text body.
     * @param {string} [placement='top'] - Vertical opening direction ('top' or 'down').
     * @returns {string} - The inline HTML component string.
     */
    function generateFinOpsHelpTooltip(title, description, placement = 'top') {
        const placementClass = placement === 'down' ? 'tt-down' : '';
        return `
    <span class="tt-wrapper text-slate-300 hover:text-slate-500" onclick="event.stopPropagation()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 text-teal-600/80 hover:text-teal-600">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
        </svg>
        <div class="tt-content tt-left ${placementClass}">
            <p class="font-bold text-teal-400 uppercase text-[9px] mb-1">${title}</p>
            ${description}
        </div>
    </span>`;
    }

</script>
