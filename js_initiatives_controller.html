<script>
    /**
     * js_initiatives_controller.html
     * CONTROLLER: Gestione Dati Aggregati Contratti, Tag Library, e UX Avanzata Modale.
     */

    function renderOperationsHub(payload) {
        window.windowPayload = payload;
        InitiativesState.loadPayload(payload);
        InitiativesState.rawInitiatives = InitiativesState.recalculateMetrics(InitiativesState.rawInitiatives, windowPayload.contracts || []);
        InitiativesController.renderKanbanBoard(true);
        InitiativesController.renderGlobalTagsFilterSelectionRow();
    }

    const InitiativesController = {
        draggedCardId: null,
        currentLocalTagsArray: [],
        globalCustomTags: [],

        handleSearchInput: function (val) {
            InitiativesState.searchKeyword = val;
            this.renderKanbanBoard(false);
        },

        renderKanbanBoard: function (forceFullLayout = false) {
            const workspace = document.getElementById('tab-operations');
            if (!workspace) return;

            let gridContainer = document.getElementById('initiatives-kanban-board-grid');

            if (!gridContainer || forceFullLayout) {
                workspace.innerHTML = InitiativesTemplates.getKanbanMainLayout();
                gridContainer = document.getElementById('initiatives-kanban-board-grid');

                if (InitiativesState.searchKeyword) {
                    const searchBox = document.getElementById('initiatives-search-input');
                    if (searchBox) searchBox.value = InitiativesState.searchKeyword;
                }
            }

            const lanes = {
                "PIPELINE": { label: "Pipeline", color: "bg-sky-500", bgColor: "bg-sky-50/50 border border-sky-200/60", html: "", count: 0, sum: 0, icon: `<svg class="w-4 h-4 text-sky-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 001.5-.189m-1.5.189a6.01 6.01 0 01-1.5-.189m3.75 7.478a12.06 12.06 0 01-4.5 0m3.75 2.383a14.406 14.406 0 01-3 0M14.25 18v-.192c0-.983.658-1.82 1.508-2.316a7.5 7.5 0 10-7.517 0c.85.496 1.509 1.333 1.509 2.316V18" /></svg>` },
                "IN_PROGRESS": { label: "In Progress", color: "bg-amber-500", bgColor: "bg-amber-50/50 border border-amber-200/60", html: "", count: 0, sum: 0, icon: `<svg class="w-4 h-4 text-amber-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>` },
                "REALIZED": { label: "Realized", color: "bg-emerald-500", bgColor: "bg-emerald-50/50 border border-emerald-200/60", html: "", count: 0, sum: 0, icon: `<svg class="w-4 h-4 text-emerald-500 shrink-0" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 00-1.14-.094l3.75-5.25z" clip-rule="evenodd" /></svg>` }
            };

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            let pipelineLimit = null;
            if (InitiativesState.pipelineHorizon === 'next_month') pipelineLimit = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000);
            else if (InitiativesState.pipelineHorizon === 'next_2_months') pipelineLimit = new Date(today.getTime() + 60 * 24 * 60 * 60 * 1000);
            else if (InitiativesState.pipelineHorizon === 'next_3_months') pipelineLimit = new Date(today.getTime() + 90 * 24 * 60 * 60 * 1000);

            let realizedLimit = null;
            if (InitiativesState.realizedHistory === 'past_month') realizedLimit = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
            else if (InitiativesState.realizedHistory === 'past_2_months') realizedLimit = new Date(today.getTime() - 60 * 24 * 60 * 60 * 1000);
            else if (InitiativesState.realizedHistory === 'past_3_months') realizedLimit = new Date(today.getTime() - 90 * 24 * 60 * 60 * 1000);

            const sortKey = InitiativesState.globalSortKey || 'assetName';
            const sortedList = [...InitiativesState.rawInitiatives].sort((a, b) => {
                if (sortKey === 'assetName') return (a["Asset Name"] || "").toString().localeCompare((b["Asset Name"] || "").toString());
                else if (sortKey === 'targetDate') {
                    const dA = a["Target Date"] ? new Date(a["Target Date"]) : new Date(2099, 11, 31);
                    const dB = b["Target Date"] ? new Date(b["Target Date"]) : new Date(2099, 11, 31);
                    return dA - dB;
                }
                else if (sortKey === 'runRate') return (parseFloat(b["Baseline Spend (Annualized)"]) || 0) - (parseFloat(a["Baseline Spend (Annualized)"]) || 0);
                else if (sortKey === 'targetSaving') return (parseFloat(b["Target Saving (Annualized)"]) || 0) - (parseFloat(a["Target Saving (Annualized)"]) || 0);
                return 0;
            });

            const contracts = windowPayload.contracts || [];
            const assets = windowPayload.assets || [];
            const searchQ = (InitiativesState.searchKeyword || "").toLowerCase().trim();

            sortedList.forEach((init, idx) => {
                const originalIndex = InitiativesState.rawInitiatives.indexOf(init);
                let status = (init["Initiative Status"] || "IDEA").toUpperCase().trim();
                let targetLane = "";

                const currentItemTags = (init["Tags"] || "").split(',').map(t => t.trim()).filter(t => t);
                if (InitiativesState.selectedTagsFilter.length > 0 && !InitiativesState.selectedTagsFilter.some(t => currentItemTags.includes(t))) return;

                const initiativeName = (init["Initiative Name"] || "").toString().trim() || "Unnamed Initiative";
                const assetName = (init["Asset Name"] || "").toString().trim();
                const relatedAsset = assets.find(a => (a["Asset Name"] || "").toString().trim().toLowerCase() === assetName.toLowerCase()) || {};
                const manufacturer = relatedAsset["Manufacturer"] || "Generic";

                const relatedContract = contracts.find(c => c["Contract ID"] === init["Contract ID"] || c["Group ID"] === init["Contracts Group ID"]) || {};
                const supplierName = init["Supplier"] || relatedContract["Supplier"] || "Generic Supplier";
                const description = init["Description"] || "";

                const ownerRaw = init["Service Owner"] ? init["Service Owner"].toString().trim() : "";
                const procurementRaw = init["Procurement Point Focal"] || init["Procurement Point"] ? (init["Procurement Point Focal"] || init["Procurement Point"]).toString().trim() : "";
                const owner = ownerRaw || "TBD";
                const procurement = procurementRaw || "TBD";

                if (searchQ) {
                    const searchStr = `${initiativeName} ${assetName} ${description} ${manufacturer} ${supplierName}`.toLowerCase();
                    if (!searchStr.includes(searchQ)) return;
                }

                const tDateStr = init["Target Date"] ? init["Target Date"].toString().trim() : "";
                const tDate = tDateStr ? new Date(tDateStr) : new Date(2099, 11, 31);
                if (tDateStr) tDate.setHours(0, 0, 0, 0);

                if (status === "IDEA" || status === "PLANNED") {
                    targetLane = "PIPELINE";
                    if (InitiativesState.pipelineStatus !== 'all' && status !== InitiativesState.pipelineStatus) return;
                    if (pipelineLimit && tDate > pipelineLimit && tDateStr) return;
                } else if (status === "IN PROGRESS") {
                    targetLane = "IN_PROGRESS";
                } else if (status === "COMPLETED") {
                    targetLane = "REALIZED";
                    if (realizedLimit && tDate < realizedLimit && tDateStr) return;
                } else return;

                const isOverdue = (targetLane !== "REALIZED" && tDate < today && tDateStr !== "");

                const targetSaving = parseFloat(init["Target Saving (Annualized)"]) || 0;
                const actualSaving = parseFloat(init["Actual Saving (Annualized)"]) || 0;
                const baselineSpend = parseFloat(init["Baseline Spend (Annualized)"]) || 0;

                const appliedSaving = targetLane === "REALIZED" ? actualSaving : targetSaving;
                const appliedTargetCost = targetLane === "REALIZED" && (parseFloat(init["New Actual"]) >= 0 && init["New Actual"] !== "")
                    ? parseFloat(init["New Actual"])
                    : parseFloat(init["Target Cost (Annualized)"]) || 0;
                const costLabel = targetLane === "REALIZED" ? "Actual" : "Target";
                const dateLabel = targetLane === "REALIZED" ? "Actual Date" : "Target Date";

                let savingPercentText = "0%";
                if (baselineSpend > 0 && appliedSaving > 0) {
                    savingPercentText = `-${Math.round((appliedSaving / baselineSpend) * 100)}%`;
                }

                const strategy = (init["Initial Strategy"] || "OPTIMIZATION").toUpperCase().trim();
                const decision = (init["Decision"] || strategy).toUpperCase().trim();

                const fmtSaving = '€' + Math.round(appliedSaving / 1000).toLocaleString('it-IT') + 'k';
                const fmtRunRate = baselineSpend > 0 ? '€' + Math.round(baselineSpend / 1000).toLocaleString('it-IT') + 'k' : '—';

                let fmtTargetCost = '—';
                if (appliedTargetCost > 0) {
                    fmtTargetCost = '€' + Math.round(appliedTargetCost / 1000).toLocaleString('it-IT') + 'k';
                } else if (appliedTargetCost === 0 && ["TERMINATE", "REPLACE", "TRANSFER"].includes(decision)) {
                    fmtTargetCost = '€0k';
                } else if (appliedTargetCost === 0 && targetLane === "REALIZED") {
                    fmtTargetCost = '€0k';
                }

                const finalDateStr = init["Target Date"] ? ContractsUtils.formatToEnglishCustomDate(init["Target Date"]) : "NO DATE";

                let strategyBadge = (strategy && decision && strategy !== decision)
                    ? `<span class="text-[7px] font-black uppercase bg-rose-50 border border-rose-200 text-rose-700 px-1.5 py-0.5 rounded flex items-center gap-1 shadow-sm">SHIFT: <span class="line-through opacity-60">${strategy}</span> ➔ ${decision}</span>`
                    : `<span class="text-[7px] font-black uppercase bg-indigo-50 border border-indigo-200 text-indigo-700 px-1.5 py-0.5 rounded shadow-sm">${decision}</span>`;

                lanes[targetLane].count++;
                lanes[targetLane].sum += appliedSaving;

                lanes[targetLane].html += InitiativesTemplates.getInitiativeCard(
                    init, originalIndex, fmtSaving, savingPercentText, finalDateStr, strategyBadge, initiativeName, assetName, fmtRunRate, fmtTargetCost, costLabel, supplierName, isOverdue, dateLabel, owner, procurement
                );
            });

            let pipelineDropdownHtml = `
            <div class="relative inline-block text-left">
                <button onclick="InitiativesController.toggleColumnFilterDropdown(event, 'dropdown-pipeline')" class="p-1 hover:bg-slate-300 rounded transition-colors text-slate-400 hover:text-slate-600 focus:outline-none">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                </button>
                <div id="dropdown-pipeline" class="hidden absolute right-0 top-full mt-1 w-44 bg-white rounded-xl shadow-xl border border-slate-200 z-50 p-2.5 flex flex-col gap-2">
                    <div>
                        <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 select-none">Horizon</label>
                        <select id="ops-filter-backlog" onchange="InitiativesController.handlePipelineFilterChange('horizon', this.value)" class="w-full text-[10px] font-bold text-slate-600 bg-slate-50 border border-slate-200 rounded px-1.5 py-1 cursor-pointer focus:outline-none">
                            <option value="next_month" ${InitiativesState.pipelineHorizon === 'next_month' ? 'selected' : ''}>Next Month</option>
                            <option value="next_2_months" ${InitiativesState.pipelineHorizon === 'next_2_months' ? 'selected' : ''}>Next 2 Months</option>
                            <option value="next_3_months" ${InitiativesState.pipelineHorizon === 'next_3_months' ? 'selected' : ''}>Next 3 Months</option>
                            <option value="all_future" ${InitiativesState.pipelineHorizon === 'all_future' ? 'selected' : ''}>All Future</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 select-none">Status</label>
                        <select id="ops-filter-status" onchange="InitiativesController.handlePipelineFilterChange('status', this.value)" class="w-full text-[10px] font-bold text-slate-600 bg-slate-50 border border-slate-200 rounded px-1.5 py-1 cursor-pointer focus:outline-none">
                            <option value="all" ${InitiativesState.pipelineStatus === 'all' ? 'selected' : ''}>All Status</option>
                            <option value="IDEA" ${InitiativesState.pipelineStatus === 'IDEA' ? 'selected' : ''}>Idea</option>
                            <option value="PLANNED" ${InitiativesState.pipelineStatus === 'PLANNED' ? 'selected' : ''}>Planned</option>
                        </select>
                    </div>
                </div>
            </div>`;

            let realizedDropdownHtml = `
            <div class="relative inline-block text-left">
                <button onclick="InitiativesController.toggleColumnFilterDropdown(event, 'dropdown-realized')" class="p-1 hover:bg-slate-300 rounded transition-colors text-slate-400 hover:text-slate-600 focus:outline-none">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                </button>
                <div id="dropdown-realized" class="hidden absolute right-0 top-full mt-1 w-44 bg-white rounded-xl shadow-xl border border-slate-200 z-50 p-2.5 flex flex-col gap-2">
                    <div>
                        <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 select-none">History</label>
                        <select id="ops-filter-savings" onchange="InitiativesController.handleRealizedFilterChange(this.value)" class="w-full text-[10px] font-bold text-slate-600 bg-slate-50 border border-slate-200 rounded px-1.5 py-1 cursor-pointer focus:outline-none">
                            <option value="past_month" ${InitiativesState.realizedHistory === 'past_month' ? 'selected' : ''}>Past Month</option>
                            <option value="past_2_months" ${InitiativesState.realizedHistory === 'past_2_months' ? 'selected' : ''}>Past 2 Months</option>
                            <option value="past_3_months" ${InitiativesState.realizedHistory === 'past_3_months' ? 'selected' : ''}>Past 3 Months</option>
                            <option value="all_history" ${InitiativesState.realizedHistory === 'all_history' ? 'selected' : ''}>All History</option>
                        </select>
                    </div>
                </div>
            </div>`;

            let gridHtml = '';
            gridHtml += InitiativesTemplates.getKanbanColumnStructure("PIPELINE", lanes.PIPELINE.label, lanes.PIPELINE.color, lanes.PIPELINE.bgColor, lanes.PIPELINE.icon, lanes.PIPELINE.html, lanes.PIPELINE.count, lanes.PIPELINE.sum, pipelineDropdownHtml);
            gridHtml += InitiativesTemplates.getKanbanColumnStructure("IN_PROGRESS", lanes.IN_PROGRESS.label, lanes.IN_PROGRESS.color, lanes.IN_PROGRESS.bgColor, lanes.IN_PROGRESS.icon, lanes.IN_PROGRESS.html, lanes.IN_PROGRESS.count, lanes.IN_PROGRESS.sum, '');
            gridHtml += InitiativesTemplates.getKanbanColumnStructure("REALIZED", lanes.REALIZED.label, lanes.REALIZED.color, lanes.REALIZED.bgColor, lanes.REALIZED.icon, lanes.REALIZED.html, lanes.REALIZED.count, lanes.REALIZED.sum, realizedDropdownHtml);

            gridContainer.innerHTML = gridHtml;
        },

        handleGlobalSortChange: function (val) {
            InitiativesState.globalSortKey = val;
            this.renderKanbanBoard(false);
        },

        handlePipelineFilterChange: function (type, val) {
            if (type === 'horizon') InitiativesState.pipelineHorizon = val;
            if (type === 'status') InitiativesState.pipelineStatus = val;
            this.renderKanbanBoard(false);
        },

        handleRealizedFilterChange: function (val) {
            InitiativesState.realizedHistory = val;
            this.renderKanbanBoard(false);
        },

        toggleColumnFilterDropdown: function (event, id) {
            if (event) event.stopPropagation();
            const target = document.getElementById(id);
            if (target) target.classList.toggle('hidden');
        },

        // COMPONENTE: LISTA DI SMART CARDS CON EXTRACTION IN ALTO E ORDINAMENTO "STICKY"
        handleAssetCascadeDropdownChange: function (selectedAssetName, preSelectedMasterId = null) {
            const container = document.getElementById('modal-init-group-list-container');
            const hiddenInput = document.getElementById('modal-init-selected-master-id');
            if (!container) return;

            if (!selectedAssetName) {
                container.innerHTML = `<div class="text-center p-4 text-[10px] text-slate-400 italic border border-dashed border-slate-200 rounded-xl">Select an Asset Context first to view mapped Master Agreements.</div>`;
                if (hiddenInput) hiddenInput.value = "";
                return;
            }

            const allContracts = windowPayload.contracts || [];

            // Pesca direttamente i MASTER CONTRACTS collegati a questo Asset
            const filteredMasters = (windowPayload.masterContracts || []).filter(m =>
                String(m["Asset Name"]).trim().toLowerCase() === String(selectedAssetName).trim().toLowerCase()
            );

            if (filteredMasters.length === 0) {
                container.innerHTML = `<div class="text-center p-4 text-[10px] text-rose-400 font-bold border border-rose-100 bg-rose-50 rounded-xl">⚠️ No Master Agreements linked to this Asset</div>`;
                if (hiddenInput) hiddenInput.value = "";
                return;
            }

            // Associa i singoli contratti di dettaglio al rispettivo Master
            filteredMasters.forEach(m => {
                m.childContracts = allContracts.filter(c => c["Master Contract ID"] === m["Master Contract ID"]);
                // Ordina i contratti figli per data di scadenza (decrescente)
                m.childContracts.sort((a, b) => {
                    const timeA = a["End Date"] ? new Date(a["End Date"]).getTime() : 0;
                    const timeB = b["End Date"] ? new Date(b["End Date"]).getTime() : 0;
                    return timeB - timeA;
                });
            });

            // Ordinamento dei Master: Quello selezionato in cima, poi per data scadenza
            filteredMasters.sort((a, b) => {
                if (preSelectedMasterId) {
                    if (a["Master Contract ID"] === preSelectedMasterId) return -1;
                    if (b["Master Contract ID"] === preSelectedMasterId) return 1;
                }
                const dateA = a["Master End Date"] ? new Date(a["Master End Date"]).getTime() : 0;
                const dateB = b["Master End Date"] ? new Date(b["Master End Date"]).getTime() : 0;
                return dateB - dateA;
            });

            // Passa i dati alla vista
            container.innerHTML = InitiativesTemplates.getMasterSmartCards(filteredMasters, preSelectedMasterId);

            if (hiddenInput && !preSelectedMasterId) hiddenInput.value = "";
        },

        selectMasterCard: function (masterId) {
            const hiddenInput = document.getElementById('modal-init-selected-master-id');
            if (!hiddenInput) return;
            hiddenInput.value = masterId;

            // 1. Reset visivo di tutte le altre card
            document.querySelectorAll('.master-card').forEach(card => {
                card.classList.remove('border-teal-500', 'bg-teal-50/20', 'ring-1', 'ring-teal-500', 'shadow-sm');
                card.classList.add('border-slate-200', 'bg-white', 'hover:border-teal-300');
            });
            document.querySelectorAll('[id^="master-check-"]').forEach(icon => {
                icon.innerHTML = `<div class="w-4 h-4 rounded-full border-2 border-slate-300 shrink-0"></div>`;
            });

            // 2. Nasconde i dettagli di tutti gli altri master aperti per compattare la vista
            document.querySelectorAll('[id^="master-details-"]').forEach(detailBox => {
                detailBox.classList.add('hidden');
            });

            // 3. Attiva lo stato selezionato ed espande la tabella dei contratti
            const selectedCard = document.getElementById(`master-card-${masterId}`);
            const selectedIcon = document.getElementById(`master-check-${masterId}`);
            const selectedDetails = document.getElementById(`master-details-${masterId}`);

            if (selectedCard && selectedIcon) {
                selectedCard.classList.remove('border-slate-200', 'bg-white', 'hover:border-teal-300');
                selectedCard.classList.add('border-teal-500', 'bg-teal-50/20', 'ring-1', 'ring-teal-500', 'shadow-sm');
                selectedIcon.innerHTML = `<svg class="w-4 h-4 text-teal-600 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`;

                if (selectedDetails) {
                    selectedDetails.classList.remove('hidden');
                }
            }
        },

        // PROCEDURA DI SELEZIONE DELLA SMART CARD MASTER
        selectMasterCard: function (masterId) {
            const hiddenInput = document.getElementById('modal-init-selected-master-id');
            if (!hiddenInput) return;
            hiddenInput.value = masterId;

            document.querySelectorAll('.master-card').forEach(card => {
                card.classList.remove('border-teal-500', 'bg-teal-50/20', 'ring-1', 'ring-teal-500', 'shadow-sm');
                card.classList.add('border-slate-200', 'bg-white', 'hover:border-teal-300');
            });
            document.querySelectorAll('[id^="master-check-"]').forEach(icon => {
                icon.innerHTML = `<div class="w-4 h-4 rounded-full border-2 border-slate-300 shrink-0"></div>`;
            });

            const selectedCard = document.getElementById(`master-card-${masterId}`);
            const selectedIcon = document.getElementById(`master-check-${masterId}`);

            if (selectedCard && selectedIcon) {
                selectedCard.classList.remove('border-slate-200', 'bg-white', 'hover:border-teal-300');
                selectedCard.classList.add('border-teal-500', 'bg-teal-50/20', 'ring-1', 'ring-teal-500', 'shadow-sm');
                selectedIcon.innerHTML = `<svg class="w-4 h-4 text-teal-600 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`;
            }
        },

        // PROCEDURA DI SELEZIONE DELLA SMART CARD CON TOGGLE ACCORDION AUTOMATICO
        selectGroup: function (groupId) {
            const hiddenInput = document.getElementById('modal-init-selected-group-id');
            if (!hiddenInput) return;

            hiddenInput.value = groupId;

            // 1. Reset visivo di tutte le altre card della lista
            document.querySelectorAll('.group-card').forEach(card => {
                card.classList.remove('border-teal-500', 'bg-teal-50/20', 'ring-1', 'ring-teal-500', 'shadow-sm');
                card.classList.add('border-slate-200', 'bg-white', 'hover:border-teal-300');
            });
            document.querySelectorAll('[id^="group-check-"]').forEach(icon => {
                icon.innerHTML = `<div class="w-4 h-4 rounded-full border-2 border-slate-300 shrink-0"></div>`;
            });

            // 2. Nasconde i dettagli di tutti gli altri gruppi aperti per compattare la vista
            document.querySelectorAll('[id^="group-details-"]').forEach(detailBox => {
                detailBox.classList.add('hidden');
            });

            // 3. Attiva lo stato selezionato ed espande la tabella dei contratti del gruppo cliccato
            const selectedCard = document.getElementById(`group-card-${groupId}`);
            const selectedIcon = document.getElementById(`group-check-${groupId}`);
            const selectedDetails = document.getElementById(`group-details-${groupId}`);

            if (selectedCard && selectedIcon && selectedDetails) {
                selectedCard.classList.remove('border-slate-200', 'bg-white', 'hover:border-teal-300');
                selectedCard.classList.add('border-teal-500', 'bg-teal-50/20', 'ring-1', 'ring-teal-500', 'shadow-sm');
                selectedIcon.innerHTML = `<svg class="w-4 h-4 text-teal-600 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`;

                // Espansione automatica istantanea
                selectedDetails.classList.remove('hidden');
            }
        },

        handleDecisionChange: function (val) {
            const costInput = document.getElementById('modal-init-target-cost');
            if (!costInput) return;
            const decision = (val || "").toUpperCase().trim();

            if (["TERMINATE", "REPLACE", "TRANSFER"].includes(decision)) {
                costInput.value = "0";
                costInput.disabled = true;
                costInput.classList.add('bg-slate-100', 'text-slate-400', 'cursor-not-allowed');
                costInput.classList.remove('text-indigo-800');
            } else {
                costInput.disabled = false;
                costInput.classList.remove('bg-slate-100', 'text-slate-400', 'cursor-not-allowed');
                costInput.classList.add('text-indigo-800');
            }
        },

        closeInitiativeModalWindow: function () {
            const mountPoint = document.getElementById('initiatives-modal-mount-point');
            mountPoint.classList.remove('flex');
            mountPoint.classList.add('hidden');
            mountPoint.innerHTML = '';
        },

        rebuildModalTagsBadgesContainer: function () {
            const wrapper = document.getElementById('modal-init-tags-wrapper');
            if (!wrapper) return;
            wrapper.innerHTML = this.currentLocalTagsArray.map((t, idx) => `
            <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-teal-50 border border-teal-200 text-teal-700 rounded-md text-[9px] font-black uppercase tracking-wider shadow-3xs">
                ${t}
                <button type="button" onclick="InitiativesController.removeTagFromLocalInstance(${idx})" class="hover:text-rose-600 font-bold ml-0.5 text-[10px]">×</button>
            </span>
        `).join('');
        },

        removeTagFromLocalInstance: function (idx) {
            this.currentLocalTagsArray.splice(idx, 1);
            this.rebuildModalTagsBadgesContainer();
            this.renderAvailableTagsInModal();
        },

        openInitiativeModalForm: function (id) {
            const isNew = id === null;
            InitiativesState.currentEditingInitiative = id;

            let initData = { "Initiative Name": "", "Initiative Status": "IDEA", "Initial Strategy": "OPTIMIZATION", "Decision": "OPTIMIZATION", "Tags": "", "Optimization Levers": "", "Target Cost (Annualized)": 0, "Description": "", "Service Owner": "", "Procurement Point Focal": "", "Contracts Group ID": "" };

            if (!isNew) {
                initData = InitiativesState.getInitiativeById(id);
            }

            const assetsList = ContractsUtils.extractUniqueField(windowPayload.assets, "Asset Name");
            const assetDropdownHtml = assetsList.map(a => `<option value="${a}" ${a === initData["Asset Name"] ? 'selected' : ''}>${a}</option>`).join('');

            const attachedLevers = (initData["Optimization Levers"] || "").split(',').map(l => l.trim());
            const leversHtml = InitiativesState.optimizationLevers.map(lever => `
            <label class="flex items-center gap-2 px-1 py-0.5 hover:bg-slate-100 rounded cursor-pointer font-bold text-slate-700">
                <input type="checkbox" value="${lever}" ${attachedLevers.includes(lever) ? 'checked' : ''} class="split-lever-checkbox w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600">
                <span class="truncate">${lever}</span>
            </label>
        `).join('');

            const mountPoint = document.getElementById('initiatives-modal-mount-point');
            mountPoint.innerHTML = InitiativesTemplates.getModalFormStructure(isNew, assetDropdownHtml, "", leversHtml);

            if (!isNew) {
                document.getElementById('modal-init-name').value = initData["Initiative Name"] || "";

                const readStrategy = (initData["Initial Strategy"] || initData["Strategy"] || "OPTIMIZATION").toUpperCase().trim();
                const readDecision = (initData["Decision"] || readStrategy).toUpperCase().trim();
                document.getElementById('modal-init-strategy').value = readStrategy;
                document.getElementById('modal-init-decision').value = readDecision;
                document.getElementById('modal-init-status').value = (initData["Initiative Status"] || "IDEA").toUpperCase().trim();

                // Centralizzazione date: estrae la stringa ISO pulita YYYY-MM-DD per il tag input html
                document.getElementById('modal-init-target-date').value = FinOpsDate.toIso(initData["Target Date"]);

                document.getElementById('modal-init-target-cost').value = initData["Target Cost (Annualized)"] ? Math.round(initData["Target Cost (Annualized)"]).toLocaleString('it-IT') : "0";
                this.handleDecisionChange(readDecision);

                document.getElementById('modal-init-owner').value = initData["Service Owner"] || "";
                document.getElementById('modal-init-procurement').value = initData["Procurement Point Focal"] || initData["Procurement Point"] || "";
                document.getElementById('modal-init-description').value = initData["Description"] || "";

                if (initData["Asset Name"]) {
                    this.handleAssetCascadeDropdownChange(initData["Asset Name"], initData["Master Contract ID"]);
                    const hInput = document.getElementById('modal-init-selected-master-id');
                    if (hInput) hInput.value = initData["Master Contract ID"] || "";
                    
                    if (initData["Master Contract ID"]) {
                        setTimeout(() => { this.selectMasterCard(initData["Master Contract ID"]); }, 50);
                    }
                }
            }

            mountPoint.classList.remove('hidden');
            mountPoint.classList.add('flex');
            mountPoint.querySelector('.bg-white').setAttribute('onclick', 'event.stopPropagation()');
        },

        commitInitiativeFormToLocalState: function () {
            const initName = document.getElementById('modal-init-name').value.trim();
            const assetName = document.getElementById('modal-init-asset-select').value;
            const masterId = document.getElementById('modal-init-selected-master-id').value; 
            const tDate = document.getElementById('modal-init-target-date').value;
            const tCostInput = document.getElementById('modal-init-target-cost');
            const tCostStr = tCostInput ? tCostInput.value.replace(/\./g, '').trim() : "0";

            if (!initName || !assetName || !masterId || !tDate || tCostStr === "") {
                // Sostituito con il nostro nuovo Alert Centralizzato
                FinOpsUI.showAlert("Validation Error", "Initiative Name, Asset Context, Linked Master ID, Target Date and Target Cost fields are strictly mandatory.");
                return;
            }

            const activeId = InitiativesState.currentEditingInitiative;
            let instance = activeId !== null ? InitiativesState.getInitiativeById(activeId) : {};

            instance["Initiative Name"] = initName;
            instance["Asset Name"] = assetName;
            instance["Master Contract ID"] = masterId;

            const targetMaster = (windowPayload.masterContracts || []).find(m => m["Master Contract ID"] === masterId);

            if (targetMaster) {
                instance["Supplier"] = targetMaster["Supplier"] || "";
                instance["Contract Term (Months)"] = targetMaster["Contract Term (Months)"] || "";
                instance["Baseline Spend (Annualized)"] = parseFloat(targetMaster["Run Rate"]) || 0;
                instance["Last Expiration"] = targetMaster["Master End Date"] ? FinOpsDate.toIso(targetMaster["Master End Date"]) : "";
            }

            const savedStrategy = document.getElementById('modal-init-strategy').value;
            instance["Initial Strategy"] = savedStrategy;
            instance["Decision"] = document.getElementById('modal-init-decision').value;

            instance["Initiative Status"] = document.getElementById('modal-init-status').value;
            // Normalizzazione in scrittura
            instance["Target Date"] = FinOpsDate.toIso(tDate);
            instance["Target Cost (Annualized)"] = parseInt(tCostStr, 10) || 0;
            instance["Service Owner"] = document.getElementById('modal-init-owner').value.trim();
            instance["Procurement Point Focal"] = document.getElementById('modal-init-procurement').value.trim();
            instance["Procurement Point"] = document.getElementById('modal-init-procurement').value.trim();
            instance["Description"] = document.getElementById('modal-init-description').value.trim();

            const checkedLevers = Array.from(document.querySelectorAll('.split-lever-checkbox:checked')).map(cb => cb.value);
            instance["Optimization Levers"] = checkedLevers.join(', ');

            if (instance["Initiative Status"] === "COMPLETED") {
                instance["Actual Date"] = instance["Target Date"];
            } else {
                instance["Actual Date"] = "";
            }

            InitiativesState.saveInitiativeInstance(activeId, instance);
            InitiativesState.rawInitiatives = InitiativesState.recalculateMetrics(InitiativesState.rawInitiatives, windowPayload.contracts || []);

            this.closeInitiativeModalWindow();
            this.renderKanbanBoard(false);
            FinOpsUI.showNotificationBanner("Initiative changes applied locally in memory cache. Commit to persist changes.", "warning");
        },

        deleteInitiativeFromArchitecture: function () {
            // Sostituito con il nostro nuovo Confirm Centralizzato
            FinOpsUI.showConfirm(
                "Delete Initiative?", 
                "Are you entirely sure you want to completely erase this initiative from the FinOps registry? This action cannot be undone once committed.",
                () => {
                    InitiativesState.deleteInitiativeInstance(InitiativesState.currentEditingInitiative);
                    this.closeInitiativeModalWindow();
                    this.renderKanbanBoard(false);
                    FinOpsUI.showNotificationBanner("Initiative purged from memory. Commit to propagate deletion.", "warning");
                }
            );
        },

        pushKanbanArchitectureToGoogleSheets: function () {
            showLoading();
            InitiativesAPI.syncInitiativesToGoogleSheets(
                InitiativesState.rawInitiatives,
                (res) => {
                    hideLoading();
                    if (res === "SUCCESS") {
                        FinOpsUI.showNotificationBanner("Kanban architecture written and versioned successfully on DB layer.", "success");
                        fetchLiveData();
                    } else {
                        FinOpsUI.showAlert("Sync Error", "The database pipeline returned a mismatch code. Changes might not be saved.");
                    }
                },
                (err) => { 
                    hideLoading(); 
                    FinOpsUI.showAlert("Cloud Sync Failed", err.message); 
                }
            );
        },

        // --- MOTORE DRAG & DROP FLUIDO E BLINDATO ---
        currentDragType: null,

        handleCardDragStart: function (event, id) {
            this.currentDragType = 'CARD';
            event.dataTransfer.setData('text/plain', JSON.stringify({ type: 'CARD', id: id }));
            event.dataTransfer.effectAllowed = 'move';

            // Pulisce la UI per evitare glitch
            document.querySelectorAll('[id^="group-details-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.group-hover\\:opacity-100').forEach(el => el.classList.remove('group-hover:opacity-100'));
        },

        handleTagDragStart: function (event, tag, sourceCardId = null) {
            event.stopPropagation();
            this.currentDragType = 'TAG';
            event.dataTransfer.setData('text/plain', JSON.stringify({ type: 'TAG', tag: tag, sourceCardId: sourceCardId }));
            event.dataTransfer.effectAllowed = 'copyMove';

            // Disattiva i pointer-events sui figli interni di tutte le card per evitare lag e sfarfallii
            document.body.classList.add('dragging-tag-active');

            // Il tuo Drag Ghost personalizzato (senza modifiche)
            const ghost = document.createElement('div');
            ghost.id = 'drag-ghost-' + tag;
            ghost.className = 'px-3 py-1 bg-teal-600 text-white font-black text-[10px] uppercase tracking-wider rounded-full fixed -top-20 left-0 z-[9999]';
            ghost.innerHTML = '#' + tag;
            document.body.appendChild(ghost);
            event.dataTransfer.setDragImage(ghost, 15, 10);

            setTimeout(() => {
                const el = document.getElementById('drag-ghost-' + tag);
                if (el) el.remove();
            }, 10);
        },

        // EVENTO CHIAVE CHE AZZERA IL LAG: Continua a spegnere le altre colonne e accende solo quella corrente
        handleColumnDragOver: function (event, element) {
            event.preventDefault();

            if (this.currentDragType === 'CARD') {
                // Anti-Lag: Modifica il DOM solo se la classe non è già presente
                if (!element.classList.contains('bg-slate-200/80')) {
                    document.querySelectorAll('.kanban-lane-container').forEach(col => {
                        if (col !== element) col.classList.remove('bg-slate-200/80', 'border-teal-500/50', 'ring-2', 'ring-teal-500/20');
                    });
                    element.classList.add('bg-slate-200/80', 'border-teal-500/50', 'ring-2', 'ring-teal-500/20');
                }
            }
        },

        handleCardDragOver: function (event, element) {
            event.preventDefault();

            if (this.currentDragType === 'TAG') {
                // Impedisce ai figli interni (testo, numeri) di attivare eventi e far sfarfallare la card
                if (event.target !== element && !element.contains(event.target)) return;

                const overlay = element.querySelector('[id^="drop-overlay-"]');
                if (overlay && !overlay.classList.contains('opacity-100')) {
                    overlay.classList.remove('opacity-0');
                    overlay.classList.add('opacity-100');
                }

                const tagsContainer = element.querySelector('.absolute.top-full');
                if (tagsContainer && !tagsContainer.classList.contains('opacity-100')) {
                    tagsContainer.classList.remove('opacity-0', 'pointer-events-none');
                    tagsContainer.classList.add('opacity-100', 'pointer-events-auto');
                }
            }
        },

        handleCardDragLeave: function (event, element) {
            if (this.currentDragType === 'TAG') {
                // TRUCCO CRITICO: Se il mouse si sta solo spostando su un testo interno alla card, NON spegnere nulla!
                const nextElement = event.relatedTarget;
                if (element.contains(nextElement)) return;

                const overlay = element.querySelector('[id^="drop-overlay-"]');
                if (overlay) {
                    overlay.classList.remove('opacity-100');
                    overlay.classList.add('opacity-0');
                }

                const tagsContainer = element.querySelector('.absolute.top-full');
                if (tagsContainer) {
                    tagsContainer.classList.remove('opacity-100', 'pointer-events-auto');
                    tagsContainer.classList.add('opacity-0', 'pointer-events-none');
                }
            }
        },

        // EVENTO DI PULIZIA GLOBALE: Alla fine del Drag, spegne l'illuminazione di TUTTO. Niente più dragleave rotti.
        handleDragEnd: function (event) {
            this.currentDragType = null;
            // Rimuove il blocco dei pointer events
            document.body.classList.remove('dragging-tag-active');

            document.querySelectorAll('.kanban-lane-container').forEach(col => {
                col.classList.remove('bg-slate-200/80', 'border-teal-500/50', 'ring-2', 'ring-teal-500/20');
            });
            document.querySelectorAll('[id^="drop-overlay-"]').forEach(el => {
                el.classList.remove('opacity-100');
                el.classList.add('opacity-0');
            });
        },

        handleColumnDrop: function (event, targetColumn, element) {
            event.preventDefault();
            this.handleDragEnd(); // Spegne immediatamente le colonne

            const rawData = event.dataTransfer.getData('text/plain');
            if (!rawData) return;

            try {
                const data = JSON.parse(rawData);
                if (data.type === 'CARD') {
                    this.processCardMove(data, targetColumn);
                } else if (data.type === 'TAG') {
                    this.removeTagFromSource(data.tag, data.sourceCardId);
                }
            } catch (e) { }
        },

        handleCardDrop: function (event, id, element) {
            event.preventDefault();
            event.stopPropagation();
            this.handleDragEnd(); // Spegne i filtri grafici globali

            const rawData = event.dataTransfer.getData('text/plain');
            if (!rawData) return;

            try {
                const data = JSON.parse(rawData);

                if (data.type === 'CARD') {
                    const targetColumnDiv = element.closest('.kanban-lane-container');
                    if (targetColumnDiv) {
                        const lane = targetColumnDiv.querySelector('[id^="kanban-target-lane-"]');
                        if (lane) {
                            const colKey = lane.id.replace('kanban-target-lane-', '');
                            this.processCardMove(data, colKey);
                        }
                    }
                    return;
                }

                if (data.type === 'TAG') {
                    if (data.sourceCardId === id) return;

                    const init = InitiativesState.rawInitiatives[id];
                    if (init) {
                        let currentTags = (init["Tags"] || "").split(',').map(t => t.trim()).filter(t => t);
                        if (!currentTags.includes(data.tag)) {
                            currentTags.push(data.tag);
                            init["Tags"] = currentTags.join(', ');

                            if (data.sourceCardId !== null && data.sourceCardId !== undefined) {
                                const oldInit = InitiativesState.rawInitiatives[data.sourceCardId];
                                if (oldInit) {
                                    oldInit["Tags"] = (oldInit["Tags"] || "").split(',').map(t => t.trim()).filter(t => t !== data.tag).join(', ');
                                }
                            }

                            // Renderizza e aggiorna la board
                            this.renderKanbanBoard(false);
                            this.renderGlobalTagsFilterSelectionRow();

                            // Recupera la card appena renderizzata per non perdere il focus visivo dell'utente
                            const newCardEl = document.getElementById('ops-card-parent-' + id);
                            if (newCardEl) {
                                const container = newCardEl.querySelector('.absolute.top-full');
                                if (container) {
                                    container.classList.remove('opacity-0', 'pointer-events-none');
                                    container.classList.add('opacity-100', 'pointer-events-auto');
                                }
                            }
                        }
                    }
                }
            } catch (e) { }
        },

        handleBoardDrop: function (event) {
            event.preventDefault();
            const rawData = event.dataTransfer.getData('text/plain');
            if (!rawData) return;

            try {
                const data = JSON.parse(rawData);
                if (data.type === 'TAG') this.removeTagFromSource(data.tag, data.sourceCardId);
            } catch (e) { }
            this.currentDragType = null;
        },

        processCardMove: function (data, targetColumn) {
            let newStatus = "";
            if (targetColumn === "PIPELINE") newStatus = "PLANNED";
            else if (targetColumn === "IN_PROGRESS") newStatus = "IN PROGRESS";
            else if (targetColumn === "REALIZED") newStatus = "COMPLETED";

            const initiative = InitiativesState.updateInitiativeStatus(data.id, newStatus);
            if (initiative) {
                if (newStatus === "COMPLETED") initiative["Actual Date"] = initiative["Target Date"] || new Date().toISOString().split('T')[0];
                else initiative["Actual Date"] = "";

                InitiativesState.rawInitiatives = InitiativesState.recalculateMetrics(InitiativesState.rawInitiatives, windowPayload.contracts || []);
                this.renderKanbanBoard(false);
                ContractsUtils.showMgmtBannerStatus(`Status shifted to ${newStatus}. Push changes to commit.`, "success");
            }
        },

        removeTagFromSource: function (tag, sourceCardId) {
            if (sourceCardId !== null && sourceCardId !== undefined) {
                const init = InitiativesState.rawInitiatives[sourceCardId];
                if (init) {
                    let currentTags = (init["Tags"] || "").split(',').map(t => t.trim()).filter(t => t);
                    currentTags = currentTags.filter(t => t !== tag);
                    init["Tags"] = currentTags.join(', ');
                    this.renderKanbanBoard(false);
                    this.renderGlobalTagsFilterSelectionRow();
                }
            }
        },

        // --- GESTIONE LIBRERIA TAG IN ALTO ---

        // --- GESTIONE LIBRERIA TAG IN ALTO ---

        handleGlobalNewTagCreation: function (event) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                event.preventDefault();
                event.stopPropagation();

                const input = document.getElementById('global-new-tag-input');
                if (!input) return;

                const newTag = input.value.trim().toUpperCase();

                if (newTag) {
                    if (!this.globalCustomTags) {
                        this.globalCustomTags = [];
                    }

                    if (!this.globalCustomTags.includes(newTag)) {
                        this.globalCustomTags.push(newTag);
                    }

                    input.value = '';
                    this.renderGlobalTagsFilterSelectionRow();

                    setTimeout(() => {
                        const newInput = document.getElementById('global-new-tag-input');
                        if (newInput) newInput.focus();
                    }, 20);
                }
            }
        },

        renderGlobalTagsFilterSelectionRow: function () {
            const lane = document.getElementById('initiatives-global-tags-filter-lane');
            if (!lane) return;

            const totalTagSet = new Set();
            const usedTagsSet = new Set();

            if (InitiativesState.rawInitiatives) {
                Object.values(InitiativesState.rawInitiatives).forEach(init => {
                    const tagsStr = init["Tags"] || init["tags"] || "";
                    tagsStr.split(',').forEach(t => {
                        const cleaned = t.trim().toUpperCase();
                        if (cleaned) {
                            totalTagSet.add(cleaned);
                            usedTagsSet.add(cleaned);
                        }
                    });
                });
            }

            if (this.globalCustomTags) {
                this.globalCustomTags.forEach(t => totalTagSet.add(t));
            }

            const allTags = Array.from(totalTagSet).sort();

            // Delegate presentation exclusively to the view layer
            lane.innerHTML = allTags.map(tag => {
                const isSelected = InitiativesState.selectedTagsFilter && InitiativesState.selectedTagsFilter.includes(tag);
                const isUsed = usedTagsSet.has(tag);

                return InitiativesTemplates.getGlobalFilterTagItem(tag, isSelected, isUsed);
            }).join('');
        },

        deleteGlobalTag: function (event, tag) {
            event.stopPropagation();
            this.globalCustomTags = this.globalCustomTags.filter(t => t !== tag);
            this.renderGlobalTagsFilterSelectionRow();
        },

        handleGlobalTagFilterToggle: function (tag) {
            InitiativesState.toggleTagFilter(tag);
            this.renderKanbanBoard(false);
            this.renderGlobalTagsFilterSelectionRow();
        },

        handleGlobalTagInputKeydown: function (event) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                event.preventDefault();
                event.stopPropagation();

                const input = document.getElementById('new-tag-input-field');
                if (!input) return;

                const tagValue = input.value.trim().toUpperCase();
                if (tagValue) {
                    // Sincronizzazione con le strutture dati reali del tuo js_initiatives_state.html
                    if (!InitiativesState.globalTags) {
                        InitiativesState.globalTags = [];
                    }

                    if (!InitiativesState.globalTags.includes(tagValue)) {
                        InitiativesState.globalTags.push(tagValue);
                    }

                    // Svuota il campo di testo
                    input.value = '';

                    // Rinfresca solo la riga dei tag richiamando la vista aggiornata
                    this.renderGlobalTagsFilterSelectionRow();

                    // Ripristina il focus immediato sul box
                    setTimeout(() => {
                        const rInp = document.getElementById('new-tag-input-field');
                        if (rInp) rInp.focus();
                    }, 20);
                }
            }
        },
    };

    document.addEventListener('click', function (e) {
        const pipelineDrop = document.getElementById('dropdown-pipeline');
        const realizedDrop = document.getElementById('dropdown-realized');
        if (pipelineDrop && !pipelineDrop.classList.contains('hidden') && !pipelineDrop.contains(e.target) && !e.target.closest('button')) {
            pipelineDrop.classList.add('hidden');
        }
        if (realizedDrop && !realizedDrop.classList.contains('hidden') && !realizedDrop.contains(e.target) && !e.target.closest('button')) {
            realizedDrop.classList.add('hidden');
        }
    });
</script>
