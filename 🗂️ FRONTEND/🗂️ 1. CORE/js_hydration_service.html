<script>
    /**
     * js_hydration_service.html
     * ENGINE: Just-In-Time (JIT) Hydration Service.
     * Cura l'inconsistenza temporale e ricalcola a freddo i valori finanziari (Crediti).
     */
    const HydrationEngine = {
        hydrateAllStatuses: function (payload) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // ⚡ PROFILING: Mappa di supporto O(1) per trovare al volo l'Asset ID dal Master
            const masterToAssetMap = new Map();
            (payload.masterContracts || []).forEach(m => {
                if (m.masterId) {
                    masterToAssetMap.set(String(m.masterId).trim(), String(m.assetId || "").trim());
                }
            });

            // 1. Contratti Locali: Svegliamo le classi di dominio e iniettiamo l'assetId mancante
            (payload.contracts || []).forEach(c => {
                const cid = c.contractId;
                const mId = String(c.masterId || "").trim();

                // ⚡ FIX: Ereditiamo l'assetId dal Master di riferimento se non è presente a livello flat
                if (!c.assetId || String(c.assetId).trim() === "") {
                    c.assetId = masterToAssetMap.get(mId) || "";
                }

                // Raccogliamo i movimenti del Ledger di questo contratto
                const cLedger = (payload.ledger || []).filter(l => String(l.contractId).trim() === String(cid).trim());

                // Istanziamo la classe di dominio pura e gli iniettiamo il Ledger
                const contractInstance = new Contract(c);
                cLedger.forEach(l => contractInstance.ledger.push(new LedgerMovement(l)));

                // Arricchiamo l'oggetto DTO con le proprietà calcolate (effectiveCommitment, effectiveRunRate, status)
                Object.assign(c, contractInstance.exportToData());
            });

            // 2. Master Contracts: Ricalcoliamo l'aggregazione dei totali Master basandoci sui figli idratati
            (payload.masterContracts || []).forEach(m => {
                const mId = m.masterId;
                const children = (payload.contracts || []).filter(c => c.masterId === mId);
                const inits = (payload.initiatives || []).filter(i => i.masterId === mId);

                // Istanziamo la classe MasterContract per ricalcolare i totali corretti con i crediti attivi
                const masterInstance = new MasterContract(m);
                children.forEach(c => {
                    const childContract = new Contract(c);
                    const cLedger = (payload.ledger || []).filter(l => String(l.contractId).trim() === String(c.contractId).trim());
                    cLedger.forEach(l => childContract.ledger.push(new LedgerMovement(l)));
                    masterInstance.addChild(childContract);
                });

                // Sovrascriviamo le proprietà calcolate del Master (totalCommitment, runRate, effectiveRunRate, status)
                Object.assign(m, masterInstance.exportToData(inits));
            });

            // 3. Asset (Macchina a Stati Finiti)
            payload.assets = (payload.assets || []).map(rawAsset => {
                const asset = new Asset(rawAsset);

                // FIX: Usiamo l'ID stringa per la join al posto del nome text-based
                const assetIdStr = String(asset.id).trim();

                const assetContracts = (payload.contracts || []).filter(c => String(c.assetId || "").trim() === assetIdStr);
                const assetInits = (payload.initiatives || []).filter(i => String(i.assetId || "").trim() === assetIdStr);

                asset.injectContext([], assetContracts, assetInits, []);
                return asset.exportToData();
            });

            return payload;
        }
    };
</script>
