<script>
    /**
     * js_contracts_controller.html
     * CONTROLLER: The orchestrator. Responds to user actions, updates the Model,
     * and re-renders the View by invoking Templates.
     */

    let isContractsLayoutRendered = false;

    // --- Tab Router Override ---
    const originalSwitchTab = switchTab;
    switchTab = function (tabId) {
        originalSwitchTab(tabId);
        if (tabId === 'tab-contracts') {
            if (!isContractsLayoutRendered) {
                document.getElementById('tab-contracts').innerHTML = ContractsTemplates.getBaseLayout();
                isContractsLayoutRendered = true;
            }

            document.getElementById('mgmt-asset-search-input').value = '';
            ContractsState.currentSelectedAsset = null;
            renderAssetSearchList();
        }
    };

    function toggleGlobalEditMode() {
        if (window.hasPendingChanges && ContractsState.globalEditMode) {
            FinOpsUI.showConfirm(
                "Modifiche in sospeso",
                "Hai delle modifiche non salvate. Se esci dalla modalità modifica, le perderai. Vuoi scartare le modifiche e uscire?",
                () => {
                    revertLocalChanges(); 
                }
            );
            return;
        }

        ContractsState.globalEditMode = !ContractsState.globalEditMode;
        if(typeof setEditModeActive !== 'undefined') setEditModeActive(ContractsState.globalEditMode);

        const editBtn = document.getElementById('contracts-edit-mode-btn');
        if (ContractsState.globalEditMode) {
            if (editBtn) {
                editBtn.className = "px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white font-black text-[11px] uppercase tracking-wider rounded-xl shadow-md transition-all flex items-center justify-center gap-1.5 cursor-pointer shrink-0 whitespace-nowrap";
                editBtn.innerHTML = `<svg class="w-3.5 h-3.5 text-white shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg> <span>Editing Mode</span>`;
            }
        } else {
            if (editBtn) {
                editBtn.className = "px-4 py-2 bg-white border border-slate-300 text-slate-700 font-black text-[11px] uppercase tracking-wider rounded-xl shadow-sm transition-all flex items-center justify-center gap-1.5 cursor-pointer hover:bg-slate-50 shrink-0 whitespace-nowrap";
                editBtn.innerHTML = `<svg class="w-3.5 h-3.5 text-slate-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.25 0 113.536 3.536L6.5 21.036H3v-3.536L16.5 3.536z" /></svg> <span>Edit Mode</span>`;
            }
        }

        const allMasterContracts = windowPayload.masterContracts || [];
        if (ContractsState.currentSelectedAsset) {
            const assetMasters = allMasterContracts.filter(m => (m["Asset Name"] || "").toString().toLowerCase().trim() === ContractsState.currentSelectedAsset.name.toLowerCase().trim());
            renderMasterContractsList(assetMasters);
        }

        if (ContractsState.currentMasterData) {
            renderMasterFormBox();
            renderDetailItemsTable();
        }
    }

    function updateCommitButtonVisibility() {
        // Disattivato: Il bottone locale è nascosto. Ora governa il semaforo globale della Navbar!
    }

    // --- Search & Selection ---
    function renderAssetSearchList() {
        const query = document.getElementById('mgmt-asset-search-input').value.toLowerCase().trim();
        const container = document.getElementById('mgmt-asset-results-list');
        if (!container) return;

        const allContracts = windowPayload.contracts || [];
        const allMasters = windowPayload.masterContracts || [];

        const matchedAssets = (windowPayload.assets || []).filter(a => {
            const assetName = (a["Asset Name"] || "").toLowerCase();
            const manufacturer = (a["Manufacturer"] || "").toLowerCase();
            if (assetName.includes(query) || manufacturer.includes(query)) return true;

            const matchInMaster = allMasters.some(m => (m["Asset Name"] || "").toLowerCase() === assetName && (m["Supplier"] || "").toLowerCase().includes(query));
            if (matchInMaster) return true;

            const matchInContract = allContracts.some(c => (c["Asset Name"] || "").toLowerCase() === assetName && (c["Supplier"] || "").toLowerCase().includes(query));
            return matchInContract;
        });

        if (matchedAssets.length === 0) {
            container.innerHTML = `<p class="text-slate-400 italic text-[11px] text-center py-2">No matching assets or suppliers in memory.</p>`;
            return;
        }

        container.innerHTML = matchedAssets.map(asset =>
            ContractsTemplates.getAssetSearchResult(asset["Asset Name"], asset["Asset ID"], asset["Manufacturer"])
        ).join('');
    }

    function selectAssetForManagement(assetName, assetId) {
        ContractsState.currentSelectedAsset = { name: assetName, id: assetId };
        ContractsState.updateMasterEditState(false);

        document.getElementById('mgmt-selected-asset-header').innerHTML = `
        <div class="bg-teal-50 border border-teal-200 rounded-xl p-3 flex justify-between items-center">
            <div>
                <span class="text-[8px] font-black text-teal-600 uppercase tracking-widest block">Active Target Asset</span>
                <span class="font-black text-slate-800 text-sm">${assetName}</span>
            </div>
            <span class="font-mono text-[10px] bg-white border border-teal-100 px-2 py-1 rounded-lg text-slate-600">ID: ${assetId}</span>
        </div>
        `;

        const allContracts = windowPayload.contracts || [];
        const filteredGroupIds = allContracts.filter(c => (c["Asset Name"] || "").toString().toLowerCase() === assetName.toLowerCase())
            .map(c => (c["Group ID"] || "").toString().trim())
            .filter(g => g !== "");
        ContractsState.currentAssetGroupIds = [...new Set(filteredGroupIds)].sort();

        document.getElementById('mgmt-master-form-container').classList.add('hidden');
        document.getElementById('mgmt-detailRowsContainer').innerHTML = '';

        const allMasterContracts = windowPayload.masterContracts || [];
        const assetMasters = allMasterContracts.filter(m => (m["Asset Name"] || "").toString().toLowerCase().trim() === assetName.toLowerCase().trim());

        renderMasterContractsList(assetMasters);
    }

    // --- Master Contract Flows ---
    function renderMasterContractsList(list) {
        const container = document.getElementById('mgmt-master-list-container');

        const newMasterBtn = ContractsState.globalEditMode
            ? `<button onclick="setupNewMasterAgreement()" class="text-[9px] font-black bg-teal-50 border border-teal-200 text-teal-700 px-2 py-1 rounded-md hover:bg-teal-100 shadow-sm transition-colors">+ New Master</button>`
            : ``;

        let html = `
        <div class="flex justify-between items-center mb-2">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Linked Master Agreements</span>
            ${newMasterBtn}
        </div>
        `;

        if (list.length === 0) {
            container.innerHTML = html + `<p class="text-slate-400 italic text-[11px] text-center py-4 bg-slate-50 border border-dashed border-slate-200 rounded-xl">No Master Agreements linked.</p>`;
            return;
        }

        list.sort((a, b) => {
            const dateA = a["Master End Date"] ? new Date(a["Master End Date"]).getTime() : 0;
            const dateB = b["Master End Date"] ? new Date(b["Master End Date"]).getTime() : 0;
            return dateB - dateA;
        });

        html += `<div class="space-y-2 max-h-64 overflow-y-auto pr-1">`;
        list.forEach(m => {
            const mId = m["Master Contract ID"];
            const supplier = m["Supplier"] || "No Supplier";
            const status = (m["Status"] || "ACTIVE").toUpperCase().trim();
            const totalCommitment = parseFloat(m["Total Commitment"]) || 0;

            let statusClass = "bg-slate-50 text-slate-500 border-slate-200";
            if (status === "ACTIVE") statusClass = "bg-emerald-50 text-emerald-700 border-emerald-200/50";
            if (status === "EXPIRED" || status === "TERMINATED") statusClass = "bg-rose-50 text-rose-600 border-rose-200/50";
            if (status === "IN NEGOTIATION") statusClass = "bg-amber-50 text-amber-700 border-amber-200/50";

            const isExpired = status === "EXPIRED" || status === "TERMINATED";
            html += ContractsTemplates.getMasterSidebarCard(mId, supplier, status, totalCommitment, isExpired, statusClass);
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    function loadFullMasterDetailArchitecture(masterId) {
        ContractsState.loadMasterDetails(
            masterId,
            windowPayload.masterContracts || [],
            windowPayload.contracts || [],
            windowPayload.allocationSplits || [],
            windowPayload.ledger || []
        );
        renderMasterFormBox();
        renderDetailItemsTable();
    }

    function setupNewMasterAgreement() {
        ContractsState.resetMaster();
        renderMasterFormBox();
        renderDetailItemsTable();
    }

    function renderMasterFormBox() {
        const masterContainer = document.getElementById('mgmt-master-form-container');
        if (!masterContainer) return;
        masterContainer.classList.remove('hidden');

        const container = document.getElementById('mgmt-master-form-box-inner');
        if (!container) return;

        const data = ContractsState.currentMasterData;
        const isEditable = ContractsState.isMasterEditable;
        const masterLinks = (data["Contract Links"] || "").toString().replace(/undefined|null/g, "").split(',').map(s => s.trim()).filter(s => s);

        if (!isEditable) {
            const status = (data["Status"] || "ACTIVE").toUpperCase().trim();
            const cleanStart = data["Master Start Date"] ? ContractsUtils.formatToEnglishCustomDate(data["Master Start Date"]) : '—';
            const cleanEnd = data["Master End Date"] ? ContractsUtils.formatToEnglishCustomDate(data["Master End Date"]) : '—';

            let rawTerm = data["contractTerm"] !== undefined ? data["contractTerm"] : (data["Contract Term (Months)"] !== undefined ? data["Contract Term (Months)"] : '—');
            let termMonths = (typeof rawTerm === 'number' || !isNaN(parseFloat(rawTerm))) ? Math.round(parseFloat(rawTerm)) : rawTerm;

            let statusClass = "bg-slate-50 text-slate-500 border-slate-200";
            if (status === "ACTIVE") statusClass = "bg-emerald-50 text-emerald-700 border-emerald-200/50";
            if (status === "EXPIRED" || status === "TERMINATED") statusClass = "bg-rose-50 text-rose-600 border-rose-200/50";
            if (status === "IN NEGOTIATION") statusClass = "bg-amber-50 text-amber-700 border-amber-200/50";

            container.innerHTML = ContractsTemplates.getMasterReadOnly(data, masterLinks, cleanStart, cleanEnd, termMonths, status, statusClass, ContractsState.globalEditMode);
        } else {
            const suppliersList = ContractsUtils.extractUniqueField(windowPayload.masterContracts || windowPayload.contracts, "Supplier");
            const isNew = data["Master Contract ID"] === "";

            container.innerHTML = ContractsTemplates.getMasterEditCard(data, isNew, suppliersList, masterLinks, ContractsState.globalEditMode);
        }

        const targetLinks = container.querySelectorAll('.live-doc-link');
        if (targetLinks.length > 0) {
            const rawUrls = Array.from(targetLinks).map(el => el.getAttribute('data-raw'));
            const uniqueUrlsString = [...new Set(rawUrls)].join(',');
            ContractsAPI.resolveLiveDocumentNames(uniqueUrlsString, targetLinks);
        }

        updateCommitButtonVisibility();
    }

    function toggleMasterEditState(editable) {
        ContractsState.updateMasterEditState(editable);
        renderMasterFormBox();
    }

    function confirmMasterEditLocalChanges() {
        const data = ContractsState.currentMasterData;
        data["Supplier"] = document.getElementById('ins-masterSupplier').value;
        data["Scope"] = document.getElementById('ins-masterScope').value.trim();
        data["Comments"] = document.getElementById('ins-masterComments').value.trim();
        const baseLinks = document.getElementById('ins-masterDocumentLink').value.trim();

        const fileInput = document.getElementById('upload-files');
        const hasFiles = fileInput && fileInput.files.length > 0;

        if (hasFiles) {
            showLoading();
            let filesData = [];
            let filesProcessed = 0;
            const supplier = data["Supplier"] || "Unknown_Supplier";
            const assetName = ContractsState.currentSelectedAsset.name || "Unknown_Asset";
            let dateStr = data["Master Start Date"];
            let year = dateStr ? dateStr.split('-')[0] : new Date().getFullYear().toString();

            Array.from(fileInput.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function (e) {
                    filesData.push({ filename: file.name, mimeType: file.type, base64: e.target.result.split(',')[1] });
                    filesProcessed++;
                    if (filesProcessed === fileInput.files.length) {
                        ContractsAPI.uploadDocuments(filesData, year, supplier, assetName,
                            (urls) => {
                                let currentLinks = baseLinks ? baseLinks.split(',').map(s => s.trim()).filter(s => s) : [];
                                urls.forEach(u => { if (!currentLinks.includes(u)) currentLinks.push(u); });
                                data["Contract Links"] = currentLinks.join(', ');
                                hideLoading();
                                ContractsState.updateMasterEditState(false);
                                ContractsState.hasUnsavedChanges = true;
                                renderMasterFormBox();
                            },
                            (err) => { hideLoading(); alert("Upload Error: " + err.message); }
                        );
                    }
                };
                reader.readAsDataURL(file);
            });
        } else {
            data["Contract Links"] = baseLinks;
            ContractsState.updateMasterEditState(false);
            ContractsState.hasUnsavedChanges = true;
            renderMasterFormBox();
        }
    }

    // --- Details / Lines Flows ---
    // --- Details / Lines Flows ---
    function renderDetailItemsTable() {
        const container = document.getElementById('mgmt-detailRowsContainer');
        if (!container) return;

        const addBtn = document.getElementById('btn-add-contract-row');
        if (addBtn) addBtn.style.display = ContractsState.globalEditMode ? 'inline-block' : 'none';

        if (ContractsState.currentDetailItems.length === 0) {
            container.innerHTML = `
            <div class="col-span-full text-center py-8 border-2 border-dashed border-slate-100 rounded-2xl bg-slate-50/20">
                <p class="text-slate-400 text-xs italic">No allocation or ramping detail records found for this Master Agreement.</p>
            </div>`;
            updateCommitButtonVisibility();
            return;
        }

        // 🌟 FIX PUNTO 1 & 1a: Niente più div intermedi, costruiamo una singola stringa HTML pura
        let cardsHtml = '';

        ContractsState.currentDetailItems.forEach((item) => {
            const d = item.data;
            const docLinks = (d["Contract Links"] || d.contractLinks || "").toString().replace(/undefined|null/g, "").split(',').map(s => s.trim()).filter(s => s);

            const formatFinance = (val) => (val || 0).toLocaleString('it-IT', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

            const ledgerTotalSum = (item.ledger || []).reduce((acc, curr) => acc + (ContractsUtils.parseFinancialValue(curr["Amount"] || curr.amount)), 0);
            const rawCommitment = ContractsUtils.parseFinancialValue(d["Total Commitment"] || d.totalCommitment);
            const effCommitNum = ContractsUtils.parseFinancialValue(d["Effective Commitment"] || d.effectiveCommitment);
            const annValNum = ContractsUtils.parseFinancialValue(d["Annual Value"] || d.annualValue);

            const pricingModel = d["Pricing Model"] || d.pricingModel || "Flat";
            const billingTerms = d["Billing Terms"] || d.billingTerms || "Linear";

            let warningBadgeHTML = '';
            const tolerance = 100;

            if (billingTerms === "Ledger-Driven" && rawCommitment > 0) {
                const diff = ledgerTotalSum - rawCommitment;

                if (diff > tolerance) {
                    warningBadgeHTML = `<div class="flex items-center justify-end bg-rose-50 border border-rose-200 px-2 py-0.5 rounded shadow-sm animate-pulse shrink-0" title="Ledger sum exceeds Total Commitment"><span class="text-[8px] text-rose-500 uppercase font-black tracking-wider whitespace-nowrap mr-1">Overage:</span><span class="font-mono font-black text-rose-600 text-[10px] whitespace-nowrap">+€${formatFinance(diff)}</span></div>`;
                } else if (diff < -tolerance) {
                    const gap = Math.abs(diff);
                    if (["Minimum Consumption", "Capped Consumption"].includes(pricingModel)) {
                        warningBadgeHTML = `<div class="flex items-center justify-end bg-amber-50 border border-amber-200 px-2 py-0.5 rounded shadow-sm shrink-0" title="Missing forecasts to fulfill the contractual Commitment"><span class="text-[8px] text-amber-500 uppercase font-black tracking-wider whitespace-nowrap mr-1">Forecast Gap:</span><span class="font-mono font-black text-amber-600 text-[10px] whitespace-nowrap">-€${formatFinance(gap)}</span></div>`;
                    } else if (pricingModel === "Pure Consumption") {
                        warningBadgeHTML = `<div class="flex items-center justify-end bg-sky-50 border border-sky-200 px-2 py-0.5 rounded shadow-sm shrink-0" title="Current consumption is below the target estimate"><span class="text-[8px] text-sky-500 uppercase font-black tracking-wider whitespace-nowrap mr-1">Under Target:</span><span class="font-mono font-black text-sky-600 text-[10px] whitespace-nowrap">-€${formatFinance(gap)}</span></div>`;
                    } else {
                        warningBadgeHTML = `<div class="flex items-center justify-end bg-orange-50 border border-orange-200 px-2 py-0.5 rounded shadow-sm shrink-0" title="Logged installments do not cover the full fixed amount"><span class="text-[8px] text-orange-500 uppercase font-black tracking-wider whitespace-nowrap mr-1">Ledger Mismatch:</span><span class="font-mono font-black text-orange-600 text-[10px] whitespace-nowrap">-€${formatFinance(gap)}</span></div>`;
                    }
                }
            } else if (billingTerms !== "Ledger-Driven" && ["Minimum Consumption", "Capped Consumption", "Pure Consumption"].includes(pricingModel)) {
                if (ledgerTotalSum > tolerance) {
                    warningBadgeHTML = `<div class="flex items-center justify-end bg-rose-50 border border-rose-200 px-2 py-0.5 rounded shadow-sm animate-pulse shrink-0" title="Extra consumption logged on top of the fixed baseline"><span class="text-[8px] text-rose-500 uppercase font-black tracking-wider whitespace-nowrap mr-1">Overage Alert:</span><span class="font-mono font-black text-rose-600 text-[10px] whitespace-nowrap">+€${formatFinance(ledgerTotalSum)}</span></div>`;
                }
            }

            const effCommit = formatFinance(effCommitNum);
            const annVal = formatFinance(annValNum);
            const totCommit = formatFinance(rawCommitment);
            const cleanStart = (d["Start Date"] || d.startDate) ? ContractsUtils.formatToEnglishCustomDate(d["Start Date"] || d.startDate) : '—';
            const cleanEnd = (d["End Date"] || d.endDate) ? ContractsUtils.formatToEnglishCustomDate(d["End Date"] || d.endDate) : '—';
            const contractEnd = (d["Contract End Date"] || d.contractEndDate) ? ContractsUtils.formatToEnglishCustomDate(d["Contract End Date"] || d.contractEndDate) : '—';
            const adjEnd = (d["Adjusted End Date"] || d.adjustedEndDate) ? ContractsUtils.formatToEnglishCustomDate(d["Adjusted End Date"] || d.adjustedEndDate) : '—';

            // Delega pura al Template
            cardsHtml += ContractsTemplates.getDetailReadOnlyCard(item, warningBadgeHTML, effCommit, annVal, totCommit, cleanStart, cleanEnd, contractEnd, adjEnd, docLinks, ContractsState.globalEditMode);
        });

        // 🌟 Scrittura Dom singola massiva (Altissime performance)
        container.innerHTML = cardsHtml;

        const targetLinks = container.querySelectorAll('.live-doc-link');
        if (targetLinks.length > 0) {
            const rawUrls = Array.from(targetLinks).map(el => el.getAttribute('data-raw'));
            const uniqueUrlsString = [...new Set(rawUrls)].join(',');
            ContractsAPI.resolveLiveDocumentNames(uniqueUrlsString, targetLinks);
        }

        updateCommitButtonVisibility();
    }

    function cloneDetailRowItem(id) {
        if (ContractsState.cloneDetailRow(id)) {
            renderDetailItemsTable();
        }
    }

    // 🌟 FIX PUNTO 3: Assicuriamoci che il toggle ignori i click sui link o bottoni e ruoti la freccia
    function toggleCompactAccordion(id, event) {
        // Se si clicca un tasto, un link o un tooltip non aprire la card
        if (event && (event.target.tagName === 'BUTTON' || event.target.closest('button') || event.target.closest('span.tt-wrapper') || event.target.tagName === 'A')) return;

        const panel = document.getElementById(`compact-accordion-${id}`);
        const chevron = document.getElementById(`compact-chevron-${id}`);

        if (!panel) return;

        if (panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            if (chevron) chevron.style.transform = "rotate(90deg)";
        } else {
            panel.classList.add('hidden');
            if (chevron) chevron.style.transform = "rotate(0deg)";
        }
    }

    function toggleRowEditMode(id, editable) {
        ContractsState.setRowEditMode(id, editable);
        renderDetailItemsTable();
    }

    function saveRowLocalChanges(id) {
        const item = ContractsState.currentDetailItems.find(i => i.id === id);
        if (!item) return;

        const safeVal = (elementId) => document.getElementById(elementId) ? document.getElementById(elementId).value : "";
        item.data["Legal Entity"] = safeVal(`edit-legalEntity-${id}`);
        item.data["Location"] = safeVal(`edit-location-${id}`);
        item.data["Service Owner"] = safeVal(`edit-serviceOwner-${id}`).trim();
        item.data["Scope"] = safeVal(`edit-scope-${id}`).trim();
        item.data["Cost Recurrence"] = safeVal(`edit-costRecurrence-${id}`);
        item.data["Pricing Model"] = safeVal(`edit-pricingModel-${id}`);
        item.data["Billing Terms"] = safeVal(`edit-billingTerms-${id}`);
        item.data["Billing Frequency"] = safeVal(`edit-billingFrequency-${id}`);
        const cleanCommitmentStr = safeVal(`edit-totalCommitment-${id}`).replace(/\./g, '').trim();
        item.data["Total Commitment"] = parseInt(cleanCommitmentStr, 10) || 0;
        item.data["Expenditure Type"] = safeVal(`edit-expenditureType-${id}`);
        item.data["Cost Center"] = safeVal(`edit-costCenter-${id}`);
        item.data["Start Date"] = safeVal(`edit-startDate-${id}`);
        item.data["Contract End Date"] = safeVal(`edit-contractEndDate-${id}`);
        item.data["Adjusted End Date"] = safeVal(`edit-adjustedEndDate-${id}`);
        item.data["Notice Period (Days)"] = safeVal(`edit-noticePeriod-${id}`).trim();
        item.data["Auto-Renewal"] = safeVal(`edit-autoRenewal-${id}`);
        item.data["BL ID"] = safeVal(`edit-blId-${id}`).trim();
        item.data["Request Code"] = safeVal(`edit-requestCode-${id}`).trim();
        item.data["Comments"] = safeVal(`edit-comments-${id}`).trim();
        const baseLinks = safeVal(`edit-contractLinks-${id}`).trim();

        const splitRows = document.querySelectorAll(`#splits-container-${id} .split-row-item`);
        item.splits = Array.from(splitRows).map(row => {
            const rule = row.querySelector('.split-rule').value;
            const rawValStr = row.querySelector('.split-val').value.replace(/[^0-9]/g, '');
            const val = parseInt(rawValStr, 10) || 0;
            return {
                "Contract ID": item.data["Contract ID"] || "", "Target Legal Entity": row.querySelector('.split-le').value || "", "Target Cost Center": row.querySelector('.split-cc').value || "",
                "Allocation Rule": rule, "Percentage Share": rule === "Percentage" ? val : "", "Fixed Amount": rule === "Fixed Amount" ? val : "", "Units Assigned": rule === "Units" ? val : "",
                "Valid From": row.querySelector('.split-from').value || "", "Valid To": row.querySelector('.split-to').value || "", "Notes": row.querySelector('.split-notes').value || ""
            };
        });

        const ledgerRows = document.querySelectorAll(`#ledger-container-${id} .ledger-row-item`);
        let ledgerDateValidationError = false;

        item.ledger = Array.from(ledgerRows).map(row => {
            const sDate = row.querySelector('.ledger-start').value || "";
            const eDate = row.querySelector('.ledger-end').value || "";

            if (sDate && eDate && new Date(sDate) > new Date(eDate)) {
                ledgerDateValidationError = true;
            }

            const rawAmtStr = row.querySelector('.ledger-amount').value.replace(/[^0-9]/g, '');
            return {
                "Contract ID": item.data["Contract ID"] || "", "Start Date": sDate, "End Date": eDate,
                "Type": row.querySelector('.ledger-type').value || "ACTUAL", "Amount": parseInt(rawAmtStr, 10) || 0, "Notes": row.querySelector('.ledger-notes').value || ""
            };
        });

        if (item.data["Expenditure Type"] === "CAPEX" && (item.data["Billing Terms"] === "Linear" || item.data["Billing Terms"] === "Quarterly")) {
            FinOpsUI.showAlert("Governance Restriction", "Un asset registrato come CAPEX non può essere vincolato a scadenze temporali fisse (Linear/Quarterly). Seleziona 'Full Upfront' o 'Ledger-Driven'.");
            return;
        }

        if (ledgerDateValidationError) {
            FinOpsUI.showAlert("Validation Error", "Incongruenza nel Ledger: la Data di Inizio di un movimento non può essere successiva alla sua Data di Fine.");
            return;
        }

        try {
            ContractsUtils.validateContractData(item.data);
            showLoading();

            const fileInput = document.getElementById(`upload-files-${id}`);
            if (fileInput && fileInput.files.length > 0) {
                let filesData = [];
                let filesProcessed = 0;
                const supplierSelect = document.getElementById('ins-masterSupplier');
                const supplier = (supplierSelect ? supplierSelect.value : ContractsState.currentMasterData["Supplier"]) || "Unknown_Supplier";
                const assetName = ContractsState.currentSelectedAsset.name || "Unknown_Asset";
                let year = item.data["Start Date"] ? item.data["Start Date"].split('-')[0] : new Date().getFullYear().toString();

                Array.from(fileInput.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        filesData.push({ filename: file.name, mimeType: file.type, base64: e.target.result.split(',')[1] });
                        filesProcessed++;
                        if (filesProcessed === fileInput.files.length) {
                            ContractsAPI.uploadDocuments(filesData, year, supplier, assetName,
                                (urls) => {
                                    let currentLinks = baseLinks ? baseLinks.split(',').map(s => s.trim()).filter(s => s) : [];
                                    urls.forEach(u => { if (!currentLinks.includes(u)) currentLinks.push(u); });
                                    item.data["Contract Links"] = currentLinks.join(', ');
                                    finalizeRowSave(item, id);
                                },
                                (err) => { hideLoading(); FinOpsUI.showAlert("Upload Error", err.message); }
                            );
                        }
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                item.data["Contract Links"] = baseLinks;
                finalizeRowSave(item, id);
            }
        } catch (e) {
            FinOpsUI.showAlert("Validation Error", e.message);
        }
    }

    function finalizeRowSave(item, id) {
        hideLoading();
        
        // 1. CALCOLO LOCALE A LATENZA ZERO!
        item.data = ContractsUtils.calculateContractFinancials(item.data);
        item.isEditing = false;
        ContractsState.hasUnsavedChanges = true;

        // 2. ACCENDIAMO IL SEMAFORO GLOBALE NELLA NAVBAR!
        if (typeof setPendingChanges !== 'undefined') setPendingChanges(true);

        // 3. AGGIORNIAMO ISTANTANEAMENTE IL MASTER CONTRACT IN RAM!
        if (ContractsState.currentMasterData) {
            let newCommitment = 0;
            let newRunRate = 0;
            let minStart = null;
            let maxEnd = null;
            
            ContractsState.currentDetailItems.forEach(child => {
                newCommitment += parseFloat(child.data["Total Commitment"]) || 0;
                if (child.data["Cost Recurrence"] !== "One-Shot") {
                    newRunRate += parseFloat(child.data["Annual Value"]) || 0;
                }
                
                const s = child.data["Start Date"] ? new Date(child.data["Start Date"]) : null;
                const e = child.data["Adjusted End Date"] ? new Date(child.data["Adjusted End Date"]) : (child.data["Contract End Date"] ? new Date(child.data["Contract End Date"]) : null);
                
                if (s && !isNaN(s.getTime()) && (!minStart || s < minStart)) minStart = s;
                if (e && !isNaN(e.getTime()) && (!maxEnd || e > maxEnd)) maxEnd = e;
            });
            
            ContractsState.currentMasterData["Total Commitment"] = newCommitment;
            ContractsState.currentMasterData["Run Rate"] = newRunRate;
            ContractsState.currentMasterData["Master Start Date"] = minStart ? FinOpsDate.toIso(minStart) : "";
            ContractsState.currentMasterData["Master End Date"] = maxEnd ? FinOpsDate.toIso(maxEnd) : "";
        }

        // 4. Chiudiamo la modale e ridisegniamo tutto
        if (window.ContractsController && window.ContractsController.closeContractModalWindow) {
            window.ContractsController.closeContractModalWindow();
        }

        renderMasterFormBox(); 
        renderDetailItemsTable();
    }

    function addNewDetailRowItem() {
        ContractsState.addNewDetailRow();

        // 🌟 FIX: Invece di renderizzare una riga rotta, apri istantaneamente la Modale
        const latestItem = ContractsState.currentDetailItems[ContractsState.currentDetailItems.length - 1];
        ContractsController.openContractModalWindow(latestItem.id);
    }

    function removeRowFromLocalArchitecture(id) {
        ContractsState.removeDetailRow(id);
        renderDetailItemsTable();
    }

    function saveCurrentContract() {
        if (!ContractsState.currentSelectedAsset) return;

        const isEditingExistingMaster = ContractsState.isMasterEditable && ContractsState.currentMasterData["Master Contract ID"] !== "";
        const hasOpenEdits = isEditingExistingMaster || ContractsState.currentDetailItems.some(item => item.isEditing);
        if (hasOpenEdits) {
            FinOpsUI.showNotificationBanner("There are active forms still in edit mode. Please click 'Apply' or 'Confirm Master Changes' before performing the global push.", "warning");
            return;
        }

        if (ContractsState.isMasterEditable) {
            ContractsState.currentMasterData["Supplier"] = document.getElementById('ins-masterSupplier').value;
            ContractsState.currentMasterData["Scope"] = document.getElementById('ins-masterScope').value.trim();
            ContractsState.currentMasterData["Comments"] = document.getElementById('ins-masterComments').value.trim();
            if (document.getElementById('ins-previousMasterId')) {
                ContractsState.currentMasterData["Previous Master ID"] = document.getElementById('ins-previousMasterId').value.trim();
            }
        }

        const mId = ContractsState.currentMasterData["Master Contract ID"] || (document.getElementById('ins-masterId') ? document.getElementById('ins-masterId').value.trim() : "");
        const prevMId = ContractsState.currentMasterData["Previous Master ID"] || "";
        const spl = ContractsState.currentMasterData["Supplier"];

        const payload = {
            assetName: ContractsState.currentSelectedAsset.name,
            assetId: ContractsState.currentSelectedAsset.id,
            masterId: mId,
            previousMasterId: prevMId,
            supplier: spl,
            masterScope: ContractsState.currentMasterData["Scope"],
            masterComments: ContractsState.currentMasterData["Comments"],
            contractLinks: ContractsState.currentMasterData["Contract Links"],
            billingChannel: ContractsState.currentMasterData["Billing Channel"] || "",
            suppliers: (windowPayload.suppliers || []).filter(s => String(s["Supplier"]).trim().toLowerCase() === String(spl).trim().toLowerCase()),
            initiatives: mId && mId.trim() !== "" ? (windowPayload.initiatives || []).filter(i => String(i["Master Contract ID"]).trim().toLowerCase() === mId.trim().toLowerCase()) : [],
            details: ContractsState.currentDetailItems.map(item => {
                return {
                    contractId: item.data["Contract ID"] || "",
                    billingChannel: item.data["Billing Channel"] || "",
                    legalEntity: item.data["Legal Entity"] || "",
                    location: item.data["Location"] || "",
                    serviceOwner: item.data["Service Owner"] || "",
                    scope: item.data["Scope"] || "",
                    costRecurrence: item.data["Cost Recurrence"] || "",
                    pricingModel: item.data["Pricing Model"] || "",
                    billingTerms: item.data["Billing Terms"] || "",
                    billingFrequency: item.data["Billing Frequency"] || "",
                    totalCommitment: item.data["Total Commitment"] || 0,
                    expenditureType: item.data["Expenditure Type"] || "",
                    costCenter: item.data["Cost Center"] || "",
                    startDate: item.data["Start Date"] || "",
                    contractEndDate: item.data["Contract End Date"] || "",
                    adjustedEndDate: item.data["Adjusted End Date"] || "",
                    noticePeriod: item.data["Notice Period (Days)"] || "",
                    autoRenewal: item.data["Auto-Renewal"] || "",
                    blId: item.data["BL ID"] || "",
                    requestCode: item.data["Request Code"] || "",
                    comments: item.data["Comments"] || "",
                    contractLinks: item.data["Contract Links"] || "",
                    splits: item.splits || [],
                    ledger: item.ledger || []
                };
            })
        };

        if (!payload.supplier) {
            FinOpsUI.showNotificationBanner("Supplier selection at Master level is required.", "warning");
            return;
        }

        showLoading();

        ContractsAPI.syncArchitectureToBackend(payload,
            (res) => {
                hideLoading();
                if (res && res.status === "SUCCESS") {
                    FinOpsUI.showNotificationBanner("Architecture synchronized successfully.", "success");

                    // 1. Aggiorna la memoria globale con il Delta Payload
                    windowPayload.masterContracts = res.masterContracts || windowPayload.masterContracts;
                    windowPayload.contracts = res.contracts || windowPayload.contracts;
                    windowPayload.allocationSplits = res.allocationSplits || windowPayload.allocationSplits;
                    windowPayload.ledger = res.ledger || windowPayload.ledger;

                    // 2. Ricalcola le proiezioni In-Memory a latenza zero!
                    windowPayload.projections = ProjectionsEngine.calculateAll(
                        windowPayload.contracts,
                        windowPayload.initiatives,
                        windowPayload.masterContracts
                    );

                    // 3. Ricarica silenziosamente le altre dashboard senza F5
                    if (typeof DashboardState !== 'undefined') DashboardState.loadCachePayload(windowPayload);
                    if (typeof ProjectionsState !== 'undefined') ProjectionsState.loadPayload(windowPayload);
                    if (typeof initInventoryTab === 'function') initInventoryTab();

                    // Ricarica la vista contratti pulita
                    selectAssetForManagement(ContractsState.currentSelectedAsset.name, ContractsState.currentSelectedAsset.id);
                } else {
                    FinOpsUI.showNotificationBanner("Sync failed: unexpected execution outcome from server.", "error");
                }
            },
            (err) => {
                hideLoading();
                FinOpsUI.showNotificationBanner("Sync error: " + err.message, "error");
            }
        );
    }

    function addSplitRowToUI(detailId) {
        const container = document.getElementById(`splits-container-${detailId}`);
        if (!container) return;
        const emptyMsg = container.querySelector('.empty-split-msg');
        if (emptyMsg) emptyMsg.remove();

        const startDateInput = document.getElementById(`edit-startDate-${detailId}`);
        const endDateInput = document.getElementById(`edit-contractEndDate-${detailId}`);
        const defStart = startDateInput ? startDateInput.value : "";
        const defEnd = endDateInput ? endDateInput.value : "";

        const leOptions = ContractsUtils.extractUniqueField(windowPayload.legalEntities, "Legal Entity").map(le => '<option value="' + le + '">' + le + '</option>').join('');
        const ccOptions = ContractsUtils.extractUniqueField(windowPayload.costCenters, "Cost Center").map(cc => '<option value="' + cc + '">' + cc + '</option>').join('');

        container.insertAdjacentHTML('beforeend', ContractsTemplates.getSplitRow(detailId, {}, defStart, defEnd, leOptions, ccOptions));
    }

    function addLedgerRowToUI(detailId, mov = {}) {
        const container = document.getElementById(`ledger-container-${detailId}`);
        if (!container) return;

        const emptyMsg = container.querySelector('.empty-ledger-msg');
        if (emptyMsg) emptyMsg.remove();

        container.insertAdjacentHTML('beforeend', ContractsTemplates.getLedgerRow(detailId, mov));
    }

    function duplicateLedgerRowInUI(btnElement, detailId) {
        const row = btnElement.closest('.ledger-row-item');
        if (!row) return;

        const rawAmtStr = row.querySelector('.ledger-amount').value.replace(/[^0-9]/g, '');

        const currentMovementData = {
            "Start Date": row.querySelector('.ledger-start').value || "",
            "End Date": row.querySelector('.ledger-end').value || "",
            "Type": row.querySelector('.ledger-type').value || "ACTUAL",
            "Amount": parseInt(rawAmtStr, 10) || 0,
            "Notes": row.querySelector('.ledger-notes').value || ""
        };

        addLedgerRowToUI(detailId, currentMovementData);
    }

    function toggleLedgerVisibility(detailId) {
        const billingTermsSelect = document.getElementById(`edit-billingTerms-${detailId}`);
        const pricingModelSelect = document.getElementById(`edit-pricingModel-${detailId}`);
        const freqContainer = document.getElementById(`container-billingFreq-${detailId}`);
        const freqSelect = document.getElementById(`edit-billingFrequency-${detailId}`);

        const ledgerSection = document.getElementById(`ledger-section-container-${detailId}`);
        const autoForecastBtn = document.getElementById(`auto-forecast-btn-${detailId}`);

        if (billingTermsSelect && pricingModelSelect) {
            const terms = billingTermsSelect.value;
            const model = pricingModelSelect.value;
            const isLedgerDriven = terms === "Custom / Ledger Driven" || terms === "Ledger-Driven";
            const isConsumption = ["Pure Consumption", "Minimum Consumption", "Capped Consumption"].includes(model);

            // Mostra/Nascondi la Frequenza
            if (freqContainer && freqSelect) {
                if (terms === "Fixed Recurring" || terms === "Linear" || terms === "Quarterly") {
                    freqContainer.classList.remove('hidden');
                    if (!freqSelect.value) freqSelect.value = "Monthly"; // Default
                } else {
                    freqContainer.classList.add('hidden');
                    freqSelect.value = "";
                }
            }

            if (ledgerSection) {
                if (isLedgerDriven || isConsumption) ledgerSection.classList.remove('hidden');
                else ledgerSection.classList.add('hidden');
            }

            if (autoForecastBtn) {
                const canAutoForecast = (terms === "Pay-As-You-Go" || isLedgerDriven) && ["Minimum Consumption", "Capped Consumption"].includes(model);
                if (canAutoForecast) autoForecastBtn.classList.remove('hidden');
                else autoForecastBtn.classList.add('hidden');
            }
        }
    }

    function handleExpenditureTypeChange(detailId) {
        const expTypeSelect = document.getElementById(`edit-expenditureType-${detailId}`);
        const billingTermsSelect = document.getElementById(`edit-billingTerms-${detailId}`);
        if (!expTypeSelect || !billingTermsSelect) return;

        const isCapex = expTypeSelect.value === "CAPEX";

        Array.from(billingTermsSelect.options).forEach(opt => {
            if (isCapex && (opt.value === "Fixed Recurring" || opt.value === "Linear" || opt.value === "Quarterly")) {
                opt.disabled = true;
                if (opt.selected) {
                    billingTermsSelect.value = "Full Upfront / Prepaid";
                }
            } else {
                opt.disabled = false;
            }
        });
        toggleLedgerVisibility(detailId);
    }

    function triggerLedgerAutomationForContract(detailId) {
        const model = document.getElementById(`edit-pricingModel-${detailId}`).value;
        const terms = document.getElementById(`edit-billingTerms-${detailId}`).value;
        const startDate = document.getElementById(`edit-startDate-${detailId}`).value;
        const endDate = document.getElementById(`edit-contractEndDate-${detailId}`).value;
        const totCommit = document.getElementById(`edit-totalCommitment-${detailId}`).value.replace(/[^0-9]/g, '');

        if (!["Minimum Consumption", "Capped Consumption"].includes(model) || terms !== "Ledger-Driven") {
            FinOpsUI.showAlert("Governance Restriction", "Automation calculations apply exclusively to 'Minimum Consumption' or 'Capped Consumption' pricing models with 'Ledger-Driven' allocation terms.");
            return;
        }

        if (!startDate || !endDate || !totCommit) {
            FinOpsUI.showAlert("Missing Data", "Start Date, End Date, and Total Commitment must be compiled to generate the forecast.");
            return;
        }

        const contractData = {
            "Pricing Model": model,
            "Billing Terms": terms,
            "Start Date": startDate,
            "Contract End Date": endDate,
            "Total Commitment": parseInt(totCommit, 10) || 0
        };

        const ledgerRows = document.querySelectorAll(`#ledger-container-${detailId} .ledger-row-item`);
        const currentLedger = [];
        Array.from(ledgerRows).forEach(row => {
            const type = row.querySelector('.ledger-type').value;
            if (type === "ACTUAL" || type === "FORECAST") {
                const rawAmt = row.querySelector('.ledger-amount').value.replace(/[^0-9]/g, '');
                currentLedger.push({
                    "Type": type,
                    "Start Date": row.querySelector('.ledger-start').value,
                    "End Date": row.querySelector('.ledger-end').value,
                    "Amount": parseInt(rawAmt, 10) || 0,
                    "Notes": row.querySelector('.ledger-notes').value
                });
            }
        });

        showLoading();
        ContractsAPI.previewAutoForecast(contractData, currentLedger,
            (generatedRows) => {
                hideLoading();
                const item = ContractsState.currentDetailItems.find(i => i.id === detailId);
                item.ledger = currentLedger.concat(generatedRows);
                renderDetailItemsTable();
                toggleRowEditMode(detailId, true);
                FinOpsUI.showNotificationBanner("Auto-forecast preview generated! Remember to click 'Apply' and then 'Commit'.", "success");
            },
            (err) => {
                hideLoading();
                FinOpsUI.showAlert("Calculation Error", err.message);
            }
        );
    }

    // 🌟 BLOCCO INTEGRATO FINALE: Sovrascrive l'oggetto globale esponendo tutte le API verso la View
    window.ContractsController = {

        updateSplitPlaceholder: function (selectEl) {
            const row = selectEl.closest('.split-row-item');
            const inputEl = row.querySelector('.split-val');
            const rule = selectEl.value;
            if (rule === 'Percentage') inputEl.placeholder = '% (e.g. 50)';
            else if (rule === 'Fixed Amount') inputEl.placeholder = '€ (e.g. 15.000)';
            else inputEl.placeholder = 'Qty (e.g. 150)';
            ContractsUtils.formatSplitValue(inputEl);
        },

        // 🌟 PUNTO 5: Metodo per accendere/spegnere i pannelli Ledger e Split dalla card
        toggleCardSection: function (id, section, event) {
            event.stopPropagation(); // Evita che si espanda anche l'accordion della card
            const panel = document.getElementById(`read-${section}-${id}`);
            if (panel) {
                panel.classList.toggle('hidden');
            }
        },

        openContractModalWindow: function (id) {
            const mountPoint = document.getElementById('contracts-modal-mount-point');
            if (!mountPoint) return;

            const item = ContractsState.currentDetailItems.find(i => i.id === id);
            if (!item) return;
            item.isEditing = true;

            const d = item.data;
            const docLinks = (d["Contract Links"] || d.contractLinks || "").toString().replace(/undefined|null/g, "").split(',').map(s => s.trim()).filter(s => s);

            const editLeOptions = ContractsUtils.extractUniqueField(windowPayload.legalEntities, "Legal Entity").map(le => `<option value="${le}" ${le === (d["Legal Entity"] || d.legalEntity) ? 'selected' : ''}>${le}</option>`).join('');
            const tgOptions = ContractsState.currentAssetGroupIds.map(g => `<option value="${g}" ${g === d["Target Group ID"] ? 'selected' : ''}>${g}</option>`).join('');
            const locOptions = ContractsUtils.extractUniqueField(windowPayload.locations, "Location").map(loc => `<option value="${loc}" ${loc === (d["Location"] || d.location) ? 'selected' : ''}>${loc}</option>`).join('');
            const soOptions = ContractsUtils.extractUniqueField(windowPayload.contracts, "Service Owner").map(so => `<option value="${so}" ${so === (d["Service Owner"] || d.serviceOwner) ? 'selected' : ''}>${so}</option>`).join('');
            const editCcOptions = ContractsUtils.extractUniqueField(windowPayload.costCenters, "Cost Center").map(cc => `<option value="${cc}" ${cc === (d["Cost Center"] || d.costCenter) ? 'selected' : ''}>${cc}</option>`).join('');

            const baseLeOptions = ContractsUtils.extractUniqueField(windowPayload.legalEntities, "Legal Entity").map(le => `<option value="${le}">${le}</option>`).join('');
            const baseCcOptions = ContractsUtils.extractUniqueField(windowPayload.costCenters, "Cost Center").map(cc => `<option value="${cc}">${cc}</option>`).join('');

            let splitsHtml = item.splits && item.splits.length > 0
                ? item.splits.map(s => ContractsTemplates.getSplitRow(item.id, s, d["Start Date"]?.split('T')[0] || "", d["Contract End Date"]?.split('T')[0] || "", baseLeOptions, baseCcOptions)).join('')
                : `<p class="text-[9px] text-emerald-600 font-medium text-center py-2 empty-split-msg bg-emerald-50/50 rounded-md">➔ Standard Allocation Active (100% to main entity).</p>`;

            let ledgerHtml = item.ledger && item.ledger.length > 0
                ? item.ledger.map(l => ContractsTemplates.getLedgerRow(item.id, l)).join('')
                : `<p class="text-[9px] text-slate-400 italic text-center py-2 empty-ledger-msg bg-slate-50 rounded-md">No manual ledger movements yet.</p>`;

            mountPoint.innerHTML = ContractsTemplates.getContractModalFormStructure(id, editLeOptions, tgOptions, locOptions, soOptions, editCcOptions, docLinks, splitsHtml, ledgerHtml, d);

            mountPoint.classList.remove('hidden');
            mountPoint.classList.add('flex');

            toggleLedgerVisibility(id);
        },

        closeContractModalWindow: function () {
            const mountPoint = document.getElementById('contracts-modal-mount-point');
            if (mountPoint) {
                mountPoint.classList.remove('flex');
                mountPoint.classList.add('hidden');
                mountPoint.innerHTML = '';
            }

            ContractsState.currentDetailItems = ContractsState.currentDetailItems.filter(i => {
                if (i.isEditing && (!i.data["Contract ID"] && !i.data.contractId && (!i.data["Start Date"] && !i.data.startDate))) {
                    return false;
                }
                i.isEditing = false;
                return true;
            });

            renderDetailItemsTable();
        },

        cancelMasterFormEditState: function (isNew) {
            if (isNew) {
                document.getElementById('mgmt-master-form-container').classList.add('hidden');
                ContractsState.currentMasterData = null;
                ContractsState.currentDetailItems = [];
            } else {
                ContractsState.updateMasterEditState(false);
                renderMasterFormBox();
            }
        },

        filterSupplierOptions: function (query) {
            const listContainer = document.getElementById('ins-supplier-options-list');
            if (!listContainer) return;
            const q = query.toLowerCase().trim();
            const suppliersList = ContractsUtils.extractUniqueField(windowPayload.masterContracts || windowPayload.contracts, "Supplier");

            const matched = suppliersList.filter(s => s.toLowerCase().includes(q));
            if (matched.length === 0) {
                listContainer.innerHTML = `<div onclick="ContractsController.selectSupplierOption('${query.replace(/'/g, "\\'")}')" class="p-1.5 text-[11px] font-black text-indigo-600 hover:bg-slate-50 rounded-md cursor-pointer">➕ Create "${query.toUpperCase()}" as new Vendor Context</div>`;
                return;
            }

            listContainer.innerHTML = matched.map(s => `
                <div onclick="ContractsController.selectSupplierOption('${s.replace(/'/g, "\\'")}')" class="p-1.5 text-[11px] font-bold text-slate-700 hover:bg-teal-50 hover:text-teal-900 rounded-md cursor-pointer transition-colors">${s}</div>
            `).join('');
        },

        toggleSupplierDropdown: function (show) {
            const listContainer = document.getElementById('ins-supplier-options-list');
            if (!listContainer) return;
            if (show) {
                listContainer.classList.remove('hidden');
                const searchInput = document.getElementById('ins-masterSupplier-search');
                if (searchInput) this.filterSupplierOptions(searchInput.value);
            } else {
                setTimeout(() => { listContainer.classList.add('hidden'); }, 200);
            }
        },

        // 🌟 PUNTO 2: Auto-assegnazione del Billing Channel
        selectSupplierOption: function (supplierName) {
            document.getElementById('ins-masterSupplier-search').value = supplierName;
            document.getElementById('ins-masterSupplier').value = supplierName;
            document.getElementById('ins-supplier-options-list').classList.add('hidden');

            // Cerca il Billing channel nel database fornitori, altrimenti applica il default
            const suppliers = windowPayload.suppliers || [];
            const supObj = suppliers.find(s => String(s["Supplier"]).trim().toLowerCase() === supplierName.toLowerCase());
            const channel = supObj ? (supObj["Billing Channel"] || 'Direct Vendor') : 'Direct Vendor';

            const channelDisplay = document.getElementById('ins-masterBillingChannel-display');
            const channelInput = document.getElementById('ins-masterBillingChannel');

            if (channelDisplay) channelDisplay.textContent = channel;
            if (channelInput) channelInput.value = channel;
        }
    };

    // Chiudi tendina se clicchi fuori
    document.addEventListener('click', function (e) {
        const assetDrop = document.getElementById('modal-asset-options-list');
        const comboContainer = document.getElementById('modal-asset-combo-container');

        const supplierDrop = document.getElementById('ins-supplier-options-list');
        const supplierSearchInput = document.getElementById('ins-masterSupplier-search');
        if (supplierDrop && !supplierDrop.classList.contains('hidden') && supplierSearchInput && !supplierSearchInput.contains(e.target)) {
            supplierDrop.classList.add('hidden');
        }

        if (assetDrop && comboContainer && !assetDrop.classList.contains('hidden') && !comboContainer.contains(e.target)) {
            assetDrop.classList.add('hidden');
        }
    });
</script>
