        // CASSETTO ESPANSO DELL'ASSET (Risolto il baco dei sottomenu in sola lettura)

                                <svg id="arrow-${safeDOMId}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" class="w-3.5 h-3.5 text-slate-300 transition-transform duration-200"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>

                            <div class="font-bold text-slate-900 text-sm truncate shrink">${data.name}</div>

                            </div>
                        </div>
                        <div class="mt-1" style="padding-left: 25px;">

                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">

                                </div>

                    <div class="w-[30%] flex items-center justify-center gap-6 px-2 flex-shrink-0 border-l border-r border-slate-100/70">

                            <span class="block text-[8px] text-slate-400 uppercase font-black tracking-widest mb-1.5">Strategy</span>
                            <div class="inline-block">${targetBadge}</div>
                        </div>
                        <div class="flex flex-col items-center text-center border-l border-slate-100 pl-6">
                            <span class="block text-[8px] text-slate-400 uppercase font-black tracking-widest mb-1.5">Budget FY27</span>
                            <div class="text-[10px] font-bold uppercase">${budgetBadge}</div>
                        </div>
                    </div>
                    
                    <div class="w-[30%] text-right flex flex-col justify-center items-end gap-1.5">
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Outlook FY27: <span class="font-mono text-slate-900">€ ${financials.outlook}</span></div>
                        <div class="flex flex-col items-end mt-auto">

        },

        // CARD DEL MASTER AGREEMENT (Compattato lo spazio verticale a mb-1.5)
        getMasterAccordionCard: function (master, childContractsHtml, isExpanded, globalEditMode) {
            const mId = master["Master Contract ID"];
            const supplier = master["Supplier"] || "Generic Supplier";
            const runRate = parseFloat(master["Run Rate"] || 0).formatCurrency();
            const expDateStr = master["Master End Date"] ? safeFormatStringDate(master["Master End Date"]) : "N/A";

            const status = (master["Status"] || "ACTIVE").toUpperCase().trim();
            const isExpired = status === "EXPIRED" || status === "TERMINATED";
            const opacityClass = isExpired ? "opacity-60 grayscale-[0.2] hover:opacity-100 hover:grayscale-0" : "";

            let statusBadge = "";
            if (status === "ACTIVE") statusBadge = `<span class="px-1.5 py-0.5 rounded text-[7px] font-black uppercase tracking-widest border bg-emerald-50 text-emerald-700 border-emerald-200 shadow-3xs leading-none shrink-0">${status}</span>`;
            else if (isExpired) statusBadge = `<span class="px-1.5 py-0.5 rounded text-[7px] font-black uppercase tracking-widest border bg-rose-50 text-rose-700 border-rose-200 shadow-3xs leading-none shrink-0">${status}</span>`;
            else statusBadge = `<span class="px-1.5 py-0.5 rounded text-[7px] font-black uppercase tracking-widest border bg-amber-50 text-amber-700 border-amber-200 shadow-3xs leading-none shrink-0">${status}</span>`;

            const editActions = globalEditMode ? `
                <div class="flex items-center gap-1.5 ml-3 pl-3 border-l border-slate-200" onclick="event.stopPropagation()">
                    <button onclick="InventoryController.triggerAddContractLine('${mId}')" class="px-2 py-1 bg-slate-100 text-slate-500 hover:bg-teal-50 hover:text-teal-700 font-black text-[8px] uppercase tracking-wider rounded border border-slate-200 shadow-sm transition-colors" title="Add Contract Line">+ Add Line</button>
                    <button onclick="InventoryController.triggerEditMaster('${mId}')" class="p-1 text-slate-400 hover:text-teal-600 transition-colors" title="Edit Master Info">✏️</button>
                </div>
            ` : '';

            return `
            <div class="bg-white border border-slate-200 rounded-xl shadow-sm mb-1.5 transition-all ${opacityClass} overflow-hidden">
                <div onclick="InventoryController.toggleMasterAccordion('${mId}')" class="p-3 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-3">
                        <svg id="master-chevron-${mId}" class="w-4 h-4 text-slate-400 transition-transform duration-200 ${isExpanded ? 'rotate-90 text-teal-600' : ''}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-black text-slate-800 text-xs">${supplier}</span>
                                ${statusBadge}
                            </div>
                            <div class="text-[9px] font-mono text-slate-400 mt-0.5">Master ID: <span class="font-bold text-slate-500">${mId}</span></div>
                        </div>
                    </div>
                    
                    <div class="flex items-center">
                        <div class="text-right pr-4 border-r border-slate-100 hidden sm:block">
                            <span class="text-[7px] text-slate-400 uppercase font-black tracking-widest block">Max Expiration</span>
                            <span class="font-mono font-bold text-slate-600 text-[10px] mt-0.5">${expDateStr}</span>
                        </div>
                        <div class="text-right pl-4">
                            <span class="text-[7px] text-slate-400 uppercase font-black tracking-widest block">Total Run Rate</span>
                            <span class="font-mono font-black text-teal-800 text-xs mt-0.5">€ ${runRate}</span>
                        </div>
                        ${editActions}
                    </div>
                </div>
                
                <div id="master-body-${mId}" class="${isExpanded ? 'block' : 'hidden'} border-t border-slate-100 bg-slate-50/50 p-2">
                    ${childContractsHtml}
                </div>
            </div>
            `;
        },

        getContractChildRowMarkup: function (contract, globalEditMode) {
            const cId = contract["Contract ID"];
            const entity = contract["Legal Entity"] || 'N/A';
            const cc = contract["Cost Center"] || 'N/A';
            const term = contract["Contract Term (Months)"] || '-';
            const end = safeFormatStringDate(contract["End Date"] || contract["Contract End Date"]);
            const runRate = parseFloat(contract["Annual Value"] || 0).formatCurrency();
            const expType = contract["Expenditure Type"] || 'OPEX';

            const editActions = globalEditMode ? `
                <button onclick="event.stopPropagation(); InventoryController.triggerEditContract('${cId}')" class="ml-2 p-1 text-slate-400 hover:text-teal-600 transition-colors" title="Edit Line">✏️</button>
            ` : '';

            return `
            <div class="flex items-center justify-between p-2 mb-1 last:mb-0 bg-white border border-slate-100 rounded-lg shadow-3xs hover:border-teal-200 transition-colors">
                <div class="flex items-center gap-3 w-[45%]">
                    <span class="px-1.5 py-0.5 bg-slate-100 text-slate-500 font-black text-[7px] uppercase tracking-widest rounded border border-slate-200">${expType}</span>
                    <div class="min-w-0">
                        <div class="font-bold text-slate-700 text-[10px] truncate">${entity}</div>
                        <div class="text-[8px] font-mono text-slate-400 mt-0.5">CC: ${cc} | ID: ${cId}</div>
                    </div>
                </div>
                <div class="flex items-center justify-end gap-4 w-[55%]">
                    <div class="text-right hidden sm:block">
                        <span class="text-[9px] font-mono text-slate-500">${term}M</span>
                    </div>
                    <div class="text-right w-16">
                        <span class="text-[9px] font-mono text-slate-500">${end}</span>
                    </div>
                    <div class="text-right w-20">
                        <span class="text-[10px] font-mono font-black text-slate-700">€ ${runRate}</span>
                    </div>
                    ${editActions}
                </div>
            </div>
            `;
        },

        // --- FUNZIONI DI FORMATTAZIONE BADGE SPOSTATE NEL TEMPLATE ---
        getCurrentStatusBadge: function (status) {
            const val = (status || "").toUpperCase().trim();
            const styles = {
                'RUNNING': 'text-emerald-700 bg-emerald-50 border-emerald-100',
                'OPTIMIZING': 'text-amber-700 bg-amber-50 border-amber-100',
                'EXITING': 'text-orange-700 bg-orange-50 border-orange-100',
                'TRANSFERRED': 'text-sky-700 bg-sky-50 border-sky-100',
                'EXPIRED': 'text-rose-700 bg-rose-50 border-rose-100',
                'DISMISSED': 'text-slate-500 bg-slate-50 border-slate-200'
            };
            return `<span class="px-2 py-0.5 text-[9px] font-bold rounded-full border ${styles[val] || 'text-slate-400 bg-slate-50 border-slate-100'}">${val}</span>`;
        },

        getTargetStatusText: function (target) {
            const val = (target || "").toUpperCase().trim();
            const colors = { 'RETAIN': 'text-emerald-600', 'EXIT': 'text-rose-600', 'HANDOVER': 'text-sky-600' };
            return `<span class="text-[10px] font-black tracking-widest uppercase ${colors[val] || 'text-slate-400'}">${val}</span>`;
        },

        getBudgetStatusBadge: function (budgetStatus) {
            const val = (budgetStatus || "").toUpperCase().trim();
            if (val === "SECURED") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> SECURED</span>`;
            if (val === "AT RISK") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> AT RISK</span>`;
            return `<span class="text-slate-300">—</span>`;
        }

    };

    InventoryTemplates.getTemplateOfMasterAccordion = InventoryTemplates.getMasterAccordionCard;
</script>
