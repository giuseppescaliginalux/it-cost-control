<script>
    /**
     * js_contracts_utils.html
     * UTILITIES: Pure functions, data formatters, validation and DOM helpers.
     */

    const ContractsUtils = {
        // --- Data Extraction & Validation ---
        extractUniqueField: function (payloadArray, keyName) {
            if (!payloadArray || payloadArray.length === 0) return [];
            return [...new Set(payloadArray.map(item => {
                const val = item[keyName] !== undefined ? item[keyName] : Object.values(item)[0];
                return (val || "").toString().trim();
            }))].filter(v => v !== "").sort();
        },

        validateContractData: function (data) {
            const requiredFields = {
                "Legal Entity": "Legal Entity",
                "Scope": "Scope",
                "Total Commitment": "Total Commitment",
                "Start Date": "Start Date",
                "Contract End Date": "Contract End Date"
            };

            for (let field in requiredFields) {
                const val = data[field];
                if (val === null || val === undefined || String(val).trim() === "") {
                    throw new Error(`Field '${requiredFields[field]}' is mandatory.`);
                }
            }

            if (parseFloat(data["Total Commitment"]) <= 0) {
                throw new Error("Total Commitment must be greater than zero.");
            }

            if (new Date(data["Start Date"]) >= new Date(data["Contract End Date"])) {
                throw new Error("Start Date must be before Contract End Date.");
            }
            return true;
        },

        // --- Safe Financial Parsing (LA FUNZIONE CHE MANCAVA) ---
        parseFinancialValue: function (rawVal) {
            if (typeof rawVal === 'number') return rawVal;
            if (!rawVal || String(rawVal).trim() === "") return 0;
            // Rimuove i simboli valuta, lettere, e normalizza la virgola in punto
            const cleaned = String(rawVal).replace(/[^0-9,.-]/g, '').replace(/,/g, '.');
            return parseFloat(cleaned) || 0;
        },

        // --- Formatters ---
        formatToEnglishCustomDate: function (dateStr) {
            if (!dateStr || String(dateStr).trim() === "" || String(dateStr) === "—") return "—";

            if (typeof FinOpsDate !== 'undefined') {
                return FinOpsDate.toVisualLong(dateStr);
            }

            let d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
                const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
            }

            return String(dateStr);
        },

        formatInputAsIntegerCurrency: function (el) {
            let val = el.value.replace(/[^0-9]/g, '');
            if (val === '') {
                el.value = '';
                return;
            }
            el.value = parseInt(val, 10).toLocaleString('it-IT');
        },

        formatLedgerValue: function (inputEl) {
            let val = inputEl.value.replace(/[^0-9]/g, '');
            if (val === '') { inputEl.value = ''; return; }
            inputEl.value = parseInt(val, 10).toLocaleString('it-IT');
        },

        formatSplitValue: function (inputEl) {
            const rule = inputEl.closest('.split-row-item').querySelector('.split-rule').value;
            let val = inputEl.value.replace(/[^0-9]/g, '');

            if (val === '') {
                inputEl.value = '';
                return;
            }

            let intVal = parseInt(val, 10);

            if (rule === 'Percentage') {
                if (intVal > 100) intVal = 100;
                inputEl.value = intVal.toString();
            } else if (rule === 'Fixed Amount') {
                inputEl.value = intVal.toLocaleString('it-IT');
            } else if (rule === 'Units') {
                inputEl.value = intVal.toString();
            }
        },

        // --- Local In-Memory Calculation Engine (Latenza Zero) ---
        calculateContractFinancials: function(d) {
            const parseFinance = (rawVal) => {
                if (typeof rawVal === 'number') return rawVal;
                if (!rawVal || String(rawVal).trim() === "") return 0;
                return parseFloat(String(rawVal).replace(/[^0-9,.-]/g, '').replace(/,/g, '.')) || 0;
            };

            const getExactMonths = (s, e) => {
                if (!s || !e || s > e) return 0;
                const startDays = new Date(s.getFullYear(), s.getMonth() + 1, 0).getDate();
                const endDays = new Date(e.getFullYear(), e.getMonth() + 1, 0).getDate();
                if (s.getFullYear() === e.getFullYear() && s.getMonth() === e.getMonth()) return (e.getDate() - s.getDate() + 1) / startDays;
                const fullMonths = (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth()) - 1;
                return fullMonths + ((startDays - s.getDate() + 1) / startDays) + (e.getDate() / endDays);
            };

            const sDate = d["Start Date"] ? new Date(d["Start Date"]) : null;
            const cEndDate = d["Contract End Date"] ? new Date(d["Contract End Date"]) : null;
            const aEndDate = d["Adjusted End Date"] ? new Date(d["Adjusted End Date"]) : null;
            const eDate = (aEndDate && !isNaN(aEndDate.getTime())) ? aEndDate : cEndDate;
            
            const totCommit = parseFinance(d["Total Commitment"]);
            const isOneShot = d["Cost Recurrence"] === "One-Shot";

            let term = 0, effCommit = 0, annVal = 0;
            
            if (sDate && eDate) {
                term = Math.round(getExactMonths(sDate, eDate));
                const origMonths = getExactMonths(sDate, cEndDate);
                const actMonths = getExactMonths(sDate, eDate);
                
                if (isOneShot) {
                    effCommit = totCommit;
                    annVal = totCommit;
                } else {
                    effCommit = origMonths > 0 ? totCommit * (actMonths / origMonths) : 0;
                    annVal = origMonths > 0 ? (totCommit / origMonths) * 12 : 0;
                }
            }
            
            d["Contract Term (Months)"] = term;
            d["Effective Commitment"] = parseFloat(effCommit.toFixed(2));
            d["Annual Value"] = parseFloat(annVal.toFixed(2));

            const today = new Date(); today.setHours(0,0,0,0);
            if (!sDate) d["Status"] = "";
            else if (eDate && eDate < today) d["Status"] = "EXPIRED";
            else if (sDate > today) d["Status"] = "UPCOMING";
            else d["Status"] = "ACTIVE";

            return d;
        },

        // --- DOM Manipulators ---
        removeDocumentLink: function (event, urlToRemove, isMaster, detailId = null) {
            const clickedButton = event.currentTarget;
            if (isMaster) {
                const input = document.getElementById('ins-masterDocumentLink');
                if (input) {
                    let links = input.value.split(',').map(s => s.trim()).filter(s => s !== urlToRemove && s);
                    input.value = links.join(', ');
                }
            } else {
                const input = document.getElementById(`edit-contractLinks-${detailId}`);
                if (input) {
                    let links = input.value.split(',').map(s => s.trim()).filter(s => s !== urlToRemove && s);
                    input.value = links.join(', ');
                }
            }
            if (clickedButton && clickedButton.parentElement) {
                clickedButton.parentElement.style.display = 'none';
            }
        }
    };
</script>
