<script>
    /**
     * js_inventory_state.html
     */
    const InventoryState = {
        filters: { search: '', minRunRate: 0, status: [], budgetStatus: [], driver: [], channel: [], expType: [], legalEntity: [], supplier: [], costCenter: [], location: [] },
        sort: { by: 'runrate-desc' },
        expandedAssetId: null,
        expandedMasterId: null,
        currentDrillDownData: null,

        getFilteredAndSortedAssets: function () {
            const f = this.filters;
            let filteredData = globalCachedData.filter(row => {
                const name = (row.name || "").toLowerCase();
                const manufacturer = (row.manufacturer || "").toLowerCase();
                const runRate = parseFloat(row.runRate) || 0;
                const currentStatus = (row.currentStatus || "").toUpperCase().trim();
                const budgetStatus = (row.budgetStatusFY27 || "").toUpperCase().trim();
                const currentDriver = (row.businessDriver || "").toUpperCase().trim();

                const matchesSearch = !f.search || name.includes(f.search) || manufacturer.includes(f.search);
                const matchesRunRate = runRate >= f.minRunRate;
                const matchesStatus = f.status.length === 0 || f.status.includes(currentStatus);
                const matchesBudgetStatus = f.budgetStatus.length === 0 || f.budgetStatus.includes(budgetStatus);
                const matchesDriver = f.driver.length === 0 || f.driver.includes(currentDriver);

                let matchesChannel = true; let matchesExp = true; let matchesLegal = true;
                let matchesSupplier = true; let matchesCostCenter = true; let matchesLocation = true;

                if (f.channel.length > 0 || f.expType.length > 0 || f.legalEntity.length > 0 || f.supplier.length > 0 || f.costCenter.length > 0 || f.location.length > 0) {
                    // FIX: Uso dell'Asset ID per filtrare i contratti collegati
                    const targetAssetId = String(row.id).trim();
                    const relatedContracts = windowPayload.contracts.filter(c =>
                        String(c.assetId).trim() === targetAssetId
                    );

                    if (f.channel.length > 0) matchesChannel = relatedContracts.some(c => f.channel.includes((c.billingChannel || "").toString().trim()));
                    if (f.expType.length > 0) matchesExp = relatedContracts.some(c => f.expType.includes((c.expenditureType || "").toString().trim()));
                    if (f.legalEntity.length > 0) matchesLegal = relatedContracts.some(c => f.legalEntity.includes((c.legalEntity || "").toString().trim()));
                    if (f.supplier.length > 0) matchesSupplier = relatedContracts.some(c => f.supplier.includes((c.supplier || "").toString().trim()));
                    if (f.costCenter.length > 0) matchesCostCenter = relatedContracts.some(c => f.costCenter.includes((c.costCenter || "").toString().trim()));
                    if (f.location.length > 0) matchesLocation = relatedContracts.some(c => f.location.includes((c.location || "").toString().trim()));
                }

                return matchesSearch && matchesRunRate && matchesStatus && matchesBudgetStatus && matchesDriver &&
                    matchesChannel && matchesExp && matchesLegal && matchesSupplier && matchesCostCenter && matchesLocation;
            });

            filteredData.sort((a, b) => {
                if (this.sort.by === 'runrate-desc') return (parseFloat(b.runRate) || 0) - (parseFloat(a.runRate) || 0);
                if (this.sort.by === 'assetname-asc') return (a.name || "").toString().localeCompare((b.name || "").toString(), 'it');
                if (this.sort.by === 'expiry-asc') {
                    const dA = a.lastEndDate ? new Date(a.lastEndDate) : new Date(2099, 11, 31);
                    const dB = b.lastEndDate ? new Date(b.lastEndDate) : new Date(2099, 11, 31);
                    return dA - dB;
                }
                return 0;
            });
            return filteredData;
        },

        loadAssetDrillDownData: function (assetId) {
            const targetId = String(assetId).trim();
            const bridge = windowPayload.bridge || [];
            const allocs = windowPayload.allocations || [];
            const assets = windowPayload.assets || [];
            const aliasMap = new Map();

            // Raggruppiamo i bridge per allocationId
            bridge.forEach(r => {
                if (!r.allocationId) return;
                if (!aliasMap.has(r.allocationId)) aliasMap.set(r.allocationId, []);

                const assetMatch = assets.find(a => String(a.id).trim() === String(r.assetId).trim());
                aliasMap.get(r.allocationId).push({
                    asset_name: assetMatch ? assetMatch.name : "Unknown Asset",
                    asset_id: r.assetId
                });
            });

            // Arricchiamo il DTO per la tabella UI iniettando i valori finanziari
            const offlineAllocations = bridge.filter(r => String(r.assetId).trim() === targetId)
                .map(r => {
                    const baseAlloc = allocs.find(a => String(a.allocationId).trim() === String(r.allocationId).trim() && String(a.fiscalYear).trim().toUpperCase() === String(r.fiscalYear).trim().toUpperCase());
                    const originalAmount = baseAlloc ? parseFloat(baseAlloc.amount) || 0 : 0;
                    const allocName = baseAlloc ? (baseAlloc.allocationName || baseAlloc.allocationId) : r.allocationId;

                    const allCoAssets = aliasMap.get(r.allocationId) || [];
                    const splitPct = allCoAssets.length > 0 ? (1 / allCoAssets.length) : 1;
                    const effectiveAmount = originalAmount * splitPct;

                    return {
                        ...r,
                        allocationAlias: allocName,
                        originalBudget: originalAmount,
                        effectiveBudget: effectiveAmount,
                        allocationSplitPct: splitPct,
                        co_allocated_assets: allCoAssets.filter(a => String(a.asset_id).trim() !== targetId).map(ca => ({ ...ca, split_pct: splitPct }))
                    };
                });

            // Troviamo gli ID dei Master collegati a questo Asset
            const validMasterIds = (windowPayload.masterContracts || [])
                .filter(m => String(m.assetId).trim() === targetId)
                .map(m => String(m.masterId).trim());

            this.currentDrillDownData = {
                contracts: (windowPayload.contracts || []).filter(c => validMasterIds.includes(String(c.masterId).trim())),
                initiatives: (windowPayload.initiatives || []).filter(i => String(i.assetId).trim() === targetId),
                allocations: offlineAllocations
            };
        },

        resetAllFilters: function () {
            this.filters = { search: '', minRunRate: 0, status: [], budgetStatus: [], driver: [], channel: [], expType: [], legalEntity: [], supplier: [], costCenter: [], location: [] };
            this.sort.by = 'runrate-desc';
        }
    };
</script>
