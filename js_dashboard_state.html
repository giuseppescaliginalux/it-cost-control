<script>
    /**
     * js_dashboard_state.html
     * MODEL: Centralized FinOps analytical state engine for executive dashboarding.
     */
    const DashboardState = {
        assets: [],
        contracts: [],
        initiatives: [],
        projections: [],
        activeChartTab: 'general',

        loadCachePayload: function (payload) {
            // Filter empty database rows from the Google Sheet arrays
            this.assets = (payload.assets || []).filter(r => {
                const name = (r["Asset Name"] || "").toString().trim();
                return name !== "" && name.toLowerCase() !== "total" && name.toLowerCase() !== "totale";
            });
            this.contracts = payload.contracts || [];
            this.initiatives = payload.initiatives || [];
            this.projections = payload.projections || [];
        },

        computeExecutiveMetrics: function () {
            let totalBudget = 0;
            let totalProjection = 0;
            this.assets.forEach(a => {
                totalBudget += parseFloat(a["Effective Budget"]) || 0;
                totalProjection += parseFloat(a["Fiscal Projection"]) || 0;
            });

            const activeContracts = this.contracts.filter(c => (c["Status"] || "").toString().trim().toUpperCase() === "ACTIVE");

            let totalActualSaving = 0;
            let totalTargetSaving = 0;
            this.initiatives.forEach(init => {
                totalActualSaving += parseFloat(init["Actual Saving (Annualized)"]) || 0;
                totalTargetSaving += parseFloat(init["Target Saving (Annualized)"]) || 0;
            });

            let realizedActual = 0;
            let realizedTarget = 0;
            this.initiatives.forEach(init => {
                if ((init["Initiative Status"] || "").toString().toUpperCase().trim() === "COMPLETED") {
                    realizedActual += parseFloat(init["Actual Saving (Annualized)"]) || 0;
                    realizedTarget += parseFloat(init["Target Saving (Annualized)"]) || 0;
                }
            });

            let perfPct = realizedTarget > 0 ? ((realizedActual - realizedTarget) / realizedTarget) * 100 : 0;

            return {
                totalBudget: totalBudget,
                totalProjection: totalProjection,
                netVariance: totalBudget - totalProjection,
                activeContractsCount: activeContracts.length,
                securedSavings: totalActualSaving,
                remainingToSecure: Math.max(0, totalTargetSaving - totalActualSaving),
                realizedActual: realizedActual,
                realizedTarget: realizedTarget,
                performancePercentage: perfPct
            };
        },

        getTop10AssetsByRunRate: function () {
            return [...this.assets]
                .sort((a, b) => (parseFloat(b["Run Rate"]) || 0) - (parseFloat(a["Run Rate"]) || 0))
                .slice(0, 10);
        }
    };
</script>
