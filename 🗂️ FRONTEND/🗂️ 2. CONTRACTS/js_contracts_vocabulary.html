<script>
/**
 * js_contracts_vocabulary.html
 * VOCABULARY: Centralized dictionary for FinOps definitions, tooltips, and business terms 
 * used within the Contracts domain. Keeps templates clean.
 */
const ContractsVocabulary = {
    tooltips: {
        pricingModel: {
            title: "Pricing Mechanics",
            items: [
                { label: "Flat", desc: "Fixed recurring cost. No overage tracking required." },
                { label: "Minimum / Capped", desc: "Baseline commitment guaranteed. Ledger tracks manual overages." },
                { label: "Pure Consumption", desc: "100% variable rate. Requires strict manual Ledger tracking." }
            ]
        },
        billingTerms: {
            title: "Projection Engine Rules",
            items: [
                { label: "Fixed Recurring", desc: "The engine linearly splits the total commitment across the fiscal calendar." },
                { label: "Full Upfront", desc: "100% of the cost hits the fiscal year containing the Start Date." },
                { label: "Pay-As-You-Go", desc: "Dynamic engine calculation to protect residual budget against actuals." },
                { label: "Ledger Driven", desc: "Automatic projection is disabled. Relies solely on manual ledger inputs." }
            ]
        },
        futureProjection: {
            title: "Future Baseline Projection",
            items: [
                { label: "Recurrent", desc: "The engine automatically replicates the run-rate in future years after expiration." },
                { label: "One-Shot", desc: "A singular expense. The cost drops to zero immediately after expiration." }
            ]
        }
    },

    buildTooltipHTML: function(key) {
        const data = this.tooltips[key];
        if (!data) return '';
        let listHtml = data.items.map(i => `<li class="mb-1"><b class="text-white">${i.label}:</b> <span class="text-slate-300">${i.desc}</span></li>`).join('');
        return `<ul class="list-disc pl-3 text-[9px] leading-tight">${listHtml}</ul>`;
    }
};
</script>
