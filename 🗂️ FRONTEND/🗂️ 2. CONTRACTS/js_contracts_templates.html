<script>
    /**
     * js_contracts_templates.html
     * VIEW TEMPLATES: Genera le stringhe HTML per il modulo contratti.
     * Basato interamente su proprietà DTO camelCase native.
     */

    const ContractsTemplates = {

        getBaseLayout: function () {
            return `
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end w-full gap-4 mb-5 shrink-0">
                <div class="min-w-0">
                    <h2 class="text-xl font-black text-slate-800 uppercase tracking-widest truncate">Contracts Center</h2>
                    <p class="text-slate-500 text-[11px] font-medium mt-1 truncate">Search an Asset capability, define Master Agreements, and allocate granular contract items.</p>
                </div>
                
                <div class="flex items-center justify-end gap-3 shrink-0 flex-nowrap w-full lg:w-auto overflow-x-auto pb-1 lg:pb-0">
                    <button onclick="ContractsController.discardLocalChanges()" id="contracts-discard-btn" class="hidden px-4 py-2 bg-rose-50 hover:bg-rose-100 text-rose-700 font-black text-[11px] uppercase tracking-wider rounded-xl border border-rose-200 transition-all items-center justify-center gap-1.5 shrink-0 whitespace-nowrap cursor-pointer shadow-sm">
                        <svg class="w-4 h-4 text-rose-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                        <span>Discard Changes</span>
                    </button>

                    <button onclick="saveCurrentContract()" id="contracts-commit-btn" class="hidden px-4 py-2 bg-teal-700 hover:bg-teal-800 text-white font-black text-[11px] uppercase tracking-wider rounded-xl shadow-md transition-all items-center justify-center gap-1.5 shrink-0 whitespace-nowrap">
                        <svg class="w-4 h-4 text-white shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
                        <span>Commit & Push</span>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
                <div class="lg:col-span-1 space-y-4 sticky top-20">
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 space-y-3">
                        <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest flex items-center gap-1">
                            <svg class="w-3.5 h-3.5 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                            Step 1: Locate Asset Target
                        </h3>
                        <input type="text" id="mgmt-asset-search-input" onkeyup="renderAssetSearchList()" placeholder="Type asset or manufacturer name..." class="w-full px-3 py-2 text-xs bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-shadow">
                        <div id="mgmt-asset-results-list" class="max-h-44 overflow-y-auto border border-slate-100 rounded-xl divide-y divide-slate-50 bg-slate-50/30"></div>
                    </div>

                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 space-y-3">
                        <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest flex items-center gap-1">
                            <svg class="w-3.5 h-3.5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            Step 2: Master Agreements
                        </h3>
                        <div id="mgmt-selected-asset-header">
                            <p class="text-slate-400 italic text-[11px] text-center">Select an asset above to access commercial vehicles.</p>
                        </div>
                        <div id="mgmt-master-list-container" class="space-y-2 pt-2 border-t border-slate-50"></div>
                    </div>
                </div>

                <div class="lg:col-span-3 space-y-4">
                    <div id="mgmt-master-form-container" class="hidden space-y-4">
                        <div id="mgmt-master-form-box-inner" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-3"></div>
                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                            <div class="flex justify-between items-center pb-2 border-b border-slate-200 mb-4">
                                <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest">Step 3: Granular Items Allocation (Contracts table)</h3>
                                <button onclick="addNewDetailRowItem()" id="btn-add-contract-row" style="display: none;" class="px-3 py-1 bg-emerald-50 border border-emerald-200 text-emerald-700 font-black text-[10px] uppercase tracking-wider rounded-lg hover:bg-emerald-100 transition-colors shadow-sm shrink-0 cursor-pointer">Add Contract Line 📄</button>
                            </div>
                            <div id="mgmt-detailRowsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[600px] overflow-y-auto pr-1.5 pb-2"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="contracts-modal-mount-point" onclick="ContractsController.closeContractModalWindow()" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xs z-[9999] flex items-center justify-center p-4"></div>
            `;
        },

        getAssetSearchResult: function (name, id, manufacturer) {
            return `
            <div onclick="selectAssetForManagement('${name.replace(/'/g, "\\'")}', '${id}')" class="p-2 border-b border-slate-100 hover:bg-teal-50/60 cursor-pointer transition-colors flex justify-between items-center text-xs group">
                <div>
                    <div class="font-black text-slate-800 group-hover:text-teal-900">${name}</div>
                    <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${manufacturer || 'Generic'}</div>
                </div>
                <span class="bg-slate-100 text-slate-500 font-mono text-[9px] px-1.5 py-0.5 rounded">ID: ${id}</span>
            </div>`;
        },

        getMasterSidebarCard: function (mId, supplier, status, totalCommitment, isExpired, statusClass) {
            const cardClasses = isExpired ? "bg-slate-50 border-slate-200 opacity-60 hover:opacity-80 grayscale-[0.2]" : "bg-white border-slate-100 hover:border-teal-200 hover:shadow-md cursor-pointer";
            return `
            <div onclick="loadFullMasterDetailArchitecture('${mId}')" class="p-3 rounded-xl shadow-sm flex flex-col gap-2 group transition-all relative overflow-hidden border ${cardClasses}">
                ${isExpired ? `<div class="absolute top-0 right-0 bg-slate-200 text-slate-500 text-[7px] font-black uppercase tracking-widest px-2 py-0.5 rounded-bl-lg z-10 pointer-events-none">Historical</div>` : ''}
                <div class="flex justify-between items-start gap-2 ${isExpired ? 'mt-2' : ''}">
                    <div class="min-w-0 flex-1">
                        <div class="font-black text-slate-800 text-xs truncate" title="${supplier}">Supplier: <span class="text-teal-700 font-black">${supplier}</span></div>
                        <div class="text-[9px] font-mono font-bold text-slate-400 uppercase mt-0.5">ID: ${mId}</div>
                    </div>
                    <span class="px-1.5 py-0.5 rounded-full text-[7px] font-black uppercase tracking-wider shrink-0 border ${statusClass}">${status}</span>
                </div>
                <div class="flex justify-between items-center border-t border-slate-100 pt-2 text-[10px]">
                    <div>
                        <span class="text-slate-400 font-bold uppercase text-[8px] tracking-wider">Total Commit</span>
                        <span class="font-mono font-bold text-slate-700 block mt-0.5">€${totalCommitment.formatCurrency()}</span>
                    </div>
                    <div class="text-slate-300 group-hover:text-teal-600 transition-colors">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                    </div>
                </div>
            </div>`;
        },

        getMasterReadOnly: function (data, masterLinks, cleanStart, cleanEnd, termMonths, status, statusClass, globalEditMode) {
            const linksHtml = masterLinks.length > 0 ? `
            <div class="flex items-center gap-1.5 mr-1 border-r border-slate-200 pr-3">
                ${masterLinks.map((url, idx) => `<a href="#" target="_blank" class="live-doc-link px-2 py-1 bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white border border-indigo-200 rounded-md text-[9px] font-black uppercase tracking-wider flex items-center gap-1 transition-all shadow-sm" data-raw="${url.trim()}"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg> Doc ${idx + 1}</a>`).join('')}
            </div>` : '';

            const runRate = parseFloat(data.runRate) || 0;
            const effRunRate = parseFloat(data.effectiveRunRate) || runRate;
            const isDiscounted = effRunRate !== runRate;
            const totCommit = parseFloat(data.totalCommitment) || 0;
            const bChannel = data.billingChannel || 'Direct Vendor';

            const editBtnHtml = globalEditMode ? `<button onclick="toggleMasterEditState(true)" class="px-3 py-1.5 bg-slate-100 border border-slate-200 text-slate-700 font-black text-[10px] uppercase tracking-wider rounded-lg hover:bg-slate-200 transition-colors shadow-sm">Edit Master Info</button>` : '';

            return `
            <div class="flex justify-between items-start border-b border-slate-100 pb-2.5 mb-2.5">
                <div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <h4 class="text-sm font-black text-slate-800">Supplier: <span class="text-teal-700">${data.supplier || 'Not Specified'}</span></h4>
                        <span class="bg-teal-50 border border-teal-100 text-teal-700 px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-wider shrink-0 shadow-3xs" title="Billing Channel">${bChannel}</span>
                    </div>
                    <div class="text-[9px] font-mono font-bold text-slate-400 uppercase mt-1.5 select-none">Internal Tech ID: <span class="text-slate-500 font-medium select-all">${data.masterId || 'NEW MASTER'}</span></div>
                </div>
                <div class="flex flex-wrap justify-end items-center gap-2">
                    ${linksHtml}
                    ${editBtnHtml}
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-between gap-3 bg-slate-50/60 p-2.5 rounded-xl border border-slate-100 mb-3 text-xs w-full">
                <div class="flex items-center gap-1.5 text-slate-500 font-mono text-[10px] whitespace-nowrap bg-white border border-slate-200 px-2 py-1 rounded-md shrink-0 shadow-3xs">
                    <span>${cleanStart}</span> <span class="text-slate-300 font-sans">➔</span> <span>${cleanEnd}</span>
                    <span class="ml-1 pl-1.5 border-l border-slate-200 font-sans font-black text-slate-700">${termMonths} M</span>
                </div>
                <div class="flex-1 flex justify-center"><span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider border ${statusClass} shadow-sm">${status}</span></div>
                <div class="flex items-center justify-start sm:justify-end gap-5 shrink-0 sm:ml-auto w-full sm:w-auto">
                    <div class="text-right shrink-0">
                        <span class="text-[8px] text-slate-400 block uppercase font-black tracking-wider whitespace-nowrap">Total Commitment</span>
                        <span class="font-mono font-black text-slate-900 text-[13px]">€${totCommit.toLocaleString('it-IT')}</span>
                    </div>
                    <div class="text-right shrink-0 border-l border-slate-200 pl-4">
                        <span class="text-[8px] text-teal-600 block uppercase font-black tracking-wider whitespace-nowrap">Effective Run Rate</span>
                        <span class="font-mono font-black text-teal-800 text-[13px]">€${effRunRate.toLocaleString('it-IT')}</span>
                        ${isDiscounted ? `<span class="text-[8px] text-slate-400 block mt-0.5">Nominal: €${runRate.toLocaleString('it-IT')}</span>` : ''}
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-3 text-xs border-t border-slate-100/40 pt-2">
                <div class="md:col-span-8 border-r border-slate-100/60 pr-2"><span class="text-slate-400 font-bold uppercase text-[8px] tracking-wider block">Master Scope</span><span class="text-slate-700 font-medium leading-tight block mt-0.5 break-words">${data.masterScope || '—'}</span></div>
                <div class="md:col-span-4 pl-0 md:pl-2"><span class="text-slate-400 font-bold uppercase text-[8px] tracking-wider block">Master Comments</span><span class="text-slate-500 italic font-medium leading-tight block mt-0.5">${data.masterComments || '—'}</span></div>
            </div>`;
        },

        getMasterEditCard: function (data, isNew, suppliersList, masterLinks) {
            const currentSupplier = data.supplier || '';
            const bChannel = data.billingChannel || 'Direct Vendor';

            const childCount = (typeof ContractsState !== 'undefined' && ContractsState.currentDetailItems) ? ContractsState.currentDetailItems.length : 0;
            const deleteBtnHtml = `
                <button onclick="ContractsController.deleteCurrentMaster()" class="px-2.5 py-1.5 bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-lg transition-colors flex items-center justify-center shrink-0 border border-rose-200 shadow-3xs cursor-pointer ${childCount > 0 ? 'opacity-50 cursor-not-allowed' : ''}" title="${childCount > 0 ? 'Cannot delete master with active contracts' : 'Delete temporary master'}">
                    <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            `;

            return `
            <div class="flex justify-between items-center border-b border-slate-200 pb-2 mb-4">
                <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest">Master Info Setup</h3>
                <div class="flex gap-2 items-center">
                    ${deleteBtnHtml}
                    <button onclick="ContractsController.cancelMasterFormEditState(${isNew})" class="px-3 py-1.5 text-[10px] font-black uppercase text-slate-500 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors cursor-pointer">Cancel</button>
                    <button onclick="confirmMasterEditLocalChanges()" class="px-4 py-1.5 bg-teal-700 hover:bg-teal-800 text-white rounded-lg font-black text-[10px] uppercase tracking-wider shadow-md transition-colors cursor-pointer">Confirm Master</button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                ${!isNew ? `
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Contract ID</label>
                    <input type="text" id="ins-masterId" disabled value="${data.masterId || ''}" class="w-full px-3 py-2 bg-slate-100 border border-slate-200 rounded-lg font-bold uppercase text-xs text-slate-500">
                </div>
                ` : ''}
                
                <div class="${isNew ? 'md:col-span-2' : ''} z-50">
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 required-label">Supplier Context</label>
                    ${FinOpsSelect.render({ id: 'ins-masterSupplier', placeholder: '🔍 Type supplier name...', options: suppliersList, selectedValue: currentSupplier, allowCustom: true, onChange: 'ContractsController.handleSupplierAutoChannel(value)' })}
                </div>

                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Billing Channel (Auto)</label>
                    <div class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold text-xs text-slate-500 shadow-inner flex items-center">
                        <span id="ins-masterBillingChannel-display">${bChannel}</span>
                        <input type="hidden" id="ins-masterBillingChannel" value="${bChannel}">
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs mt-3">
                <div class="md:col-span-2">
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Previous Master ID (Optional - For Renewals/Merges)</label>
                    <input type="text" id="ins-previousMasterId" value="${data.previousMasterId || ''}" placeholder="e.g. MCT-AWS-2024-01 (use commas for multiple)" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 text-xs font-mono text-indigo-700">
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Scope</label>
                    <input type="text" id="ins-masterScope" value="${data.masterScope || ''}" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 text-xs">
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Comments</label>
                    <input type="text" id="ins-masterComments" value="${data.masterComments || ''}" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 italic text-slate-500 text-xs">
                </div>
            </div>

            <div class="mt-4 border border-dashed border-slate-300 bg-slate-50 p-3 rounded-lg">
                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Upload & Manage Documents</label>
                ${masterLinks.length > 0 ? `
                    <div class="mb-3 bg-white p-2 rounded border border-slate-200">
                        <span class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Currently Attached Files:</span>
                        <div class="flex flex-wrap gap-1.5">
                            ${masterLinks.map((url, idx) => `
                                <div class="flex items-center gap-0 bg-indigo-50 border border-indigo-200 rounded-md shadow-sm overflow-hidden group">
                                    <a href="#" target="_blank" class="live-doc-link px-2 py-0.5 text-indigo-700 hover:bg-indigo-600 hover:text-white text-[8px] font-black uppercase tracking-wider flex items-center gap-1 transition-colors" data-raw="${url.trim()}">Doc ${idx + 1}</a>
                                    <button type="button" onclick="ContractsUtils.removeDocumentLink(event, '${url.trim()}', true)" class="px-1.5 py-0.5 text-indigo-400 hover:bg-rose-500 hover:text-white transition-colors border-l border-indigo-200 cursor-pointer">×</button>
                                </div>`).join('')}
                        </div>
                    </div>` : ''}
                <input type="text" id="ins-masterDocumentLink" value="${data.contractLinks || ''}" class="hidden">
                <div class="flex items-center gap-3">
                    <input type="file" id="upload-files" multiple class="w-full text-xs text-slate-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100 cursor-pointer border border-dashed border-slate-300 bg-white p-1 rounded-md">
                </div>
            </div>`;
        },

        getDetailReadOnlyCard: function (item, warningBadgeHTML, effCommit, annVal, totCommit, cleanStart, cleanEnd, contractEnd, adjEnd, docLinks, globalEditMode) {
            const d = item.data;

            const legalEntity = d.legalEntity || "";
            const costCenter = d.costCenter || "";
            const status = d.status || "ACTIVE";
            const scope = d.scope || "";
            const expType = d.expenditureType || "OPEX";
            const location = d.location || "N/A";
            const serviceOwner = d.serviceOwner || "TBD";
            const blId = d.blId || "—";
            const requestCode = d.requestCode || "—";
            const term = d.contractTerm || "—";
            const recurrence = d.costRecurrence || "Recurrent";
            const cId = d.contractId || "NEW_LINE";
            const pricingModel = d.pricingModel || "Flat";
            const billingTerms = d.billingTerms || "Linear";
            const billingFreq = d.billingFrequency || "Monthly";

            const fullBilling = (billingTerms === "Fixed Recurring" || billingTerms === "Linear" || billingTerms === "Quarterly") ? `Fixed Recurring (${billingFreq})` : billingTerms;
            const statusClass = status === 'ACTIVE' ? 'bg-emerald-50 text-emerald-700 border-emerald-200/50' : status === 'EXPIRED' ? 'bg-rose-50 text-rose-600 border-rose-200/50' : 'bg-amber-50 text-amber-700 border-amber-200/50';

            const formatFinance = (val) => (val || 0).toLocaleString('it-IT', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
            const annValNum = ContractsUtils.parseFinancialValue(d.annualValue);
            const effRunRateNum = ContractsUtils.parseFinancialValue(d.effectiveRunRate) || annValNum;
            const effRunRate = formatFinance(effRunRateNum);
            const isDiscounted = effRunRateNum !== annValNum;

            let splitBadge = item.splits && item.splits.length > 0 ? `<button onclick="ContractsController.toggleCardSection(${item.id}, 'splits', event)" class="px-2 py-0.5 bg-indigo-50 hover:bg-indigo-600 text-indigo-700 hover:text-white border border-indigo-200 rounded text-[9px] font-black uppercase tracking-wider shadow-sm flex items-center gap-1 cursor-pointer transition-colors" title="Click to view Allocation Splits">Splits <span class="bg-white text-indigo-700 rounded-full px-1 py-0.5 text-[7px] leading-none">${item.splits.length}</span></button>` : '';
            let ledgerBadge = item.ledger && item.ledger.length > 0 ? `<button onclick="ContractsController.toggleCardSection(${item.id}, 'ledger', event)" class="px-2 py-0.5 bg-amber-50 hover:bg-amber-600 text-amber-700 hover:text-white border border-amber-200 rounded text-[9px] font-black uppercase tracking-wider shadow-sm flex items-center gap-1 cursor-pointer transition-colors" title="Click to view Ledger Movements">Ledger <span class="bg-white text-amber-700 rounded-full px-1 py-0.5 text-[7px] leading-none">${item.ledger.length}</span></button>` : '';
            let docsHtml = docLinks.length > 0 ? `<div class="flex gap-1">${docLinks.map((url, idx) => `<a href="#" target="_blank" class="live-doc-link px-2 py-0.5 bg-slate-50 text-slate-600 hover:bg-slate-600 hover:text-white border border-slate-200 rounded-md text-[8px] font-black uppercase tracking-wider flex items-center gap-1 transition-all shadow-sm" data-raw="${url.trim()}"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg> Doc ${idx + 1}</a>`).join('')}</div>` : '';

            const actionsHtml = globalEditMode ? `
                <div class="flex items-center gap-1.5 shrink-0 ml-4" onclick="event.stopPropagation();">
                    <button onclick="cloneDetailRowItem(${item.id})" class="px-2.5 py-1 bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold rounded-lg text-[9px] uppercase tracking-wider border border-slate-200 shadow-sm transition-colors">Clone</button>
                    <button onclick="ContractsController.openContractModalWindow(${item.id})" class="px-3 py-1 bg-teal-50 hover:bg-teal-700 text-teal-700 hover:text-white font-black rounded-lg text-[9px] uppercase tracking-wider border border-teal-100 transition-colors shadow-sm">Modify Line ⚙️</button>
                </div>` : '';

            let splitsReadOnlyHtml = '';
            if (item.splits && item.splits.length > 0) {
                splitsReadOnlyHtml = `
                <div id="read-splits-${item.id}" class="hidden p-3 bg-indigo-50/40 rounded-xl border border-indigo-100 text-[10px] w-full mt-3 animate-fade-in pointer-events-auto" onclick="event.stopPropagation()">

                                <button type="button" onclick="ContractsController.addLedgerRowToUI(${id})" class="text-[9px] font-black text-white bg-amber-600 hover:bg-amber-700 px-3 py-1.5 border border-amber-700 rounded-lg shadow-sm transition-colors cursor-pointer">+ Add Manual Row</button>
                            </div>
                        </div>
                        <div id="ledger-container-${id}" class="space-y-1.5 flex-1 overflow-y-auto custom-scrollbar pr-2 pb-8">
                            <div class="${roWrapperClass}">
                                ${ledgerHtml}
                            </div>
                        </div>
                    </div>
                </div>

                <div id="modal-tab-content-splits-${id}" class="hidden animate-fade-in h-full">
                    <div class="bg-indigo-50/40 p-4 rounded-xl border border-indigo-100 shadow-inner h-full flex flex-col min-h-[400px]">
                        <div class="flex justify-between items-center mb-3 border-b border-indigo-200/50 pb-2 shrink-0">
                            <div>
                                <h4 class="text-[12px] text-indigo-800 font-black uppercase tracking-widest">Granular Cost Allocation</h4>
                                <p class="text-[10px] text-indigo-600/80 italic mt-0.5">Leave empty to assign 100% to main corporate entity context.</p>
                            </div>
                            <button type="button" onclick="ContractsController.addSplitRowToUI(${id})" class="${hiddenBlock} text-[9px] font-black text-white bg-indigo-600 hover:bg-indigo-700 px-3 py-1.5 border border-indigo-700 rounded-lg shadow-sm transition-colors cursor-pointer">+ Add Split Row</button>
                        </div>
                        <div id="splits-container-${id}" class="space-y-1.5 flex-1 overflow-y-auto custom-scrollbar pr-2 pb-8">
                            <div class="${roWrapperClass}">
                                ${splitsHtml}
                            </div>
                        </div>
                    </div>
                </div>

                <div id="modal-tab-content-metadata-${id}" class="hidden space-y-4 animate-fade-in">
                    <div class="border border-dashed border-slate-300 bg-slate-50 p-4 rounded-xl shadow-inner mt-1">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Upload Line Level Attachments</label>
                        ${docLinks.length > 0 ? `
                            <div class="mb-3 bg-white p-2 rounded border border-slate-200 pointer-events-auto">
                                <span class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Currently Attached Files:</span>
                                <div class="flex flex-wrap gap-1.5">
                                    ${docLinks.map((url, idx) => `
                                        <div class="flex items-center gap-0 bg-indigo-50 border border-indigo-200 rounded-md shadow-sm overflow-hidden group">
                                            <a href="${url.trim()}" target="_blank" class="live-doc-link px-2 py-0.5 text-indigo-700 hover:bg-indigo-600 hover:text-white text-[8px] font-black uppercase tracking-wider flex items-center gap-1 transition-colors" data-raw="${url.trim()}" title="${url.trim()}">
                                                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                                Doc ${idx + 1}
                                            </a>
                                            <button type="button" onclick="ContractsUtils.removeDocumentLink(event, '${url.trim()}', false, ${id})" class="${hiddenBlock} px-1.5 py-0.5 text-indigo-400 hover:bg-rose-500 hover:text-white transition-colors border-l border-indigo-200 cursor-pointer">×</button>
                                        </div>`).join('')}
                                </div>
                            </div>` : ''}
                        <input type="text" id="edit-contractLinks-${id}" value="${d.contractLinks || ''}" class="hidden">
                        <div class="${hiddenBlock}">
                            <input type="file" id="upload-files-${id}" multiple class="w-full text-xs text-slate-500 p-1.5 rounded-lg border border-dashed border-slate-300 bg-white cursor-pointer pointer-events-auto">
                        </div>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">
                        <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest block mb-2">Private Identifiers & Annotations</span>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block mb-0.5 text-[8px] font-black uppercase text-slate-400">Business Line ID (BL ID)</label>
                                <input type="text" id="edit-blId-${id}" ${ro} placeholder="e.g. BL-IT-9923..." class="w-full p-2 bg-white border border-slate-300 rounded-lg font-mono font-bold text-xs transition-colors ${roInputClass}" value="${d.blId || ''}">
                            </div>
                            <div>
                                <label class="block mb-0.5 text-[8px] font-black uppercase text-slate-400">Procurement Request Code</label>
                                <input type="text" id="edit-requestCode-${id}" ${ro} placeholder="e.g. PR-002341..." class="w-full p-2 bg-white border border-slate-300 rounded-lg font-mono font-bold text-xs transition-colors ${roInputClass}" value="${d.requestCode || ''}">
                            </div>
                        </div>
                        <div class="pt-4 border-t border-slate-200/60 mt-4">
                            <label class="block mb-0.5 text-[8px] font-black uppercase text-slate-400">Private Internal Annotations</label>
                            <textarea id="edit-comments-${id}" ${ro} rows="3" placeholder="Add extra operational comments..." class="w-full p-2 bg-white border border-slate-300 rounded-lg font-medium text-xs italic text-slate-600 custom-scrollbar resize-y min-h-[40px] max-h-[120px] transition-colors ${roInputClass}">${d.comments || ''}</textarea>
                        </div>
                    </div>
                </div>

            </div>

            <div class="flex flex-wrap items-center gap-x-4 gap-y-2 mt-3 mb-3 px-4 py-2.5 bg-indigo-50/50 border border-indigo-100 rounded-lg shrink-0 pointer-events-auto shadow-inner">
                <div class="flex items-center gap-1.5"><span class="text-[9px] font-black text-indigo-800 uppercase tracking-widest">Master Link:</span><span class="text-[10px] font-bold text-slate-700">${masterIdStr}</span></div>
                <div class="w-px h-3 bg-indigo-200 hidden sm:block"></div>
                <div class="flex items-center gap-1.5"><span class="text-[9px] font-black text-indigo-800 uppercase tracking-widest">Master Start:</span><span class="text-[10px] font-bold text-slate-700">${masterStartStr}</span></div>
                <div class="w-px h-3 bg-indigo-200 hidden sm:block"></div>
                <div class="flex items-center gap-1.5"><span class="text-[9px] font-black text-indigo-800 uppercase tracking-widest">Master End:</span><span class="text-[10px] font-bold text-slate-700">${masterEndStr}</span></div>
                <div class="w-px h-3 bg-indigo-200 hidden md:block"></div>
                <div class="flex items-center gap-1.5"><span class="text-[9px] font-black text-indigo-800 uppercase tracking-widest">Master Commitment:</span><span class="text-[10px] font-black text-slate-900 font-mono">€ ${masterCommitment}</span></div>
            </div>

            <div class="flex justify-between items-center pt-3 border-t border-slate-100 shrink-0 bg-white z-10 pointer-events-auto">
                <div class="${hiddenBtns}">
                    <button onclick="ContractsController.removeRowFromLocalArchitecture(${id}); ContractsController.closeContractModalWindow()" class="px-3 py-1.5 bg-rose-50 border border-rose-200 text-rose-600 font-black uppercase tracking-wider text-[10px] rounded-xl hover:bg-rose-100 transition-colors cursor-pointer">Delete Line</button>
                </div>
                <div class="flex gap-2 w-full justify-end">
                    <button onclick="ContractsController.closeContractModalWindow()" class="px-4 py-2 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 cursor-pointer">${isEditMode ? 'Cancel' : 'Close'}</button>
                    <button onclick="ContractsController.saveRowLocalChanges(${id})" class="${hiddenBtns} px-6 py-2 bg-teal-700 hover:bg-teal-800 text-white font-black uppercase tracking-wider rounded-xl shadow-md cursor-pointer transition-colors">Apply Modifications</button>
                </div>
            </div>
        </div>
        `;
        },

        getSplitRow: function (detailId, split, defaultStartDate, defaultEndDate, leOptions, ccOptions) {
            const rule = split.allocationRule || "Percentage";
            const validFrom = typeof FinOpsDate !== 'undefined' ? (FinOpsDate.toIso(split.validFrom) || defaultStartDate) : defaultStartDate;
            const validTo = typeof FinOpsDate !== 'undefined' ? (FinOpsDate.toIso(split.validTo) || defaultEndDate) : defaultEndDate;
            const notes = split.notes || "";

            let rawVal = "";
            if (rule === "Percentage") {
                let pShare = parseFloat(split.percentageShare);
                if (!isNaN(pShare)) rawVal = (pShare > 0 && pShare <= 1) ? Math.round(pShare * 100) : Math.round(pShare);
            } else if (rule === "Fixed Amount") {
                rawVal = Math.round(split.fixedAmount || 0);
            } else if (rule === "Units") {
                rawVal = Math.round(split.unitsAssigned || 0);
            }

            let displayVal = rawVal;
            if (rawVal !== "" && rule === "Fixed Amount") displayVal = parseInt(rawVal, 10).toLocaleString('it-IT');

            const targetLe = split.targetLegalEntity || "";
            const targetCc = split.targetCostCenter || "";

            return `
        <div class="split-row-item bg-white p-2 border border-slate-200 rounded-md shadow-sm relative animate-fade-in mb-1.5">
            <div class="flex flex-wrap md:flex-nowrap gap-1.5 items-end">
                <div class="w-full md:w-[20%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Target Entity</label>
                    <select class="split-le w-full text-[9px] p-1 bg-slate-50 border border-slate-200 rounded font-bold text-slate-700"><option value="" disabled ${!targetLe ? 'selected' : ''}>Select...</option>${leOptions.replace(`value="${targetLe}"`, `value="${targetLe}" selected`)}</select>
                </div>
                <div class="w-full md:w-[20%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Cost Center</label>
                    <select class="split-cc w-full text-[9px] p-1 bg-slate-50 border border-slate-200 rounded font-bold text-slate-700"><option value="" disabled ${!targetCc ? 'selected' : ''}>Select...</option>${ccOptions.replace(`value="${targetCc}"`, `value="${targetCc}" selected`)}</select>
                </div>
                <div class="w-full md:w-[15%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Rule</label>
                    <select class="split-rule w-full text-[9px] p-1 bg-slate-50 border border-slate-200 rounded text-indigo-700 font-bold" onchange="ContractsController.updateSplitPlaceholder(this)">
                        <option value="Percentage" ${rule === 'Percentage' ? 'selected' : ''}>Percentage %</option>
                        <option value="Fixed Amount" ${rule === 'Fixed Amount' ? 'selected' : ''}>Fixed Amount €</option>
                        <option value="Units" ${rule === 'Units' ? 'selected' : ''}>Units</option>
                    </select>
                </div>
                <div class="w-full md:w-[13%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Value</label>
                    <input type="text" class="split-val w-full text-[10px] p-1 bg-white border border-slate-300 rounded font-mono text-slate-800" placeholder="${rule === 'Percentage' ? '% (e.g. 50)' : (rule === 'Fixed Amount' ? '€' : 'Qty')}" value="${displayVal}" oninput="ContractsUtils.formatSplitValue(this)">
                </div>
                <div class="w-full md:w-[14%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Valid From</label>
                    <input type="date" class="split-from w-full text-[9px] p-0.5 bg-white border border-slate-300 rounded font-mono text-slate-700" value="${validFrom}">
                </div>
                <div class="w-full md:w-[14%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Valid To</label>
                    <input type="date" class="split-to w-full text-[9px] p-0.5 bg-white border border-slate-300 rounded font-mono text-slate-700" value="${validTo}">
                </div>
                <button type="button" onclick="this.closest('.split-row-item').remove()" class="text-slate-300 hover:text-rose-500 pb-1.5 px-1 transition-colors shrink-0" title="Remove Rule"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <div class="mt-1 border-t border-slate-100 pt-1">
                <input type="text" class="split-notes w-full text-[9px] p-1 bg-slate-50 border border-slate-200 rounded text-slate-600 italic" placeholder="Add notes (e.g. Approved by CFO...)" value="${notes}">
            </div>
        </div>`;
        },

        getLedgerRow: function (detailId, mov) {
            const type = (mov.type || "ACTUAL").toUpperCase();
            const sDate = typeof FinOpsDate !== 'undefined' ? FinOpsDate.toIso(mov.startDate || mov.StartDate) : "";
            const eDate = typeof FinOpsDate !== 'undefined' ? FinOpsDate.toIso(mov.endDate || mov.EndDate) : "";
            const amount = mov.amount != null ? parseInt(mov.amount, 10).toLocaleString('it-IT') : "";
            const notes = mov.notes || "";

            const isCalculated = type === "CALCULATED";
            const bgClass = isCalculated ? "bg-slate-100 opacity-70" : "bg-white";
            const readOnlyAttr = isCalculated ? "readonly disabled" : "";

            return `
            <div class="ledger-row-item flex flex-wrap md:flex-nowrap gap-1.5 items-end ${bgClass} p-2 border border-slate-200 rounded-md shadow-sm relative animate-fade-in mb-1.5">
                <div class="w-full md:w-[20%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Start Date</label>
                    <input type="date" class="ledger-start w-full text-[9px] p-1 border border-slate-200 rounded font-mono text-slate-700" value="${sDate}" ${readOnlyAttr}>
                </div>
                <div class="w-full md:w-[20%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">End Date</label>
                    <input type="date" class="ledger-end w-full text-[9px] p-1 border border-slate-200 rounded font-mono text-slate-700" value="${eDate}" ${readOnlyAttr}>
                </div>
                <div class="w-full md:w-[15%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Type</label>
                    <select class="ledger-type w-full text-[9px] p-1 border border-slate-200 rounded font-bold text-slate-700" ${readOnlyAttr}>
                        <option value="ACTUAL" ${type === 'ACTUAL' ? 'selected' : ''}>ACTUAL</option>
                        <option value="FORECAST" ${type === 'FORECAST' ? 'selected' : ''}>FORECAST</option>
                        <option value="CREDIT" ${type === 'CREDIT' ? 'selected' : ''}>CREDIT (Discount)</option>
                        ${isCalculated ? `<option value="CALCULATED" selected>CALCULATED</option>` : ''}
                    </select>
                </div>
                <div class="w-full md:w-[15%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Amount (€)</label>
                    <input type="text" class="ledger-amount w-full text-[10px] p-1 border border-slate-300 rounded font-mono text-slate-800" placeholder="e.g. 15.000" value="${amount}" oninput="ContractsUtils.formatLedgerValue(this)" ${readOnlyAttr}>
                </div>
                <div class="w-full md:w-[30%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Notes</label>
                    <input type="text" class="ledger-notes w-full text-[9px] p-1 border border-slate-200 rounded italic text-slate-600" placeholder="Invoice # or desc..." value="${notes}" ${readOnlyAttr}>
                </div>
                ${!isCalculated ? `
                <div class="flex items-center gap-1 pb-1.5 shrink-0">
                    <button type="button" onclick="duplicateLedgerRowInUI(this, ${detailId})" class="text-slate-300 hover:text-teal-600 px-1 transition-colors" title="Duplicate Movement">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                    </button>
                    <button type="button" onclick="this.closest('.ledger-row-item').remove()" class="text-slate-300 hover:text-rose-500 px-1 transition-colors" title="Remove Movement">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                ` : `<div class="px-2 pb-1.5 text-slate-400 cursor-not-allowed" title="Auto-generated by Engine">⚙️</div>`}
            </div>`;
        }
    };
</script>
