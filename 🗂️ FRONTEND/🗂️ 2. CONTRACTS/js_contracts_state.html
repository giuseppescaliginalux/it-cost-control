<script>
    /**
     * js_contracts_state.html
     * MODEL: Centralized state management for the Contracts Center.
     * Ragiona esclusivamente in formato DTO camelCase puro.
     */
    const ContractsState = {
        currentSelectedAsset: null,
        currentAssetGroupIds: [],
        currentMasterData: null,
        currentDetailItems: [],
        isMasterEditable: false,
        hasUnsavedChanges: false,
        globalEditMode: false,
        deletedContractIds: [],
        deletedMasterIds: [],
        lastDirtyMasterId: null,

        resetMaster: function () {
            this.currentMasterData = { masterId: "", supplier: "", scope: "", comments: "" };
            this.currentDetailItems = [];
            this.isMasterEditable = true;
            this.hasUnsavedChanges = true;
        },

        loadMasterDetails: function (masterId, allMasterContracts, allContracts, allocationSplits, ledger) {
            const cleanId = String(masterId).trim();
            this.currentMasterData = allMasterContracts.find(m => String(m.masterId || "").trim() === cleanId);
            const rawDetails = allContracts.filter(c => String(c.masterId || "").trim() === cleanId);

            rawDetails.sort((a, b) => {
                const dA = a.adjustedEndDate || a.contractEndDate || a.endDate;
                const dB = b.adjustedEndDate || b.contractEndDate || b.endDate;
                return (dB ? new Date(dB).getTime() : 0) - (dA ? new Date(dA).getTime() : 0);
            });

            this.currentDetailItems = rawDetails.map((row, index) => {
                const cId = String(row.contractId || "").trim();
                return {
                    id: index,
                    isEditing: false,
                    data: row,
                    splits: allocationSplits.filter(s => String(s.contractId || "").trim() === cId),
                    ledger: ledger.filter(l => String(l.contractId || "").trim() === cId)
                };
            });
            this.isMasterEditable = false;
            this.hasUnsavedChanges = false;
        },

        addNewDetailRow: function () {
            const newId = this.currentDetailItems.length > 0 ? Math.max(...this.currentDetailItems.map(i => i.id)) + 1 : 0;
            this.currentDetailItems.push({
                id: newId, isEditing: true, splits: [], ledger: [],
                data: { status: "ACTIVE", costRecurrence: "Recurrent", totalCommitment: 0, contractId: "", contractRef: "" }
            });
            this.hasUnsavedChanges = true;
        },

        cloneDetailRow: function (id) {
            const itemToClone = this.currentDetailItems.find(i => i.id === id);
            if (!itemToClone) return false;
            const newId = this.currentDetailItems.length > 0 ? Math.max(...this.currentDetailItems.map(i => i.id)) + 1 : 0;
            const clonedData = JSON.parse(JSON.stringify(itemToClone.data));
            clonedData.scope = ""; clonedData.contractId = ""; clonedData.status = "ACTIVE"; clonedData.contractLinks = "";
            this.currentDetailItems.push({ id: newId, isEditing: true, data: clonedData, splits: [], ledger: [] });
            this.hasUnsavedChanges = true;
            return true;
        },

        removeDetailRow: function (id) {
            this.currentDetailItems = this.currentDetailItems.filter(i => i.id !== id);
            this.hasUnsavedChanges = true;
        },

        setRowEditMode: function (id, editable) {
            const item = this.currentDetailItems.find(i => i.id === id);
            if (item) item.isEditing = editable;
        },

        updateMasterEditState: function (editable) {
            this.isMasterEditable = editable;
        }
    };
</script>
