<script>
    /**
     * js_contracts_utils.html
     * UTILITIES: Pure functions, data formatters, validation and DOM helpers.
     */

    const ContractsUtils = {
        extractUniqueField: function (arr, key) {
            return [...new Set((arr || []).map(x => x[key]).filter(Boolean))].sort();
        },

        parseFinancialValue: function (v) {
            return typeof v === 'number' ? v : parseFloat(String(v || 0).replace(/[^0-9.-]/g, '')) || 0;
        },

        formatToEnglishCustomDate: function (d) {
            return d ? new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
        },

        formatInputAsIntegerCurrency: function (el) {
            el.value = (parseInt(el.value.replace(/[^0-9]/g, ''), 10) || 0).toLocaleString('it-IT');
        },

        // REINSERITA: Formattazione per la griglia degli split
        formatSplitValue: function (el) {
            const rule = el.closest('.split-row-item').querySelector('.split-rule').value;
            if (rule === 'Fixed Amount' || rule === 'Units') {
                let val = parseInt(el.value.replace(/[^0-9]/g, ''), 10) || 0;
                el.value = val === 0 && el.value.trim() === '' ? '' : val.toLocaleString('it-IT');
            } else {
                let val = el.value.replace(/[^0-9]/g, '');
                if (parseInt(val, 10) > 100) val = '100';
                el.value = val;
            }
        },

        // REINSERITA: Formattazione per il ledger
        formatLedgerValue: function (el) {
            let val = parseInt(el.value.replace(/[^0-9-]/g, ''), 10) || 0;
            el.value = val === 0 && el.value.trim() === '' ? '' : val.toLocaleString('it-IT');
        },

        // REINSERITA: Regole di Governance vitali invocate dal Controller
        validateContractData: function (d) {
            if (!d.legalEntity) throw new Error("Governance: Legal Entity is strictly mandatory.");
            if (!d.costCenter) throw new Error("Governance: Cost Center is strictly mandatory.");
            if (!d.startDate) throw new Error("Governance: Contract Start Date is strictly mandatory.");
            if (!d.contractEndDate) throw new Error("Governance: Contract End Date is strictly mandatory.");
            if (d.startDate && d.contractEndDate && new Date(d.startDate) > new Date(d.contractEndDate)) {
                throw new Error("Timeline Error: Start Date cannot be later than End Date.");
            }
            if (!d.totalCommitment || d.totalCommitment <= 0) {
                throw new Error("Financial Error: Total Commitment must be greater than zero.");
            }
        },

        // REINSERITA: Rimozione visiva e stringa base64 degli allegati
        removeDocumentLink: function (event, urlToRemove, isMaster, detailId) {
            event.preventDefault();
            event.stopPropagation();

            const processRemoval = (inputId) => {
                const linkInput = document.getElementById(inputId);
                if (linkInput) {
                    let links = linkInput.value.split(',').map(s => s.trim()).filter(Boolean);
                    links = links.filter(l => l !== urlToRemove);
                    linkInput.value = links.join(', ');
                    event.target.closest('.group').remove();
                }
            };

            if (isMaster) {
                processRemoval('ins-masterDocumentLink');
            } else {
                processRemoval(`edit-contractLinks-${detailId}`);
            }
        }
    };
</script>
