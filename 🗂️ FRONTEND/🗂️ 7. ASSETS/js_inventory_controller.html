<script>
    /**
     * ============================================================================
     * MODULO ASSET INVENTORY: CONTROLLER
     * ============================================================================
     */
    const InventoryController = {

        // INIZIALIZZAZIONE COMPLETA (Risolto il problema delle tendine vuote e dei totali a zero)
        initWorkspace: function () {
            const container = document.getElementById('tab-inventory');
            if (!container) return;

            container.innerHTML = InventoryTemplates.getWorkspaceLayout();

            // Sincronizza i filtri usando i metodi interni aggiornati
            this.setupDynamicSlider(globalCachedData);
            this.populateAssetFilters();
            this.populateContractFilters();

            this.syncFiltersUIFromState();
            this.applyFiltersAndSort();
        },

        // APPLICAZIONE DEI FILTRI E RENDERING DELLA TABELLA PRINCIPALE
        applyFiltersAndSort: function () {
            const searchInput = document.getElementById('search-input');
            const sortSelect = document.getElementById('sort-select');
            const sliderInput = document.getElementById('budget-slider');

            if (searchInput) InventoryState.filters.search = searchInput.value.toLowerCase().trim();
            if (sortSelect) InventoryState.sort.by = sortSelect.value;
            if (sliderInput) {
                InventoryState.filters.minRunRate = parseFloat(sliderInput.value) || 0;
                const budgetValDisplay = document.getElementById('budget-val');
                if (budgetValDisplay) budgetValDisplay.textContent = InventoryState.filters.minRunRate.toLocaleString('it-IT');
            }

            // Recupera gli Asset filtrati e ordinati dallo State
            const filteredAssets = InventoryState.getFilteredAndSortedAssets();

            const tableBody = document.getElementById('live-table-body');
            if (!tableBody) return;

            if (filteredAssets.length === 0) {
                tableBody.innerHTML = `<p class="text-slate-400 italic text-center py-8 text-xs">No technology assets match the active filters.</p>`;
                return;
            }

            let htmlBuffer = '';
            const today = new Date();
            const alertThreshold = new Date();
            alertThreshold.setDate(today.getDate() + 30);

            filteredAssets.forEach(row => {
                const name = row["Asset Name"] || row.asset_name || "Unknown Asset";
                const manufacturer = row["Manufacturer"] || "";
                const businessDriver = row["Business Driver"] || "Technology";
                const status = (row["Current Status"] || "Active").toUpperCase().trim();
                const target = row["Target Status"] || "-";
                const budgetStatus = row["Budget Status (FY27)"] || row["Budget Status"] || "";
                const exitDate = row["Exit Date"] || "";
                const lastEndDate = row["Last End Date"] ? new Date(row["Last End Date"]) : null;

                const runRate = parseFloat(row["Run Rate"]) || 0;
                const costImprovement = parseFloat(row["Cost Improvement"]) || 0;
                const fiscalProjection = parseFloat(row["Fiscal Projection (FY27)"] || row["Fiscal FY27"] || row["Fiscal Projection"] || 0);

                const isActiveGroup = ["RUNNING", "EXPIRED", "OPTIMIZNG", "ACTIVE"].includes(status);
                const isInactiveGroup = ["DISMISSED", "TRANSFERRED", "EXTNG", "EXITING"].includes(status);
                const safeDOMId = btoa(encodeURIComponent(name)).replace(/=/g, "");

                const showBudgetBadge = budgetStatus && budgetStatus.toUpperCase().trim() !== "NOT BUDGETED" && budgetStatus.trim() !== "-";

                let alertClass = ""; let alertLabel = "";
                if (lastEndDate) {
                    if (lastEndDate <= today && ["RUNNING", "OPTIMIZNG", "ACTIVE"].includes(status)) {
                        alertClass = "border-l-4 border-l-rose-500 bg-rose-50/20";
                        alertLabel = `<span class="ml-2 text-[8px] font-black uppercase tracking-widest text-rose-600 bg-rose-100 px-1.5 py-0.5 rounded">Overdue</span>`;
                    } else if (lastEndDate <= alertThreshold && lastEndDate > today) {
                        alertClass = "border-l-4 border-l-amber-500 bg-amber-50/20";
                        alertLabel = `<span class="ml-2 text-[8px] font-black uppercase tracking-widest text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded animate-pulse">Expiring</span>`;
                    }
                }

                let datesHtml = "";
                if (isActiveGroup && lastEndDate) datesHtml = `<span>End: <span class="text-slate-600">${lastEndDate.formatDashboardDate()}</span></span>`;
                if (isInactiveGroup && exitDate) datesHtml = `<span>Exit: <span class="text-slate-600">${exitDate.formatDashboardDate()}</span></span>`;

                const statusBadge = InventoryTemplates.getCurrentStatusBadge(status);
                const targetBadge = InventoryTemplates.getTargetStatusText(target);
                const budgetBadge = showBudgetBadge ? InventoryTemplates.getBudgetStatusBadge(budgetStatus) : '<span class="text-slate-300 font-mono select-none">—</span>';

                const financials = {
                    outlook: fiscalProjection.formatCurrency(),
                    mainValue: isInactiveGroup ? costImprovement.formatCurrency() : runRate.formatCurrency(),
                    mainLabel: isInactiveGroup ? "Cost Improvement" : "Annual Run Rate",
                    colorClass: isInactiveGroup ? "text-emerald-600" : "text-slate-900",
                    labelColorClass: isInactiveGroup ? "text-emerald-500" : "text-slate-400"
                };

                htmlBuffer += InventoryTemplates.getAssetRow(
                    { name, manufacturer, driver: businessDriver, datesHtml },
                    safeDOMId, alertClass, alertLabel, statusBadge, targetBadge, budgetBadge, financials
                );
            });

            tableBody.innerHTML = htmlBuffer;

            // Ricalcolo e compilazione immediata dei riepiloghi numerici in alto a sinistra
            let sumRunRate = 0; let sumOutlook = 0;
            filteredAssets.forEach(row => {
                sumRunRate += parseFloat(row["Run Rate"]) || 0;
                sumOutlook += parseFloat(row["Fiscal Projection (FY27)"] || row["Fiscal FY27"] || row["Fiscal Projection"]) || 0;
            });

            if (document.getElementById('asset-count-badge')) document.getElementById('asset-count-badge').textContent = filteredAssets.length + " Assets";
            if (document.getElementById('filter-runrate-val')) document.getElementById('filter-runrate-val').textContent = this.formatFilterValue(sumRunRate);
            if (document.getElementById('filter-outlook-val')) document.getElementById('filter-outlook-val').textContent = this.formatFilterValue(sumOutlook);

            if (InventoryState.expandedAssetId) {
                this.reopenAssetDrawerUIVisually(InventoryState.expandedAssetId);
            }
        },

        // APERTURA/CHIUSURA DEL CASSETTO DELL'ASSET (ACCORDION LIVELLO 1)
        toggleAssetDrawer: function (assetName, safeDOMId) {
            const container = document.getElementById(`details-${safeDOMId}`);
            const arrow = document.getElementById(`arrow-${safeDOMId}`);
            if (!container || !arrow) return;

            if (!container.classList.contains('hidden')) {
                container.classList.add('hidden');
                arrow.style.transform = "rotate(0deg)";
                arrow.classList.remove('text-teal-600');
                if (InventoryState.expandedAssetId === safeDOMId) InventoryState.expandedAssetId = null;
                return;
            }

            if (InventoryState.expandedAssetId) {
                const oldContainer = document.getElementById(`details-${InventoryState.expandedAssetId}`);
                const oldArrow = document.getElementById(`arrow-${InventoryState.expandedAssetId}`);
                if (oldContainer) oldContainer.classList.add('hidden');
                if (oldArrow) { oldArrow.style.transform = "rotate(0deg)"; oldArrow.classList.remove('text-teal-600'); }
            }

            container.classList.remove('hidden');
            arrow.style.transform = "rotate(90deg)";
            arrow.classList.add('text-teal-600');

            InventoryState.expandedAssetId = safeDOMId;
            InventoryState.expandedMasterId = null;

            InventoryState.loadAssetDrillDownData(assetName);
            this.switchDetailTab(safeDOMId, 'contracts');
        },

        reopenAssetDrawerUIVisually: function (safeDOMId) {
            const container = document.getElementById(`details-${safeDOMId}`);
            const arrow = document.getElementById(`arrow-${safeDOMId}`);
            if (container && arrow) {
                container.classList.remove('hidden');
                arrow.style.transform = "rotate(90deg)";
                arrow.classList.add('text-teal-600');
                this.renderContractsTabContent(safeDOMId);
            }
        },

        // NAVIGAZIONE INTERNA AI SOTTO-TAB DEL CASSETTO
        switchDetailTab: function (safeDOMId, tabType) {
            const contentDiv = document.getElementById(`tab-content-${safeDOMId}`);
            if (!contentDiv || !InventoryState.currentDrillDownData) return;

            ['contracts', 'alloc', 'initiatives'].forEach(t => {
                const btn = document.getElementById(`tab-btn-${t}-${safeDOMId}`);
                if (btn) {
                    btn.className = (t === tabType)
                        ? "pb-2 font-bold text-[10px] uppercase border-b-2 border-teal-700 text-teal-700 transition-all"
                        : "pb-2 font-bold text-[10px] uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition-all";
                }
            });

            contentDiv.innerHTML = '';

            if (tabType === 'contracts') {
                this.renderContractsTabContent(safeDOMId);
            }
            else if (tabType === 'alloc') {
                const dataList = InventoryState.currentDrillDownData.allocations || [];
                if (dataList.length === 0) { contentDiv.innerHTML = '<p class="text-slate-400 italic py-4 text-center text-xs">No allocations.</p>'; return; }
                let html = `<div class="overflow-hidden border border-slate-200 rounded-xl bg-white shadow-sm"><table class="w-full text-left text-[11px] border-collapse"><thead><tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-black uppercase tracking-widest"><th class="p-3 w-1/2">Budget Entry</th><th class="p-3 text-right w-1/4">Original Amount</th><th class="p-3 text-right w-1/4">Allocated Share</th></tr></thead><tbody class="divide-y divide-slate-100">`;
                let sumOriginal = 0; let sumEffective = 0;
                dataList.forEach(log => {
                    const origBudget = parseFloat(log["Original Budget"]) || 0; const effBudget = parseFloat(log["Effective Budget"]) || 0;
                    const coAssets = log.co_allocated_assets || []; sumOriginal += origBudget; sumEffective += effBudget;
                    let split = (parseFloat(log["Allocation Split %"]) || 0); if (split > 0 && split <= 1) split *= 100;
                    html += `<tr class="text-slate-600 font-medium hover:bg-slate-50/30"><td class="p-3 align-top"><div class="font-bold text-slate-900 leading-tight">${log["Allocation Alias"] || "N/A"}</div><div class="text-[9px] text-slate-400 mt-1 uppercase font-bold">${safeFormatStringDate(log["Valid From"])} → ${safeFormatStringDate(log["Valid To"])}</div></td><td class="p-3 text-right align-top font-mono text-slate-400 italic">€ ${origBudget.formatCurrency()}</td><td class="p-3 text-right align-top"><div class="text-teal-900 font-black font-mono text-sm">€ ${effBudget.formatCurrency()}</div><div class="mt-1"><span class="px-2 py-0.5 rounded border text-[9px] font-black uppercase ${split >= 99.9 ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 'text-teal-600 bg-teal-50 border-teal-100'}">${split.toFixed(1)}%</span></div></td></tr>`;
                    if (split < 99.9 && coAssets.length > 0) {
                        const sharedList = coAssets.map(co => `<span class="text-slate-700 font-bold">${co.asset_name}</span> <span class="text-teal-600 font-mono">(${(parseFloat(co.split_pct) * 100).toFixed(0)}%)</span>`).join('<span class="mx-3 text-slate-300">|</span>');
                        html += `<tr class="bg-slate-50/50"><td colspan="3" class="px-4 py-2 border-b border-slate-100 text-left"><div class="text-[10px] leading-relaxed"><span class="font-black text-slate-400 uppercase tracking-widest mr-2">↳ Co-allocated with:</span>${sharedList}</div></td></tr>`;
                    }
                });
                const totalRatio = sumOriginal > 0 ? (sumEffective / sumOriginal) * 100 : 0;
                html += `</tbody><tfoot><tr class="bg-slate-100/50 font-bold border-t-2 border-slate-200"><td class="p-3 text-slate-500 uppercase tracking-widest font-black text-[9px]">Total Portfolio Allocation</td><td class="p-3 text-right font-mono text-slate-400 italic"></td><td class="p-3 text-right bg-teal-100/10"><div class="text-teal-900 font-black text-sm font-mono">€ ${sumEffective.formatCurrency()}</div><div class="text-[9px] text-teal-600 uppercase tracking-tighter mt-0.5">${totalRatio.toFixed(1)}% of total budget</div></td></tr></tfoot></table></div>`;
                contentDiv.innerHTML = html;
            }
            else if (tabType === 'initiatives') {
                const dataList = InventoryState.currentDrillDownData.initiatives || [];
                dataList.sort((a, b) => {
                    const dA = a["Target Date"] ? new Date(a["Target Date"]).getTime() : new Date(2099, 11, 31).getTime();
                    const dB = b["Target Date"] ? new Date(b["Target Date"]).getTime() : new Date(2099, 11, 31).getTime();
                    return dA - dB;
                });
                if (dataList.length === 0) { contentDiv.innerHTML = '<p class="text-slate-400 italic py-4 text-center text-xs">No initiatives linked to this asset.</p>'; return; }
                let html = '<div class="flex flex-col gap-2">';
                dataList.forEach(log => {
                    const isActual = (parseFloat(log["Actual Saving (Annualized)"]) || 0) > 0; const savingVal = isActual ? parseFloat(log["Actual Saving (Annualized)"]) : parseFloat(log["Target Saving (Annualized)"]);
                    const baselineVal = parseFloat(log["Baseline Spend (Annualized)"]) || 0; const savingPct = baselineVal > 0 ? Math.round((savingVal / baselineVal) * 100) : 0;
                    const borderClass = isActual ? "border-emerald-500 shadow-emerald-50" : "border-amber-500 shadow-amber-50";
                    html += `<div class="bg-white p-3 rounded-xl border-l-4 ${borderClass} border-slate-100 shadow-sm flex justify-between items-center gap-4 hover:shadow-md transition-shadow"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 mb-1"><span class="font-black text-slate-900 text-[13px] uppercase truncate">${log["Decision"]}</span><span class="px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500 text-[8px] font-black uppercase tracking-widest">${log["Initiative Status"]}</span></div><p class="text-[10px] text-slate-500 italic truncate opacity-80">"${log["Description"] || "No description."}"</p></div><div class="flex gap-3 items-center shrink-0"><div class="text-center px-3 border-r border-slate-100"><p class="text-[8px] text-slate-400 font-black uppercase mb-0.5 tracking-tighter">Target Date</p><p class="font-mono font-bold text-slate-800 text-[10px]">${safeFormatStringDate(log["Target Date"] || log["Actual Date"])}</p></div><div class="text-right px-3 border-r border-slate-100 hidden sm:block"><p class="text-[8px] text-slate-400 font-black uppercase mb-0.5 tracking-tighter">Baseline Spend</p><p class="font-mono font-bold text-slate-600 text-[10px]">€${baselineVal.formatCurrency()}</p></div><div class="text-right min-w-[85px]"><p class="text-[8px] text-emerald-500 font-black uppercase mb-0.5 tracking-tighter">${isActual ? 'Actual Saving' : 'Target Saving'}</p><div class="flex flex-col items-end gap-0.5"><p class="font-mono font-black text-emerald-700 text-xs">€${savingVal.formatCurrency()}</p>${savingPct > 0 ? `<span class="bg-emerald-100 text-emerald-700 text-[8px] font-bold px-1 py-0.5 rounded leading-none">-${savingPct}%</span>` : ''}</div></div></div></div>`;
                });
                contentDiv.innerHTML = html + '</div>';
            }
        },

        // RENDERING DEL SOTTO-TAB CONTRATTI
        renderContractsTabContent: function (safeDOMId) {
            const contentDiv = document.getElementById(`tab-content-${safeDOMId}`);
            if (!contentDiv) return;

            const assetContracts = InventoryState.currentDrillDownData.contracts || [];
            const linkedMasterIds = [...new Set(assetContracts.map(c => String(c["Master Contract ID"]).trim()).filter(Boolean))];

            const allMasters = windowPayload.masterContracts || [];
            const filteredMasters = allMasters.filter(m => linkedMasterIds.includes(String(m["Master Contract ID"]).trim()));

            let newMasterBtnHtml = '';

            // ⚡ FISSO: Rilevamento corretto dello stato senza window per sbloccare i pulsanti
            const isEditActive = typeof ContractsState !== 'undefined' && ContractsState.globalEditMode;

            if (isEditActive) {
                newMasterBtnHtml = `
                <div class="flex justify-end mb-2.5 animate-fade-in">
                    <button onclick="InventoryController.triggerCreateNewMaster()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-900 text-white font-black text-[9px] uppercase tracking-wider rounded-xl shadow-md transition-colors flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                        New Master Agreement
                    </button>
                </div>`;
            }

            if (filteredMasters.length === 0) {
                contentDiv.innerHTML = newMasterBtnHtml + `<p class="text-slate-400 italic text-center py-4 bg-white border border-dashed border-slate-200 rounded-xl text-xs">No Master Agreements associated with this asset.</p>`;
                return;
            }

            let htmlBuffer = newMasterBtnHtml + `<div class="flex flex-col gap-0">`;

            filteredMasters.forEach(master => {
                const mId = master["Master Contract ID"];
                const childContracts = assetContracts.filter(c => String(c["Master Contract ID"]).trim() === String(mId).trim());

                let childRowsHtml = '';
                childContracts.forEach(c => {
                    childRowsHtml += InventoryTemplates.getContractChildRowMarkup(c, isEditActive);
                });

                if (childRowsHtml === '') {
                    childRowsHtml = `<p class="text-slate-400 italic p-2 text-center text-[10px]">No operational rows linked.</p>`;
                }

                const isMasterExpanded = InventoryState.expandedMasterId === mId;

                htmlBuffer += InventoryTemplates.getTemplateOfMasterAccordion(
                    master, childRowsHtml, isMasterExpanded, isEditActive
                );
            });

            htmlBuffer += `</div>`;
            contentDiv.innerHTML = htmlBuffer;
        },

        // APERTURA/CHIUSURA FISARMONICA DEL MASTER (ACCORDION LIVELLO 2)
        toggleMasterAccordion: function (masterId) {
            const body = document.getElementById(`master-body-${masterId}`);
            const chevron = document.getElementById(`master-chevron-${masterId}`);
            if (!body) return;

            const isHidden = body.classList.contains('hidden');

            if (isHidden) {
                body.classList.remove('hidden');
                if (chevron) { chevron.style.transform = "rotate(90deg)"; chevron.classList.add('text-teal-600'); }
                InventoryState.expandedMasterId = masterId;
            } else {
                body.classList.add('hidden');
                if (chevron) { chevron.style.transform = "rotate(0deg)"; chevron.classList.remove('text-teal-600'); }
                if (InventoryState.expandedMasterId === masterId) InventoryState.expandedMasterId = null;
            }
        },

        // INNESTATORI DI AZIONE VERSO LE MEGA-MODALI
        triggerEditContract: function (contractId) {
            // ⚡ FIX: Uso esplicito di window per prevenire i ReferenceError silenziosi
            if (typeof window.ContractsController !== 'undefined' && typeof ContractsState !== 'undefined') {
                const masterId = (windowPayload.contracts.find(c => c["Contract ID"] === contractId) || {})["Master Contract ID"];
                if (masterId) {
                    ContractsState.loadMasterDetails(masterId, windowPayload.masterContracts, windowPayload.contracts, windowPayload.allocationSplits, windowPayload.ledger);
                    const assetMatch = windowPayload.assets.find(a => a["Asset Name"] === windowPayload.masterContracts.find(m => m["Master Contract ID"] === masterId)["Asset Name"]);
                    if (assetMatch) ContractsState.currentSelectedAsset = { name: assetMatch["Asset Name"], id: assetMatch["Asset ID"] };

                    const detailItem = ContractsState.currentDetailItems.find(item => item.data["Contract ID"] === contractId);
                    if (detailItem) {
                        window.ContractsController.openContractModalWindow(detailItem.id);
                    }
                }
            }
        },

        triggerAddContractLine: function (masterId) {
            // ⚡ FIX: Uso esplicito di window e chiamata alla funzione globale di add row
            if (typeof window.ContractsController !== 'undefined' && typeof ContractsState !== 'undefined') {
                ContractsState.loadMasterDetails(masterId, windowPayload.masterContracts, windowPayload.contracts, windowPayload.allocationSplits, windowPayload.ledger);
                const assetMatch = windowPayload.assets.find(a => a["Asset Name"] === windowPayload.masterContracts.find(m => m["Master Contract ID"] === masterId)["Asset Name"]);
                if (assetMatch) ContractsState.currentSelectedAsset = { name: assetMatch["Asset Name"], id: assetMatch["Asset ID"] };

                if (typeof addNewDetailRowItem === 'function') addNewDetailRowItem();
            }
        },

        triggerEditMaster: function (masterId) {
            if (typeof window.ContractsController !== 'undefined') {
                window.ContractsController.openMasterModalWindow(masterId);
            }
        },

        triggerCreateNewMaster: function () {
            if (typeof window.ContractsController !== 'undefined' && InventoryState.expandedAssetId) {
                const decodedAssetName = globalCachedData.find(a => btoa(encodeURIComponent(a["Asset Name"])).replace(/=/g, "") === InventoryState.expandedAssetId)["Asset Name"];
                const decodedAssetId = globalCachedData.find(a => btoa(encodeURIComponent(a["Asset Name"])).replace(/=/g, "") === InventoryState.expandedAssetId)["Asset ID"];
                ContractsState.currentSelectedAsset = { name: decodedAssetName, id: decodedAssetId };
                
                ContractsState.resetMaster();
                window.ContractsController.openMasterModalWindow("");
            }
        },

        triggerCloneContract: function (contractId) {
            if (typeof window.ContractsController !== 'undefined' && typeof ContractsState !== 'undefined') {
                const masterId = (windowPayload.contracts.find(c => c["Contract ID"] === contractId) || {})["Master Contract ID"];
                if (masterId) {
                    ContractsState.loadMasterDetails(masterId, windowPayload.masterContracts, windowPayload.contracts, windowPayload.allocationSplits, windowPayload.ledger);
                    const assetMatch = windowPayload.assets.find(a => a["Asset Name"] === windowPayload.masterContracts.find(m => m["Master Contract ID"] === masterId)["Asset Name"]);
                    if (assetMatch) ContractsState.currentSelectedAsset = { name: assetMatch["Asset Name"], id: assetMatch["Asset ID"] };
                    
                    const detailItem = ContractsState.currentDetailItems.find(item => item.data["Contract ID"] === contractId);
                    if (detailItem) {
                        if (ContractsState.cloneDetailRow(detailItem.id)) {
                            const latestItem = ContractsState.currentDetailItems[ContractsState.currentDetailItems.length - 1];
                            window.ContractsController.openContractModalWindow(latestItem.id);
                        }
                    }
                }
            }
        },

        resetAllFilters: function () {
            InventoryState.resetAllFilters();
            this.initWorkspace();
        },

        syncFiltersUIFromState: function () {
            const searchInput = document.getElementById('search-input');
            const slider = document.getElementById('budget-slider');
            if (searchInput) searchInput.value = InventoryState.filters.search;
            if (slider) slider.value = InventoryState.filters.minRunRate;
        },

        // --- NUOVO: METODI DI POPOLAMENTO FILTRI INTEGRATI NEL CONTROLLER ---
        populateContractFilters: function () {
            const contracts = windowPayload.contracts || [];
            const getUnique = (key) => [...new Set(contracts.map(c => (c[key] || "").toString().trim()).filter(v => v !== ""))].sort();

            const buildCheckboxes = (values, containerId) => {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = values.map(val => `
                    <label class="flex items-center gap-2 cursor-pointer group/cb">
                        <input type="checkbox" value="${val}" onchange="InventoryController.applyFiltersAndSort()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                        <span class="text-[11px] font-medium text-slate-600 group-hover/cb:text-slate-900 truncate">${val}</span>
                    </label>
                `).join('');
            };

            buildCheckboxes(getUnique("Billing Channel"), "filter-container-channel");
            buildCheckboxes(getUnique("Expenditure Type"), "filter-container-exp");
            buildCheckboxes(getUnique("Legal Entity"), "filter-container-legal");
            buildCheckboxes(getUnique("Supplier"), "filter-container-supplier");
            buildCheckboxes(getUnique("Cost Center"), "filter-container-costcenter");
            buildCheckboxes(getUnique("Location"), "filter-container-location");

            // Generazione Quick-Select Nazioni [XYZ]
            const uniqueLocations = getUnique("Location");
            const countrySet = new Set();
            uniqueLocations.forEach(loc => {
                const match = loc.match(/^\[([A-Z]{3})\]/);
                if (match) countrySet.add(match[1].trim().toUpperCase());
            });
            const uniqueCountries = Array.from(countrySet).sort();

            const quickSelectContainer = document.getElementById("location-country-quick-select");
            if (quickSelectContainer) {
                quickSelectContainer.innerHTML = uniqueCountries.map(c => `
                    <button type="button" onclick="InventoryController.toggleCountryLocations(event, '${c}')" class="text-[9px] font-black px-2 py-0.5 rounded bg-slate-100 text-slate-600 hover:bg-teal-600 hover:text-white border border-slate-200 transition-all uppercase tracking-wider">
                        ${c}
                    </button>
                `).join('');
            }
        },

        toggleCountryLocations: function (event, country) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const checkBoxes = document.querySelectorAll('#filter-container-location input');
            let targetBoxes = Array.from(checkBoxes).filter(cb => {
                const match = cb.value.match(/^\[([A-Z]{3})\]/);
                return match && match[1].trim().toUpperCase() === country.toUpperCase();
            });
            if (targetBoxes.length === 0) return;

            const allChecked = targetBoxes.every(cb => cb.checked);
            targetBoxes.forEach(cb => cb.checked = !allChecked);

            this.applyFiltersAndSort();
        },

        populateAssetFilters: function () {
            const assets = globalCachedData || [];

            const uniqueStatuses = [...new Set(assets.map(a => (a["Current Status"] || "").toString().trim().toUpperCase()).filter(v => v !== ""))].sort();
            const container = document.getElementById("status-filter-container");
            if (container) {
                container.innerHTML = uniqueStatuses.map(val => `
                    <label class="flex items-center gap-2 cursor-pointer group/cb">
                        <input type="checkbox" value="${val}" onchange="InventoryController.applyFiltersAndSort()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                        <span class="text-[11px] font-medium text-slate-600 group-hover/cb:text-slate-900 truncate">${val}</span>
                    </label>
                `).join('');
            }

            const uniqueBudgetStatuses = [...new Set(assets.map(a => (a["Budget Status (FY27)"] || a["Budget Status"] || "").toString().trim()).filter(v => v !== "" && v !== "-"))].sort();
            const budgetContainer = document.getElementById("budget-status-filter-container");
            if (budgetContainer) {
                budgetContainer.innerHTML = uniqueBudgetStatuses.map(val => `
                    <label class="flex items-center gap-2 cursor-pointer group/cb">
                        <input type="checkbox" value="${val}" onchange="InventoryController.applyFiltersAndSort()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                        <span class="text-[11px] font-medium text-slate-600 group-hover/cb:text-slate-900 truncate">${val}</span>
                    </label>
                `).join('');
            }

            const uniqueDrivers = [...new Set(assets.map(a => (a["Business Driver"] || "").toString().trim()).filter(v => v !== ""))].sort();
            const driverContainer = document.getElementById("driver-filter-container");
            if (driverContainer) {
                driverContainer.innerHTML = uniqueDrivers.map(val => `
                    <label class="flex items-center gap-2 cursor-pointer group/cb">
                        <input type="checkbox" value="${val}" onchange="InventoryController.applyFiltersAndSort()" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                        <span class="text-[11px] font-medium text-slate-600 group-hover/cb:text-slate-900 truncate">${val}</span>
                    </label>
                `).join('');
            }
        },

        setupDynamicSlider: function (allRows) {
            let maxRunRate = 0;
            allRows.forEach(row => {
                const rate = parseFloat(row["Run Rate"]) || 0;
                if (rate > maxRunRate) maxRunRate = rate;
            });
            if (maxRunRate === 0) maxRunRate = 1000000;

            const slider = document.getElementById('budget-slider');
            const maxLabel = document.getElementById('slider-max-label');
            if (slider) slider.max = maxRunRate;

            if (maxLabel) {
                if (maxRunRate >= 1000000) maxLabel.textContent = `€ ${(maxRunRate / 1000000).toFixed(1)}M`;
                else maxLabel.textContent = `€ ${(maxRunRate / 1000).toFixed(0)}K`;
            }
        },

        // Formattatore monetario interno al modulo (Risolve il problema dei totali a zero)
        formatFilterValue: function (val) {
            if (val >= 1000000) return '€ ' + (val / 1000000).toFixed(2) + 'M';
            if (val >= 1000) return '€ ' + (val / 1000).toFixed(0) + 'k';
            return '€ ' + val.toFixed(0);
        }
    };

    // Routing ad aggancio atomico
    const mvcOriginalExecuteTabSwitch = executeTabSwitch;
    executeTabSwitch = function (tabId) {
        mvcOriginalExecuteTabSwitch(tabId);
        if (tabId === 'tab-inventory') {
            InventoryController.initWorkspace();
        }
    };
</script>
