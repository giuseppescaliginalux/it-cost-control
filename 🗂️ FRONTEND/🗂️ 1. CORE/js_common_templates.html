<script>
    /**
     * js_common_templates.html
     * UTILITIES & COMPONENT HUB: Centralized layer for UI notifications and atomic Date normalization.
     */

    // ==========================================
    // 1. FINOPS DATE ENGINE: Solo date pure (YYYY-MM-DD), zero fusi orari
    // ==========================================
    const FinOpsDate = {
        parse: function(dStr) {
            if (!dStr) return null;
            if (dStr instanceof Date) return !isNaN(dStr.getTime()) ? dStr : null;
            
            let s = String(dStr).trim();
            if (!s || s === "—" || s === "-") return null;
            
            if (s.includes('T')) s = s.split('T')[0];
            
            // Pattern Europeo: DD/MM/YYYY o DD-MM-YYYY
            const euMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
            if (euMatch) {
                return new Date(parseInt(euMatch[3], 10), parseInt(euMatch[2], 10) - 1, parseInt(euMatch[1], 10));
            }
            
            // Pattern Standard/ISO: YYYY-MM-DD o YYYY/MM/DD
            const isoMatch = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
            if (isoMatch) {
                return new Date(parseInt(isoMatch[1], 10), parseInt(isoMatch[2], 10) - 1, parseInt(isoMatch[3], 10));
            }
            
            let prs = new Date(s);
            return !isNaN(prs.getTime()) ? prs : null;
        },
        
        toIso: function(dStr) {
            const d = this.parse(dStr);
            if (!d) return "";
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        },
        
        toVisualLong: function(dStr) {
            const d = this.parse(dStr);
            if (!d) return "—";
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        },
        
        toVisualShort: function(dStr) {
            const d = this.parse(dStr);
            if (!d) return "—";
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return `${months[d.getMonth()]} '${String(d.getFullYear()).substring(2)}`;
        }
    };

    // ==========================================
    // 2. FINOPS UI NOTIFICATION LAYERS (Addio cagate standard!)
    // ==========================================
    const FinOpsUI = {
        showAlert: function(title, message, type = 'error') {
            const existing = document.getElementById('finops-global-alert');
            if(existing) existing.remove();

            const color = type === 'error' ? 'rose' : (type === 'success' ? 'emerald' : 'amber');
            const icon = type === 'error' ? 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' : 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z';

            const html = `
            <div id="finops-global-alert" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99999] flex items-center justify-center p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 p-6 max-w-sm w-full transform transition-all scale-100">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-full bg-${color}-100 flex items-center justify-center shrink-0">
                            <svg class="w-5 h-5 text-${color}-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="${icon}" /></svg>
                        </div>
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">${title}</h3>
                    </div>
                    <p class="text-xs text-slate-600 font-medium leading-relaxed mb-6">${message}</p>
                    <div class="flex justify-end">
                        <button onclick="document.getElementById('finops-global-alert').remove()" class="px-5 py-2 bg-slate-800 hover:bg-slate-900 text-white text-[10px] font-black uppercase tracking-wider rounded-xl shadow-md transition-colors cursor-pointer">Understood</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
        },

        showConfirm: function(title, message, onConfirmCallback) {
            const existing = document.getElementById('finops-global-confirm');
            if(existing) existing.remove();

            const html = `
            <div id="finops-global-confirm" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99999] flex items-center justify-center p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 p-6 max-w-sm w-full transform transition-all scale-100">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center shrink-0">
                            <svg class="w-5 h-5 text-rose-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                        </div>
                        <h3 class="text-sm font-black text-rose-700 uppercase tracking-widest">${title}</h3>
                    </div>
                    <p class="text-xs text-slate-600 font-medium leading-relaxed mb-6">${message}</p>
                    <div class="flex justify-end gap-3">
                        <button onclick="document.getElementById('finops-global-confirm').remove()" class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 text-[10px] font-bold uppercase tracking-wider rounded-xl transition-colors cursor-pointer">Cancel</button>
                        <button id="finops-global-confirm-yes" class="px-5 py-2 bg-rose-600 hover:bg-rose-700 text-white text-[10px] font-black uppercase tracking-wider rounded-xl shadow-md transition-colors cursor-pointer">Confirm Action</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            document.getElementById('finops-global-confirm-yes').onclick = () => {
                document.getElementById('finops-global-confirm').remove();
                if(onConfirmCallback) onConfirmCallback();
            };
        },

        showNotificationBanner: function(message, type = 'warning') {
            const banner = document.getElementById('mgmt-push-warning'); // Sfrutta il banner di notifica nativo nell'index.html
            if (!banner) return;

            const textSpan = banner.querySelector('span');
            const svgIcon = banner.querySelector('svg');
            if (textSpan) textSpan.textContent = message;

            banner.className = "text-[11px] font-bold animate-fade-in items-center gap-2 shadow-2xs rounded-xl px-3 py-1.5 border flex";

            if (type === 'success') {
                banner.classList.add('text-emerald-700', 'bg-emerald-50', 'border-emerald-200/60');
                if (svgIcon) svgIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>`;
            } else if (type === 'error') {
                banner.classList.add('text-rose-700', 'bg-rose-50', 'border-rose-200/60');
                if (svgIcon) svgIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
            } else {
                banner.classList.add('text-amber-700', 'bg-amber-50', 'border-amber-200/60');
                if (svgIcon) svgIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>`;
            }

            if (window.globalFinOpsBannerTimeout) clearTimeout(window.globalFinOpsBannerTimeout);
            window.globalFinOpsBannerTimeout = setTimeout(() => {
                banner.classList.add('hidden');
                banner.classList.remove('flex');
            }, type === 'error' ? 6000 : 4000);
        }
    };

    // ==========================================
    // 3. TOOLTIP ENGINE
    // ==========================================
    function generateFinOpsHelpTooltip(title, description, placement = 'top') {
        const placementClass = placement === 'down' ? 'tt-down' : '';
        return `
    <span class="tt-wrapper text-slate-300 hover:text-slate-500" onclick="event.stopPropagation()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 text-teal-600/80 hover:text-teal-600">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
        </svg>
        <div class="tt-content tt-left ${placementClass}">
            <p class="font-bold text-teal-400 uppercase text-[9px] mb-1">${title}</p>
            ${description}
        </div>
    </span>`;
    }

    // ==========================================
    // 4. FINOPS UNIVERSAL SEARCHABLE SELECT
    // ==========================================
    const FinOpsSelect = {
        render: function(config) {
            const safeVal = (config.selectedValue || "").replace(/'/g, "\\'").replace(/"/g, "&quot;");
            
            let itemsHtml = config.options.map(opt => {
                const safeOpt = opt.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                return `<div onclick="FinOpsSelect.select(this, '${config.id}', '${safeOpt}', \`${config.onChange || ''}\`)" class="finops-select-item p-2 text-[11px] font-bold text-slate-700 hover:bg-teal-50 hover:text-teal-900 cursor-pointer transition-colors">${opt}</div>`;
            }).join('');

            if (config.allowCustom) {
                itemsHtml = `<div class="finops-select-custom p-2 text-[11px] font-black text-indigo-600 hover:bg-slate-50 cursor-pointer hidden" onclick="FinOpsSelect.selectCustom(this, '${config.id}', \`${config.onChange || ''}\`)">➕ Add "<span class="custom-val"></span>"</div>` + itemsHtml;
            }

            if(config.options.length === 0 && !config.allowCustom) {
                 itemsHtml = `<div class="p-2 text-slate-400 italic text-[10px] text-center">No options available</div>`;
            }

            return `
            <div class="relative finops-select-container" id="finops-select-wrapper-${config.id}">
                <input type="text" id="finops-select-display-${config.id}" 
                       oninput="FinOpsSelect.filter('${config.id}', this.value, ${config.allowCustom ? 'true' : 'false'})" 
                       onclick="FinOpsSelect.openAndShowAll('${config.id}')" 
                       onfocus="this.select()"
                       placeholder="${config.placeholder || 'Select or type...'}" 
                       class="w-full p-2 pr-8 bg-white border border-slate-300 rounded-lg focus:ring-1 focus:ring-teal-500 font-bold text-slate-800 text-xs shadow-3xs cursor-text" 
                       autocomplete="off" 
                       value="${safeVal}">
                <svg onclick="FinOpsSelect.openAndShowAll('${config.id}')" class="w-4 h-4 absolute right-2.5 top-2.5 text-slate-400 cursor-pointer transition-transform pointer-events-auto hover:text-teal-600" id="finops-select-arrow-${config.id}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
                <input type="hidden" id="${config.id}" value="${safeVal}">
                
                <div id="finops-select-dropdown-${config.id}" class="hidden absolute left-0 right-0 top-full mt-1 max-h-48 overflow-y-auto bg-white border border-slate-200 rounded-lg shadow-xl z-[99999] p-1 space-y-0.5 custom-scrollbar">
                    ${itemsHtml}
                </div>
            </div>`;
        },
        
        openAndShowAll: function(id) {
            const dropdown = document.getElementById(`finops-select-dropdown-${id}`);
            if(!dropdown) return;
            // 🌟 FIX UX: Mostra sempre tutte le opzioni quando si clicca per aprire
            dropdown.querySelectorAll('.finops-select-item').forEach(i => i.style.display = "block");
            const customItem = dropdown.querySelector('.finops-select-custom');
            if(customItem) customItem.style.display = "none";
            this.toggle(id, true);
        },

        filter: function(id, query, allowCustom) {
            const q = query.toLowerCase().trim();
            const dropdown = document.getElementById(`finops-select-dropdown-${id}`);
            if(!dropdown) return;
            
            if (allowCustom) document.getElementById(id).value = query;

            const items = dropdown.querySelectorAll('.finops-select-item');
            let exactMatch = false;

            items.forEach(item => {
                if (item.textContent.toLowerCase().includes(q)) {
                    item.style.display = "block";
                    if (item.textContent.toLowerCase() === q) exactMatch = true;
                } else {
                    item.style.display = "none";
                }
            });

            const customItem = dropdown.querySelector('.finops-select-custom');
            if (customItem && allowCustom) {
                if (q !== "" && !exactMatch) {
                    customItem.querySelector('.custom-val').textContent = query;
                    customItem.style.display = "block";
                } else {
                    customItem.style.display = "none";
                }
            }
            this.toggle(id, true);
        },

        toggle: function(id, forceShow) {
            const dropdown = document.getElementById(`finops-select-dropdown-${id}`);
            const arrow = document.getElementById(`finops-select-arrow-${id}`);
            if (!dropdown) return;

            document.querySelectorAll('.finops-select-container .absolute.z-\\[99999\\]').forEach(el => {
                if (el.id !== `finops-select-dropdown-${id}`) el.classList.add('hidden');
            });

            if (forceShow) {
                dropdown.classList.remove('hidden');
                if(arrow) arrow.style.transform = "rotate(180deg)";
            } else {
                const isHidden = dropdown.classList.toggle('hidden');
                if(arrow) arrow.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
            }
        },

        select: function(itemEl, id, value, onChangeStr) {
            document.getElementById(`finops-select-display-${id}`).value = value;
            document.getElementById(id).value = value;
            this.toggle(id, false);
            
            const dropdown = document.getElementById(`finops-select-dropdown-${id}`);
            if(dropdown) {
                dropdown.querySelectorAll('.finops-select-item').forEach(i => i.style.display = "block");
                const customItem = dropdown.querySelector('.finops-select-custom');
                if(customItem) customItem.style.display = "none";
            }

            if (onChangeStr) {
                try {
                    const fn = new Function('value', onChangeStr);
                    fn(value);
                } catch(e) { console.error("FinOpsSelect Callback Error:", e); }
            }
        },

        selectCustom: function(itemEl, id, onChangeStr) {
            const val = itemEl.querySelector('.custom-val').textContent;
            this.select(itemEl, id, val, onChangeStr);
        },
        
        closeAll: function(e) {
            if (!e.target.closest('.finops-select-container')) {
                document.querySelectorAll('[id^="finops-select-dropdown-"]').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('[id^="finops-select-arrow-"]').forEach(el => el.style.transform = "rotate(0deg)");
            }
        }
    };
    document.addEventListener('click', FinOpsSelect.closeAll);
</script>
