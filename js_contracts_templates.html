<script>
    /**
     * js_contracts_templates.html
     * VIEW TEMPLATES: Generates all HTML strings for the UI.
     * Keeps DOM rendering strictly separated from business logic.
     */

    const ContractsTemplates = {

        getBaseLayout: function() {
            return `
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end w-full gap-4 mb-5 shrink-0">
                <div>
                    <h2 class="text-xl font-black text-slate-800 uppercase tracking-widest">Contracts Center</h2>
                    <p class="text-slate-500 text-[11px] font-medium mt-1">Search an Asset capability, define Master Agreements, and allocate granular contract items.</p>
                </div>
                
                <div class="flex items-center gap-3 shrink-0">
                    <button onclick="toggleGlobalEditMode()" id="contracts-edit-mode-btn" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 font-black text-[11px] uppercase tracking-wider rounded-xl shadow-sm transition-all flex items-center gap-1.5 cursor-pointer hover:bg-slate-50">
                        <svg class="w-3.5 h-3.5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.25 0 113.536 3.536L6.5 21.036H3v-3.536L16.5 3.536z" /></svg>
                        Edit Mode
                    </button>
                    <button onclick="saveCurrentContract()" id="contracts-commit-btn" class="hidden px-4 py-2 bg-teal-700 hover:bg-teal-800 text-white font-black text-[11px] uppercase tracking-wider rounded-xl shadow-md transition-all items-center gap-2">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
                        Commit & Push
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
                <div class="lg:col-span-1 space-y-4 sticky top-20">
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 space-y-3">
                        <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest flex items-center gap-1">
                            <svg class="w-3.5 h-3.5 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            Step 1: Locate Asset Target
                        </h3>
                        <input type="text" id="mgmt-asset-search-input" onkeyup="renderAssetSearchList()" placeholder="Type asset or manufacturer name..." class="w-full px-3 py-2 text-xs bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-shadow">
                        <div id="mgmt-asset-results-list" class="max-h-44 overflow-y-auto border border-slate-100 rounded-xl divide-y divide-slate-50 bg-slate-50/30"></div>
                    </div>

                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 space-y-3">
                        <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest flex items-center gap-1">
                            <svg class="w-3.5 h-3.5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            Step 2: Master Agreements
                        </h3>
                        <div id="mgmt-selected-asset-header">
                            <p class="text-slate-400 italic text-[11px] text-center">Select an asset above to access commercial vehicles.</p>
                        </div>
                        <div id="mgmt-master-list-container" class="space-y-2 pt-2 border-t border-slate-50"></div>
                    </div>
                </div>

                <div class="lg:col-span-3 space-y-4">
                    <div id="mgmt-master-form-container" class="hidden space-y-4">
                        
                        <div id="mgmt-master-form-box-inner" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-3"></div>

                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                            <div class="flex justify-between items-center pb-2 border-b border-slate-200 mb-4">
                                <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest">Step 3: Granular Items Allocation (Contracts table)</h3>
                                <button onclick="addNewDetailRowItem()" id="btn-add-contract-row" style="display: none;" class="px-3 py-1 bg-emerald-50 border border-emerald-200 text-emerald-700 font-black text-[10px] uppercase tracking-wider rounded-lg hover:bg-emerald-100 transition-colors shadow-sm">+ Add Contract</button>
                            </div>

                            <div id="mgmt-detailRowsContainer" class="space-y-4 max-h-[600px] overflow-y-auto pr-1.5 pb-2"></div>
                            
                            </div>

                    </div>
                </div>
            </div>
            `;
        },

        getAssetSearchResult: function (name, id, manufacturer) {
            return `
            <div onclick="selectAssetForManagement('${name.replace(/'/g, "\\'")}', '${id}')" 
                 class="p-2 border-b border-slate-100 hover:bg-teal-50/60 cursor-pointer transition-colors flex justify-between items-center text-xs group">
                <div>
                    <div class="font-black text-slate-800 group-hover:text-teal-900">${name}</div>
                    <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${manufacturer || 'Generic'}</div>
                </div>
                <span class="bg-slate-100 text-slate-500 font-mono text-[9px] px-1.5 py-0.5 rounded">ID: ${id}</span>
            </div>
        `;
        },

        getMasterSidebarCard: function (mId, supplier, status, totalCommitment, isExpired, statusClass) {
            const cardClasses = isExpired
                ? "bg-slate-50 border-slate-200 opacity-60 hover:opacity-80 grayscale-[0.2]"
                : "bg-white border-slate-100 hover:border-teal-200 hover:shadow-md cursor-pointer";

            return `
            <div onclick="loadFullMasterDetailArchitecture('${mId}')" class="p-3 rounded-xl shadow-sm flex flex-col gap-2 group transition-all relative overflow-hidden border ${cardClasses}">
                
                ${isExpired ? `<div class="absolute top-0 right-0 bg-slate-200 text-slate-500 text-[7px] font-black uppercase tracking-widest px-2 py-0.5 rounded-bl-lg z-10 pointer-events-none">Historical</div>` : ''}
                
                <div class="flex justify-between items-start gap-2 Panding-top ${isExpired ? 'mt-2' : ''}">
                    <div class="min-w-0 flex-1">
                        <div class="font-black text-slate-800 text-xs truncate" title="${supplier}">Supplier: <span class="text-teal-700 font-black">${supplier}</span></div>
                        <div class="text-[9px] font-mono font-bold text-slate-400 uppercase mt-0.5">ID: ${mId}</div>
                    </div>
                    <span class="px-1.5 py-0.5 rounded-full text-[7px] font-black uppercase tracking-wider shrink-0 border ${statusClass}">${status}</span>
                </div>
                
                <div class="flex justify-between items-center border-t border-slate-100 pt-2 text-[10px]">
                    <div>
                        <span class="text-slate-400 font-bold uppercase text-[8px] tracking-wider">Total Commit</span>
                        <span class="font-mono font-bold text-slate-700 block mt-0.5">€${totalCommitment.formatCurrency()}</span>
                    </div>
                    <div class="text-slate-300 group-hover:text-teal-600 transition-colors">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                    </div>
                </div>
            </div>
        `;
        },

        getMasterReadOnly: function (data, masterLinks, cleanStart, cleanEnd, termMonths, status, statusClass, globalEditMode) {
            const linksHtml = masterLinks.length > 0 ? `
            <div class="flex items-center gap-1.5 mr-1 border-r border-slate-200 pr-3">
                ${masterLinks.map((url, idx) => `
                    <a href="#" target="_blank" class="live-doc-link px-2 py-1 bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white border border-indigo-200 rounded-md text-[9px] font-black uppercase tracking-wider flex items-center gap-1 transition-all shadow-sm" data-raw="${url.trim()}" title="Syncing...">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg> Doc ${idx + 1}
                    </a>
                `).join('')}
            </div>` : '';

            const runRate = parseFloat(data["runRate"] || data["Run Rate"]) || 0;
            const totCommit = parseFloat(data["totalCommitment"] || data["Total Commitment"]) || 0;

            const editBtnHtml = globalEditMode ? `<button onclick="toggleMasterEditState(true)" class="px-3 py-1.5 bg-slate-100 border border-slate-200 text-slate-700 font-black text-[10px] uppercase tracking-wider rounded-lg hover:bg-slate-200 transition-colors shadow-sm cursor-pointer">Edit Master Info</button>` : '';

            return `
            <div class="flex justify-between items-start border-b border-slate-100 pb-2.5 mb-2.5">
                <div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <h4 class="text-sm font-black text-slate-800">Supplier: <span class="text-teal-700">${data["Supplier"] || 'Not Specified'}</span></h4>
                        ${data["Billing Channel"] ? `<span class="bg-teal-50 border border-teal-100 text-teal-700 px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-wider shrink-0 shadow-3xs" title="Billing Channel">${data["Billing Channel"]}</span>` : ''}
                    </div>
                    <div class="text-[9px] font-mono font-bold text-slate-400 uppercase mt-1.5 select-none">
                        Internal Tech ID: <span class="text-slate-500 font-medium select-all">${data["Master Contract ID"] || 'NEW MASTER'}</span>
                    </div>
                </div>
                <div class="flex flex-wrap justify-end items-center gap-2">
                    ${linksHtml}
                    ${editBtnHtml}
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-between gap-3 bg-slate-50/60 p-2.5 rounded-xl border border-slate-100 mb-3 text-xs w-full">
                
                <div class="flex items-center gap-1.5 text-slate-500 font-mono text-[10px] whitespace-nowrap bg-white border border-slate-200 px-2 py-1 rounded-md shrink-0 shadow-3xs">
                    <span>${cleanStart}</span>
                    <span class="text-slate-300 font-sans">➔</span>
                    <span>${cleanEnd}</span>
                    <span class="ml-1 pl-1.5 border-l border-slate-200 font-sans font-black text-slate-700">${termMonths} M</span>
                </div>

                <div class="flex-1 flex justify-center">
                    <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider border ${statusClass} shadow-sm">${status}</span>
                </div>

                <div class="flex items-center justify-start sm:justify-end gap-5 shrink-0 sm:ml-auto w-full sm:w-auto">
                    <div class="text-right shrink-0">
                        <span class="text-[8px] text-slate-400 block uppercase font-black tracking-wider whitespace-nowrap">Total Commitment</span>
                        <span class="font-mono font-black text-slate-900 text-[13px]">€${totCommit.toLocaleString('it-IT', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}</span>
                    </div>
                    <div class="text-right shrink-0 border-l border-slate-200 pl-4">
                        <span class="text-[8px] text-teal-600 block uppercase font-black tracking-wider whitespace-nowrap">Master Run Rate</span>
                        <span class="font-mono font-black text-teal-800 text-[13px]">€${runRate.toLocaleString('it-IT', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}</span>
                    </div>
                </div>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-3 text-xs border-t border-slate-100/40 pt-2">
                <div class="md:col-span-8 border-r border-slate-100/60 pr-2">
                    <span class="text-slate-400 font-bold uppercase text-[8px] tracking-wider block">Master Scope</span>
                    <span class="text-slate-700 font-medium leading-tight block mt-0.5 break-words">${data["Scope"] || '—'}</span>
                </div>
                <div class="md:col-span-4 pl-0 md:pl-2">
                    <span class="text-slate-400 font-bold uppercase text-[8px] tracking-wider block">Master Comments</span>
                    <span class="text-slate-500 italic font-medium leading-tight block mt-0.5">${data["Comments"] || '—'}</span>
                </div>
            </div>
        `;
        },

        getMasterEditCard: function (data, isNew, suppliersList, masterLinks) {
            return `
            <div class="flex justify-between items-center border-b border-slate-200 pb-2 mb-4">
                <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest">Master Info Setup</h3>
                ${!isNew ? `<button onclick="toggleMasterEditState(false)" class="text-[10px] font-bold text-slate-400 hover:text-slate-600">Cancel</button>` : ''}
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                ${!isNew ? `
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Contract ID</label>
                    <input type="text" id="ins-masterId" disabled value="${data["Master Contract ID"]}" class="w-full px-3 py-2 bg-slate-100 border border-slate-200 rounded-lg font-bold uppercase text-xs text-slate-500">
                </div>
                ` : ''}
                <div class="${isNew ? 'md:col-span-2' : ''}">
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Supplier</label>
                    <select id="ins-masterSupplier" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 font-bold text-slate-800 bg-white text-xs">
                        <option value="">-- Select Supplier --</option>
                        ${suppliersList.map(s => `<option value="${s}" ${s === data["Supplier"] ? 'selected' : ''}>${s}</option>`).join('')}
                    </select>
                </div>
                <div class="md:col-span-2 mt-1">
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Previous Master ID (Optional - For Renewals/Merges)</label>
                    <input type="text" id="ins-previousMasterId" value="${data["Previous Master ID"] || ''}" placeholder="e.g. MCT-AWS-2024-01 (use commas for multiple)" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 text-xs font-mono text-indigo-700">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs mt-3">
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Scope</label>
                    <input type="text" id="ins-masterScope" value="${data["Scope"] || ''}" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 text-xs">
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Comments</label>
                    <input type="text" id="ins-masterComments" value="${data["Comments"] || ''}" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 italic text-slate-500 text-xs">
                </div>
            </div>
            ${!isNew ? `
            <div class="mt-3 flex justify-end">
                <button onclick="confirmMasterEditLocalChanges()" class="px-4 py-1.5 bg-slate-800 text-white rounded-lg font-black text-[10px] uppercase tracking-wider">Confirm Master Changes</button>
            </div>` : ''}
            <div class="mt-4 border border-dashed border-slate-300 bg-slate-50 p-3 rounded-lg">
                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Upload & Manage Documents</label>
                ${masterLinks.length > 0 ? `
                    <div class="mb-3 bg-white p-2 rounded border border-slate-200">
                        <span class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Currently Attached Files:</span>
                        <div class="flex flex-wrap gap-1.5">
                            ${masterLinks.map((url, idx) => `
                                <div class="flex items-center gap-0 bg-indigo-50 border border-indigo-200 rounded-md shadow-sm overflow-hidden group">
                                    <a href="#" target="_blank" class="live-doc-link px-2 py-0.5 text-indigo-700 hover:bg-indigo-600 hover:text-white text-[8px] font-black uppercase tracking-wider flex items-center gap-1 transition-colors" data-raw="${url.trim()}" title="Syncing...">Doc ${idx + 1}</a>
                                    <button type="button" onclick="ContractsUtils.removeDocumentLink(event, '${url.trim()}', true)" class="px-1.5 py-0.5 text-indigo-400 hover:bg-rose-500 hover:text-white transition-colors border-l border-indigo-200" title="Remove Document">×</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                <input type="text" id="ins-masterDocumentLink" value="${data["Contract Links"] || ''}" class="hidden">
                <div class="flex items-center gap-3">
                    <input type="file" id="upload-files" multiple class="w-full text-xs text-slate-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-[10px] file:font-black file:uppercase file:tracking-wider file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100 cursor-pointer border border-dashed border-slate-300 bg-white p-1 rounded-md">
                </div>
                <p class="text-[9px] text-slate-400 italic mt-1.5">Files will be uploaded automatically when you click "Confirm Master Changes".</p>
            </div>
        `;
        },

        getDetailReadOnlyCard: function (item, warningBadgeHTML, effCommit, annVal, totCommit, cleanStart, cleanEnd, contractEnd, adjEnd, docLinks, globalEditMode) {
            const d = item.data;
            const statusClass = d["Status"] === 'ACTIVE' ? 'bg-emerald-50 text-emerald-700 border-emerald-200/50' : d["Status"] === 'EXPIRED' ? 'bg-rose-50 text-rose-600 border-rose-200/50' : 'bg-amber-50 text-amber-700 border-amber-200/50';

            let splitBadge = item.splits && item.splits.length > 0 ? `<span class="px-1.5 py-0.5 bg-indigo-100 text-indigo-700 border border-indigo-200 rounded text-[8px] font-black uppercase tracking-wider shadow-sm flex items-center gap-0.5" title="Custom Allocation Split Active">Split (${item.splits.length})</span>` : '';
            let ledgerBadge = item.ledger && item.ledger.length > 0 ? `<span class="px-1.5 py-0.5 bg-amber-100 text-amber-700 border border-amber-200 rounded text-[8px] font-black uppercase tracking-wider shadow-sm flex items-center gap-0.5" title="Ledger Movements Present">Ledger (${item.ledger.length})</span>` : '';
            let docsHtml = docLinks.length > 0 ? `<div class="flex gap-1 ml-1 pl-1.5 border-l border-slate-200">${docLinks.map((url, idx) => `<a href="#" target="_blank" class="live-doc-link px-2 py-0.5 bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white border border-indigo-200 rounded-md text-[8px] font-black uppercase tracking-wider flex items-center gap-1 transition-all shadow-sm" data-raw="${url.trim()}" title="Syncing...">Doc ${idx + 1}</a>`).join('')}</div>` : '';

            const safeEntityName = (d["Legal Entity"] || '—').replace(/"/g, '&quot;');
            let rawTerm = d["contractTerm"] !== undefined ? d["contractTerm"] : (d["Contract Term (Months)"] !== undefined ? d["Contract Term (Months)"] : '—');
            let termMonths = (typeof rawTerm === 'number' || !isNaN(parseFloat(rawTerm))) ? Math.round(parseFloat(rawTerm)) : rawTerm;

            // Pulsanti azioni spostati in alto a destra, in linea con la Legal Entity
            const actionsHtml = globalEditMode ? `
                <div class="flex items-start gap-1.5 shrink-0" onclick="event.stopPropagation();">
                    <button onclick="cloneDetailRowItem(${item.id})" class="px-2.5 py-1 bg-amber-50 hover:bg-amber-600 text-amber-700 hover:text-white font-black rounded text-[9px] uppercase tracking-wider border border-amber-100 transition-all shadow-sm">Clone</button>
                    <button onclick="toggleRowEditMode(${item.id}, true)" class="px-3 py-1 bg-teal-50 hover:bg-teal-700 text-teal-700 hover:text-white font-black rounded text-[9px] uppercase tracking-wider border border-teal-100 transition-all shadow-sm">Edit</button>
                </div>
            ` : '';

            // (Codice Splits e Ledger invariato per pulizia)
            let splitsReadOnlyHtml = '';
            if (item.splits && item.splits.length > 0) {
                splitsReadOnlyHtml = `
                <div class="p-3 bg-indigo-50/40 rounded-xl border border-indigo-100 shadow-2xs w-full mt-3">
                    <span class="block text-[9px] font-black text-indigo-500 uppercase tracking-widest mb-2.5">Custom Allocation Splits</span>
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-2.5">
                        ${item.splits.map(s => {
                    let rule = s["Allocation Rule"] || "Percentage";
                    let rawVal = "";
                    if (rule === "Percentage" && s["Percentage Share"] != null && s["Percentage Share"] !== "") {
                        let pShare = parseFloat(s["Percentage Share"]);
                        rawVal = (pShare > 0 && pShare <= 1) ? Math.round(pShare * 100) + "%" : Math.round(pShare) + "%";
                    }
                    else if (rule === "Fixed Amount" && s["Fixed Amount"] != null && s["Fixed Amount"] !== "") rawVal = "€ " + Math.round(s["Fixed Amount"]).toLocaleString('it-IT');
                    else if (rule === "Units" && s["Units Assigned"] != null && s["Units Assigned"] !== "") rawVal = Math.round(s["Units Assigned"]) + " Qty";

                    return `
                            <div class="bg-white p-2 border border-slate-200 rounded-lg shadow-3xs text-[10px]">
                                <div class="font-bold text-slate-800 truncate">${s["Target Legal Entity"] || 'N/A'}</div>
                                <div class="text-[9px] text-slate-400 mt-0.5">CC: ${s["Target Cost Center"] || 'N/A'} | Rule: <span class="text-indigo-600 font-bold">${rule}</span></div>
                                <div class="flex justify-between items-center mt-1.5 pt-1.5 border-t border-slate-50 font-mono">
                                    <span class="text-slate-500">Value:</span>
                                    <span class="font-black text-slate-800">${rawVal}</span>
                                </div>
                            </div>`;
                }).join('')}
                    </div>
                </div>`;
            }

            let ledgerReadOnlyHtml = '';
            if (item.ledger && item.ledger.length > 0) {
                ledgerReadOnlyHtml = `
                <div class="p-3 bg-amber-50/40 rounded-xl border border-amber-100 shadow-2xs w-full mt-3">
                    <span class="block text-[9px] font-black text-amber-500 uppercase tracking-widest mb-2.5">Ledger Movements</span>
                    <div class="space-y-1.5">
                        ${item.ledger.map(l => {
                    const lStart = l["Start Date"] ? ContractsUtils.formatToEnglishCustomDate(l["Start Date"]) : "—";
                    const lEnd = l["End Date"] ? ContractsUtils.formatToEnglishCustomDate(l["End Date"]) : "—";
                    return `
                            <div class="flex items-center justify-between bg-white px-3 py-1.5 rounded-lg border border-slate-100 shadow-3xs text-[10px] gap-2">
                                <div class="flex items-center gap-2 shrink-0">
                                    <span class="text-[7px] font-black ${l["Type"] === 'ACTUAL' ? 'text-emerald-700 bg-emerald-50 border border-emerald-100' : (l["Type"] === 'CALCULATED' ? 'text-slate-500 bg-slate-100' : 'text-amber-700 bg-amber-50 border border-amber-100')} px-1.5 py-0.5 rounded uppercase tracking-wider">${l["Type"]}</span>

                    <div class="p-3 border-t border-slate-100 bg-slate-50/50 rounded-b-lg">
                        ${docLinks.length > 0 ? `
                            <div class="mb-3 bg-white p-2 rounded border border-slate-200 flex flex-wrap gap-1.5">
                                ${docLinks.map((url, idx) => `
                                    <div class="flex items-center gap-0 bg-indigo-50 border border-indigo-200 rounded-md overflow-hidden">
                                        <a href="#" class="live-doc-link px-2 py-0.5 text-indigo-700 text-[8px] font-black uppercase" data-raw="${url.trim()}">Doc ${idx + 1}</a>
                                        <button type="button" onclick="ContractsUtils.removeDocumentLink(event, '${url.trim()}', false, ${item.id})" class="px-1.5 py-0.5 text-indigo-400 hover:bg-rose-500 hover:text-white border-l border-indigo-200">×</button>
                                    </div>`).join('')}
                            </div>` : ''}
                        <input type="text" id="edit-contractLinks-${item.id}" value="${d["Contract Links"] || ''}" class="hidden">
                        <input type="file" id="upload-files-${item.id}" multiple class="w-full text-xs text-slate-500 p-1 rounded-md border border-dashed border-slate-300 bg-white">
                        <p class="text-[9px] text-slate-400 italic mt-1">Files uploaded automatically on "Apply".</p>
                    </div>
                </details>

                <details class="group bg-indigo-50/30 border border-indigo-100 rounded-lg shadow-sm [&_summary::-webkit-details-marker]:hidden" ${item.splits && item.splits.length > 0 ? 'open' : ''}>
                    <summary class="flex justify-between items-center cursor-pointer p-2.5 text-[9px] text-indigo-700 uppercase font-black tracking-widest hover:bg-indigo-50 transition-colors rounded-lg">
                        <span>Allocation Splits ${item.splits && item.splits.length > 0 ? `<span class="bg-indigo-200 text-indigo-800 px-1.5 py-0.5 rounded-full text-[7px] ml-1">${item.splits.length}</span>` : ''}</span>
                    </summary>
                    <div class="p-3 border-t border-indigo-100 bg-white rounded-b-lg">
                        <div class="flex justify-between items-center mb-3">
                            <p class="text-[9px] text-indigo-500 italic">Leave empty to assign 100% to main entity.</p>
                            <button type="button" onclick="addSplitRowToUI(${item.id})" class="text-[9px] font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 border border-indigo-200 rounded-md">+ Add Split</button>
                        </div>
                        <div id="splits-container-${item.id}" class="space-y-1.5">${splitsHtml}</div>
                    </div>
                </details>

                <details id="ledger-section-container-${item.id}" class="hidden group bg-amber-50/30 border border-amber-200 rounded-lg shadow-sm [&_summary::-webkit-details-marker]:hidden">
                    <summary class="flex justify-between items-center cursor-pointer p-2.5 text-[9px] text-amber-700 uppercase font-black tracking-widest hover:bg-amber-50 transition-colors rounded-lg">
                        <span>Ledger Movements ${item.ledger && item.ledger.length > 0 ? `<span class="bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded-full text-[7px] ml-1">${item.ledger.length}</span>` : ''}</span>
                    </summary>
                    <div class="p-3 border-t border-amber-200 bg-white rounded-b-lg">
                        <div class="flex justify-between items-center mb-2">
                            <p class="text-[9px] text-amber-600 italic">Manage manual or automatic entries.</p>
                            <div class="flex gap-1.5">
                                <button type="button" id="auto-forecast-btn-${item.id}" onclick="triggerLedgerAutomationForContract(${item.id})" class="text-[9px] font-black text-amber-800 bg-white px-2.5 py-1 border border-amber-300 rounded-md ${(['Minimum Consumption', 'Capped Consumption'].includes(d['Pricing Model']) && d['Billing Terms'] === 'Ledger-Driven') ? '' : 'hidden'}">⚡ Auto-Forecast</button>
                                <button type="button" onclick="addLedgerRowToUI(${item.id})" class="text-[9px] font-black text-amber-700 bg-amber-50 px-2.5 py-1 border border-amber-200 rounded-md">+ Add</button>
                            </div>
                        </div>
                        <div id="ledger-container-${item.id}" class="space-y-1.5">${ledgerHtml}</div>
                    </div>
                </details>
            </div>
        `;
        },

        getSplitRow: function (detailId, split, defaultStartDate, defaultEndDate, leOptions, ccOptions) {
            const rule = split["Allocation Rule"] || "Percentage";
            const validFrom = split["Valid From"] ? split["Valid From"].toString().split('T')[0] : defaultStartDate;
            const validTo = split["Valid To"] ? split["Valid To"].toString().split('T')[0] : defaultEndDate;
            const notes = split["Notes"] || "";

            let rawVal = "";
            if (rule === "Percentage" && split["Percentage Share"] != null && split["Percentage Share"] !== "") {
                let pShare = parseFloat(split["Percentage Share"]);
                rawVal = (pShare > 0 && pShare <= 1) ? Math.round(pShare * 100) : Math.round(pShare);
            } else if (rule === "Fixed Amount" && split["Fixed Amount"] != null && split["Fixed Amount"] !== "") {
                rawVal = Math.round(split["Fixed Amount"]);
            } else if (rule === "Units" && split["Units Assigned"] != null && split["Units Assigned"] !== "") {
                rawVal = Math.round(split["Units Assigned"]);
            }

            let displayVal = rawVal;
            if (rawVal !== "" && rule === "Fixed Amount") {
                displayVal = parseInt(rawVal, 10).toLocaleString('it-IT');
            }

            return `
        <div class="split-row-item bg-white p-2 border border-slate-200 rounded-md shadow-sm relative animate-fade-in mb-1.5">
            <div class="flex flex-wrap md:flex-nowrap gap-1.5 items-end">
                <div class="w-full md:w-[20%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Target Entity</label>
                    <select class="split-le w-full text-[9px] p-1 bg-slate-50 border border-slate-200 rounded font-bold text-slate-700"><option value="" disabled ${!split["Target Legal Entity"] ? 'selected' : ''}>Select...</option>${leOptions}</select>
                </div>
                <div class="w-full md:w-[20%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Cost Center</label>
                    <select class="split-cc w-full text-[9px] p-1 bg-slate-50 border border-slate-200 rounded font-bold text-slate-700"><option value="" disabled ${!split["Target Cost Center"] ? 'selected' : ''}>Select...</option>${ccOptions}</select>
                </div>
                <div class="w-full md:w-[15%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Rule</label>
                    <select class="split-rule w-full text-[9px] p-1 bg-slate-50 border border-slate-200 rounded text-indigo-700 font-bold" onchange="ContractsController.updateSplitPlaceholder(this)">
                        <option value="Percentage" ${rule === 'Percentage' ? 'selected' : ''}>Percentage %</option>
                        <option value="Fixed Amount" ${rule === 'Fixed Amount' ? 'selected' : ''}>Fixed Amount €</option>
                        <option value="Units" ${rule === 'Units' ? 'selected' : ''}>Units</option>
                    </select>
                </div>
                <div class="w-full md:w-[13%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Value</label>
                    <input type="text" class="split-val w-full text-[10px] p-1 bg-white border border-slate-300 rounded font-mono text-slate-800" placeholder="${rule === 'Percentage' ? '% (e.g. 50)' : (rule === 'Fixed Amount' ? '€' : 'Qty')}" value="${displayVal}" oninput="ContractsUtils.formatSplitValue(this)">
                </div>
                <div class="w-full md:w-[14%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Valid From</label>
                    <input type="date" class="split-from w-full text-[9px] p-0.5 bg-white border border-slate-300 rounded font-mono text-slate-700" value="${validFrom}">
                </div>
                <div class="w-full md:w-[14%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Valid To</label>
                    <input type="date" class="split-to w-full text-[9px] p-0.5 bg-white border border-slate-300 rounded font-mono text-slate-700" value="${validTo}">
                </div>
                <button type="button" onclick="this.closest('.split-row-item').remove()" class="text-slate-300 hover:text-rose-500 pb-1.5 px-1 transition-colors shrink-0" title="Remove Rule"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <div class="mt-1 border-t border-slate-100 pt-1">
                <input type="text" class="split-notes w-full text-[9px] p-1 bg-slate-50 border border-slate-200 rounded text-slate-600 italic" placeholder="Add notes (e.g. Approved by CFO...)" value="${notes}">
            </div>
        </div>`;
        },

        // Cerca il metodo getLedgerRow: function (detailId, mov) dentro js_contracts_templates.html
        getLedgerRow: function (detailId, mov) {
            const type = (mov["Type"] || "ACTUAL").toUpperCase();
            const sDate = mov["Start Date"] ? mov["Start Date"].toString().split('T')[0] : "";
            const eDate = mov["End Date"] ? mov["End Date"].toString().split('T')[0] : "";
            const amount = mov["Amount"] != null ? parseInt(mov["Amount"], 10).toLocaleString('it-IT') : "";
            const notes = mov["Notes"] || "";

            const isCalculated = type === "CALCULATED";
            const bgClass = isCalculated ? "bg-slate-100 opacity-70" : "bg-white";
            const readOnlyAttr = isCalculated ? "readonly disabled" : "";

            return `
            <div class="ledger-row-item flex flex-wrap md:flex-nowrap gap-1.5 items-end ${bgClass} p-2 border border-slate-200 rounded-md shadow-sm relative animate-fade-in mb-1.5">
                <div class="w-full md:w-[20%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Start Date</label>
                    <input type="date" class="ledger-start w-full text-[9px] p-1 border border-slate-200 rounded font-mono text-slate-700" value="${sDate}" ${readOnlyAttr}>
                </div>
                <div class="w-full md:w-[20%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">End Date</label>
                    <input type="date" class="ledger-end w-full text-[9px] p-1 border border-slate-200 rounded font-mono text-slate-700" value="${eDate}" ${readOnlyAttr}>
                </div>
                <div class="w-full md:w-[15%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Type</label>
                    <select class="ledger-type w-full text-[9px] p-1 border border-slate-200 rounded font-bold text-slate-700" ${readOnlyAttr}>
                        <option value="ACTUAL" ${type === 'ACTUAL' ? 'selected' : ''}>ACTUAL</option>
                        <option value="FORECAST" ${type === 'FORECAST' ? 'selected' : ''}>FORECAST</option>
                        ${isCalculated ? `<option value="CALCULATED" selected>CALCULATED</option>` : ''}
                    </select>
                </div>
                <div class="w-full md:w-[15%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Amount (€)</label>
                    <input type="text" class="ledger-amount w-full text-[10px] p-1 border border-slate-300 rounded font-mono text-slate-800" placeholder="e.g. 15.000" value="${amount}" oninput="ContractsUtils.formatLedgerValue(this)" ${readOnlyAttr}>
                </div>
                <div class="w-full md:w-[30%]">
                    <label class="block text-[7px] font-bold text-slate-400 uppercase mb-0.5">Notes</label>
                    <input type="text" class="ledger-notes w-full text-[9px] p-1 border border-slate-200 rounded italic text-slate-600" placeholder="Invoice # or desc..." value="${notes}" ${readOnlyAttr}>
                </div>
                ${!isCalculated ? `
                <div class="flex items-center gap-1 pb-1.5 shrink-0">
                    <button type="button" onclick="duplicateLedgerRowInUI(this, ${detailId})" class="text-slate-300 hover:text-teal-600 px-1 transition-colors" title="Duplicate Movement">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                    <button type="button" onclick="this.closest('.ledger-row-item').remove()" class="text-slate-300 hover:text-rose-500 px-1 transition-colors" title="Remove Movement">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                ` : `<div class="px-2 pb-1.5 text-slate-400 cursor-not-allowed" title="Auto-generated by Engine">⚙️</div>`}
            </div>`;
        }
    };
</script>
