<script>
    // In-memory local state tracking
    let currentSelectedAsset = null;
    let currentAssetGroupIds = [];
    let currentMasterData = null;
    let currentDetailItems = [];
    let isMasterEditable = false;

    // Hook into global SPA tab router
    const originalSwitchTab = switchTab;
    switchTab = function (tabId) {
        originalSwitchTab(tabId);
        if (tabId === 'tab-contracts') {
            document.getElementById('mgmt-asset-search-input').value = '';
            renderAssetSearchList();
        }
    };

    // Safe extraction mechanism for unique key headers across configuration entities
    function extractUniqueField(payloadArray, keyName) {
        if (!payloadArray || payloadArray.length === 0) return [];
        return [...new Set(payloadArray.map(item => {
            const val = item[keyName] !== undefined ? item[keyName] : Object.values(item)[0];
            return (val || "").toString().trim();
        }))].filter(v => v !== "").sort();
    }

    // STEP 1: Client-side search optimization against memory cache (Enhanced with Supplier search)
    function renderAssetSearchList() {
        const query = document.getElementById('mgmt-asset-search-input').value.toLowerCase().trim();
        const container = document.getElementById('mgmt-asset-results-list');
        if (!container) return;

        const allContracts = windowPayload.contracts || [];
        const allMasters = windowPayload.masterContracts || [];

        const matchedAssets = (windowPayload.assets || []).filter(a => {
            const assetName = (a["Asset Name"] || "").toLowerCase();
            const manufacturer = (a["Manufacturer"] || "").toLowerCase();

            // 1. Cerca nei metadati dell'Asset (Nome e Produttore)
            if (assetName.includes(query) || manufacturer.includes(query)) return true;

            // 2. Cerca nel Supplier dei Master Contracts collegati
            const matchInMaster = allMasters.some(m =>
                (m["Asset Name"] || "").toLowerCase() === assetName &&
                (m["Supplier"] || "").toLowerCase().includes(query)
            );
            if (matchInMaster) return true;

            // 3. Cerca nel Supplier dei Contratti di dettaglio collegati
            const matchInContract = allContracts.some(c =>
                (c["Asset Name"] || "").toLowerCase() === assetName &&
                (c["Supplier"] || "").toLowerCase().includes(query)
            );

            return matchInContract;
        });

        if (matchedAssets.length === 0) {
            container.innerHTML = `<p class="text-slate-400 italic text-[11px] text-center py-2">No matching assets or suppliers in memory.</p>`;
            return;
        }

        container.innerHTML = matchedAssets.map(asset => {
            const name = asset["Asset Name"] || "Unknown Asset";
            const id = asset["Asset ID"] || "N/A";
            return `
                <div onclick="selectAssetForManagement('${name.replace(/'/g, "\\'")}', '${id}')" 
                     class="p-2 border-b border-slate-100 hover:bg-teal-50/60 cursor-pointer transition-colors flex justify-between items-center text-xs group">
                    <div>
                        <div class="font-black text-slate-800 group-hover:text-teal-900">${name}</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${asset["Manufacturer"] || 'Generic'}</div>
                    </div>
                    <span class="bg-slate-100 text-slate-500 font-mono text-[9px] px-1.5 py-0.5 rounded">ID: ${id}</span>
                </div>
            `;
        }).join('');
    }

    // Map contracts and compile active Group IDs for the targeted Asset context
    function selectAssetForManagement(assetName, assetId) {
        currentSelectedAsset = { name: assetName, id: assetId };
        isMasterEditable = false;

        document.getElementById('mgmt-selected-asset-header').innerHTML = `
            <div class="bg-teal-50 border border-teal-200 rounded-xl p-3 flex justify-between items-center">
                <div>
                    <span class="text-[8px] font-black text-teal-600 uppercase tracking-widest block">Active Target Asset</span>
                    <span class="font-black text-slate-800 text-sm">${assetName}</span>
                </div>
                <span class="font-mono text-[10px] bg-white border border-teal-100 px-2 py-1 rounded-lg text-slate-600">ID: ${assetId}</span>
            </div>
        `;

        const allContracts = windowPayload.contracts || [];
        const filteredGroupIds = allContracts.filter(c => (c["Asset Name"] || "").toString().toLowerCase() === assetName.toLowerCase())
            .map(c => (c["Group ID"] || "").toString().trim())
            .filter(g => g !== "");
        currentAssetGroupIds = [...new Set(filteredGroupIds)].sort();

        document.getElementById('mgmt-master-form-container').classList.add('hidden');
        document.getElementById('mgmt-detailRowsContainer').innerHTML = '';

        const allMasterContracts = windowPayload.masterContracts || [];
        const assetMasters = allMasterContracts.filter(m => (m["Asset Name"] || "").toString().toLowerCase().trim() === assetName.toLowerCase().trim());

        renderMasterContractsList(assetMasters);
    }

    // MODIFICA AGGIORNATA: Iniezione dello Stato e del Total Commitment staticizzato sui Master in ricerca sidebar
    function renderMasterContractsList(list) {
        const container = document.getElementById('mgmt-master-list-container');
        let html = `
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Linked Master Agreements</span>
                <button onclick="setupNewMasterAgreement()" class="text-[9px] font-black bg-teal-50 border border-teal-200 text-teal-700 px-2 py-1 rounded-md hover:bg-teal-100">+ New Master</button>
            </div>
        `;

        if (list.length === 0) {
            html += `<p class="text-slate-400 italic text-[11px] text-center py-4 bg-slate-50 border border-dashed border-slate-200 rounded-xl">No Master Agreements linked.</p>`;
            container.innerHTML = html;
            return;
        }

        html += `<div class="space-y-2 max-h-64 overflow-y-auto pr-1">`;
        list.forEach(m => {
            const mId = m["Master Contract ID"];
            const supplier = m["Supplier"] || "No Supplier";
            const status = (m["Status"] || "ACTIVE").toUpperCase().trim();
            const totalCommitment = parseFloat(m["Total Commitment"]) || 0;

            // Mappatura dinamica degli stati ereditati sul selettore laterale
            let statusClass = "bg-slate-50 text-slate-500 border-slate-200";
            if (status === "ACTIVE") statusClass = "bg-emerald-50 text-emerald-700 border-emerald-200/50";
            if (status === "EXPIRED" || status === "TERMINATED") statusClass = "bg-rose-50 text-rose-600 border-rose-200/50";
            if (status === "IN NEGOTIATION") statusClass = "bg-amber-50 text-amber-700 border-amber-200/50";

            html += `
                <div class="p-3 bg-white border border-slate-100 hover:border-teal-200 rounded-xl shadow-sm flex flex-col gap-2 group transition-all">
                    <div class="flex justify-between items-start gap-2">
                        <div class="min-w-0 flex-1">
                            <div class="font-black text-slate-800 text-xs truncate" title="${mId}">${mId}</div>
                            <div class="text-[10px] text-slate-400 font-bold mt-0.5">Supplier: <span class="text-teal-700 font-extrabold">${supplier}</span></div>
                        </div>
                        <span class="px-1.5 py-0.5 rounded-full text-[7px] font-black uppercase tracking-wider shrink-0 border ${statusClass}">${status}</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-50/60 pt-2 text-[10px]">
                        <div>
                            <span class="text-slate-400 font-medium">Total Commit:</span>
                            <span class="font-mono font-bold text-slate-700">€${totalCommitment.formatCurrency()}</span>
                        </div>
                        <button onclick="loadFullMasterDetailArchitecture('${mId}')" class="px-2.5 py-1 bg-slate-100 hover:bg-teal-700 hover:text-white rounded-lg text-[9px] font-black uppercase tracking-wider transition-all">Manage</button>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    function loadFullMasterDetailArchitecture(masterId) {
        const allMasterContracts = windowPayload.masterContracts || [];
        const allContracts = windowPayload.contracts || [];

        currentMasterData = allMasterContracts.find(m => m["Master Contract ID"].toString().trim() === masterId.toString().trim());
        const rawDetails = allContracts.filter(c => c["Master Contract ID"].toString().trim() === masterId.toString().trim());

        currentDetailItems = rawDetails.map((row, index) => {
            const cId = (row["Contract ID"] || "").toString().trim();
            const gId = (row["Group ID"] || "").toString().trim();

            const linkedSplits = (windowPayload.allocationSplits || []).filter(s => (s["Contract ID"] || "").toString().trim() === cId);
            const linkedLedger = (windowPayload.ledger || []).filter(l => (l["Contract ID"] || "").toString().trim() === cId);

            return {
                id: index,
                isEditing: false,
                data: row,
                splits: linkedSplits,
                ledger: linkedLedger // <-- NUOVO
            };
        });

        isMasterEditable = false;
        renderMasterFormBox();
        renderDetailItemsTable();
    }

    function setupNewMasterAgreement() {
        currentMasterData = { "Master Contract ID": "", "Supplier": "", "Scope": "", "Comments": "" };
        currentDetailItems = [];
        isMasterEditable = true;
        renderMasterFormBox();
        renderDetailItemsTable();
    }

    // MODIFICA AGGIORNATA: Card del Master ridisegnata come cruscotto FinOps completo a 6 colonne di KPI metriche
    function renderMasterFormBox() {
        document.getElementById('mgmt-master-form-container').classList.remove('hidden');
        const container = document.getElementById('mgmt-master-form-box-inner');
        if (!container) return;

        const suppliersList = extractUniqueField(windowPayload.suppliers, "Supplier");

        if (!isMasterEditable) {
            const status = (currentMasterData["Status"] || "ACTIVE").toUpperCase().trim();
            const totalCommitment = parseFloat(currentMasterData["Total Commitment"]) || 0;
            const runRate = parseFloat(currentMasterData["Run Rate"]) || 0;

            const cleanStart = currentMasterData["Master Start Date"] ? currentMasterData["Master Start Date"].toString().split('T')[0] : '—';
            const cleanEnd = currentMasterData["Master End Date"] ? currentMasterData["Master End Date"].toString().split('T')[0] : '—';
            const termMonths = currentMasterData["Contract Term (Months)"] !== undefined ? currentMasterData["Contract Term (Months)"] : '—';

            let statusClass = "bg-slate-50 text-slate-500 border-slate-200";
            if (status === "ACTIVE") statusClass = "bg-emerald-50 text-emerald-700 border-emerald-200/50";
            if (status === "EXPIRED" || status === "TERMINATED") statusClass = "bg-rose-50 text-rose-600 border-rose-200/50";
            if (status === "IN NEGOTIATION") statusClass = "bg-amber-50 text-amber-700 border-amber-200/50";

            container.innerHTML = `
                <div class="flex justify-between items-start border-b border-slate-100 pb-3 mb-4">
    
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-mono bg-teal-900 text-white px-2 py-0.5 rounded-md font-bold uppercase tracking-wider">${currentMasterData["Master Contract ID"] || 'NEW MASTER'}</span>
                            <span class="px-2 py-0.5 rounded-full text-[8px] font-black uppercase tracking-wider border ${statusClass}">${status}</span>
                        </div>
                        <h4 class="text-sm font-black text-slate-800 mt-1.5">Supplier: <span class="text-teal-700">${currentMasterData["Supplier"] || 'Not Specified'}</span></h4>
                    </div>
                    
                    <div class="flex flex-wrap justify-end items-center gap-2">
                        
                        ${currentMasterData["Contract Links"] ?
                    `<div class="flex items-center gap-1.5 mr-1 border-r border-slate-200 pr-3">
                                ${currentMasterData["Contract Links"].split(',').map((url, idx) => `
                                    <a href="${url.trim()}" target="_blank" class="px-2 py-1 bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white border border-indigo-200 hover:border-indigo-600 rounded-md text-[9px] font-black uppercase tracking-wider flex items-center gap-1 transition-all shadow-sm" title="${url.trim()}">
                                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                        Doc ${idx + 1}
                                    </a>
                                `).join('')}
                            </div>`
                    : ''}
                        
                        <button onclick="toggleMasterEditState(true)" class="px-3 py-1.5 bg-slate-100 border border-slate-200 text-slate-700 font-black text-[10px] uppercase tracking-wider rounded-lg hover:bg-slate-200 transition-colors shadow-sm">
                            Edit Master Info
                        </button>
                    </div>
                    
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 bg-slate-50/60 p-3 rounded-xl border border-slate-100 mb-3 text-xs">
                    <div class="border-r border-slate-200/60 last:border-none pr-2">
                        <span class="block text-[8px] font-black text-slate-400 uppercase tracking-wider mb-0.5">Start Date</span>
                        <span class="font-mono font-bold text-slate-700">${cleanStart}</span>
                    </div>
                    <div class="border-r border-slate-200/60 md:last:border-none pr-2 pl-1">
                        <span class="block text-[8px] font-black text-slate-400 uppercase tracking-wider mb-0.5">End Date</span>
                        <span class="font-mono font-bold text-slate-700">${cleanEnd}</span>
                    </div>
                    <div class="border-r border-slate-200/60 last:border-none pr-2 pl-1">
                        <span class="block text-[8px] font-black text-slate-400 uppercase tracking-wider mb-0.5">Contract Term</span>
                        <span class="font-bold text-slate-800 font-mono">${termMonths} <span class="text-[9px] font-sans text-slate-500 font-normal">Months</span></span>
                    </div>
                    <div class="last:border-none pr-2 pl-1 text-right md:text-left">
                        <span class="block text-[8px] font-black text-teal-600 uppercase tracking-wider mb-0.5">Master Run Rate</span>
                        <span class="font-mono font-black text-teal-800 text-[13px]">€${runRate.formatCurrency()}</span>
                    </div>
                </div>

                <div class="bg-white p-2.5 rounded-xl border border-slate-100 shadow-2xs mb-2 flex justify-between items-center text-xs">
                    <span class="text-slate-400 font-bold uppercase text-[8px] tracking-wider">Total Cumulative Commitment</span>
                    <span class="font-mono font-black text-slate-900 text-sm">€${totalCommitment.formatCurrency()}</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs mt-3 border-t border-slate-100 pt-3">
                    <div><span class="text-slate-400 font-bold uppercase text-[9px] block">Billing Channel:</span> <span class="inline-block bg-teal-50 border border-teal-100 text-teal-700 px-2 py-0.5 rounded text-[10px] font-black mt-0.5">${currentMasterData["Billing Channel"] || '—'}</span></div>
                    <div><span class="text-slate-400 font-bold uppercase text-[9px] block">Master Scope:</span> <span class="text-slate-700 font-medium">${currentMasterData["Scope"] || '—'}</span></div>
                    <div><span class="text-slate-400 font-bold uppercase text-[9px] block">Master Comments:</span> <span class="text-slate-500 italic font-medium">${currentMasterData["Comments"] || '—'}</span></div>
                </div>
            `;
        } else {
            const isNew = currentMasterData["Master Contract ID"] === "";
            container.innerHTML = `
                <div class="flex justify-between items-center border-b border-slate-200 pb-2 mb-4">
                    <h3 class="text-xs font-black text-slate-700 uppercase tracking-widest">Master Info Setup</h3>
                    ${!isNew ? `<button onclick="toggleMasterEditState(false)" class="text-[10px] font-bold text-slate-400 hover:text-slate-600">Cancel</button>` : ''}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                    ${!isNew ? `
                    <div>
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Contract ID</label>
                        <input type="text" id="ins-masterId" disabled value="${currentMasterData["Master Contract ID"]}" class="w-full px-3 py-2 bg-slate-100 border border-slate-200 rounded-lg font-bold uppercase text-xs text-slate-500">
                    </div>
                    ` : ''}
                    <div class="${isNew ? 'md:col-span-2' : ''}">
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Supplier</label>
                        <select id="ins-masterSupplier" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 font-bold text-slate-800 bg-white text-xs">
                            <option value="">-- Select Supplier --</option>
                            ${suppliersList.map(s => `<option value="${s}" ${s === currentMasterData["Supplier"] ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs mt-3">
                    <div>
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Scope</label>
                        <input type="text" id="ins-masterScope" value="${currentMasterData["Scope"] || ''}" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 text-xs">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Master Comments</label>
                        <input type="text" id="ins-masterComments" value="${currentMasterData["Comments"] || ''}" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 italic text-slate-500 text-xs">
                    </div>
                </div>
                ${!isNew ? `
                <div class="mt-3 flex justify-end">
                    <button onclick="confirmMasterEditLocalChanges()" class="px-4 py-1.5 bg-slate-800 text-white rounded-lg font-black text-[10px] uppercase tracking-wider">Confirm Master Changes</button>
                </div>` : ''}
                <div class="mt-4 border border-dashed border-slate-300 bg-slate-50 p-3 rounded-lg">
                    <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Upload & Manage Documents</label>
                    
                    ${currentMasterData["Contract Links"] ? `
                        <div class="mb-3 bg-white p-2 rounded border border-slate-200">
                            <span class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Currently Attached Files:</span>
                            <div class="flex flex-wrap gap-1.5">
                                ${currentMasterData["Contract Links"].split(',').map((url, idx) => `
                                    <div class="flex items-center gap-0 bg-indigo-50 border border-indigo-200 rounded-md shadow-sm overflow-hidden group">
                                        <a href="${url.trim()}" target="_blank" class="px-2 py-0.5 text-indigo-700 hover:bg-indigo-600 hover:text-white text-[8px] font-black uppercase tracking-wider flex items-center gap-1 transition-colors" title="${url.trim()}">
                                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                            Doc ${idx + 1}
                                        </a>
                                        <button type="button" onclick="removeDocumentLink('${url.trim()}', true)" class="px-1.5 py-0.5 text-indigo-400 hover:bg-rose-500 hover:text-white transition-colors border-l border-indigo-200" title="Remove Document">
                                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                    
                    <input type="text" id="ins-masterDocumentLink" value="${currentMasterData["Contract Links"] || ''}" class="hidden">
                    
                    <div class="flex items-center gap-3">
                        <input type="file" id="upload-files" multiple class="text-xs text-slate-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-[10px] file:font-black file:uppercase file:tracking-wider file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100 cursor-pointer">
                        <button type="button" onclick="handleFileUploads()" class="px-3 py-1.5 bg-slate-800 hover:bg-teal-700 text-white rounded-md text-[10px] font-black uppercase tracking-wider transition-all shadow-sm">Start Upload</button>
                    </div>
                    <div id="upload-status" class="hidden mt-2 text-[10px]"></div>
                </div>
            `;
        }
    }

    function toggleMasterEditState(editable) {
        isMasterEditable = editable;
        renderMasterFormBox();
    }

    function confirmMasterEditLocalChanges() {
        currentMasterData["Supplier"] = document.getElementById('ins-masterSupplier').value;
        currentMasterData["Scope"] = document.getElementById('ins-masterScope').value.trim();
        currentMasterData["Comments"] = document.getElementById('ins-masterComments').value.trim();
        currentMasterData["Contract Links"] = document.getElementById('ins-masterDocumentLink').value.trim();
        isMasterEditable = false;
        renderMasterFormBox();
    }

    // STEP 3 RENDERING: Mantenimento della label uniforme "Run Rate" sui contratti di allocazione atomici
    function renderDetailItemsTable() {
        const container = document.getElementById('mgmt-detailRowsContainer');
        if (!container) return;

        if (currentDetailItems.length === 0) {
            container.innerHTML = `
                <div class="text-center py-8 border-2 border-dashed border-slate-100 rounded-2xl bg-slate-50/20">
                    <p class="text-slate-400 text-xs italic">No allocation or ramping detail records found for this Master Agreement.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = `<div id="mgmt-flexible-cards-list" class="space-y-2"></div>`;
        const listWrapper = document.getElementById('mgmt-flexible-cards-list');

        currentDetailItems.forEach((item) => {
            const cardDiv = document.createElement('div');

            if (!item.isEditing) {
                const d = item.data;
                const effCommit = typeof d["Effective Commitment"] === 'number' ? d["Effective Commitment"].formatCurrency() : (parseFloat(d["Effective Commitment"]) || 0).formatCurrency();
                const annVal = typeof d["Annual Value"] === 'number' ? d["Annual Value"].formatCurrency() : (parseFloat(d["Annual Value"]) || 0).formatCurrency();
                const totCommit = typeof d["Total Commitment"] === 'number' ? d["Total Commitment"].formatCurrency() : (parseFloat(d["Total Commitment"]) || 0).formatCurrency();
                const cleanStart = d["Start Date"] ? d["Start Date"].toString().split('T')[0] : '—';
                const cleanEnd = d["End Date"] ? d["End Date"].toString().split('T')[0] : '—';
                const contractEnd = d["Contract End Date"] ? d["Contract End Date"].toString().split('T')[0] : '—';
                const adjEnd = d["Adjusted End Date"] ? d["Adjusted End Date"].toString().split('T')[0] : '—';

                cardDiv.className = "p-3 bg-white border border-slate-200/80 rounded-xl hover:border-teal-200 hover:shadow-sm transition-all flex flex-col gap-2 cursor-pointer select-none";
                cardDiv.setAttribute("onclick", `toggleCompactAccordion(${item.id}, event)`);

                cardDiv.innerHTML = `
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 text-xs">
                        <div class="grid grid-cols-1 md:grid-cols-3 flex-1 gap-4 items-center">
                            
                            <div class="flex items-center gap-2.5 min-w-0">
                                <svg id="compact-chevron-${item.id}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-3.5 h-3.5 text-slate-300 transition-transform duration-200">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                                </svg>
                                <div class="min-w-0 flex-1">
                                    <div class="flex items-center gap-2 flex-wrap">
                                        <span class="font-black text-slate-900 truncate tracking-wide text-[13px]">${d["Legal Entity"] || '—'}</span>
                                        <span class="px-2 py-0.5 rounded-full text-[8px] font-black uppercase tracking-wider shrink-0 ${d["Status"] === 'ACTIVE' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200/50' : d["Status"] === 'EXPIRED' ? 'bg-rose-50 text-rose-600 border border-rose-200/50' : 'bg-amber-50 text-amber-700 border border-amber-200/50'}">${d["Status"] || 'ACTIVE'}</span>
                                        
                                        <span class="font-mono text-[9px] font-black text-slate-600 bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded-md shadow-3xs" title="Cost Center">CC: ${d["Cost Center"] || '—'}</span>
                                    </div>

    function formatInputAsIntegerCurrency(el) {
        let val = el.value.replace(/[^0-9]/g, '');
        if (val === '') {
            el.value = '';
            return;
        }
        el.value = parseInt(val, 10).toLocaleString('it-IT');
    }

    function cloneDetailRowItem(id) {
        const itemToClone = currentDetailItems.find(i => i.id === id);
        if (!itemToClone) return;

        const newId = currentDetailItems.length > 0 ? Math.max(...currentDetailItems.map(i => i.id)) + 1 : 0;

        // Cloniamo i dati contrattuali
        const clonedData = JSON.parse(JSON.stringify(itemToClone.data));

        // Puliamo i campi che devono essere unici per la nuova riga
        clonedData["Scope"] = "";
        clonedData["Contract ID"] = "";
        clonedData["Status"] = "ACTIVE";
        clonedData["Contract Links"] = "";

        // Inseriamo la nuova riga in memoria
        currentDetailItems.push({
            id: newId,
            isEditing: true,
            data: clonedData,
            splits: [],
            ledger: []
        });

        renderDetailItemsTable();
    }

    function toggleCompactAccordion(id, event) {
        if (event.target.tagName === 'BUTTON' || event.target.closest('button') || event.target.closest('span.tt-wrapper')) {
            return;
        }

        const accordionPanel = document.getElementById(`compact-accordion-${id}`);
        const chevronSvg = document.getElementById(`compact-chevron-${id}`);
        if (!accordionPanel) return;

        const isHidden = accordionPanel.classList.contains('hidden');
        if (isHidden) {
            accordionPanel.classList.remove('hidden');
            if (chevronSvg) chevronSvg.classList.add('rotate-90');
        } else {
            accordionPanel.classList.add('hidden');
            if (chevronSvg) chevronSvg.classList.remove('rotate-90');
        }
    }

    function toggleRowEditMode(id, editable) {
        const item = currentDetailItems.find(i => i.id === id);
        if (item) {
            item.isEditing = editable;
            renderDetailItemsTable();
        }
    }

    function showErrorMessage(id, msg) {
        const errorDiv = document.getElementById(`error-message-${id}`);
        const errorText = document.getElementById(`error-text-${id}`);

        if (errorDiv && errorText) {
            errorText.textContent = msg;
            errorDiv.classList.remove('hidden');
            errorDiv.classList.add('flex');
        }
    }

    function saveRowLocalChanges(id) {
        const item = currentDetailItems.find(i => i.id === id);
        if (!item) return;

        item.data["Group ID"] = document.getElementById(`edit-groupId-${id}`).value.trim();
        item.data["Target Group ID"] = document.getElementById(`edit-targetGroupId-${id}`).value;
        item.data["Legal Entity"] = document.getElementById(`edit-legalEntity-${id}`).value;
        item.data["Location"] = document.getElementById(`edit-location-${id}`).value;
        item.data["Service Owner"] = document.getElementById(`edit-serviceOwner-${id}`).value.trim();
        item.data["Scope"] = document.getElementById(`edit-scope-${id}`).value.trim();
        item.data["Cost Recurrence"] = document.getElementById(`edit-costRecurrence-${id}`).value;
        item.data["Pricing Model"] = document.getElementById(`edit-pricingModel-${id}`).value;
        item.data["Billing Terms"] = document.getElementById(`edit-billingTerms-${id}`).value;

        const cleanCommitmentStr = document.getElementById(`edit-totalCommitment-${id}`).value.replace(/\./g, '').trim();
        item.data["Total Commitment"] = parseInt(cleanCommitmentStr, 10) || 0;
        item.data["Expenditure Type"] = document.getElementById(`edit-expenditureType-${id}`).value;
        item.data["Cost Center"] = document.getElementById(`edit-costCenter-${id}`).value;
        item.data["Start Date"] = document.getElementById(`edit-startDate-${id}`).value;
        item.data["Contract End Date"] = document.getElementById(`edit-contractEndDate-${id}`).value;
        item.data["Adjusted End Date"] = document.getElementById(`edit-adjustedEndDate-${id}`).value;
        item.data["Notice Period (Days)"] = document.getElementById(`edit-noticePeriod-${id}`).value.trim();
        item.data["Auto-Renewal"] = document.getElementById(`edit-autoRenewal-${id}`).value;
        item.data["BL ID"] = document.getElementById(`edit-blId-${id}`).value.trim();
        item.data["Request Code"] = document.getElementById(`edit-requestCode-${id}`).value.trim();
        item.data["Comments"] = document.getElementById(`edit-comments-${id}`).value.trim();
        item.data["Contract Links"] = document.getElementById(`edit-contractLinks-${id}`).value.trim();

        // --- LETTURA E SALVATAGGIO ALLOCATION SPLITS ---
        const splitRows = document.querySelectorAll(`#splits-container-${id} .split-row-item`);
        item.splits = Array.from(splitRows).map(row => {
            const rule = row.querySelector('.split-rule').value;
            const rawValStr = row.querySelector('.split-val').value.replace(/[^0-9]/g, '');
            const val = parseInt(rawValStr, 10) || 0;

            return {
                "Contract ID": item.data["Contract ID"] || "",
                "Target Legal Entity": row.querySelector('.split-le').value || "",
                "Target Cost Center": row.querySelector('.split-cc').value || "",
                "Allocation Rule": rule,
                "Percentage Share": rule === "Percentage" ? val : "",
                "Fixed Amount": rule === "Fixed Amount" ? val : "",
                "Units Assigned": rule === "Units" ? val : "",
                "Valid From": row.querySelector('.split-from').value || "",
                "Valid To": row.querySelector('.split-to').value || "",
                "Notes": row.querySelector('.split-notes').value || "" // <-- NOTE DELLO SPLIT
            };
        });

        // --- LETTURA E SALVATAGGIO LEDGER ---
        const ledgerRows = document.querySelectorAll(`#ledger-container-${id} .ledger-row-item`);
        item.ledger = Array.from(ledgerRows).map(row => {
            const rawAmtStr = row.querySelector('.ledger-amount').value.replace(/[^0-9]/g, '');
            return {
                "Contract ID": item.data["Contract ID"] || "",
                "Start Date": row.querySelector('.ledger-start').value || "",
                "End Date": row.querySelector('.ledger-end').value || "",
                "Type": row.querySelector('.ledger-type').value || "ACTUAL",
                "Amount": parseInt(rawAmtStr, 10) || 0,
                "Notes": row.querySelector('.ledger-notes').value || ""
            };
        });

        document.getElementById('error-message').style.display = 'none';
        try {
            validateContractData(item.data);

            showLoading();
            google.script.run
                .withSuccessHandler(function (calculatedItem) {
                    hideLoading();
                    item.data = calculatedItem;
                    item.isEditing = false;
                    renderDetailItemsTable();
                })
                .withFailureHandler(function (err) {
                    hideLoading();
                    showErrorMessage(id, "Server Error: " + err.message);
                })
                .calculateContractLogic(item.data);
        } catch (e) {
            showErrorMessage(id, e.message);
            return;
        }
    }

    function saveCurrentContract() {
        if (!currentSelectedAsset) return;

        const isEditingExistingMaster = isMasterEditable && currentMasterData["Master Contract ID"] !== "";
        const hasOpenEdits = isEditingExistingMaster || currentDetailItems.some(item => item.isEditing);
        if (hasOpenEdits) {
            showMgmtBannerStatus("There are active forms still in edit mode. Please click 'Apply' or 'Confirm Master Changes' before performing the global push.", "warning");
            return;
        }

        if (isMasterEditable) {
            currentMasterData["Supplier"] = document.getElementById('ins-masterSupplier').value;
            currentMasterData["Scope"] = document.getElementById('ins-masterScope').value.trim();
            currentMasterData["Comments"] = document.getElementById('ins-masterComments').value.trim();
        }

        const mId = currentMasterData["Master Contract ID"] || (document.getElementById('ins-masterId') ? document.getElementById('ins-masterId').value.trim() : "");
        const spl = currentMasterData["Supplier"];

        const payload = {
            assetName: currentSelectedAsset.name,
            assetId: currentSelectedAsset.id,
            masterId: mId,
            supplier: spl,
            masterScope: currentMasterData["Scope"],
            masterComments: currentMasterData["Comments"],
            contractLinks: currentMasterData["Contract Links"],
            suppliers: (windowPayload.suppliers || []).filter(s => String(s["Supplier"]).trim().toLowerCase() === String(spl).trim().toLowerCase()),
            initiatives: mId && mId.trim() !== "" ? (windowPayload.initiatives || []).filter(i => String(i["Master Contract ID"]).trim().toLowerCase() === mId.trim().toLowerCase()) : [],
            details: currentDetailItems.map(item => {
                return {
                    contractId: item.data["Contract ID"] || "",
                    groupId: item.data["Group ID"] || "",
                    targetGroupId: item.data["Target Group ID"] || "",
                    legalEntity: item.data["Legal Entity"] || "",
                    location: item.data["Location"] || "",
                    serviceOwner: item.data["Service Owner"] || "",
                    scope: item.data["Scope"] || "",
                    costRecurrence: item.data["Cost Recurrence"] || "",
                    pricingModel: item.data["Pricing Model"] || "",
                    billingTerms: item.data["Billing Terms"] || "",
                    totalCommitment: item.data["Total Commitment"] || 0,
                    expenditureType: item.data["Expenditure Type"] || "",
                    costCenter: item.data["Cost Center"] || "",
                    startDate: item.data["Start Date"] || "",
                    contractEndDate: item.data["Contract End Date"] || "",
                    adjustedEndDate: item.data["Adjusted End Date"] || "",
                    noticePeriod: item.data["Notice Period (Days)"] || "",
                    autoRenewal: item.data["Auto-Renewal"] || "",
                    blId: item.data["BL ID"] || "",
                    requestCode: item.data["Request Code"] || "",
                    comments: item.data["Comments"] || "",
                    contractLinks: item.data["Contract Links"] || "",
                    splits: item.splits || [],
                    ledger: item.ledger || []
                };
            })
        };

        if (!payload.supplier) {
            showMgmtBannerStatus("Supplier selection at Master level is required.", "warning");
            return;
        }

        showLoading();

        google.script.run
            .withSuccessHandler(function (res) {
                hideLoading();
                if (res === "SUCCESS") {
                    showMgmtBannerStatus("Architecture synchronized successfully.", "success");
                    fetchLiveData().then(() => {
                        selectAssetForManagement(currentSelectedAsset.name, currentSelectedAsset.id);
                    });
                } else {
                    showMgmtBannerStatus("Sync failed: unexpected execution outcome from server.", "error");
                }
            })
            .withFailureHandler((err) => {
                hideLoading();
                showMgmtBannerStatus("Sync error: " + err.message, "error");
            })
            .processMasterDetailSync(payload);
    }

    function showMgmtBannerStatus(message, type = 'warning') {
        const banner = document.getElementById('mgmt-push-warning');
        if (!banner) return;

        const textSpan = banner.querySelector('span');
        const svgIcon = banner.querySelector('svg');
        if (textSpan) textSpan.textContent = message;

        banner.className = "text-[11px] font-bold animate-fade-in items-center gap-2 shadow-2xs rounded-xl px-3 py-1.5 border flex";

        if (type === 'success') {
            banner.classList.add('text-emerald-700', 'bg-emerald-50', 'border-emerald-200/60');
            if (svgIcon) {
                svgIcon.className = "w-4 h-4 text-emerald-600 shrink-0";
                svgIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>`;
            }
        } else if (type === 'error') {
            banner.classList.add('text-rose-700', 'bg-rose-50', 'border-rose-200/60');
            if (svgIcon) {
                svgIcon.className = "w-4 h-4 text-rose-600 shrink-0";
                svgIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
            }
        } else {

                svgIcon.className = "w-4 h-4 text-amber-600 shrink-0";
                svgIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>`;

            banner.classList.remove('flex');
            banner.classList.add('hidden');

    function validateContractData(data) {
        const requiredFields = {
            "Legal Entity": "Legal Entity",
            "Scope": "Scope",
            "Total Commitment": "Total Commitment",
            "Start Date": "Start Date",
            "Contract End Date": "Contract End Date"
        };

        for (let field in requiredFields) {
            const val = data[field];
            if (val === null || val === undefined || String(val).trim() === "") {
                throw new Error(`Field '${requiredFields[field]}' is mandatory.`);
            }
        }

        if (parseFloat(data["Total Commitment"]) <= 0) {
            throw new Error("Total Commitment must be greater than zero.");
        }

        if (new Date(data["Start Date"]) >= new Date(data["Contract End Date"])) {
            throw new Error("Start Date must be before Contract End Date.");
        }

        return true;
    }

    function handleFileUploads() {
        const fileInput = document.getElementById('upload-files');
        if (!fileInput || fileInput.files.length === 0) {
            showMgmtBannerStatus("Please select at least one file before uploading.", "warning");
            return;
        }

        const supplier = document.getElementById('ins-masterSupplier').value || "Unknown_Supplier";
        const assetName = currentSelectedAsset.name || "Unknown_Asset";

        let dateStr = currentMasterData["Master Start Date"];
        let year = dateStr ? dateStr.split('-')[0] : new Date().getFullYear().toString();

        const statusDiv = document.getElementById('upload-status');
        statusDiv.innerHTML = `<span class="text-teal-600 font-bold animate-pulse">Uploading ${fileInput.files.length} file(s)... Please do not close this window.</span>`;
        statusDiv.classList.remove('hidden');

        let filesData = [];
        let filesProcessed = 0;

        Array.from(fileInput.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function (e) {
                const dataUrl = e.target.result;
                const base64 = dataUrl.split(',')[1];

                filesData.push({
                    filename: file.name,
                    mimeType: file.type,
                    base64: base64
                });

                filesProcessed++;

                if (filesProcessed === fileInput.files.length) {
                    google.script.run
                        .withSuccessHandler(urls => {
                            statusDiv.innerHTML = `<span class="text-emerald-600 font-bold">✓ Upload completed! Files saved successfully.</span>`;

                            const inputLinks = document.getElementById('ins-masterDocumentLink');
                            let currentLinks = inputLinks.value ? inputLinks.value.split(',').map(s => s.trim()).filter(s => s) : [];

                            // Add only NEW urls to avoid duplicates in the cell
                            urls.forEach(url => {
                                if (!currentLinks.includes(url)) {
                                    currentLinks.push(url);
                                }
                            });

                            const finalLinks = currentLinks.join(', ');
                            inputLinks.value = finalLinks;
                            currentMasterData["Contract Links"] = finalLinks; // Update memory

                            fileInput.value = ""; // Clear input

                            // Force UI refresh to show the newly added files immediately
                            setTimeout(() => renderMasterFormBox(), 1500);
                        })
                        .withFailureHandler(err => {
                            statusDiv.innerHTML = `<span class="text-rose-600 font-bold">✗ Error: ${err.message}</span>`;
                        })
                        .uploadFilesToDrive(filesData, year, supplier, assetName);
                }
            };
            reader.readAsDataURL(file);
        });
    }

    /**
     * Rimuove un link dalla stringa dei documenti allegati.
     * @param {string} urlToRemove - L'URL esatto da rimuovere.
     * @param {boolean} isMaster - true se stiamo modificando il Master, false se è un Dettaglio.
     * @param {number} detailId - L'ID della riga di dettaglio (necessario solo se isMaster è false).
     */
    function removeDocumentLink(urlToRemove, isMaster, detailId = null) {
        if (isMaster) {
            // Logica per il Master Contract
            let links = currentMasterData["Contract Links"] ? currentMasterData["Contract Links"].split(',').map(s => s.trim()).filter(s => s) : [];
            links = links.filter(link => link !== urlToRemove); // Rimuove l'url specifico
            currentMasterData["Contract Links"] = links.join(', '); // Ricrea la stringa

            // Ridisegna il form per mostrare il badge rimosso
            renderMasterFormBox();
        } else {
            // Logica per la singola riga di Dettaglio
            const item = currentDetailItems.find(i => i.id === detailId);
            if (item) {
                let links = item.data["Contract Links"] ? item.data["Contract Links"].split(',').map(s => s.trim()).filter(s => s) : [];
                links = links.filter(link => link !== urlToRemove);
                item.data["Contract Links"] = links.join(', ');

                // Ridisegna la tabella dei dettagli per mostrare il badge rimosso
                renderDetailItemsTable();
            }
        }
    }

    function updateSplitPlaceholder(selectEl) {
        const row = selectEl.closest('.split-row-item');
        const inputEl = row.querySelector('.split-val');
        const rule = selectEl.value;

        // Aggiorna il suggerimento grigio
        if (rule === 'Percentage') inputEl.placeholder = '% (e.g. 50)';
        else if (rule === 'Fixed Amount') inputEl.placeholder = '€ (e.g. 15.000)';
        else inputEl.placeholder = 'Qty (e.g. 150)';

        // Riformatta il valore già inserito applicando la nuova regola
        formatSplitValue(inputEl);
    }

    function formatSplitValue(inputEl) {
        const rule = inputEl.closest('.split-row-item').querySelector('.split-rule').value;

        // Pulisce tutto ciò che non è un numero (lettere, punti, virgole)
        let val = inputEl.value.replace(/[^0-9]/g, '');

        if (val === '') {
            inputEl.value = '';
            return;
        }

        let intVal = parseInt(val, 10);

        if (rule === 'Percentage') {
            // Blocca la percentuale a massimo 100
            if (intVal > 100) intVal = 100;
            inputEl.value = intVal.toString();
        }
        else if (rule === 'Fixed Amount') {
            // Aggiunge il separatore delle migliaia (es. 15000 -> 15.000)
            inputEl.value = intVal.toLocaleString('it-IT');
        }
        else if (rule === 'Units') {
            // Lascia il numero pulito per le licenze
            inputEl.value = intVal.toString();
        }
    }

    }

    function formatLedgerValue(inputEl) {
        let val = inputEl.value.replace(/[^0-9]/g, '');
        if (val === '') { inputEl.value = ''; return; }
        inputEl.value = parseInt(val, 10).toLocaleString('it-IT');
    }

    function toggleLedgerVisibility(detailId) {
        const billingTermsSelect = document.getElementById(`edit-billingTerms-${detailId}`);
        const ledgerSection = document.getElementById(`ledger-section-container-${detailId}`);

        if (billingTermsSelect && ledgerSection) {
            if (billingTermsSelect.value === "Ledger-Driven") {
                ledgerSection.classList.remove('hidden');
            } else {
                ledgerSection.classList.add('hidden');
            }
        }
    }

    function formatToEnglishCustomDate(dateStr) {
        if (!dateStr) return "—";
        // Gestione sicura delle stringhe ISO o dei timestamp
        const cleanStr = dateStr.toString().split('T')[0];
        const parts = cleanStr.split('-');
        if (parts.length !== 3) return dateStr; // Ritorna il valore originale se è già formattato

        const year = parts[0];
        const monthIdx = parseInt(parts[1], 10) - 1;
        const day = parseInt(parts[2], 10);

        // Mesi rigorosamente in Inglese
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        if (monthIdx >= 0 && monthIdx < 12) {
            return `${day} ${months[monthIdx]} ${year}`;
        }
        return dateStr;
    }

</script>
