<script>
    /**
     * js_contracts_controller.html
     * CONTROLLER: Gestione logica del modulo contratti basata su DTO puliti.
     */

    window.ContractsController = {
        toggleMasterContextMenu: function (masterId, event) {
            if (event) event.stopPropagation();
            document.querySelectorAll('.contracts-kebab-dropdown').forEach(el => {
                if (el.id !== `master-kebab-menu-${masterId}`) el.classList.add('hidden');
            });
            const menu = document.getElementById(`master-kebab-menu-${masterId}`);
            if (menu) menu.classList.toggle('hidden');
        },

        toggleContractLineContextMenu: function (lineId, event) {
            if (event) event.stopPropagation();
            document.querySelectorAll('.contracts-kebab-dropdown').forEach(el => {
                if (el.id !== `line-kebab-menu-${lineId}`) el.classList.add('hidden');
            });
            const menu = document.getElementById(`line-kebab-menu-${lineId}`);
            if (menu) menu.classList.toggle('hidden');
        },

        closeAllContextMenus: function () {
            document.querySelectorAll('.contracts-kebab-dropdown').forEach(el => el.classList.add('hidden'));
        },

        initiateRenewal: function (masterId) {
            this.closeAllContextMenus();
            setupMasterRenewal(masterId);
        },

        deleteCurrentMaster: function (masterId) {
            const mId = masterId || (ContractsState.currentMasterData ? ContractsState.currentMasterData.masterId : "");
            if (!mId) return;

            const childLines = (windowPayload.contracts || []).filter(c => String(c.masterId).trim() === String(mId).trim());
            if (childLines.length > 0) {
                FinOpsUI.showAlert("Governance Restriction", "Cannot delete a Master Agreement that contains active contract lines. Please remove all contract lines first.");
                return;
            }

            FinOpsUI.showConfirm("Delete Master Agreement", "Are you entirely sure you want to permanently remove this Master Agreement from memory?", () => {
                ContractsState.deletedMasterIds = ContractsState.deletedMasterIds || [];
                if (!String(mId).toUpperCase().startsWith("TMP-")) {
                    ContractsState.deletedMasterIds.push(mId);
                }

                windowPayload.masterContracts = windowPayload.masterContracts.filter(m => m.masterId !== mId);

                if (ContractsState.currentMasterData && ContractsState.currentMasterData.masterId === mId) {
                    ContractsState.currentMasterData = null;
                    ContractsState.currentDetailItems = [];
                }

                const mountPoint = document.getElementById('contracts-modal-mount-point');
                if (mountPoint) { mountPoint.classList.add('hidden'); mountPoint.classList.remove('flex'); mountPoint.innerHTML = ''; }

                ContractsState.hasUnsavedChanges = true;
                if (typeof setPendingChanges !== 'undefined') setPendingChanges(true);

                if (window.currentActiveTabId === 'tab-inventory' && typeof InventoryController !== 'undefined') {
                    if (InventoryState.expandedAssetId) {
                        const assetObj = globalCachedData.find(a => btoa(encodeURIComponent(a.name)).replace(/=/g, "") === InventoryState.expandedAssetId);
                        if (assetObj) {
                            InventoryState.loadAssetDrillDownData(assetObj.id);
                        }
                    }
                    InventoryController.renderContractsTabContent(InventoryState.expandedAssetId);
                    InventoryController.applyFiltersAndSort();
                }
            });
        },

        deleteContractLineById: function (contractId) {
            if (!contractId) return;

            const targetContract = (windowPayload.contracts || []).find(c => c.contractId === contractId);
            if (targetContract && targetContract.masterId) {
                ContractsState.lastDirtyMasterId = targetContract.masterId;
            }

            FinOpsUI.showConfirm("Delete Contract Line", "Are you entirely sure you want to permanently remove this specific contract line allocation?", () => {
                ContractsState.deletedContractIds = ContractsState.deletedContractIds || [];
                if (!String(contractId).toUpperCase().startsWith("TMP-")) {
                    ContractsState.deletedContractIds.push(contractId);
                }

                windowPayload.contracts = windowPayload.contracts.filter(c => c.contractId !== contractId);

                if (windowPayload.ledger) windowPayload.ledger = windowPayload.ledger.filter(l => l.contractId !== contractId);
                if (windowPayload.allocationSplits) windowPayload.allocationSplits = windowPayload.allocationSplits.filter(s => s.contractId !== contractId);

                ContractsState.hasUnsavedChanges = true;
                if (typeof setPendingChanges !== 'undefined') setPendingChanges(true);

                if (window.currentActiveTabId === 'tab-inventory' && typeof InventoryController !== 'undefined') {
                    if (InventoryState.expandedAssetId) {
                        const assetObj = globalCachedData.find(a => btoa(encodeURIComponent(a.name)).replace(/=/g, "") === InventoryState.expandedAssetId);
                        if (assetObj) {
                            InventoryState.loadAssetDrillDownData(assetObj.id);
                        }
                    }
                    InventoryController.renderContractsTabContent(InventoryState.expandedAssetId);
                    InventoryController.applyFiltersAndSort();
                }
            });
        },

        discardLocalChanges: function () {
            FinOpsUI.showConfirm("Discard Changes", "Are you sure you want to revert all local modifications? All new uncommitted items will be permanently lost.", () => {
                const mountPoint = document.getElementById('contracts-modal-mount-point');
                if (mountPoint) { mountPoint.classList.add('hidden'); mountPoint.classList.remove('flex'); mountPoint.innerHTML = ''; }

                const formContainer = document.getElementById('mgmt-master-form-container');
                if (formContainer) formContainer.classList.add('hidden');

                if (typeof window.revertLocalChanges === 'function') {
                    window.revertLocalChanges();
                }

                if (window.currentActiveTabId === 'tab-inventory' && typeof InventoryController !== 'undefined' && typeof InventoryState !== 'undefined') {
                    if (InventoryState.expandedAssetId) {
                        const assetObj = globalCachedData.find(a => btoa(encodeURIComponent(a.name)).replace(/=/g, "") === InventoryState.expandedAssetId);
                        if (assetObj) {
                            InventoryState.loadAssetDrillDownData(assetObj.id);
                            InventoryController.renderContractsTabContent(InventoryState.expandedAssetId);
                        }
                    }
                }
            });
        },

        switchContractModalTab: function (tabId, detailId) {
            const tabs = ['general', 'ledger', 'splits', 'metadata'];
            tabs.forEach(t => {
                const btn = document.getElementById(`modal-tab-btn-${t}-${detailId}`);
                const content = document.getElementById(`modal-tab-content-${t}-${detailId}`);
                if (!btn || !content) return;

                if (t === tabId) {
                    btn.classList.remove('border-transparent', 'text-slate-400');
                    btn.classList.add('border-teal-600', 'text-teal-700');
                    content.classList.remove('hidden');
                    content.classList.add('block');
                } else {
                    btn.classList.remove('border-teal-600', 'text-teal-700');
                    btn.classList.add('border-transparent', 'text-slate-400');
                    content.classList.remove('block');
                    content.classList.add('hidden');
                }
            });
        },

        handleEarlyTerminationChange: function (id) {
            const earlyInput = document.getElementById(`edit-adjustedEndDate-${id}`);
            const endInput = document.getElementById(`edit-contractEndDate-${id}`);
            if (earlyInput && endInput) {
                if (earlyInput.value) {
                    endInput.classList.add('opacity-50', 'cursor-not-allowed', 'bg-slate-50');
                    endInput.disabled = true;
                } else {
                    endInput.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-slate-50');
                    endInput.disabled = false;
                }
            }
        },

        handleAutoRenewalChange: function (id) {
            const autoRenew = document.getElementById('edit-autoRenewal-' + id);
            const noticePeriod = document.getElementById('edit-noticePeriod-' + id);
            if (autoRenew && noticePeriod) {
                if (autoRenew.value === "No") {
                    noticePeriod.disabled = true;
                    noticePeriod.classList.add('opacity-50', 'cursor-not-allowed', 'bg-slate-50');
                    noticePeriod.value = "";
                } else {
                    noticePeriod.disabled = false;
                    noticePeriod.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-slate-50');
                }
            }
        },

        toggleLedgerVisibility: function (detailId) {
            const billingTermsSelect = document.getElementById(`edit-billingTerms-${detailId}`);
            const pricingModelSelect = document.getElementById(`edit-pricingModel-${detailId}`);
            const freqContainer = document.getElementById(`container-billingFreq-${detailId}`);
            const freqSelect = document.getElementById(`edit-billingFrequency-${detailId}`);
            const autoForecastBtn = document.getElementById(`auto-forecast-btn-${detailId}`);
            const ledgerTabBtn = document.getElementById(`modal-tab-btn-ledger-${detailId}`);

            if (billingTermsSelect && pricingModelSelect) {
                const terms = billingTermsSelect.value;
                const model = pricingModelSelect.value;
                const isLedgerDriven = terms === "Custom / Ledger Driven" || terms === "Ledger-Driven";
                const isPayg = terms === "Pay-As-You-Go";
                const isFixedRec = terms === "Fixed Recurring" || terms === "Linear" || terms === "Quarterly";
                const isConsumption = ["Pure Consumption", "Minimum Consumption", "Capped Consumption"].includes(model);

                if (freqContainer && freqSelect) {
                    if (terms === "Full Upfront / Prepaid" || terms === "Full Upfront" || isLedgerDriven) {
                        freqContainer.classList.add('hidden');
                        freqSelect.value = "";
                    } else {
                        freqContainer.classList.remove('hidden');
                        if (!freqSelect.value) freqSelect.value = "Monthly";
                    }
                }

                if (ledgerTabBtn) {
                    if (isLedgerDriven || isPayg || isFixedRec || isConsumption) {
                        ledgerTabBtn.classList.remove('opacity-40', 'cursor-not-allowed');
                        ledgerTabBtn.title = "";
                    } else {
                        ledgerTabBtn.classList.add('opacity-40', 'cursor-not-allowed');
                        ledgerTabBtn.title = "Ledger disabled for current billing terms.";
                        const ledgerContent = document.getElementById(`modal-tab-content-ledger-${detailId}`);
                        if (ledgerContent && !ledgerContent.classList.contains('hidden')) {
                            this.switchContractModalTab('general', detailId);
                        }
                    }
                }

                if (autoForecastBtn) {
                    const canAutoForecast = isPayg || isFixedRec;
                    if (canAutoForecast) autoForecastBtn.classList.remove('hidden');
                    else autoForecastBtn.classList.add('hidden');
                }
            }
        },

        handleExpenditureTypeChange: function (detailId) {
            const expTypeVal = document.getElementById(`edit-expenditureType-${detailId}`).value;
            const displayPricing = document.getElementById('finops-select-display-edit-pricingModel-' + detailId);
            const inputPricing = document.getElementById(`edit-pricingModel-${detailId}`);
            const displayBilling = document.getElementById('finops-select-display-edit-billingTerms-' + detailId);
            const inputBilling = document.getElementById(`edit-billingTerms-${detailId}`);

            if (!displayPricing || !displayBilling) return;

            if (expTypeVal === "CAPEX") {
                displayPricing.value = "Flat";
                inputPricing.value = "Flat";
                displayPricing.disabled = true;
                displayPricing.classList.add('opacity-50', 'cursor-not-allowed', 'bg-slate-100');

                displayBilling.value = "Full Upfront / Prepaid";
                inputBilling.value = "Full Upfront / Prepaid";
                displayBilling.disabled = true;
                displayBilling.classList.add('opacity-50', 'cursor-not-allowed', 'bg-slate-100');
            } else {
                displayPricing.disabled = false;
                displayPricing.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-slate-100');
                displayBilling.disabled = false;
                displayBilling.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-slate-100');
            }
            this.toggleLedgerVisibility(detailId);
        },

        triggerLedgerAutomationForContract: function (detailId) {
            const displayPricing = document.getElementById('finops-select-display-edit-pricingModel-' + detailId);
            const displayTerms = document.getElementById('finops-select-display-edit-billingTerms-' + detailId);
            const model = displayPricing ? displayPricing.value : document.getElementById(`edit-pricingModel-${detailId}`).value;
            const terms = displayTerms ? displayTerms.value : document.getElementById(`edit-billingTerms-${detailId}`).value;

            const startDate = document.getElementById(`edit-startDate-${detailId}`).value;
            const endDate = document.getElementById(`edit-contractEndDate-${detailId}`).value;
            const totCommit = document.getElementById(`edit-totalCommitment-${detailId}`).value.replace(/[^0-9]/g, '');
            const freqSelect = document.getElementById(`edit-billingFrequency-${detailId}`);
            const freq = freqSelect ? freqSelect.value : "Monthly";

            const isPayg = terms === "Pay-As-You-Go";
            const isFixedRec = terms === "Fixed Recurring" || terms === "Linear" || terms === "Quarterly";

            if (!isPayg && !isFixedRec) {
                FinOpsUI.showAlert("Governance Restriction", "Automation calculations apply exclusively to 'Fixed Recurring' or 'Pay-As-You-Go' allocation terms.");
                return;
            }

            if (!startDate || !endDate || !totCommit) {
                FinOpsUI.showAlert("Missing Data", "Start Date, End Date, and Total Commitment must be compiled to generate the forecast.");
                return;
            }

            const contractData = { pricingModel: model, billingTerms: terms, billingFrequency: freq, startDate: startDate, contractEndDate: endDate, totalCommitment: parseInt(totCommit, 10) || 0 };
            const ledgerRows = document.querySelectorAll(`#ledger-container-${detailId} .ledger-row-item`);
            const currentLedger = [];

            Array.from(ledgerRows).forEach(row => {
                const typeEl = row.querySelector('.ledger-type');
                const safeType = typeEl ? String(typeEl.value).toUpperCase().trim() : "ACTUAL";

                if (safeType === "ACTUAL" || safeType === "FORECAST" || safeType === "CREDIT" || safeType === "DEBIT") {
                    const rawAmt = row.querySelector('.ledger-amount').value.replace(/[^0-9-]/g, '');
                    currentLedger.push({
                        type: safeType,
                        startDate: row.querySelector('.ledger-start').value,
                        endDate: row.querySelector('.ledger-end').value,
                        amount: parseInt(rawAmt, 10) || 0,
                        notes: row.querySelector('.ledger-notes').value
                    });
                }
            });

            try {
                const contract = new Contract(contractData);
                const ledgerMocks = currentLedger.map(l => new LedgerMovement(l));
                const forecast = contract.generateForecastLedger(ledgerMocks);
                const generatedRows = forecast.map(f => f.exportToData());

                if (generatedRows.length === 0) {
                    FinOpsUI.showNotificationBanner("No accruals calculated: Commitment is fully covered or dates prevent it.", "warning");
                    return;
                }

                const item = ContractsState.currentDetailItems.find(i => i.id === detailId);
                item.ledger = currentLedger.concat(generatedRows);

                this.openContractModalWindow(detailId);
                setTimeout(() => { this.switchContractModalTab('ledger', detailId); }, 50);

                FinOpsUI.showNotificationBanner("Auto-forecast preview generated successfully!", "success");
            } catch (err) {
                FinOpsUI.showAlert("Calculation Error", err.message);
            }
        },

        addLedgerRowToUI: function (detailId, mov = null) {
            const container = document.getElementById(`ledger-container-${detailId}`);
            if (!container) return;
            const emptyMsg = container.querySelector('.empty-ledger-msg');
            if (emptyMsg) emptyMsg.remove();

            let movData = mov;
            if (!movData || Object.keys(movData).length === 0) {
                const now = new Date();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                movData = { startDate: FinOpsDate.toIso(firstDay), endDate: FinOpsDate.toIso(lastDay), type: "ACTUAL", amount: "", notes: "" };
            }

            container.insertAdjacentHTML('beforeend', ContractsTemplates.getLedgerRow(detailId, movData));
            setTimeout(() => {
                const newRows = container.querySelectorAll('.ledger-row-item');
                if (newRows.length > 0) {
                    const amtInput = newRows[newRows.length - 1].querySelector('.ledger-amount');
                    if (amtInput) amtInput.focus();
                }
            }, 50);
        },

        addSplitRowToUI: function (detailId) {
            const container = document.getElementById(`splits-container-${detailId}`);
            if (!container) return;
            const emptyMsg = container.querySelector('.empty-split-msg');
            if (emptyMsg) emptyMsg.remove();

            const startDateInput = document.getElementById(`edit-startDate-${detailId}`);
            const endDateInput = document.getElementById(`edit-contractEndDate-${detailId}`);
            const defStart = startDateInput ? startDateInput.value : "";
            const defEnd = endDateInput ? endDateInput.value : "";

            const leOptions = ContractsUtils.extractUniqueField(windowPayload.legalEntities, "legalEntity").map(le => '<option value="' + le + '">' + le + '</option>').join('');
            const ccOptions = ContractsUtils.extractUniqueField(windowPayload.costCenters, "costCenter").map(cc => '<option value="' + cc + '">' + cc + '</option>').join('');

            container.insertAdjacentHTML('beforeend', ContractsTemplates.getSplitRow(detailId, {}, defStart, defEnd, leOptions, ccOptions));
        },

        duplicateLedgerRowInUI: function (btnElement, detailId) {
            const row = btnElement.closest('.ledger-row-item');
            if (!row) return;
            const rawAmtStr = row.querySelector('.ledger-amount').value.replace(/[^0-9]/g, '');
            const currentMovementData = {
                startDate: row.querySelector('.ledger-start').value || "", endDate: row.querySelector('.ledger-end').value || "",
                type: row.querySelector('.ledger-type').value || "ACTUAL", amount: parseInt(rawAmtStr, 10) || 0, notes: row.querySelector('.ledger-notes').value || ""
            };
            this.addLedgerRowToUI(detailId, currentMovementData);
        },

        updateSplitPlaceholder: function (selectEl) {
            const row = selectEl.closest('.split-row-item');
            const inputEl = row.querySelector('.split-val');
            const rule = selectEl.value;
            if (rule === 'Percentage') inputEl.placeholder = '% (e.g. 50)';
            else if (rule === 'Fixed Amount') inputEl.placeholder = '€ (e.g. 15.000)';
            else inputEl.placeholder = 'Qty (e.g. 150)';
            ContractsUtils.formatSplitValue(inputEl);
        },

        toggleCardSection: function (id, section, event) {
            event.stopPropagation();
            const panel = document.getElementById(`read-${section}-${id}`);
            if (panel) panel.classList.toggle('hidden');
        },

        openContractModalWindow: function (id) {
            let mountPoint = document.getElementById('contracts-modal-mount-point');
            if (mountPoint && mountPoint.parentElement !== document.body) document.body.appendChild(mountPoint);

            if (!mountPoint) {
                mountPoint = document.createElement('div');
                mountPoint.id = 'contracts-modal-mount-point';
                mountPoint.className = 'hidden fixed inset-0 bg-black/60 backdrop-blur-xs z-[9999] flex items-center justify-center p-4';
                document.body.appendChild(mountPoint);
            }
            mountPoint.onclick = (e) => { if (e.target === mountPoint) this.closeContractModalWindow(); };

            const item = ContractsState.currentDetailItems.find(i => i.id === id);
            if (!item) return;
            item.isEditing = true;

            const d = item.data;
            const docLinks = (d.contractLinks || "").toString().replace(/undefined|null/g, "").split(',').map(s => s.trim()).filter(s => s);

            const leList = ContractsUtils.extractUniqueField(windowPayload.legalEntities, "legalEntity");
            const locList = ContractsUtils.extractUniqueField(windowPayload.locations, "location");
            const ccList = ContractsUtils.extractUniqueField(windowPayload.costCenters, "costCenter");
            const soList = ContractsUtils.extractUniqueField(windowPayload.contracts, "serviceOwner");
            const tgOptions = ContractsState.currentAssetGroupIds.map(g => `<option value="${g}" ${g === d.targetGroupId ? 'selected' : ''}>${g}</option>`).join('');

            const baseLeOptions = leList.map(le => `<option value="${le}">${le}</option>`).join('');
            const baseCcOptions = ccList.map(cc => `<option value="${cc}">${cc}</option>`).join('');

            let splitsHtml = item.splits && item.splits.length > 0
                ? item.splits.map(s => ContractsTemplates.getSplitRow(
                    item.id,
                    s,
                    typeof FinOpsDate !== 'undefined' ? FinOpsDate.toIso(d.startDate) : "",
                    typeof FinOpsDate !== 'undefined' ? FinOpsDate.toIso(d.contractEndDate) : "",
                    baseLeOptions,
                    baseCcOptions
                )).join('')
                : `<p class="text-[9px] text-emerald-600 font-medium text-center py-2 empty-split-msg bg-emerald-50/50 rounded-md">➔ Standard Allocation Active (100% to main entity).</p>`;

            let ledgerHtml = item.ledger && item.ledger.length > 0
                ? item.ledger.map(l => ContractsTemplates.getLedgerRow(item.id, l)).join('')
                : `<p class="text-[9px] text-slate-400 italic text-center py-2 empty-ledger-msg bg-slate-50 rounded-md">No manual ledger movements yet.</p>`;

            const mData = ContractsState.currentMasterData || {};
            const masterStartStr = mData.masterStartDate ? ContractsUtils.formatToEnglishCustomDate(mData.masterStartDate) : 'N/A';
            const masterEndStr = mData.masterEndDate ? ContractsUtils.formatToEnglishCustomDate(mData.masterEndDate) : 'N/A';
            const masterCommitment = (parseFloat(mData.totalCommitment) || 0).toLocaleString('it-IT');

            const isEditActive = typeof ContractsState !== 'undefined' && ContractsState.globalEditMode;

            mountPoint.innerHTML = ContractsTemplates.getContractModalFormStructure(id, leList, tgOptions, locList, soList, ccList, docLinks, splitsHtml, ledgerHtml, d, masterStartStr, masterEndStr, masterCommitment, isEditActive);

            mountPoint.classList.remove('hidden');
            mountPoint.classList.add('flex');

            this.toggleLedgerVisibility(id);

            if (docLinks.length > 0 && typeof ContractsAPI !== 'undefined') {
                const targetLinks = mountPoint.querySelectorAll('.live-doc-link');
                if (targetLinks.length > 0) {
                    const rawUrls = Array.from(targetLinks).map(el => el.getAttribute('data-raw'));
                    const uniqueUrlsString = [...new Set(rawUrls)].join(',');
                    ContractsAPI.resolveLiveDocumentNames(uniqueUrlsString, targetLinks);
                }
            }
        },

        openMasterModalWindow: function (masterId) {
            let mountPoint = document.getElementById('contracts-modal-mount-point');
            if (mountPoint && mountPoint.parentElement !== document.body) document.body.appendChild(mountPoint);

            if (!mountPoint) {
                mountPoint = document.createElement('div');
                mountPoint.id = 'contracts-modal-mount-point';
                mountPoint.className = 'hidden fixed inset-0 bg-black/60 backdrop-blur-xs z-[9999] flex items-center justify-center p-4';
                document.body.appendChild(mountPoint);
            }
            mountPoint.onclick = (e) => { if (e.target === mountPoint) this.cancelMasterFormEditState(false); };

            const isEditActive = typeof ContractsState !== 'undefined' && ContractsState.globalEditMode;

            if (masterId) {
                ContractsState.loadMasterDetails(masterId, windowPayload.masterContracts, windowPayload.contracts, windowPayload.allocationSplits, windowPayload.ledger);
                const masterObj = windowPayload.masterContracts.find(m => m.masterId === masterId);

                // CORREZIONE: Risoluzione del DTO basata su assetId (camelCase puro) e non sul nome dell'asset
                const assetId = masterObj ? masterObj.assetId : null;
                const assetMatch = windowPayload.assets.find(a => String(a.id).trim() === String(assetId).trim());
                if (assetMatch) {
                    ContractsState.currentSelectedAsset = { name: assetMatch.name, id: assetMatch.id };
                }
            }

            const data = ContractsState.currentMasterData;
            const isNew = !data.masterId;
            const suppliersList = (windowPayload.suppliers && windowPayload.suppliers.length > 0)
                ? windowPayload.suppliers.map(s => s.supplier || s.name).filter(s => s)
                : ContractsUtils.extractUniqueField(windowPayload.masterContracts || windowPayload.contracts, "supplier");
            const masterLinks = (data.contractLinks || "").toString().replace(/undefined|null/g, "").split(',').map(s => s.trim()).filter(s => s);

            let formHtml = '';
            if (isEditActive) {
                // FIX: Estraiamo l'ID invece del Nome
                const currentAssetId = ContractsState.currentSelectedAsset ? String(ContractsState.currentSelectedAsset.id).trim() : "";
                const allMasters = windowPayload.masterContracts || [];

                // FIX: Filtro puramente basato sull'ID relazionale
                const assetMastersList = allMasters.filter(m =>
                    String(m.assetId).trim() === currentAssetId &&
                    m.masterId !== data.masterId &&
                    m.masterId
                );

                formHtml = ContractsTemplates.getMasterEditCard(data, isNew, suppliersList, assetMastersList, masterLinks);
            } else {
                const status = (data.status || "ACTIVE").toUpperCase().trim();
                const rawStart = data.masterStartDate;
                const rawEnd = data.masterEndDate;
                const cleanStart = rawStart ? ContractsUtils.formatToEnglishCustomDate(rawStart) : '—';
                const cleanEnd = rawEnd ? ContractsUtils.formatToEnglishCustomDate(rawEnd) : '—';
                let rawTerm = data.contractTerm !== undefined ? data.contractTerm : '—';
                let termMonths = (typeof rawTerm === 'number' || !isNaN(parseFloat(rawTerm))) ? Math.round(parseFloat(rawTerm)) : rawTerm;

                let statusClass = "bg-slate-50 text-slate-500 border-slate-200";
                if (status === "ACTIVE") statusClass = "bg-emerald-50 text-emerald-700 border-emerald-200/50";
                if (status === "EXPIRED" || status === "TERMINATED") statusClass = "bg-rose-50 text-rose-600 border-rose-200/50";
                if (status === "IN NEGOTIATION") statusClass = "bg-amber-50 text-amber-700 border-amber-200/50";

                formHtml = ContractsTemplates.getMasterReadOnly(data, masterLinks, cleanStart, cleanEnd, termMonths, status, statusClass, isEditActive);
            }

            mountPoint.innerHTML = `
        <div class="bg-white rounded-2xl border border-slate-200 p-6 w-full max-w-3xl shadow-2xl relative animate-fade-in text-xs flex flex-col" onclick="if(typeof FinOpsSelect !== 'undefined') FinOpsSelect.closeAll(event); event.stopPropagation();">
            ${formHtml}
        </div>`;

            mountPoint.classList.remove('hidden');
            mountPoint.classList.add('flex');

            if (!isEditActive && masterLinks.length > 0 && typeof ContractsAPI !== 'undefined') {
                const targetLinks = mountPoint.querySelectorAll('.live-doc-link');
                if (targetLinks.length > 0) {
                    const rawUrls = Array.from(targetLinks).map(el => el.getAttribute('data-raw'));
                    const uniqueUrlsString = [...new Set(rawUrls)].join(',');
                    ContractsAPI.resolveLiveDocumentNames(uniqueUrlsString, targetLinks);
                }
            }
        },

        cancelMasterFormEditState: function (isNew) {
            if (window.currentActiveTabId === 'tab-inventory') {
                const mountPoint = document.getElementById('contracts-modal-mount-point');
                if (mountPoint) { mountPoint.classList.add('hidden'); mountPoint.classList.remove('flex'); mountPoint.innerHTML = ''; }
                return;
            }
            if (isNew) {
                document.getElementById('mgmt-master-form-container').classList.add('hidden');
                ContractsState.currentMasterData = null;
                ContractsState.currentDetailItems = [];
            } else {
                ContractsState.updateMasterEditState(false);
                renderMasterFormBox();
            }
        },

        closeContractModalWindow: function () {
            const mountPoint = document.getElementById('contracts-modal-mount-point');
            if (mountPoint) {
                mountPoint.classList.remove('flex');
                mountPoint.classList.add('hidden');
                mountPoint.innerHTML = '';
            }

            ContractsState.currentDetailItems = ContractsState.currentDetailItems.filter(i => {
                if (i.isEditing && (!i.data.contractId && !i.data.startDate)) {
                    return false;
                }
                i.isEditing = false;
                return true;
            });

            if (window.currentActiveTabId === 'tab-contracts') {
                renderDetailItemsTable();
            }
        },

        filterSupplierOptions: function (query) {
            const listContainer = document.getElementById('ins-supplier-options-list');
            if (!listContainer) return;
            const q = query.toLowerCase().trim();
            const suppliersList = ContractsUtils.extractUniqueField(windowPayload.masterContracts || windowPayload.contracts, "supplier");

            const matched = suppliersList.filter(s => s.toLowerCase().includes(q));
            if (matched.length === 0) {
                listContainer.innerHTML = `<div onclick="ContractsController.selectSupplierOption('${query.replace(/'/g, "\\'")}')" class="p-1.5 text-[11px] font-black text-indigo-600 hover:bg-slate-50 rounded-md cursor-pointer">➕ Create "${query.toUpperCase()}" as new Vendor Context</div>`;
                return;
            }

            listContainer.innerHTML = matched.map(s => `
            <div onclick="ContractsController.selectSupplierOption('${s.replace(/'/g, "\\'")}')" class="p-1.5 text-[11px] font-bold text-slate-700 hover:bg-teal-50 hover:text-teal-900 rounded-md cursor-pointer transition-colors">${s}</div>
        `).join('');
        },

        toggleSupplierDropdown: function (show) {
            const listContainer = document.getElementById('ins-supplier-options-list');
            if (!listContainer) return;
            if (show) {
                listContainer.classList.remove('hidden');
                const searchInput = document.getElementById('ins-masterSupplier-search');
                if (searchInput) this.filterSupplierOptions(searchInput.value);
            } else {
                setTimeout(() => { listContainer.classList.add('hidden'); }, 200);
            }
        },

        selectSupplierOption: function (supplierName) {
            document.getElementById('ins-masterSupplier-search').value = supplierName;
            document.getElementById('ins-masterSupplier').value = supplierName;
            document.getElementById('ins-supplier-options-list').classList.add('hidden');

            const suppliers = windowPayload.suppliers || [];
            const supObj = suppliers.find(s => String(s.supplier || s.name || "").trim().toLowerCase() === supplierName.toLowerCase());
            const channel = supObj ? (supObj.Type || supObj.billingChannel || 'Direct Vendor') : 'Direct Vendor';

            const channelDisplay = document.getElementById('ins-masterBillingChannel-display');
            const channelInput = document.getElementById('ins-masterBillingChannel');

            if (channelDisplay) channelDisplay.textContent = channel;
            if (channelInput) channelInput.value = channel;
        },

        handleSupplierAutoChannel: function (supplierName) {
            const suppliers = windowPayload.suppliers || [];
            const supObj = suppliers.find(s => String(s.supplier || s.name || "").trim().toLowerCase() === String(supplierName).toLowerCase().trim());
            const channel = supObj ? (supObj.Type || 'Direct Vendor') : 'Direct Vendor';

            const context = document.getElementById('contracts-modal-mount-point') || document;
            const channelDisplay = context.querySelector('#ins-masterBillingChannel-display');
            const channelInput = context.querySelector('#ins-masterBillingChannel');

            if (channelDisplay) channelDisplay.textContent = channel;
            if (channelInput) channelInput.value = channel;
        },

        // 👇 100% FEDELTÀ: Assorbimento esatto della logica di estrazione, CAPEX, e upload file
        saveRowLocalChanges: function (id) {
            const item = ContractsState.currentDetailItems.find(i => i.id === id);
            if (!item) return;

            const safeVal = (elementId) => document.getElementById(elementId) ? document.getElementById(elementId).value : "";
            item.data.legalEntity = safeVal(`edit-legalEntity-${id}`);
            item.data.location = safeVal(`edit-location-${id}`);
            item.data.serviceOwner = safeVal(`edit-serviceOwner-${id}`).trim();
            item.data.scope = safeVal(`edit-scope-${id}`).trim();
            const isOneShotCheckbox = document.getElementById(`edit-isOneShot-${id}`);
            item.data.costRecurrence = isOneShotCheckbox && isOneShotCheckbox.checked ? "One-Shot" : "Recurrent";
            item.data.pricingModel = safeVal(`edit-pricingModel-${id}`);
            item.data.billingTerms = safeVal(`edit-billingTerms-${id}`);
            item.data.billingFrequency = safeVal(`edit-billingFrequency-${id}`);
            const cleanCommitmentStr = safeVal(`edit-totalCommitment-${id}`).replace(/\./g, '').trim();
            item.data.totalCommitment = parseInt(cleanCommitmentStr, 10) || 0;
            item.data.expenditureType = safeVal(`edit-expenditureType-${id}`);
            item.data.costCenter = safeVal(`edit-costCenter-${id}`);
            item.data.startDate = safeVal(`edit-startDate-${id}`);
            item.data.contractEndDate = safeVal(`edit-contractEndDate-${id}`);
            item.data.adjustedEndDate = safeVal(`edit-adjustedEndDate-${id}`);
            item.data.noticePeriod = safeVal(`edit-noticePeriod-${id}`).trim();
            item.data.autoRenewal = safeVal(`edit-autoRenewal-${id}`);
            item.data.blId = safeVal(`edit-blId-${id}`).trim();
            item.data.requestCode = safeVal(`edit-requestCode-${id}`).trim();
            item.data.comments = safeVal(`edit-comments-${id}`).trim();
            const baseLinks = safeVal(`edit-contractLinks-${id}`).trim();

            const splitRows = document.querySelectorAll(`#splits-container-${id} .split-row-item`);
            item.splits = Array.from(splitRows).map(row => {
                const rule = row.querySelector('.split-rule').value;
                const rawValStr = row.querySelector('.split-val').value.replace(/[^0-9-]/g, '');
                const val = parseInt(rawValStr, 10) || 0;
                return {
                    contractId: item.data.contractId || "", targetLegalEntity: row.querySelector('.split-le').value || "", targetCostCenter: row.querySelector('.split-cc').value || "",
                    allocationRule: rule, percentageShare: rule === "Percentage" ? val : "", fixedAmount: rule === "Fixed Amount" ? val : "", unitsAssigned: rule === "Units" ? val : "",
                    validFrom: row.querySelector('.split-from').value || "", validTo: row.querySelector('.split-to').value || "", notes: row.querySelector('.split-notes').value || ""
                };
            });

            const ledgerRows = document.querySelectorAll(`#ledger-container-${id} .ledger-row-item`);
            let ledgerDateValidationError = false;

            item.ledger = Array.from(ledgerRows).map(row => {
                const sDate = row.querySelector('.ledger-start').value || "";
                const eDate = row.querySelector('.ledger-end').value || "";
                if (sDate && eDate && new Date(sDate) > new Date(eDate)) { ledgerDateValidationError = true; }

                const rawAmtStr = row.querySelector('.ledger-amount').value.replace(/[^0-9-]/g, '');
                const typeEl = row.querySelector('.ledger-type');
                const rawType = typeEl ? typeEl.value : "ACTUAL";
                const safeType = String(rawType).toUpperCase().trim();

                return {
                    contractId: item.data.contractId || "", startDate: sDate, endDate: eDate,
                    type: safeType, amount: parseInt(rawAmtStr, 10) || 0, notes: row.querySelector('.ledger-notes').value || ""
                };
            });

            if (item.data.expenditureType === "CAPEX" && (item.data.billingTerms === "Linear" || item.data.billingTerms === "Quarterly")) {
                FinOpsUI.showAlert("Governance Restriction", "Un asset registrato come CAPEX non può essere vincolato a scadenze temporali fisse. Seleziona 'Full Upfront' o 'Ledger-Driven'.");
                return;
            }

            if (ledgerDateValidationError) {
                FinOpsUI.showAlert("Validation Error", "Incongruenza: la Data Inizio non può essere successiva alla Data Fine.");
                return;
            }

            try {
                ContractsUtils.validateContractData(item.data);
                const fileInput = document.getElementById(`upload-files-${id}`);
                const hasFiles = fileInput && fileInput.files.length > 0;

                if (hasFiles) {
                    showLoading();
                    let filesData = [];
                    let filesProcessed = 0;
                    const supplier = item.data.supplier || (ContractsState.currentMasterData ? ContractsState.currentMasterData.supplier : "Unknown_Supplier");
                    const assetName = ContractsState.currentSelectedAsset ? ContractsState.currentSelectedAsset.name : "Unknown_Asset";
                    let dateStr = item.data.startDate;
                    let year = dateStr ? dateStr.split('-')[0] : new Date().getFullYear().toString();

                    Array.from(fileInput.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            filesData.push({ filename: file.name, mimeType: file.type, base64: e.target.result.split(',')[1] });
                            filesProcessed++;
                            if (filesProcessed === fileInput.files.length) {
                                ContractsAPI.uploadDocuments(filesData, year, supplier, assetName,
                                    (urls) => {
                                        let currentLinks = baseLinks ? baseLinks.split(',').map(s => s.trim()).filter(s => s) : [];
                                        urls.forEach(u => { if (!currentLinks.includes(u)) currentLinks.push(u); });
                                        item.data.contractLinks = currentLinks.join(', ');
                                        this.finalizeRowSave(item, id); // ◄── Dirottato internamente all'oggetto
                                    },
                                    (err) => { hideLoading(); FinOpsUI.showAlert("Upload Error", err.message); }
                                );
                            }
                        };
                        reader.readAsDataURL(file);
                    });
                } else {
                    item.data.contractLinks = baseLinks;
                    this.finalizeRowSave(item, id); // ◄── Dirottato internamente all'oggetto
                }
            } catch (e) {
                FinOpsUI.showAlert("Validation Error", e.message);
            }
        },

        // 👇 100% FEDELTÀ: Assorbimento esatto della logica di immagazzinamento in RAM del contratto
        finalizeRowSave: function (item, id) {
            hideLoading();

            let cId = item.data.contractId;
            if (!cId || cId.trim() === "") {
                cId = "TMP-CTR-" + Date.now() + Math.floor(Math.random() * 1000);
                item.data.contractId = cId;
            }

            if (ContractsState.currentMasterData) {
                item.data.masterId = ContractsState.currentMasterData.masterId;
                item.data.assetName = ContractsState.currentSelectedAsset ? ContractsState.currentSelectedAsset.name : (ContractsState.currentMasterData.assetName || "");
                item.data.assetId = ContractsState.currentSelectedAsset ? ContractsState.currentSelectedAsset.id : (ContractsState.currentMasterData.assetId || ""); // <-- AGGIUNTA
                item.data.supplier = ContractsState.currentMasterData.supplier || "";
            }

            const contract = new Contract(item.data);
            item.ledger.forEach(l => contract.ledger.push(new LedgerMovement(l)));
            item.splits.forEach(s => contract.splits.push(new AllocationSplit(s)));

            item.data = contract.exportToData();

            item.isEditing = false;
            ContractsState.hasUnsavedChanges = true;
            if (typeof setPendingChanges !== 'undefined') setPendingChanges(true);

            const cIndex = windowPayload.contracts.findIndex(c => c.contractId === cId);
            if (cIndex > -1) windowPayload.contracts[cIndex] = item.data;
            else windowPayload.contracts.push(item.data);

            if (windowPayload.ledger) {
                windowPayload.ledger = windowPayload.ledger.filter(l => l.contractId !== cId);
                item.ledger.forEach(l => { l.contractId = cId; windowPayload.ledger.push(l); });
            }
            if (windowPayload.allocationSplits) {
                windowPayload.allocationSplits = windowPayload.allocationSplits.filter(s => s.contractId !== cId);
                item.splits.forEach(s => { s.contractId = cId; windowPayload.allocationSplits.push(s); });
            }

            if (ContractsState.currentMasterData) {
                const master = new MasterContract(ContractsState.currentMasterData);
                ContractsState.currentDetailItems.forEach(childItem => {
                    const childDto = childItem.data;
                    if (childDto.startDate) childDto.startDate = new Date(childDto.startDate);
                    if (childDto.contractEndDate) childDto.contractEndDate = new Date(childDto.contractEndDate);
                    if (childDto.adjustedEndDate) childDto.adjustedEndDate = new Date(childDto.adjustedEndDate);

                    const childContract = new Contract(childDto);
                    childItem.ledger.forEach(l => childContract.ledger.push(new LedgerMovement(l)));
                    master.addChild(childContract);
                });

                const linkedInits = (windowPayload.initiatives || []).filter(i => String(i.masterId).trim() === String(master.id).trim());
                ContractsState.currentMasterData = master.exportToData(linkedInits);

                const mId = ContractsState.currentMasterData.masterId;
                const mIndex = windowPayload.masterContracts.findIndex(m => m.masterId === mId);
                if (mIndex > -1) windowPayload.masterContracts[mIndex] = ContractsState.currentMasterData;
                else windowPayload.masterContracts.push(ContractsState.currentMasterData);
            }

            this.closeContractModalWindow();
            if (typeof InventoryController !== 'undefined') {
                InventoryState.loadAssetDrillDownData(ContractsState.currentSelectedAsset.id);
                InventoryController.renderContractsTabContent(InventoryState.expandedAssetId);
                InventoryController.applyFiltersAndSort();
            }
        },

        // 👇 100% FEDELTÀ: Assorbimento esatto della logica di immagazzinamento in RAM del master
        confirmMasterEditLocalChanges: function () {
            const data = ContractsState.currentMasterData;
            data.supplier = document.getElementById('ins-masterSupplier').value;
            data.masterScope = document.getElementById('ins-masterScope').value;

            data.assetName = ContractsState.currentSelectedAsset?.name || "";
            data.assetId = ContractsState.currentSelectedAsset?.id || "";

            windowPayload.masterContracts = windowPayload.masterContracts.filter(m => m.masterId !== data.masterId);
            windowPayload.masterContracts.push(data);
            setPendingChanges(true);

            this.closeContractModalWindow();
            if (typeof InventoryController !== 'undefined') InventoryController.renderContractsTabContent(InventoryState.expandedAssetId);
        },

        addNewDetailRowItem: function () {
            ContractsState.addNewDetailRow();
            const latestItem = ContractsState.currentDetailItems[ContractsState.currentDetailItems.length - 1];

            if (!latestItem.data.contractId) {
                const tempId = "TMP-CTR-" + Date.now();
                latestItem.data.contractId = tempId;
            }

            const mData = ContractsState.currentMasterData;
            const mId = mData.masterId;
            latestItem.data.masterId = mId;

            this.openContractModalWindow(latestItem.id);
        },

        removeRowFromLocalArchitecture: function (id) {
            ContractsState.removeDetailRow(id);
            renderDetailItemsTable();
        },

        saveCurrentContract: function () {
            if (!ContractsState.currentSelectedAsset) return;

            if (!ContractsState.currentMasterData) {
                const currentAsset = ContractsState.currentSelectedAsset.id;
                const assetMasters = (windowPayload.masterContracts || []).filter(m =>
                    String(m.assetId).trim().toLowerCase() === String(currentAsset).trim().toLowerCase()
                );

                if (assetMasters.length > 0) {
                    const targetMasterId = ContractsState.lastDirtyMasterId ||
                        (assetMasters.find(m => String(m.masterId).startsWith("TMP-")) || assetMasters[0]).masterId;

                    ContractsState.loadMasterDetails(targetMasterId, windowPayload.masterContracts, windowPayload.contracts, windowPayload.allocationSplits, windowPayload.ledger);
                    ContractsState.lastDirtyMasterId = null;
                } else if ((ContractsState.deletedMasterIds && ContractsState.deletedMasterIds.length > 0) || (ContractsState.deletedContractIds && ContractsState.deletedContractIds.length > 0)) {
                    // Creates a dummy envelope to safely transmit explicit deletions to the server if there are no active masters
                    ContractsState.currentMasterData = { masterId: "PUDGE_OP", childContracts: [], supplier: "DUMMY", contractLinks: "" };
                    ContractsState.currentDetailItems = [];
                } else {
                    FinOpsUI.showNotificationBanner("No Master Agreement modifications detected to synchronize for this asset.", "warning");
                    return;
                }
            }

            const isEditingExistingMaster = ContractsState.isMasterEditable && ContractsState.currentMasterData.masterId !== "" && ContractsState.currentMasterData.masterId !== "PUDGE_OP";
            const hasOpenEdits = isEditingExistingMaster || ContractsState.currentDetailItems.some(item => item.isEditing);
            if (hasOpenEdits) {
                FinOpsUI.showNotificationBanner("There are active forms still in edit mode. Please click 'Apply' or 'Confirm Master Changes' before performing the global push.", "warning");
                return;
            }

            if (ContractsState.isMasterEditable && ContractsState.currentMasterData.masterId !== "PUDGE_OP") {
                ContractsState.currentMasterData.supplier = document.getElementById('ins-masterSupplier').value;
                ContractsState.currentMasterData.masterScope = document.getElementById('ins-masterScope').value.trim();
                ContractsState.currentMasterData.masterComments = document.getElementById('ins-masterComments').value.trim();
                if (document.getElementById('ins-previousMasterId')) {
                    ContractsState.currentMasterData.previousMasterId = document.getElementById('ins-previousMasterId').value.trim();
                }
            }

            const mId = ContractsState.currentMasterData.masterId || (document.getElementById('ins-masterId') ? document.getElementById('ins-masterId').value.trim() : "");
            const prevMId = ContractsState.currentMasterData.previousMasterId || "";
            const spl = ContractsState.currentMasterData.supplier;

            const payload = {
                assetName: ContractsState.currentSelectedAsset.name,
                assetId: ContractsState.currentSelectedAsset.id,
                masterId: mId,
                previousMasterId: prevMId,
                supplier: spl,
                masterScope: ContractsState.currentMasterData.masterScope,
                masterComments: ContractsState.currentMasterData.masterComments,
                contractLinks: ContractsState.currentMasterData.contractLinks,
                billingChannel: ContractsState.currentMasterData.billingChannel || "",
                suppliers: (windowPayload.suppliers || []).filter(s => String(s.supplier).trim().toLowerCase() === String(spl).trim().toLowerCase()),
                initiatives: mId && mId.trim() !== "" ? (windowPayload.initiatives || []).filter(i => String(i.masterId).trim().toLowerCase() === mId.trim().toLowerCase()) : [],

                // Attaching the trash bin contents with explicit deletions
                deletedContractIds: ContractsState.deletedContractIds || [],
                deletedMasterIds: ContractsState.deletedMasterIds || [],

                details: ContractsState.currentDetailItems.map(item => {
                    const contract = new Contract(item.data);
                    const cleanExport = contract.exportToData();
                    cleanExport.splits = item.splits || [];
                    cleanExport.ledger = item.ledger || [];
                    return cleanExport;
                })
            };

            if (!payload.supplier) {
                FinOpsUI.showNotificationBanner("Supplier selection at Master level is required.", "warning");
                return;
            }

            showLoading();

            ContractsAPI.syncArchitectureToBackend(payload,
                (res) => {
                    hideLoading();
                    if (res && res.status === "SUCCESS") {
                        FinOpsUI.showNotificationBanner("Architecture synchronized successfully.", "success");

                        // Clearing local buffers after sync is complete
                        ContractsState.deletedContractIds = [];
                        ContractsState.deletedMasterIds = [];

                        windowPayload.masterContracts = res.masterContracts || [];
                        windowPayload.contracts = res.contracts || [];
                        windowPayload.allocationSplits = res.allocationSplits || [];
                        windowPayload.ledger = res.ledger || [];

                        if (typeof HydrationEngine !== 'undefined') {
                            HydrationEngine.hydrateAllStatuses(windowPayload);
                        }

                        windowPayload.projections = ProjectionsEngine.calculateAll(
                            windowPayload.contracts,
                            windowPayload.initiatives,
                            windowPayload.masterContracts,
                            windowPayload.ledger
                        );

                        if (typeof window.originalPayloadSnapshot !== 'undefined') {
                            window.originalPayloadSnapshot = JSON.parse(JSON.stringify(windowPayload));
                        }

                        if (window.ContractsController && window.ContractsController.closeContractModalWindow) {
                            window.ContractsController.closeContractModalWindow();
                        }
                        setPendingChanges(false);

                        ContractsState.currentMasterData = null;

                        if (window.currentActiveTabId === 'tab-inventory' && typeof InventoryController !== 'undefined') {
                            InventoryController.initWorkspace();
                            if (InventoryState.expandedAssetId) {
                                const targetAssetId = ContractsState.currentSelectedAsset.id;
                                const assetObj = globalCachedData.find(a => String(a.id).trim() === String(targetAssetId).trim());

                                if (assetObj) {
                                    InventoryState.loadAssetDrillDownData(assetObj.id);
                                    InventoryController.renderContractsTabContent(InventoryState.expandedAssetId);
                                }
                            }
                        }
                    } else {
                        FinOpsUI.showNotificationBanner("Sync failed: unexpected execution outcome from server.", "error");
                    }
                },
                (err) => { hideLoading(); FinOpsUI.showNotificationBanner("Sync error: " + err.message, "error"); }
            );
        }
    };
</script>
