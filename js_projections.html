<script>
    /**
     * MODULE PROJECTIONS MATRIX CORE: DOUBLE-AGGREGATION & EMBEDDED DROPDOWN SEARCH
     */
    let rawProjectionsDataset = [];
    let selectedExpenditureTypes = [];
    let assetLookupMap = new Map();
    let projSortKey = 'assetName';
    let projSortOrder = 'asc';

    function renderProjectionsHub(payload) {
        rawProjectionsDataset = payload.projections || [];

        // Build cross-reference map from the true Assets table data
        assetLookupMap.clear();
        (payload.assets || []).forEach(asset => {
            const name = (asset["Asset Name"] || "").toString().trim().toLowerCase();
            if (name) {
                assetLookupMap.set(name, {
                    manufacturer: (asset["Manufacturer"] || "Unknown").toString().trim(),
                    driver: (asset["Business Driver"] || "Technology").toString().trim()
                });
            }
        });

        populateDropdownMenuData('Legal Entity', 'proj-drop-legal', 'proj-btn-legal', 'All Legal Entities');
        populateDropdownMenuData('Supplier', 'proj-drop-supplier', 'proj-btn-supplier', 'All Suppliers');

        applyProjectionsEngine();
    }

    // Dynamic dropdown generator with embedded quick-search filter for Suppliers
    function populateDropdownMenuData(columnKey, containerId, buttonId, defaultText) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const uniqueValues = [...new Set(rawProjectionsDataset.map(r => (r[columnKey] || "").toString().trim()).filter(v => v !== ""))].sort();

        let html = '';

        // Inject inline live-search bar if generating the Supplier listing
        if (columnKey === 'Supplier') {
            html += `
                <div class="p-1 mb-2 sticky top-0 bg-white border-b border-slate-100 z-10">
                    <input type="text" id="proj-supplier-search" onkeyup="filterSupplierDropdownItems()" placeholder="Search supplier..." class="w-full px-2 py-1 text-[11px] bg-slate-50 border border-slate-200 rounded-md focus:outline-none focus:ring-1 focus:ring-teal-500 font-medium">
                </div>
                <div id="proj-supplier-items-wrapper" class="space-y-1.5">
            `;
        }

        html += uniqueValues.map(val => `
            <label class="flex items-center gap-2 px-1 py-0.5 hover:bg-slate-50 rounded cursor-pointer text-[11px] font-bold text-slate-700 ${columnKey === 'Supplier' ? 'proj-supplier-item' : ''}">
                <input type="checkbox" value="${val}" onchange="updateDropdownLabelAndSync('${columnKey}', '${containerId}', '${buttonId}', '${defaultText}')" class="w-3.5 h-3.5 text-teal-600 rounded border-slate-300 focus:ring-teal-600 cursor-pointer">
                <span class="truncate">${val}</span>
            </label>
        `).join('');

        if (columnKey === 'Supplier') {
            html += `</div>`;
        }

        container.innerHTML = html;
    }

    // Local filter processing inside the Supplier menu popup wrapper
    function filterSupplierDropdownItems() {
        const query = document.getElementById('proj-supplier-search').value.toLowerCase().trim();
        const items = document.querySelectorAll('.proj-supplier-item');
        items.forEach(item => {
            const text = item.querySelector('span').textContent.toLowerCase();
            if (text.includes(query)) {
                item.style.display = "flex";
            } else {
                item.style.display = "none";
            }
        });
    }

    function toggleExpenditureTypeButton(btnElement, typeKey) {
        const idx = selectedExpenditureTypes.indexOf(typeKey);
        if (idx > -1) {
            selectedExpenditureTypes.splice(idx, 1);
            btnElement.className = "px-2.5 py-1 text-[10px] font-black uppercase border border-slate-200 rounded-lg bg-slate-50 text-slate-600 hover:bg-slate-100 transition-all cursor-pointer";
        } else {
            selectedExpenditureTypes.push(typeKey);
            btnElement.className = "px-2.5 py-1 text-[10px] font-black uppercase border border-teal-700 rounded-lg bg-teal-700 text-white shadow-xs transition-all cursor-pointer";
        }
        applyProjectionsEngine();
    }

    function updateDropdownLabelAndSync(columnKey, containerId, buttonId, defaultText) {
        const checkedBoxes = Array.from(document.querySelectorAll(`#${containerId} input:checked`));
        const btnSpan = document.querySelector(`#${buttonId} span`);

        if (checkedBoxes.length === 0) {
            btnSpan.textContent = defaultText;
            btnSpan.className = "truncate";
        } else if (checkedBoxes.length === 1) {
            btnSpan.textContent = checkedBoxes[0].value;
            btnSpan.className = "truncate text-teal-700 font-extrabold";
        } else {
            btnSpan.textContent = `${checkedBoxes.length} Selected`;
            btnSpan.className = "truncate text-teal-700 font-extrabold";
        }
        applyProjectionsEngine();
    }

    function toggleProjDropdown(event, dropdownId) {
        if (event) event.stopPropagation();
        const dropdowns = ['proj-drop-legal', 'proj-drop-supplier'];
        dropdowns.forEach(id => {
            const el = document.getElementById(id);
            const arrow = document.getElementById(id.replace('drop', 'arrow'));
            if (id === dropdownId) {
                const isHidden = el.classList.toggle('hidden');
                if (arrow) arrow.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
            } else {
                if (el) el.classList.add('hidden');
                if (arrow) arrow.style.transform = "rotate(0deg)";
            }
        });
    }

    function handleProjSort(key) {
        if (projSortKey === key) {
            projSortOrder = projSortOrder === 'asc' ? 'desc' : 'asc';
        } else {
            projSortKey = key;
            projSortOrder = 'asc';
        }
        applyProjectionsEngine();
    }

    function updateSortIcons() {
        const keys = ['assetName', '2026', '2027', '2028'];
        keys.forEach(k => {
            const el = document.getElementById(`proj-ico-${k}`);
            if (!el) return;
            if (projSortKey === k) {
                el.textContent = projSortOrder === 'asc' ? ' ▲' : ' ▼';
                el.className = "ml-1 text-[9px] text-teal-600 font-black";
            } else {
                el.textContent = ' ▲';
                el.className = "ml-1 text-[9px] text-slate-300 opacity-40";
            }
        });
    }

    function resetProjectionFilters() {
        document.querySelectorAll('#tab-projections input[type="checkbox"]').forEach(cb => cb.checked = false);
        document.getElementById('proj-search-input').value = '';
        if (document.getElementById('proj-supplier-search')) document.getElementById('proj-supplier-search').value = '';
        selectedExpenditureTypes = [];
        projSortKey = 'assetName';
        projSortOrder = 'asc';

        document.querySelectorAll('#proj-filter-type-buttons button').forEach(btn => {
            btn.className = "px-2.5 py-1 text-[10px] font-black uppercase border border-slate-200 rounded-lg bg-slate-50 text-slate-600 hover:bg-slate-100 transition-all cursor-pointer";
        });

        document.querySelector('#proj-btn-legal span').textContent = 'All Legal Entities';
        document.querySelector('#proj-btn-legal span').className = 'truncate';
        document.querySelector('#proj-btn-supplier span').textContent = 'All Suppliers';
        document.querySelector('#proj-btn-supplier span').className = 'truncate';

        // Reveal any hidden supplier elements if any search filter was left typed
        const items = document.querySelectorAll('.proj-supplier-item');
        items.forEach(item => item.style.display = "flex");

        applyProjectionsEngine();
    }

    function toggleProjChildRow(idx) {
        const row = document.getElementById(`proj-child-${idx}`);
        const chevron = document.getElementById(`proj-chevron-${idx}`);
        if (!row) return;
        const isHidden = row.classList.toggle('hidden');
        if (chevron) {
            chevron.style.transform = isHidden ? "rotate(0deg)" : "rotate(90deg)";
        }
    }

    // MULTIDIMENSIONAL AGGREGATION ENGINE (DOUBLE PIVOT PUSH)
    function applyProjectionsEngine() {
        const searchQuery = document.getElementById('proj-search-input').value.toLowerCase().trim();
        const activeLegals = Array.from(document.querySelectorAll('#proj-drop-legal input:checked')).map(cb => cb.value);
        const activeSuppliers = Array.from(document.querySelectorAll('#proj-drop-supplier input:checked')).map(cb => cb.value);

        const filteredRows = rawProjectionsDataset.filter(row => {
            const assetName = (row["Asset Name"] || "").toString().toLowerCase();
            const supplier = (row["Supplier"] || "").toString();
            const legal = (row["Legal Entity"] || "").toString();
            const type = (row["Expenditure Type"] || "").toString().toUpperCase();

            if (searchQuery && !assetName.includes(searchQuery)) return false;
            if (selectedExpenditureTypes.length > 0 && !selectedExpenditureTypes.includes(type)) return false;
            if (activeLegals.length > 0 && !activeLegals.includes(legal)) return false;
            if (activeSuppliers.length > 0 && !activeSuppliers.includes(supplier)) return false;

            return true;
        });

        const assetPivotMap = {};
        const macroGraphTotals = {
            2026: { OPEX: 0, CAPEX: 0, ROU: 0 },
            2027: { OPEX: 0, CAPEX: 0, ROU: 0 },
            2028: { OPEX: 0, CAPEX: 0, ROU: 0 }
        };

        filteredRows.forEach(row => {
            const assetName = (row["Asset Name"] || "Unknown Asset").toString().trim();
            const supplier = (row["Supplier"] || "Generic Supplier").toString().trim();
            const legal = (row["Legal Entity"] || "N/A").toString().trim();

            // NEW: True relational lookup targeting the cached assets dataset map
            const assetMetadata = assetLookupMap.get(assetName.toLowerCase()) || { manufacturer: "Unknown", driver: "Technology" };
            const manufacturer = assetMetadata.manufacturer;
            const driver = assetMetadata.driver;

            let expType = (row["Expenditure Type"] || "OPEX").toString().toUpperCase().trim();
            if (!['OPEX', 'CAPEX', 'ROU'].includes(expType)) expType = "OPEX";

            const v26 = parseFloat(row["FY26 Optimized"]) || 0;
            const v27 = parseFloat(row["FY27 Optimized"]) || 0;
            const v28 = parseFloat(row["FY28 Optimized"]) || 0;

            if (!assetPivotMap[assetName]) {
                assetPivotMap[assetName] = {
                    assetName: assetName,
                    manufacturer: manufacturer,
                    driver: driver,
                    2026: { total: 0, OPEX: 0, CAPEX: 0, ROU: 0 },
                    2027: { total: 0, OPEX: 0, CAPEX: 0, ROU: 0 },
                    2028: { total: 0, OPEX: 0, CAPEX: 0, ROU: 0 },
                    subAggregationMap: {}
                };
            }

            assetPivotMap[assetName][2026].total += v26;
            assetPivotMap[assetName][2026][expType] += v26;
            assetPivotMap[assetName][2027].total += v27;
            assetPivotMap[assetName][2027][expType] += v27;
            assetPivotMap[assetName][2028].total += v28;
            assetPivotMap[assetName][2028][expType] += v28;

            const subKey = `${supplier}|||${legal}|||${expType}`;
            if (!assetPivotMap[assetName].subAggregationMap[subKey]) {
                assetPivotMap[assetName].subAggregationMap[subKey] = {
                    supplier: supplier,
                    legalEntity: legal,
                    expType: expType,
                    v26: 0,
                    v27: 0,
                    v28: 0
                };
            }

            assetPivotMap[assetName].subAggregationMap[subKey].v26 += v26;
            assetPivotMap[assetName].subAggregationMap[subKey].v27 += v27;
            assetPivotMap[assetName].subAggregationMap[subKey].v28 += v28;

            macroGraphTotals[2026][expType] += v26;
            macroGraphTotals[2027][expType] += v27;
            macroGraphTotals[2028][expType] += v28;
        });

        const finalizedPivotArray = Object.values(assetPivotMap).filter(asset =>
            asset[2026].total > 0 || asset[2027].total > 0 || asset[2028].total > 0
        );

        finalizedPivotArray.forEach(asset => {
            asset.children = Object.values(asset.subAggregationMap).sort((a, b) => b.v27 - a.v27);
        });

        finalizedPivotArray.sort((a, b) => {
            let valA, valB;
            if (projSortKey === 'assetName') {
                valA = a.assetName.toLowerCase();
                valB = b.assetName.toLowerCase();
                return projSortOrder === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
            } else {
                valA = a[projSortKey].total;
                valB = b[projSortKey].total;
                return projSortOrder === 'asc' ? valA - valB : valB - valA;
            }
        });

        if (document.getElementById('proj-count-badge')) {
            document.getElementById('proj-count-badge').textContent = finalizedPivotArray.length + " Aggregated Assets";
        }

        buildMatrixTableDOM(finalizedPivotArray);
        renderMacroStackedChart(macroGraphTotals);
        updateSortIcons();
    }

    function buildMatrixTableDOM(matrixData) {
        const tableBody = document.getElementById('projections-matrix-body');
        if (!tableBody) return;

        if (matrixData.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400 italic">No records found matching the active filters.</td></tr>`;
            return;
        }

        let html = '';
        matrixData.forEach((row, idx) => {
            html += `
            <tr onclick="toggleProjChildRow(${idx})" class="hover:bg-slate-50/60 transition-all border-b border-slate-100 cursor-pointer select-none">
                <td class="p-3 align-middle">
                    <div class="flex items-center gap-2">
                        <svg id="proj-chevron-${idx}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-3 h-3 text-slate-400 transition-transform duration-200">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                        </svg>
                        <span class="font-black text-slate-900 text-sm tracking-tight">${row.assetName}</span>
                    </div>
                    <!-- Added Manufacturer & Business Driver Metadata -->
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tight mt-0.5 pl-5">
                        ${row.manufacturer} <span class="text-slate-300 font-normal mx-1 select-none">•</span> <span class="text-slate-400/60 font-medium normal-case tracking-normal">for: ${row.driver}</span>
                    </div>
                </td>
                ${[2026, 2027, 2028].map(year => {
                const y = row[year];
                return `
                    <td class="p-3 text-right align-middle font-mono">
                        <div class="font-black text-slate-800">€ ${y.total.formatCurrency()}</div>
                        ${y.total > 0 ? `
                        <div class="flex justify-end gap-1 mt-1 text-[8px] font-sans font-black tracking-tight select-none">
                            ${y.OPEX > 0 ? `<span class="px-1.5 py-0.5 bg-teal-50 text-teal-700 rounded border border-teal-200/30">OPEX: ${Math.round((y.OPEX / y.total) * 100)}%</span>` : ''}
                            ${y.CAPEX > 0 ? `<span class="px-1.5 py-0.5 bg-emerald-50 text-emerald-700 rounded border border-emerald-200/30">CAPEX: ${Math.round((y.CAPEX / y.total) * 100)}%</span>` : ''}
                            ${y.ROU > 0 ? `<span class="px-1.5 py-0.5 bg-amber-50 text-amber-600 rounded border border-amber-200/30">ROU: ${Math.round((y.ROU / y.total) * 100)}%</span>` : ''}
                        </div>
                        ` : `<span class="text-slate-300 select-none">—</span>`}
                    </td>`;
            }).join('')}
            </tr>
            <tr id="proj-child-${idx}" class="hidden bg-slate-50/40 shadow-inner">
                <td colspan="4" class="p-4">
                    <div class="border border-slate-200/80 rounded-xl bg-white p-3 shadow-2xs">
                        <table class="w-full text-left text-[11px] border-collapse">
                            <thead>
                                <tr class="border-b border-slate-200 text-slate-400 font-black uppercase tracking-wider text-[9px] select-none">
                                    <th class="pb-2">Supplier Dimension</th>
                                    <th class="pb-2">Legal Entity</th>
                                    <th class="pb-2">Expenditure Type</th>
                                    <th class="pb-2 text-right">FY26</th>
                                    <th class="pb-2 text-right text-teal-900 bg-teal-50/20 px-1 rounded">FY27</th>
                                    <th class="pb-2 text-right">FY28</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 font-medium text-slate-600">
                                ${row.children.map(child => `
                                    <tr class="hover:bg-slate-50/40">
                                        <td class="py-2 font-bold text-slate-800 select-all">${child.supplier}</td>
                                        <td class="py-2">${child.legalEntity}</td>
                                        <td class="py-2 font-mono font-black text-[9px] text-slate-500">${child.expType}</td>
                                        <td class="py-2 text-right font-mono text-slate-500">€ ${child.v26.formatCurrency()}</td>
                                        <td class="py-2 text-right font-mono font-black text-teal-700 bg-teal-50/10 px-1">€ ${child.v27.formatCurrency()}</td>
                                        <td class="py-2 text-right font-mono text-slate-500">€ ${child.v28.formatCurrency()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </td>
            </tr>`;
        });

        tableBody.innerHTML = html;
    }

    // CHART UPDATE: Labels set directly to cleanly display fiscal identifiers
    function renderMacroStackedChart(totals) {
        const ctxElement = document.getElementById('projectionsStackedChart');
        if (!ctxElement) return;

        if (window.chartInstances && window.chartInstances.projStacked) {
            window.chartInstances.projStacked.destroy();
        } else if (!window.chartInstances) {
            window.chartInstances = {};
        }

        window.chartInstances.projStacked = new Chart(ctxElement.getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['FY26 Projections', 'FY27 Projections', 'FY28 Projections'],
                datasets: [
                    { label: 'OPEX', data: [totals[2026].OPEX, totals[2027].OPEX, totals[2028].OPEX], backgroundColor: '#0f766e', borderRadius: 4, barPercentage: 0.38 },
                    { label: 'CAPEX', data: [totals[2026].CAPEX, totals[2027].CAPEX, totals[2028].CAPEX], backgroundColor: '#10b981', borderRadius: 4, barPercentage: 0.38 },
                    { label: 'ROU', data: [totals[2026].ROU, totals[2027].ROU, totals[2028].ROU], backgroundColor: '#f59e0b', borderRadius: 4, barPercentage: 0.38 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10, weight: 'bold' } } },
                    tooltip: { callbacks: { label: (c) => ` ${c.dataset.label}: € ${c.raw.toLocaleString('en-US', { maximumFractionDigits: 0 })}` } }
                },
                scales: {
                    x: { stacked: true, grid: { display: false } },
                    y: { stacked: true, ticks: { callback: (v) => v >= 1000000 ? '€ ' + (v / 1000000).toFixed(1) + 'M' : '€ ' + (v / 1000).toFixed(0) + 'k' } }
                }
            }
        });
    }

    // Floating window outside bounds click dismiss handler
    document.addEventListener('click', function (e) {
        const dropdowns = ['proj-drop-legal', 'proj-drop-supplier'];
        dropdowns.forEach(id => {
            const el = document.getElementById(id);
            const btn = document.getElementById(id.replace('drop', 'btn'));
            if (el && !el.classList.contains('hidden') && btn && !btn.contains(e.target) && !el.contains(e.target)) {
                el.classList.add('hidden');
                const arrow = document.getElementById(id.replace('drop', 'arrow'));
                if (arrow) arrow.style.transform = "rotate(0deg)";
            }
        });
    });
</script>
