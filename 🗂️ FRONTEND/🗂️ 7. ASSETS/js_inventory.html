<script>
    /**
     * MODULO INVENTORY: MAIN ASSET TABLE
     */
    function renderMainTable(filteredData) {
        const tableBody = document.getElementById('live-table-body');
        let tableHtml = '';
        const today = new Date();
        const alertThreshold = new Date();
        alertThreshold.setDate(today.getDate() + 30);

        filteredData.forEach((row) => {
            const name = row["Asset Name"] || row.asset_name || "Unknown Asset";
            const manufacturer = row["Manufacturer"] || "";
            const businessDriver = row["Business Driver"] || "Technology"; // default se vuoto
            const status = (row["Current Status"] || "Active").toUpperCase().trim();
            const target = row["Target Status"] || "-";
            const budgetStatus = row["Budget Status (FY27)"] || row["Budget Status"] || "";
            const exitDate = row["Exit Date"] || "";
            const lastEndDate = row["Last End Date"] ? new Date(row["Last End Date"]) : null;

            const runRate = parseFloat(row["Run Rate"]) || 0;
            const costImprovement = parseFloat(row["Cost Improvement"]) || 0;
            const fiscalProjection = parseFloat(row["Fiscal Projection (FY27)"] || row["Fiscal FY27"] || row["Fiscal Projection"] || 0);

            const isActiveGroup = ["RUNNING", "EXPIRED", "OPTIMIZNG", "ACTIVE"].includes(status);
            const isInactiveGroup = ["DISMISSED", "TRANSFERRED", "EXTNG", "EXITING"].includes(status);
            const safeDOMId = btoa(encodeURIComponent(name)).replace(/=/g, "");
            const targetHtmlContent = getTargetStatusText(target);
            const showBudgetBadge = budgetStatus && budgetStatus.toUpperCase().trim() !== "NOT BUDGETED" && budgetStatus.trim() !== "-";

            let alertClass = ""; let alertLabel = "";
            if (lastEndDate) {
                if (lastEndDate <= today && ["RUNNING", "OPTIMIZNG", "ACTIVE"].includes(status)) {
                    alertClass = "border-l-4 border-l-rose-500 bg-rose-50/20";
                    alertLabel = `<span class="ml-2 text-[8px] font-black uppercase tracking-widest text-rose-600 bg-rose-100 px-1.5 py-0.5 rounded">Overdue</span>`;
                } else if (lastEndDate <= alertThreshold && lastEndDate > today) {
                    alertClass = "border-l-4 border-l-amber-500 bg-amber-50/20";
                    alertLabel = `<span class="ml-2 text-[8px] font-black uppercase tracking-widest text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded animate-pulse">Expiring</span>`;
                }
            }

            tableHtml += `
<div class="group hover:bg-slate-50/50 transition-all border-b border-slate-100 w-full text-xs ${alertClass}">
    <div onclick="toggleAssetDetails('${name.replace(/'/g, "\\'")}', '${safeDOMId}')" class="px-5 py-3 flex justify-between items-center cursor-pointer w-full gap-4">
        <div class="w-[40%] min-w-0 flex flex-col justify-center text-left">
            <div class="flex items-center w-full min-w-0">
                <div class="mr-2 flex-shrink-0 flex items-center justify-center" style="width: 14px !important; height: 14px !important; min-width: 14px !important;">
                    <svg id="arrow-${safeDOMId}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" class="w-3.5 h-3.5 text-slate-300 transition-transform duration-200"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
                </div>
                <div class="font-bold text-slate-900 text-sm truncate shrink">${name}</div>
                <div class="flex items-center gap-1 shrink-0 ml-2">
                    ${alertLabel}
                    <span class="tt-wrapper text-slate-300 hover:text-slate-500" onclick="event.stopPropagation()">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" /></svg>
                        <div class="tt-content tt-left"><p class="font-bold text-teal-400 uppercase text-[9px] mb-1">Description</p>${row["Description"] || "No description available."}</div>
                    </span>
                </div>
            </div>
            <div class="mt-1" style="padding-left: 25px;">
                <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest truncate leading-tight" style="padding-left: 10px;">
                    ${manufacturer} <span class="text-slate-300 font-normal mx-1 select-none">•</span> <span class="text-slate-400/60 font-medium normal-case tracking-normal">for: ${businessDriver}</span>
                </p>
                <div class="mt-1.5 flex items-center gap-3">
                    ${getCurrentStatusBadge(status)}
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">
                        ${isActiveGroup && lastEndDate ? `<span>End: <span class="text-slate-600">${lastEndDate.formatDashboardDate()}</span></span>` : ''}
                        ${isInactiveGroup && exitDate ? `<span>Exit: <span class="text-slate-600">${exitDate.formatDashboardDate()}</span></span>` : ''}
                    </div>
                </div>
            </div>
        </div>
        <div class="w-[30%] flex items-center justify-center gap-6 px-2 flex-shrink-0 border-l border-r border-slate-100/70">
            <div class="flex flex-col items-center text-center">
                <span class="block text-[8px] text-slate-400 uppercase font-black tracking-widest mb-1.5">Strategy</span>
                <div class="inline-block">${targetHtmlContent}</div>
            </div>
            <div class="flex flex-col items-center text-center border-l border-slate-100 pl-6">
                <span class="block text-[8px] text-slate-400 uppercase font-black tracking-widest mb-1.5">Budget FY27</span>
                <div class="text-[10px] font-bold uppercase">${showBudgetBadge ? getBudgetStatusBadge(budgetStatus) : '<span class="text-slate-300 font-mono select-none">—</span>'}</div>
            </div>
        </div>
        <div class="w-[30%] text-right flex flex-col justify-center items-end gap-1.5">
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Outlook FY27: <span class="font-mono text-slate-900">€ ${fiscalProjection.formatCurrency()}</span></div>
            <div class="flex flex-col items-end mt-auto">
                ${isInactiveGroup ? `
                    <span class="font-mono text-base text-emerald-600 font-black">€ ${costImprovement.formatCurrency()}</span>
                    <span class="block text-[8px] text-emerald-500 uppercase font-black tracking-widest mt-0.5">Cost Improvement</span>
                ` : `
                    <span class="font-mono text-base text-slate-900 font-black">€ ${runRate.formatCurrency()}</span>
                    <span class="block text-[8px] text-slate-400 uppercase font-black tracking-widest mt-0.5">Annual Run Rate</span>
                `}
            </div>
        </div>
    </div>
    <div id="details-${safeDOMId}" class="hidden px-8 pb-6 pt-2 bg-slate-50 border-t border-slate-100 shadow-inner">
         <div class="flex gap-4 border-b border-slate-200 mb-4">
            <button id="tab-btn-contracts-${safeDOMId}" onclick="switchDetailTab('${safeDOMId}', 'contracts')" class="pb-2 font-bold text-[10px] uppercase border-b-2 border-teal-700 text-teal-700 transition-all">1. Contracts</button>
            <button id="tab-btn-alloc-${safeDOMId}" onclick="switchDetailTab('${safeDOMId}', 'alloc')" class="pb-2 font-bold text-[10px] uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-700 transition-all">2. Budget</button>
            <button id="tab-btn-initiatives-${safeDOMId}" onclick="switchDetailTab('${safeDOMId}', 'initiatives')" class="pb-2 font-bold text-[10px] uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-700 transition-all">3. Initiatives</button>
         </div>
         <div id="tab-content-${safeDOMId}" class="animate-fade-in"></div>
    </div>
</div>`;
        });
        tableBody.innerHTML = tableHtml;
    }

    function toggleAssetDetails(name, safeDOMId) {
        const container = document.getElementById(`details-${safeDOMId}`);
        const arrow = document.getElementById(`arrow-${safeDOMId}`);
        if (!container.classList.contains('hidden')) { container.classList.add('hidden'); arrow.style.transform = "rotate(0deg)"; arrow.classList.remove('text-teal-600'); return; }
        container.classList.remove('hidden'); arrow.style.transform = "rotate(90deg)"; arrow.classList.add('text-teal-600');

        const targetName = (name || "").toString().trim().toLowerCase();

        const bridge = windowPayload.bridge || [];
        const aliasMap = new Map();
        bridge.forEach(r => {
            if (!r["Allocation Alias"]) return;
            if (!aliasMap.has(r["Allocation Alias"])) aliasMap.set(r["Allocation Alias"], []);
            aliasMap.get(r["Allocation Alias"]).push({ asset_name: r["Asset Name"], split_pct: r["Allocation Split %"] || 0 });
        });

        const offlineAllocations = bridge.filter(r => (r["Asset Name"] || "").toString().trim().toLowerCase() === targetName)
            .map(r => ({ ...r, co_allocated_assets: (aliasMap.get(r["Allocation Alias"]) || []).filter(a => (a.asset_name || "").toString().trim().toLowerCase() !== targetName) }));

        window.currentDrillDown = {
            contracts: (windowPayload.contracts || []).filter(c => (c["Asset Name"] || "").toString().trim().toLowerCase() === targetName),
            initiatives: (windowPayload.initiatives || []).filter(i => (i["Asset Name"] || "").toString().trim().toLowerCase() === targetName),
            allocations: offlineAllocations
        };
        switchDetailTab(safeDOMId, 'contracts');
    }

    function switchDetailTab(safeDOMId, tabType) {
        const contentDiv = document.getElementById(`tab-content-${safeDOMId}`);
        const assetPayload = window.currentDrillDown; contentDiv.innerHTML = '';

        ['contracts', 'alloc', 'initiatives'].forEach(t => {
            const btn = document.getElementById(`tab-btn-${t}-${safeDOMId}`);
            if (btn) btn.className = (t === tabType) ? "pb-2 font-bold text-[10px] uppercase border-b-2 border-teal-700 text-teal-700 transition-all" : "pb-2 font-bold text-[10px] uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition-all";
        });

        if (tabType === 'contracts') {
            const dataList = assetPayload.contracts || [];
            dataList.sort((a, b) => {
                const dA = a["End Date"] ? new Date(a["End Date"]).getTime() : new Date(2099, 11, 31).getTime();
                const dB = b["End Date"] ? new Date(b["End Date"]).getTime() : new Date(2099, 11, 31).getTime();
                return dB - dA;
            });
            if (dataList.length === 0) { contentDiv.innerHTML = '<p class="text-slate-400 italic py-4 text-center text-xs">No active contracts found.</p>'; return; }
            let html = `<div class="overflow-hidden border border-slate-200 rounded-xl bg-white shadow-sm"><table class="w-full text-left text-[11px]"><thead><tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-black uppercase tracking-widest"><th class="p-3">Supplier</th><th class="p-3 text-center">Commitment</th><th class="p-3 text-right bg-teal-50/40 text-teal-900">Annual Run Rate</th></tr></thead><tbody class="divide-y divide-slate-100">`;
            dataList.forEach(log => {
                const cStatus = (log["Status"] || log["Contract Status"] || "").toUpperCase().trim();
                let rowStyles = "hover:bg-slate-50/20"; let statusBadge = "";
                if (cStatus === "EXPIRED") { rowStyles = "opacity-50 grayscale"; statusBadge = `<span class="ml-2 text-[7px] font-black uppercase border border-slate-300 text-slate-400 px-1 rounded">Expired</span>`; }
                else if (cStatus === "ACTIVE") { statusBadge = `<span class="ml-2 text-[7px] font-black uppercase bg-emerald-50 text-emerald-600 border border-emerald-100 px-1 rounded">Active</span>`; }
                else if (cStatus === "INCOMING" || cStatus === "UPCOMING") { statusBadge = `<span class="ml-2 text-[7px] font-black uppercase bg-sky-50 text-sky-600 border border-sky-100 px-1 rounded">Incoming</span>`; }
                html += `<tr class="text-slate-600 font-medium ${rowStyles} transition-all"><td class="p-3 align-top"><div class="flex items-center"><div class="text-sm font-black text-slate-900 leading-none">${log["Supplier"]}</div>${statusBadge}</div><div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">${log["Legal Entity"] || 'N/A'}</div></td><td class="p-3 text-center align-top"><div class="font-mono text-slate-700 font-bold mb-1">€ ${parseFloat(log["Total Commitment"] || 0).formatCurrency()}</div><div class="flex items-center justify-center gap-1.5 text-[9px] text-slate-400 font-bold uppercase tracking-tighter"><span>${safeFormatStringDate(log["Start Date"])} → ${log["End Date"] ? safeFormatStringDate(log["End Date"]) : 'Active'}</span></div></td><td class="p-3 text-right bg-teal-50/10 align-top font-black font-mono text-teal-800 text-sm">€ ${parseFloat(log["Annual Value"] || 0).formatCurrency()}</td></tr>`;
            });
            contentDiv.innerHTML = html + '</tbody></table></div>';
        }
        else if (tabType === 'alloc') {
            const dataList = assetPayload.allocations || [];
            if (dataList.length === 0) { contentDiv.innerHTML = '<p class="text-slate-400 italic py-4 text-center text-xs">No allocations.</p>'; return; }
            let html = `<div class="overflow-hidden border border-slate-200 rounded-xl bg-white shadow-sm"><table class="w-full text-left text-[11px] border-collapse"><thead><tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-black uppercase tracking-widest"><th class="p-3 w-1/2">Budget Entry</th><th class="p-3 text-right w-1/4">Original Amount</th><th class="p-3 text-right w-1/4">Allocated Share</th></tr></thead><tbody class="divide-y divide-slate-100">`;
            let sumOriginal = 0; let sumEffective = 0;
            dataList.forEach(log => {
                const origBudget = parseFloat(log["Original Budget"]) || 0; const effBudget = parseFloat(log["Effective Budget"]) || 0;
                const coAssets = log.co_allocated_assets || []; sumOriginal += origBudget; sumEffective += effBudget;
                let split = (parseFloat(log["Allocation Split %"]) || 0); if (split > 0 && split <= 1) split *= 100;
                html += `<tr class="text-slate-600 font-medium hover:bg-slate-50/30"><td class="p-3 align-top"><div class="font-bold text-slate-900 leading-tight">${log["Allocation Alias"] || "N/A"}</div><div class="text-[9px] text-slate-400 mt-1 uppercase font-bold">${safeFormatStringDate(log["Valid From"])} → ${safeFormatStringDate(log["Valid To"])}</div></td><td class="p-3 text-right align-top font-mono text-slate-400 italic">€ ${origBudget.formatCurrency()}</td><td class="p-3 text-right align-top"><div class="text-teal-900 font-black font-mono text-sm">€ ${effBudget.formatCurrency()}</div><div class="mt-1"><span class="px-2 py-0.5 rounded border text-[9px] font-black uppercase ${split >= 99.9 ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 'text-teal-600 bg-teal-50 border-teal-100'}">${split.toFixed(1)}%</span></div></td></tr>`;
                if (split < 99.9 && coAssets.length > 0) {
                    const sharedList = coAssets.map(co => `<span class="text-slate-700 font-bold">${co.asset_name}</span> <span class="text-teal-600 font-mono">(${(parseFloat(co.split_pct) * 100).toFixed(0)}%)</span>`).join('<span class="mx-3 text-slate-300">|</span>');
                    html += `<tr class="bg-slate-50/50"><td colspan="3" class="px-4 py-2 border-b border-slate-100 text-left"><div class="text-[10px] leading-relaxed"><span class="font-black text-slate-400 uppercase tracking-widest mr-2">↳ Co-allocated with:</span>${sharedList}</div></td></tr>`;
                }
            });
            const totalRatio = sumOriginal > 0 ? (sumEffective / sumOriginal) * 100 : 0;
            html += `</tbody><tfoot><tr class="bg-slate-100/50 font-bold border-t-2 border-slate-200"><td class="p-3 text-slate-500 uppercase tracking-widest font-black text-[9px]">Total Portfolio Allocation</td><td class="p-3 text-right font-mono text-slate-400 italic"></td><td class="p-3 text-right bg-teal-100/10"><div class="text-teal-900 font-black text-sm font-mono">€ ${sumEffective.formatCurrency()}</div><div class="text-[9px] text-teal-600 uppercase tracking-tighter mt-0.5">${totalRatio.toFixed(1)}% of total budget</div></td></tr></tfoot></table></div>`;
            contentDiv.innerHTML = html;
        }
        else if (tabType === 'initiatives') {
            const dataList = assetPayload.initiatives || [];
            dataList.sort((a, b) => {
                const dA = a["Target Date"] ? new Date(a["Target Date"]).getTime() : new Date(2099, 11, 31).getTime();
                const dB = b["Target Date"] ? new Date(b["Target Date"]).getTime() : new Date(2099, 11, 31).getTime();
                return dA - dB;
            });
            if (dataList.length === 0) { contentDiv.innerHTML = '<p class="text-slate-400 italic py-4 text-center text-xs">No initiatives linked to this asset.</p>'; return; }
            let html = '<div class="flex flex-col gap-2">';
            dataList.forEach(log => {
                const isActual = (parseFloat(log["Actual Saving (Annualized)"]) || 0) > 0; const savingVal = isActual ? parseFloat(log["Actual Saving (Annualized)"]) : parseFloat(log["Target Saving (Annualized)"]);
                const baselineVal = parseFloat(log["Baseline Spend (Annualized)"]) || 0; const savingPct = baselineVal > 0 ? Math.round((savingVal / baselineVal) * 100) : 0;
                const borderClass = isActual ? "border-emerald-500 shadow-emerald-50" : "border-amber-500 shadow-amber-50";
                html += `<div class="bg-white p-3 rounded-xl border-l-4 ${borderClass} border-slate-100 shadow-sm flex justify-between items-center gap-4 hover:shadow-md transition-shadow"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 mb-1"><span class="font-black text-slate-900 text-[13px] uppercase truncate">${log["Decision"]}</span><span class="px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500 text-[8px] font-black uppercase tracking-widest">${log["Initiative Status"]}</span></div><p class="text-[10px] text-slate-500 italic truncate opacity-80">"${log["Description"] || "No description."}"</p></div><div class="flex gap-3 items-center shrink-0"><div class="text-center px-3 border-r border-slate-100"><p class="text-[8px] text-slate-400 font-black uppercase mb-0.5 tracking-tighter">Target Date</p><p class="font-mono font-bold text-slate-800 text-[10px]">${safeFormatStringDate(log["Target Date"] || log["Actual Date"])}</p></div><div class="text-right px-3 border-r border-slate-100 hidden sm:block"><p class="text-[8px] text-slate-400 font-black uppercase mb-0.5 tracking-tighter">Baseline Spend</p><p class="font-mono font-bold text-slate-600 text-[10px]">€${baselineVal.formatCurrency()}</p></div><div class="text-right min-w-[85px]"><p class="text-[8px] text-emerald-500 font-black uppercase mb-0.5 tracking-tighter">${isActual ? 'Actual Saving' : 'Target Saving'}</p><div class="flex flex-col items-end gap-0.5"><p class="font-mono font-black text-emerald-700 text-xs">€${savingVal.formatCurrency()}</p>${savingPct > 0 ? `<span class="bg-emerald-100 text-emerald-700 text-[8px] font-bold px-1 py-0.5 rounded leading-none">-${savingPct}%</span>` : ''}</div></div></div></div>`;
            });
            contentDiv.innerHTML = html + '</div>';
        }
    }

    function getCurrentStatusBadge(status) {
        const val = (status || "").toUpperCase().trim();
        const styles = {
            'RUNNING': 'text-emerald-700 bg-emerald-50 border-emerald-100',
            'OPTIMIZING': 'text-amber-700 bg-amber-50 border-amber-100',
            'EXITING': 'text-orange-700 bg-orange-50 border-orange-100',
            'TRANSFERRED': 'text-sky-700 bg-sky-50 border-sky-100',
            'EXPIRED': 'text-rose-700 bg-rose-50 border-rose-100',
            'DISMISSED': 'text-slate-500 bg-slate-50 border-slate-200'
        };
        return `<span class="px-2 py-0.5 text-[9px] font-bold rounded-full border ${styles[val] || 'text-slate-400 bg-slate-50 border-slate-100'}">${val}</span>`;
    }

    function getTargetStatusText(target) {
        const val = (target || "").toUpperCase().trim();
        const colors = { 'RETAIN': 'text-emerald-600', 'EXIT': 'text-rose-600', 'HANDOVER': 'text-sky-600' };
        return `<span class="text-[10px] font-black tracking-widest uppercase ${colors[val] || 'text-slate-400'}">${val}</span>`;
    }

    function getBudgetStatusBadge(budgetStatus) {
        const val = (budgetStatus || "").toUpperCase().trim();
        if (val === "SECURED") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> SECURED</span>`;
        if (val === "AT RISK") return `<span class="flex items-center gap-1.5 text-slate-600 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> AT RISK</span>`;
        return `<span class="text-slate-300">—</span>`;
    }
</script>
