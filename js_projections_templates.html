                                    <span class="truncate">All Cost Centers</span>

                                <button onclick="ProjectionsController.toggleMenuDropdown(event, 'proj-filter-drop-le')" id="proj-btn-filter-le" class="w-full text-left px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg flex justify-between items-center font-bold text-slate-700 text-xs select-none cursor-pointer">
                                    <span class="truncate">All Legal Entities</span>
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-slate-400 shrink-0 ml-2" id="proj-arrow-filter-le"><path d="M19 9l-7 7-7-7"/></svg>

                                    <span class="truncate">All Suppliers</span>
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-slate-400 shrink-0 ml-2" id="proj-arrow-filter-sup"><path d="M19 9l-7 7-7-7"/></svg>
                                </button>
                                <div id="proj-filter-drop-sup" class="hidden absolute left-0 right-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-xl p-2.5 z-50 max-h-48 overflow-y-auto space-y-1">

                <div class="lg:col-span-3 space-y-4">

                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden p-5">

        },

        // 🌟 Helper interno per generare le celle finanziarie con i Badge di sconto
        _renderCell: function (val, pct, colorClass = "text-slate-700") {
            let badge = '';
            // Se c'è uno sconto maggiore di zero, genera il badge
            if (pct > 0) {
                const isTerminated = pct >= 99.9; // Se lo sconto è totale (100%), è una dismissione
                const badgeColor = isTerminated ? 'text-rose-500' : 'text-amber-500';
                const icon = isTerminated ? '🛑' : '⚡';
                badge = `<span class="ml-1.5 text-[9px] font-black ${badgeColor} tracking-tighter shrink-0 select-none">${icon} -${Math.round(pct)}%</span>`;
            }

            return `
            <div class="flex items-center justify-end whitespace-nowrap w-full">
                <span class="${colorClass}">€ ${val.formatCurrency()}</span>
                ${badge}
            </div>`;
        },

        // LEVEL 1: Top-Level Dimension Header Card (Aggiunti i parametri p26, p27, p28)
        getGroupHeaderRowMarkup: function (groupIdx, label, assetCount, v26, p26, v27, p27, v28, p28) {
            return `
            <tr onclick="ProjectionsController.toggleLevel1Accordion(${groupIdx})" class="bg-slate-100/80 border-b border-slate-200 hover:bg-slate-100 transition-all font-black text-slate-900 select-none cursor-pointer">
                <td class="p-3 text-left align-middle w-2/5">
                    <div style="display: flex; align-items: center; justify-content: flex-start; width: 100%; min-width: 0;">
                        <div style="flex-shrink: 0; width: 20px; display: flex; justify-content: center;">
                            <svg id="proj-l1-chevron-${groupIdx}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" class="text-slate-500 transition-transform duration-200" style="transform: rotate(0deg);">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                            </svg>
                        </div>
                        <div style="flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px;" class="text-xs uppercase font-black tracking-wider text-slate-800" title="${label || 'UNSPECIFIED'}">
                            ${label || 'UNSPECIFIED'}
                        </div>
                        <div style="flex-shrink: 0;">
                            <span class="bg-white border border-slate-300 text-slate-600 text-[8px] font-extrabold px-1.5 py-0.5 rounded shadow-3xs leading-none" title="Contains ${assetCount} active scoped assets">${assetCount} Assets</span>
                        </div>
                    </div>
                </td>
                <td class="p-3 align-middle font-mono w-1/5">${this._renderCell(v26, p26, 'text-slate-700')}</td>
                <td class="p-3 align-middle font-mono bg-teal-50/10 w-1/5">${this._renderCell(v27, p27, 'text-teal-800')}</td>
                <td class="p-3 align-middle font-mono w-1/5">${this._renderCell(v28, p28, 'text-indigo-800')}</td>
            </tr>
            <tr id="proj-l1-body-row-${groupIdx}" class="hidden bg-transparent">
                <td colspan="4" class="p-0">
                    <table class="w-full table-fixed border-collapse bg-white">
                        <tbody id="proj-l1-container-${groupIdx}"></tbody>
                    </table>
                </td>
            </tr>`;
        },

        // LEVEL 2: Nested Intermediate Asset Row (Aggiunti i parametri p26, p27, p28)
        getAssetRowMarkup: function (groupIdx, assetIdx, assetName, manufacturer, driver, v26, p26, v27, p27, v28, p28, childTableHtml) {
            return `

                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                            </svg>
                        </div>
                        <div style="flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px;" class="font-extrabold text-slate-900 text-xs tracking-tight" title="${assetName}">
                            ${assetName}

                    <div class="text-[9px] font-bold text-slate-400 uppercase tracking-tight mt-0.5 pl-[20px] truncate w-full">

            <tr id="proj-l2-body-row-${groupIdx}-${assetIdx}" class="hidden bg-slate-50/30 shadow-inner">

        getContractDrillDownItemRow: function (c) {

            <tr class="hover:bg-slate-50/50 border-b border-slate-100 last:border-0">
