        // 🌟 Helper interno per generare le celle finanziarie con i Badge di sconto (Ibrido Vettoriale)
        _renderCell: function (val, pct, colorClass = "text-slate-700", isCompact = false) {
            let badge = '';
            const roundedPct = Math.round(pct);

            // 🛡️ Scudo protettivo per nascondere decimali o zero spuri (-0%)
            if (roundedPct > 0) {
                const isTerminated = roundedPct >= 99.9;

                if (isCompact) {
                    // 🎯 LIVELLO 3 (Drill-down): Layout ultra-compatto con micro-freccia verticale
                    const badgeColor = isTerminated ? 'text-emerald-800 bg-emerald-100' : 'text-teal-800 bg-teal-100';
                    const iconSvg = `<svg class="w-2.5 h-2.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m0 0l6.75-6.75M12 19.5l-6.75-6.75" /></svg>`;

                    badge = `
                    <span class="inline-flex items-center gap-[1px] px-1 py-0.5 rounded text-[8px] font-black tracking-tighter shrink-0 select-none mr-1.5 ${badgeColor}" title="Cost reduced by ${roundedPct}%">
                        ${iconSvg}${roundedPct}%
                    </span>`;
                } else {
                    // ⚡ LIVELLI 1 e 2 (Riepiloghi Macro): Icone SVG pure ad alta fedeltà (Anti-Schiacciamento)
                    let badgeColor, iconSvg;

                    if (isTerminated) {
                        // Dismissione completa (100%): Colore Smeraldo, icona di Chiusura/Taglio Netto (X spessa)
                        badgeColor = 'text-emerald-700 bg-emerald-50 border-emerald-200';
                        iconSvg = `<svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>`;
                    } else {
                        // Ottimizzazione parziale: Colore Teal FinOps, icona del Fulmine Vettoriale asimmetrico
                        badgeColor = 'text-teal-700 bg-teal-50 border-teal-200';
                        iconSvg = `<svg class="w-3 h-3 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M11.5 2L3 13h7v9l8.5-11H11.5V2z"/></svg>`;
                    }

                    badge = `
                    <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded border text-[9px] font-black tracking-tight shrink-0 select-none mr-2 ${badgeColor}" title="Cost reduced by ${roundedPct}%">
                        ${iconSvg} -${roundedPct}%
                    </span>`;
                }
            }

            return `
            <div class="flex items-center justify-end whitespace-nowrap w-full">
                ${badge}
                <span class="${colorClass}">€ ${val.formatCurrency()}</span>
            </div>`;
        },
