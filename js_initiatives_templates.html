                                ${leverCheckboxesHtml}
                            </div>
                        </div>
                    </div>
                </details>

            </div>

            <div class="flex justify-between items-center pt-3 mt-1 border-t border-slate-100 shrink-0">
                ${!isNew ? `<button onclick="InitiativesController.deleteInitiativeFromArchitecture()" class="px-4 py-2 bg-rose-50 border border-rose-200 hover:bg-rose-600 text-rose-600 hover:text-white font-black uppercase tracking-wider rounded-xl transition-all">Delete</button>` : '<div></div>'}
                <div class="flex gap-2">
                    <button onclick="InitiativesController.closeInitiativeModalWindow()" class="px-4 py-2 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">Cancel</button>
                    <button onclick="InitiativesController.commitInitiativeFormToLocalState()" class="px-6 py-2 bg-teal-700 hover:bg-teal-800 text-white font-black uppercase tracking-wider rounded-xl shadow-md transition-colors">Apply Matrix Changes</button>
                </div>
            </div>
        </div>
        `;
        },

        getContractGroupSmartCards: function (groupArray, preSelectedGroupId) {
            let html = '<div class="space-y-2">';

            groupArray.forEach(g => {
                const expDateStr = g.maxDate ? g.maxDate.toISOString().split('T')[0] : "N/A";
                const isSelected = preSelectedGroupId === g.id;

                // 1. Calcolo Scadenza: se la data massima del gruppo è nel passato, è tutto scaduto
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const isFullyExpired = g.maxDate && (g.maxDate < today);

                // 2. Classe CSS per opacizzare (torna normale se ci passi il mouse o se lo selezioni)
                const expiredOpacityClass = isFullyExpired && !isSelected ? 'opacity-40 grayscale hover:opacity-100 hover:grayscale-0' : '';

                let listHtml = g.contracts.map(c => {
                    let desc = c["Scope"] || c["Description"] || "No scope provided";
                    let safeScope = String(desc).replace(/"/g, '&quot;');
                    let cc = c["Cost Center"] || "N/A";
                    let tcv = parseFloat(c["Total Commitment"] || c["TCV"] || 0);
                    let term = c["Contract Term (Months)"] || "N/A";

                    let endDate = c["Expiration Date"] || c["End Date"] || c["Contract End Date"] || "N/A";
                    if (endDate !== "N/A") {
                        let ed = new Date(endDate);
                        if (!isNaN(ed.getTime())) endDate = ed.toISOString().split('T')[0];
                    }
                    let runRate = parseFloat(c["Annual Value"] || 0);

                    return `
                    <tr class="border-b border-slate-100 hover:bg-slate-100 transition-colors">
                        <td class="p-1.5 truncate max-w-[200px] font-medium text-slate-800" title="${safeScope}">${desc}</td>
                        <td class="p-1.5">${cc}</td>
                        <td class="p-1.5">€${Math.round(tcv).toLocaleString('it-IT')}</td>
                        <td class="p-1.5 truncate max-w-[100px]" title="${term}">${term}</td>
                        <td class="p-1.5">${endDate}</td>
                        <td class="p-1.5 font-bold text-slate-700">€${Math.round(runRate).toLocaleString('it-IT')}</td>
                    </tr>
                `;
                }).join('');

                const borderClass = isSelected ? 'border-teal-500 bg-teal-50/20 ring-1 ring-teal-500 shadow-sm' : 'border-slate-200 bg-white hover:border-teal-300';
                const checkIcon = isSelected
                    ? `<svg class="w-4 h-4 text-teal-600 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`
                    : `<div class="w-4 h-4 rounded-full border-2 border-slate-300 shrink-0"></div>`;

                html += `
                <div class="border ${borderClass} ${expiredOpacityClass} rounded-xl p-2.5 transition-all cursor-pointer group-card pb-3" onclick="InitiativesController.selectGroup('${g.id}')" id="group-card-${g.id}">
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex items-center gap-2.5 min-w-0 flex-1">
                            <div id="group-check-${g.id}" class="shrink-0">${checkIcon}</div>
                            <div class="min-w-0 flex-1">
                                <div class="font-black text-[11px] text-slate-800">[${g.le}] Group ID: <span class="text-indigo-600">${g.id}</span></div>
                                <div class="flex flex-wrap gap-x-2 gap-y-0.5 text-[9px] font-bold text-slate-500 mt-0.5">
                                    <div class="truncate">Supplier: <span class="text-slate-700">${g.supplier}</span></div>
                                    <div class="text-slate-300">•</div>
                                    <div>Type: <span class="text-indigo-600 uppercase font-black text-[8px] border border-indigo-100 bg-indigo-50/50 px-1 rounded shadow-3xs">${g.expType}</span></div>
                                </div>
                            </div>
                        </div>
                        <div class="text-right shrink-0">
                            <div class="font-mono font-black text-slate-700 text-[12px]">€${Math.round(g.sum).toLocaleString('it-IT')}</div>
                            <div class="text-[8px] font-bold text-slate-400 uppercase mt-0.5">Max Exp: <span class="text-slate-600">${expDateStr}</span></div>
                        </div>
                    </div>

                    <div id="group-details-${g.id}" class="${isSelected ? '' : 'hidden'} mt-3 bg-slate-50 border border-slate-200/60 rounded-lg overflow-x-auto custom-scrollbar p-1 shadow-inner" onclick="event.stopPropagation()">
                        <table class="w-full text-[8px] text-left text-slate-600 whitespace-nowrap">
                            <thead class="text-slate-400 uppercase tracking-widest border-b border-slate-200">
                                <tr>
                                    <th class="p-1.5 font-black">Scope / Service Name</th>
                                    <th class="p-1.5 font-black">Cost Ctr</th>
                                    <th class="p-1.5 font-black">Commitment</th>
                                    <th class="p-1.5 font-black">Term</th>
                                    <th class="p-1.5 font-black">End Date</th>
                                    <th class="p-1.5 font-black">Run Rate</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${listHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            });
            html += '</div>';
            return html;
        }
    };
</script>
